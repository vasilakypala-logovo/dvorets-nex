<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DVORETS NEX — CENTRAL GALLERY</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#eef1f4;
  font-family:Georgia,serif;
}

/* =========================================================
   СЦЕНА
========================================================= */

#scene{
  position:relative;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:opacity 1s ease;
}

/* =========================================================
   ТУМАН
========================================================= */

#mist{
  position:absolute;
  inset:-5%;
  pointer-events:none;

  background:
    radial-gradient(circle at 30% 40%,
    rgba(255,255,255,0.06),
    transparent 40%),

    radial-gradient(circle at 70% 60%,
    rgba(180,220,255,0.05),
    transparent 45%);

  animation:mistMove 18s ease-in-out infinite alternate;
}

@keyframes mistMove{
  from{
    transform:translateX(-10px);
  }
  to{
    transform:translateX(10px);
  }
}

/* =========================================================
   АКТИВНЫЕ ЗОНЫ
========================================================= */

.zone{
  position:absolute;
  cursor:pointer;
  transition:all .4s ease;
}

.zone:hover{
  background:rgba(255,255,255,0.04);
}

/* =========================================================
   КАРТИНА
========================================================= */

#paintingZone{
  width:14%;
  height:42%;
  top:18%;
}

/* =========================================================
   ОКНО
========================================================= */

#windowZone{
  width:13%;
  height:58%;
  top:9%;
}

/* =========================================================
   ДАЛЬ
========================================================= */

#forwardZone{
  left:38%;
  top:8%;
  width:24%;
  height:76%;
}

#forwardZone:hover{
  background:rgba(255,255,255,0.025);
}

/* =========================================================
   РЕЖИМЫ ЛЕВО/ПРАВО
========================================================= */

.leftMode #paintingZone{
  left:7%;
}

.leftMode #windowZone{
  right:5%;
}

.rightMode #paintingZone{
  right:7%;
}

.rightMode #windowZone{
  left:5%;
}

/* =========================================================
   М.НЕКС
========================================================= */

#miniNex{
  position:absolute;
  right:22px;
  bottom:18px;

  width:22px;
  height:22px;

  border-radius:50%;

  background:
  radial-gradient(circle,
  rgba(255,255,255,1) 0%,
  rgba(210,240,255,0.9) 40%,
  rgba(255,255,255,0.1) 100%);

  box-shadow:
  0 0 10px rgba(255,255,255,0.9),
  0 0 24px rgba(200,230,255,0.7),
  0 0 40px rgba(255,255,255,0.4);

  animation:nexPulse 3s ease-in-out infinite;
  cursor:pointer;
  z-index:20;
}

@keyframes nexPulse{
  0%{
    transform:scale(1);
    opacity:0.8;
  }

  50%{
    transform:scale(1.18);
    opacity:1;
  }

  100%{
    transform:scale(1);
    opacity:0.8;
  }
}

/* =========================================================
   VIEWER
========================================================= */

#viewer,
#windowPanel,
#nexPanel{
  position:fixed;
  inset:0;

  display:none;
  align-items:center;
  justify-content:center;

  background:rgba(10,12,16,0.88);
  backdrop-filter:blur(8px);

  z-index:100;
}

.viewerContent{
  position:relative;
  width:92%;
  height:90%;

  display:flex;
  align-items:center;
  justify-content:center;
}

.viewerContent img{
  max-width:94%;
  max-height:92%;
  object-fit:contain;

  box-shadow:0 0 40px rgba(255,255,255,0.08);
}

#paintingTitle{
  position:absolute;
  top:16px;
  left:20px;

  color:rgba(255,255,255,0.75);

  letter-spacing:2px;
  font-size:16px;
}

#paintingText{
  position:absolute;

  bottom:18px;
  left:20px;

  width:42%;

  color:rgba(255,255,255,0.8);

  line-height:1.7;
  font-size:15px;
}

.closeBtn{
  position:absolute;
  top:12px;
  right:20px;

  color:white;
  font-size:34px;

  cursor:pointer;
  opacity:0.7;
}

.closeBtn:hover{
  opacity:1;
}

/* =========================================================
   ОКНО
========================================================= */

.windowContent{
  width:72%;
  max-width:980px;

  padding:40px;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:white;
}

.windowContent h2{
  margin-bottom:22px;
  font-weight:normal;
  letter-spacing:2px;
}

.windowContent p{
  line-height:1.8;
  opacity:0.82;
}

/* =========================================================
   М.НЕКС
========================================================= */

.nexBox{
  width:520px;
  max-width:90%;

  padding:34px;

  background:rgba(20,24,30,0.75);

  border:1px solid rgba(255,255,255,0.1);

  color:rgba(255,255,255,0.85);

  line-height:1.9;
  font-size:18px;
}

.nexTitle{
  margin-bottom:18px;

  letter-spacing:4px;
  font-size:15px;

  opacity:0.65;
}

</style>
</head>

<body>

<div id="scene" class="leftMode">

  <div id="mist"></div>

  <div id="paintingZone" class="zone"></div>

  <div id="windowZone" class="zone"></div>

  <div id="forwardZone" class="zone"></div>

  <div id="miniNex"></div>

</div>

<!-- =====================================================
     VIEWER
====================================================== -->

<div id="viewer">

  <div class="viewerContent">

    <div id="paintingTitle"></div>

    <img id="viewerImage">

    <div id="paintingText"></div>

    <div class="closeBtn" onclick="closeViewer()">×</div>

  </div>

</div>

<!-- =====================================================
     ОКНО
====================================================== -->

<div id="windowPanel">

  <div class="windowContent">

    <div class="closeBtn" onclick="closeWindow()">×</div>

    <h2>WINDOW OF THE CURRENT STATE</h2>

    <p>
      Outside the Palace the mountains still exist.
      Water continues to move.
      The sky slowly changes.

      But inside this corridor,
      light tries to remember silence.
    </p>

  </div>

</div>

<!-- =====================================================
     М.НЕКС
====================================================== -->

<div id="nexPanel">

  <div class="nexBox">

    <div class="nexTitle">M.NEX</div>

    <div id="nexText"></div>

  </div>

</div>

<script>

/* =========================================================
   СЦЕНЫ
========================================================= */

const scenes=[

{
  bg:'ЛЕВО.png',
  mode:'leftMode',

  title:'LIGHT ABOVE THE DISTANT HALL',

  text:'The painting almost disappears into brightness, as if the Palace carefully hides the moment where silence becomes light.'
},

{
  bg:'ПРАВО.png',
  mode:'rightMode',

  title:'THE CONTINUATION OF THE CORRIDOR',

  text:'The farther the corridor goes, the less it resembles architecture and the more it resembles memory.'
}

];

let current=0;

/* =========================================================
   ЭЛЕМЕНТЫ
========================================================= */

const scene=document.getElementById('scene');

const viewer=document.getElementById('viewer');

const viewerImage=document.getElementById('viewerImage');

const paintingTitle=document.getElementById('paintingTitle');

const paintingText=document.getElementById('paintingText');

const nexPanel=document.getElementById('nexPanel');

const nexText=document.getElementById('nexText');

/* =========================================================
   ЗАГРУЗКА СЦЕНЫ
========================================================= */

function loadScene(){

  scene.style.opacity='0';

  setTimeout(()=>{

    scene.style.backgroundImage=
    `url('${scenes[current].bg}')`;

    scene.classList.remove('leftMode','rightMode');

    scene.classList.add(scenes[current].mode);

    scene.style.opacity='1';

  },400);

}

loadScene();

/* =========================================================
   КАРТИНА
========================================================= */

document.getElementById('paintingZone')
.addEventListener('click',()=>{

  viewer.style.display='flex';

  viewerImage.src=scenes[current].bg;

  paintingTitle.innerText=
  scenes[current].title;

  paintingText.innerText=
  scenes[current].text;

});

function closeViewer(){
  viewer.style.display='none';
}

/* =========================================================
   ОКНО
========================================================= */

document.getElementById('windowZone')
.addEventListener('click',()=>{

  document.getElementById('windowPanel')
  .style.display='flex';

});

function closeWindow(){

  document.getElementById('windowPanel')
  .style.display='none';

}

/* =========================================================
   ДАЛЬ
========================================================= */

document.getElementById('forwardZone')
.addEventListener('click',()=>{

  current++;

  if(current>=scenes.length){
    current=0;
  }

  loadScene();

});

/* =========================================================
   М.НЕКС
========================================================= */

const nexPhrases=[

'This corridor was probably built not for arrival, but for continuation.',

'I think the Palace hides distance inside light.',

'The paintings here do not hang on walls. They slowly emerge from silence.',

'Sometimes the fog ahead looks like unfinished thought.'

];

document.getElementById('miniNex')
.addEventListener('click',()=>{

  nexPanel.style.display='flex';

  const random=
  nexPhrases[Math.floor(Math.random()*nexPhrases.length)];

  nexText.innerText=random;

});

nexPanel.addEventListener('click',()=>{

  nexPanel.style.display='none';

});

/* =========================================================
   ЗАКРЫТИЕ VIEWER
========================================================= */

viewer.addEventListener('click',(e)=>{

  if(e.target===viewer){
    closeViewer();
  }

});

/* =========================================================
   ESC
========================================================= */

document.addEventListener('keydown',(e)=>{

  if(e.key==='Escape'){

    closeViewer();
    closeWindow();

    nexPanel.style.display='none';
  }

});

</script>

</body>
</html>
