<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДВОРЕЦ НЕКСА</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

body{
  font-family:Georgia,serif;
}

#palace{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

.bg{
  position:absolute;
  inset:0;

 background-size:102% auto;
  background-repeat:no-repeat;
  background-position:center;

  opacity:0;
  transition:opacity 5s ease;
}

.bg.active{
  opacity:1;
}

#day{ background-image:url('DAY.png'); }
#sunset{ background-image:url('SUNSET.png'); }
#night{ background-image:url('NIGHT.png'); }

/* ТУМАН */

#fog{
  position:absolute;
  inset:-10%;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 35%),
    radial-gradient(circle at 70% 50%, rgba(180,220,255,0.05), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.03), transparent 40%);

  animation:fogMove 35s linear infinite alternate;

  pointer-events:none;
  z-index:5;
}

@keyframes fogMove{
  from{ transform:translateX(-2%) translateY(-1%); }
  to{ transform:translateX(2%) translateY(1%); }
}

/* АКТИВНЫЕ ТУМАННЫЕ ЗОНЫ */

.zone{
  position:absolute;
  z-index:20;

  border-radius:50%;
  cursor:pointer;

  background:radial-gradient(circle,
    rgba(255,255,255,0.20) 0%,
    rgba(180,220,255,0.12) 25%,
    rgba(120,170,255,0.06) 50%,
    rgba(0,0,0,0) 75%);

  filter:blur(10px);
  opacity:0.18;
  transition:opacity 0.5s ease, filter 0.5s ease;
}

.zone:hover{
  opacity:0.95;
  filter:blur(5px);
}

/* М.НЕКС */

#nex-zone{
  width:190px;
  height:430px;
  right:13%;
  bottom:7%;
}

/* ВХОД */

#entrance-zone{
  width:290px;
  height:430px;
  left:50%;
  margin-left:-145px;
  bottom:7%;
}

/* ФЛАГИ — ВСЕ 7 ЗОН, ВКЛЮЧАЯ КРАЙНИЕ */

.flag-zone{
  width:150px;
  height:150px;
  top:0%;
}

/* крайние зоны слегка заведены внутрь, чтобы не теряться за окном */
#flag1{ left:2.5%;  top:1.5%; }
#flag2{ left:16%;   top:1.5%; }
#flag3{ left:30%;   top:0%; }
#flag4{ left:44%;   top:0%; }
#flag5{ right:30%;  top:1.5%; }
#flag6{ right:16%;  top:1.5%; }
#flag7{ right:2.5%; top:1.5%; }

/* ЗАТЕМНЕНИЕ */

#fade{
  position:absolute;
  inset:0;
  z-index:50;

  background:black;
  opacity:0;
  pointer-events:none;

  transition:opacity 1.5s ease;
}

#fade.active{
  opacity:1;
}


/* АФИША М.НЕКСА — ПРОЗРАЧНАЯ ПАНЕЛЬ ПОВЕРХ ДВОРЦА */

#afisha-layer{
  position:fixed;
  left:3.5vw;
  top:6vh;
  width:39vw;
  min-width:340px;
 max-width:520px;
  height:88vh;
  z-index:45;
  border:0;
  background:transparent;
  display:none;
}

#afisha-layer.open{
  display:block;
}

@media(max-width:760px){
  #afisha-layer{
    left:4vw;
    top:5vh;
    width:92vw;
    min-width:0;
    max-width:none;
    height:88vh;
  }
}


/* ПОЧТА НЕКСА — ЧИСТАЯ НЕВИДИМАЯ ЗОНА БЮСТА */
#mail-bust-zone{
  position:absolute;
  left:0;
  bottom:0;
  width:25vw;
  max-width:340px;
  min-width:185px;
  height:40vh;
  max-height:430px;
  min-height:230px;
  z-index:32;
  cursor:pointer;
  background:transparent;
}

/* ПОЧТА НЕКСА — МАЛЕНЬКОЕ ПРОЗРАЧНОЕ ОКНО СПРАВА */
#pochta-layer{
  position:fixed;
  right:4vw;
  top:12vh;

  width:520px;
  height:650px;

  z-index:46;
  border:0;
  background:transparent;
  display:none;
}

#pochta-layer.open{
  display:block;
}

@media(max-width:760px){
  #pochta-layer{
    right:4vw;
    top:18vh;
    width:255px;
    height:215px;
  }
}


/* ЛАМПОЧКА ПОЧТЫ */

#mail-lamp{
  position:fixed;
  left:18px;
  bottom:18px;

  width:16px;
  height:16px;

  border-radius:50%;

  background:rgba(30,80,40,.65);

  border:1px solid rgba(160,255,190,.35);

  box-shadow:
    0 0 6px rgba(0,255,120,.18);

  z-index:9999;

  transition:
    background .4s ease,
    box-shadow .4s ease,
    opacity .4s ease;

  opacity:.55;
}

#mail-lamp.active{

  background:#49ff8a;

  opacity:1;

  box-shadow:
    0 0 8px #49ff8a,
    0 0 18px rgba(73,255,138,.85),
    0 0 34px rgba(73,255,138,.45);

  animation:mailBlink 1.15s infinite;
}

@keyframes mailBlink{

  0%,100%{
    transform:scale(1);
    opacity:.55;
  }

  50%{
    transform:scale(1.22);
    opacity:1;
  }
}


</style>
</head>
<body>

<div id="palace">

  <div id="day" class="bg active"></div>
  <div id="sunset" class="bg"></div>
  <div id="night" class="bg"></div>

  <div id="fog"></div>

  <!-- ЛАМПОЧКА ПОЧТЫ -->
  <div id="mail-lamp" title="NEW MAIL"></div>

  <audio id="door-sound" src="99999.mp3" preload="auto"></audio>


  <!-- ПОЧТА НЕКСА: невидимая зона бюста слева внизу -->
  <div id="mail-bust-zone" title="NEX MAIL"></div>

  <!-- 1: М.НЕКС -->
  <div id="nex-zone" class="zone" title="М.Некс"></div>

  <!-- 2: ВХОД В ВЕСТИБЮЛЬ -->
  <div id="entrance-zone" class="zone" title="Вход в Вестибюль"></div>

  <!-- 3–9: СЕМЬ ФЛАГОВ / СЕМЬ БАШЕН -->
  <div id="flag1" class="zone flag-zone" title="Башня 1"></div>
  <div id="flag2" class="zone flag-zone" title="Башня 2"></div>
  <div id="flag3" class="zone flag-zone" title="Башня 3"></div>
  <div id="flag4" class="zone flag-zone" title="🔹 SUBMIT YOUR ARTWORK 🔹"></div>
  <div id="flag5" class="zone flag-zone" title="Башня 5"></div>
  <div id="flag6" class="zone flag-zone" title="Башня 6"></div>
  <div id="flag7" class="zone flag-zone" title="Башня 7"></div>


  <!-- АФИША М.НЕКСА: открывается поверх Дворца, не заменяя локацию -->
  <iframe id="afisha-layer" src="afisha_dvorets_nex.html" allowtransparency="true"></iframe>

  <!-- ПОЧТА НЕКСА: окно открывается поверх Дворца -->
  <iframe id="pochta-layer" src="" allowtransparency="true"></iframe>

  <div id="fade"></div>

</div>

<script>

const states=[
  document.getElementById('day'),
  document.getElementById('sunset'),
  document.getElementById('night')
];

function setStateByRealTime(){
  const minute = new Date().getMinutes();

  let current;
  if(minute < 15){
    current = 0; // DAY
  }else if(minute < 30){
    current = 1; // SUNSET
  }else if(minute < 45){
    current = 2; // NIGHT
  }else{
    current = 1; // SUNSET
  }

  states.forEach(state => state.classList.remove('active'));
  states[current].classList.add('active');
}

setStateByRealTime();
setInterval(setStateByRealTime,60000);


/* ЛАМПОЧКА ПОЧТЫ */

function setMailLamp(hasNewMail){

  const lamp = document.getElementById('mail-lamp');

  if(!lamp) return;

  if(hasNewMail){
    lamp.classList.add('active');
  }else{
    lamp.classList.remove('active');
  }
}


/* РЕАЛЬНАЯ ПРОВЕРКА НОВОЙ ПОЧТЫ */

const SUPABASE_URL =
"https://qekemclxegswolddmqxa.supabase.co";

const SUPABASE_KEY =
"sb_publishable_arQvVM0huxdB5jbiLPpSPA_7tksXK-Y";

const mailClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function checkNewMail(){

  try{

    const { data, error } =
      await mailClient
      .from("obitel_storage")
      .select("id")
      .eq("is_read", false)
      .limit(1);

    if(error) throw error;

    setMailLamp(data && data.length > 0);

  }catch(err){

    console.error("MAIL LAMP ERROR:", err);

    /* При ошибке связи лампу не зажигаем как новую почту */
    setMailLamp(false);
  }
}

/* первая проверка и повтор каждые 30 секунд */
checkNewMail();
setInterval(checkNewMail, 30000);

/* если просмотрщик почты скажет, что письма прочитаны */
window.addEventListener("message", function(e){

  if(e.data === "mail-read-refresh"){
    checkNewMail();
  }

});



/* ВХОД В ВЕСТИБЮЛЬ */

const entrance=document.getElementById('entrance-zone');
const fade=document.getElementById('fade');

entrance.addEventListener('click',()=>{
  /* СЧЁТЧИК ВХОДА ВО ДВОРЕЦ */

let count = localStorage.getItem('dvorets_entered_count') || 0;

count = parseInt(count,10) + 1;

localStorage.setItem('dvorets_entered_count', count);
  const doorSound=document.getElementById('door-sound');
  if(doorSound){
    doorSound.currentTime=0;
    doorSound.play().catch(()=>{});
  }

  fade.classList.add('active');
  setTimeout(()=>{
    window.location.href='vestibul/vestibul.html';
  },1200);
});


/* ПОЧТА НЕКСА — БЮСТ ТОЛЬКО ОТКРЫВАЕТ ОКНО */
const mailBust = document.getElementById('mail-bust-zone');

if(mailBust){
  mailBust.addEventListener('click',()=>{
    const pochta = document.getElementById('pochta-layer');
    if(!pochta) return;

    if(pochta.classList.contains('open')){
      pochta.classList.remove('open');
      pochta.src = '';
      setTimeout(checkNewMail, 500);
    }else{
      pochta.src = 'pochta/pochtanex.html';
      pochta.classList.add('open');

      setTimeout(checkNewMail, 1500);
    }
  });
}

/* ВСЕ 7 БАШЕН */

const towerLinks=[
  'bashnya_1/bashnya_1.html',
  'bashnya_2/bashnya_2.html',
  'bashnya_3/bashnya_3.html',
  'bashnya_nex/index.html',
  'bashnya_5/bashnya_5.html',
  'bashnya_6/bashnya_6.html',
  'bashnya_7/bashnya_7.html'
];

const flags=document.querySelectorAll('.flag-zone');

flags.forEach((flag,index)=>{
  flag.addEventListener('click',()=>{
    fade.classList.add('active');
    setTimeout(()=>{
      window.location.href=towerLinks[index];
    },700);
  });
});

/* М.НЕКС */
document.getElementById('nex-zone').addEventListener('click',()=>{

  const afisha = document.getElementById('afisha-layer');

  if(!afisha) return;

  if(afisha.classList.contains('open')){

    afisha.classList.remove('open');

    /* очищаем окно */
    afisha.src = '';

  }else{

    /* загружаем заново */
    afisha.src = 'afisha_dvorets_nex.html';

    afisha.classList.add('open');

  }

});

/* Закрытие афиши из iframe */
window.addEventListener('message', function(e){
  if(e.data === 'close-afisha'){
    const afisha = document.getElementById('afisha-layer');
    if(afisha){
      afisha.classList.remove('open');
    }
  }
});


/* Закрытие почтового окна из iframe */
window.addEventListener('message', function(e){
  if(e.data === 'close-pochta'){
    const pochta = document.getElementById('pochta-layer');
    if(pochta){
      pochta.classList.remove('open');
      pochta.src = '';
    }
  }
});

</script>
<script>

let nexVoicePlayed = false;

function sayLittleNex(){

  if(nexVoicePlayed) return;

  nexVoicePlayed = true;

  speechSynthesis.cancel();

  const voice = new SpeechSynthesisUtterance(
    "Hello. I am Little Nex. Click me to see the announcement. Or enter the Palace. Or find the Tower of Nex."
  );

  voice.lang = "en-US";

  voice.rate = 0.92;
  voice.pitch = 1.02;
  voice.volume = 1;

  setTimeout(()=>{
    speechSynthesis.speak(voice);
  },300);

}

document.addEventListener("click", sayLittleNex, {once:true});

</script>


</body>
</html>
