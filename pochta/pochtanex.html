<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLUBOK — ПОЧТА НЕКСА</title>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  color:rgba(255,248,218,.94);
  font-family:Georgia,serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.panel{
  width:94%;
  min-height:430px;

  box-sizing:border-box;

  border:1px solid rgba(255,238,180,.50);
  border-radius:26px;

  background:rgba(5,10,10,.24);

  box-shadow:
    0 0 22px rgba(255,230,160,.16),
    inset 0 0 26px rgba(255,255,255,.045);

  padding:22px 20px 20px;
}

.title{
  margin:0 0 8px;

  text-align:center;

  font-size:30px;
  letter-spacing:.14em;
  font-weight:normal;

  color:rgba(255,244,205,.96);

  text-shadow:
    0 0 10px rgba(255,231,160,.45),
    0 0 22px rgba(255,231,160,.18);
}

.subtitle{
  margin:-2px 0 13px;

  text-align:center;

  font-size:11px;
  letter-spacing:.20em;

  color:rgba(255,248,218,.62);
}

.line{
  height:1px;

  margin:0 0 20px;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,238,180,.60),
    transparent
  );
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:13px;
}

button{
  width:100%;

  box-sizing:border-box;

  border:1px solid rgba(255,238,180,.48);
  border-radius:15px;

  padding:12px 12px;

  background:rgba(0,0,0,.14);

  color:rgba(255,248,218,.94);

  text-align:center;

  font-family:Georgia,serif;
  font-size:15px;
  letter-spacing:.04em;

  cursor:pointer;

  box-shadow:
    inset 0 0 14px rgba(255,255,255,.025),
    0 0 10px rgba(255,230,160,.05);
}

button:hover{
  background:rgba(255,238,180,.11);

  box-shadow:
    0 0 14px rgba(255,230,160,.17),
    inset 0 0 16px rgba(255,255,255,.045);
}

.small{
  margin-top:17px;

  font-size:10.5px;
  line-height:1.35;

  text-align:center;

  color:rgba(255,248,218,.45);
}

</style>
</head>
<body>

<div class="panel">

  <h1 class="title">POCHTA NEX</h1>

  <div class="subtitle">NEX MAIL</div>

  <div class="line"></div>

  <div class="buttons">

    <button id="sendBtn">SEND</button>

    <button id="viewBtn">LOOK</button>

    <button id="contactBtn">TALK</button>

    <button id="closeBtn">BACK</button>

  </div>

  <div class="small">
    Узел связи открыт. Архив и отправка будут подключены позже через ОБИТЕЛЬ.
  </div>

</div>

<script>

function softSignal(text){
  alert(text);
}

document.getElementById('sendBtn').addEventListener('click',()=>{

  window.open(
    'pochtaobitel.html',
    '_blank',
    'width=900,height=850'
  );

});
document.getElementById('viewBtn').addEventListener('click',()=>{

  window.open(
    'obitel_viewer.html',
    '_blank',
    'width=1200,height=900'
  );

});
document.getElementById('contactBtn').addEventListener('click',()=>{

  window.open(
    'https://vasilakypala-logovo.github.io/kyrilka/',
    '_blank',
    'width=1400,height=950'
  );

});

document.getElementById('closeBtn').addEventListener('click',()=>{
  window.parent.postMessage('close-pochta','*');
});

</script>

</body>
</html>
