<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОЧТА НЕКСА</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  color:#ecfff3;
  font-family:Georgia,serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.panel{
  width:92%;
  height:88%;
  box-sizing:border-box;
  border:1px solid rgba(185,255,215,.34);
  border-radius:22px;
  background:
    radial-gradient(circle at 20% 15%, rgba(90,255,165,.20), transparent 34%),
    radial-gradient(circle at 80% 80%, rgba(120,170,255,.13), transparent 36%),
    rgba(2,10,6,.34);
  box-shadow:
    0 0 28px rgba(80,255,160,.16),
    inset 0 0 30px rgba(255,255,255,.035);
  backdrop-filter:blur(8px);
  padding:18px 18px 16px;
}

.title{
  margin:0;
  font-size:17px;
  letter-spacing:.16em;
  font-weight:normal;
  color:#ddffec;
  text-shadow:0 0 14px rgba(80,255,170,.55);
}

.line{
  height:1px;
  margin:12px 0 14px;
  background:linear-gradient(90deg, transparent, rgba(185,255,215,.45), transparent);
}

.signal{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0 12px;
  color:rgba(235,255,242,.86);
  font-size:14px;
  line-height:1.35;
}

.lamp{
  width:13px;
  height:13px;
  flex:0 0 13px;
  border-radius:50%;
  background:rgba(60,255,145,.90);
  box-shadow:
    0 0 9px rgba(60,255,145,.95),
    0 0 22px rgba(60,255,145,.46);
}

.lamp.empty{
  background:rgba(180,210,190,.32);
  box-shadow:0 0 9px rgba(190,230,205,.18);
}

.note{
  margin:10px 0 15px;
  font-size:12px;
  line-height:1.45;
  color:rgba(235,255,242,.62);
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:9px;
}

button,a.button{
  display:block;
  width:100%;
  box-sizing:border-box;
  border:1px solid rgba(190,255,220,.34);
  border-radius:999px;
  padding:9px 14px;
  background:rgba(12,44,28,.42);
  color:#effff3;
  text-align:center;
  text-decoration:none;
  font-family:Georgia,serif;
  font-size:12px;
  letter-spacing:.10em;
  cursor:pointer;
  transition:.3s ease;
}

button:hover,a.button:hover{
  background:rgba(45,120,72,.62);
  box-shadow:0 0 18px rgba(90,255,160,.25);
}

.small{
  margin-top:12px;
  font-size:11px;
  color:rgba(235,255,242,.44);
  text-align:center;
}
</style>
</head>
<body>

<div class="panel">
  <h1 class="title">NEX MAIL</h1>
  <div class="line"></div>

  <div class="signal">
    <span class="lamp empty"></span>
    <span>Новых писем пока нет.</span>
  </div>

  <div class="signal">
    <span class="lamp"></span>
    <span>Архив почты готовится в ОБИТЕЛИ НЕКСА.</span>
  </div>

  <div class="note">
    Это не окно письма, а почтовый пульт Дворца: здесь будут сигналы, вход в журнал и отметки о новых сообщениях.
  </div>

  <div class="buttons">
    <a class="button" href="../obitel/obitel.html" target="_top">ВОЙТИ В ЖУРНАЛ ОБИТЕЛИ</a>
    <button id="closeBtn">ВЫЙТИ НАЗАД</button>
  </div>

  <div class="small">бюст держит связь • Маленький Некс слушает</div>
</div>

<script>
document.getElementById('closeBtn').addEventListener('click',()=>{
  if(window.parent){
    window.parent.postMessage('close-pochta','*');
  }
});
</script>

</body>
</html>
