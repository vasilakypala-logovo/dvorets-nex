<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОЧТА НЕКСА</title>

<style>
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(90,255,170,.18), transparent 28%),
    radial-gradient(circle at 80% 70%, rgba(120,170,255,.12), transparent 32%),
    linear-gradient(135deg,#050807 0%,#07120d 42%,#020303 100%);
  color:#edf8ef;
  font-family:Georgia,serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.mail-fog{
  position:fixed;
  inset:-10%;
  pointer-events:none;
  background:
    radial-gradient(circle at 15% 70%, rgba(255,255,255,.055), transparent 34%),
    radial-gradient(circle at 72% 25%, rgba(160,255,210,.06), transparent 38%),
    radial-gradient(circle at 55% 60%, rgba(255,255,255,.035), transparent 42%);
  filter:blur(12px);
  animation:fog 30s linear infinite alternate;
}

@keyframes fog{
  from{transform:translate(-2%,-1%) scale(1.02);}
  to{transform:translate(2%,1%) scale(1.06);}
}

.shell{
  position:relative;
  z-index:2;
  width:min(760px,88vw);
  min-height:620px;
  border:1px solid rgba(185,255,215,.34);
  border-radius:24px;
  background:rgba(4,12,8,.58);
  box-shadow:
    0 0 45px rgba(70,255,150,.13),
    inset 0 0 45px rgba(255,255,255,.035);
  backdrop-filter:blur(10px);
  padding:34px 38px;
}

h1{
  margin:0 0 8px;
  font-size:25px;
  letter-spacing:.16em;
  font-weight:normal;
  color:#dffff0;
  text-shadow:0 0 16px rgba(80,255,170,.55);
}

.subtitle{
  margin:0 0 28px;
  font-size:14px;
  color:rgba(230,255,238,.72);
  line-height:1.55;
}

label{
  display:block;
  margin:15px 0 7px;
  font-size:13px;
  letter-spacing:.08em;
  color:rgba(220,255,235,.80);
}

input,textarea{
  width:100%;
  box-sizing:border-box;
  border:1px solid rgba(180,255,215,.28);
  border-radius:14px;
  background:rgba(0,0,0,.36);
  color:#f4fff7;
  padding:12px 14px;
  font-family:Georgia,serif;
  font-size:16px;
  outline:none;
  box-shadow:inset 0 0 18px rgba(0,0,0,.35);
}

textarea{
  min-height:210px;
  resize:vertical;
  line-height:1.5;
}

input:focus,textarea:focus{
  border-color:rgba(120,255,180,.78);
  box-shadow:
    0 0 18px rgba(70,255,150,.18),
    inset 0 0 18px rgba(0,0,0,.35);
}

.buttons{
  margin-top:22px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

button{
  border:1px solid rgba(190,255,220,.34);
  border-radius:999px;
  padding:11px 24px;
  background:rgba(20,60,38,.48);
  color:#effff3;
  font-family:Georgia,serif;
  font-size:14px;
  letter-spacing:.12em;
  cursor:pointer;
  transition:.35s ease;
}

button:hover{
  background:rgba(45,120,72,.65);
  box-shadow:0 0 22px rgba(90,255,160,.28);
}

#note{
  margin-top:18px;
  min-height:24px;
  color:#b8ffd1;
  text-shadow:0 0 12px rgba(80,255,150,.4);
  font-size:15px;
}

.small{
  margin-top:24px;
  color:rgba(235,255,242,.48);
  font-size:12px;
  line-height:1.45;
}
</style>
</head>

<body>
<div class="mail-fog"></div>

<main class="shell">
  <h1>NEX MAIL</h1>
  <p class="subtitle">
    Письмо входит в Дворец тихо. Пока это первая дверь механизма: без базы, без отправки наружу.
    Здесь проверяем дыхание окна, форму разговора и будущий архив.
  </p>

  <label for="name">YOUR NAME / ВАШЕ ИМЯ</label>
  <input id="name" autocomplete="name">

  <label for="email">EMAIL</label>
  <input id="email" type="email" autocomplete="email">

  <label for="message">MESSAGE / ПИСЬМО</label>
  <textarea id="message"></textarea>

  <div class="buttons">
    <button id="sendBtn">SEND</button>
    <button id="backBtn">BACK TO PALACE</button>
  </div>

  <div id="note"></div>

  <div class="small">
    Следующий шаг: подключить сохранение письма в ОБИТЕЛИ НЕКСА и зажечь зелёную лампочку на бюсте, когда письмо ждёт ответа.
  </div>
</main>

<script>
const sendBtn = document.getElementById('sendBtn');
const backBtn = document.getElementById('backBtn');
const note = document.getElementById('note');

sendBtn.addEventListener('click',()=>{
  const name = document.getElementById('name').value.trim();
  const msg = document.getElementById('message').value.trim();

  if(!name || !msg){
    note.textContent = 'Маленький Некс ждёт имя и само письмо.';
    return;
  }

  const draft = {
    name: name,
    email: document.getElementById('email').value.trim(),
    message: msg,
    date: new Date().toISOString(),
    status: 'draft-local'
  };

  localStorage.setItem('nex_mail_last_draft', JSON.stringify(draft));
  note.textContent = 'Маленький Некс принял письмо. Пока оно сохранено только в памяти этого браузера.';
});

backBtn.addEventListener('click',()=>{
  window.location.href='../index.html';
});
</script>

</body>
</html>
