<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОЧТА НЕКСА</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  color:rgba(250,255,250,.92);
  font-family:Georgia,serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
.panel{
  width:94%;
  height:88%;
  box-sizing:border-box;
  border:1px solid rgba(255,255,255,.23);
  border-radius:18px;
  background:rgba(0,0,0,.10);
  box-shadow:0 0 16px rgba(255,255,255,.08), inset 0 0 18px rgba(255,255,255,.025);
  padding:12px 13px;
}
.title{
  margin:0 0 8px;
  font-size:12px;
  letter-spacing:.20em;
  font-weight:normal;
  text-shadow:0 0 8px rgba(255,255,255,.45);
}
.line{
  height:1px;
  margin:0 0 9px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
}
.signal{
  display:flex;
  align-items:center;
  gap:8px;
  margin:7px 0;
  font-size:11px;
  line-height:1.25;
  color:rgba(250,255,250,.82);
}
.dot{
  width:8px;
  height:8px;
  flex:0 0 8px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.52);
  background:rgba(255,255,255,.18);
  box-shadow:0 0 8px rgba(255,255,255,.14);
}
.dot.on{
  background:rgba(70,255,140,.68);
  box-shadow:0 0 11px rgba(70,255,140,.65);
}
.note{
  margin:8px 0 10px;
  font-size:10.5px;
  line-height:1.28;
  color:rgba(250,255,250,.55);
}
.buttons{
  display:flex;
  gap:7px;
}
button,a.button{
  flex:1;
  box-sizing:border-box;
  border:1px solid rgba(255,255,255,.26);
  border-radius:999px;
  padding:6px 7px;
  background:rgba(0,0,0,.10);
  color:rgba(250,255,250,.92);
  text-align:center;
  text-decoration:none;
  font-family:Georgia,serif;
  font-size:9.5px;
  letter-spacing:.08em;
  cursor:pointer;
}
button:hover,a.button:hover{
  background:rgba(255,255,255,.10);
}
</style>
</head>
<body>

<div class="panel">
  <h1 class="title">NEX MAIL</h1>
  <div class="line"></div>

  <div class="signal"><span class="dot"></span><span>Новых сообщений пока нет.</span></div>
  <div class="signal"><span class="dot on"></span><span>Архив почты будет в ОБИТЕЛИ.</span></div>

  <div class="note">Это информационное окно. Здесь будут сигналы сообщений и вход в журнал.</div>

  <div class="buttons">
    <a class="button" href="../obitel/obitel.html" target="_top">ЖУРНАЛ</a>
    <button id="closeBtn">НАЗАД</button>
  </div>
</div>

<script>
document.getElementById('closeBtn').addEventListener('click',()=>{
  window.parent.postMessage('close-pochta','*');
});
</script>

</body>
</html>
