<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПОЧТА НЕКСА</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  color:#f4fff8;
  font-family:Georgia,serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.panel{
  width:96%;
  height:92%;
  box-sizing:border-box;
  border:1px solid rgba(245,255,248,.30);
  border-radius:18px;
  background:rgba(0,0,0,.16);
  box-shadow:
    0 0 18px rgba(255,255,255,.10),
    inset 0 0 18px rgba(255,255,255,.035);
  backdrop-filter:blur(3px);
  padding:13px 14px 12px;
}

.title{
  margin:0;
  font-size:13px;
  letter-spacing:.18em;
  font-weight:normal;
  color:rgba(250,255,252,.92);
  text-shadow:0 0 10px rgba(255,255,255,.34);
}

.line{
  height:1px;
  margin:9px 0 10px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.32), transparent);
}

.signal{
  display:flex;
  align-items:center;
  gap:8px;
  margin:8px 0;
  color:rgba(245,255,248,.82);
  font-size:12px;
  line-height:1.28;
}

.dot{
  width:9px;
  height:9px;
  flex:0 0 9px;
  border-radius:50%;
  border:1px solid rgba(240,255,245,.55);
  background:rgba(40,255,130,.72);
  box-shadow:0 0 10px rgba(70,255,145,.55);
}

.dot.sleep{
  background:rgba(255,255,255,.18);
  box-shadow:0 0 8px rgba(255,255,255,.12);
}

.note{
  margin:8px 0 11px;
  font-size:11px;
  line-height:1.35;
  color:rgba(245,255,248,.58);
}

.buttons{
  display:flex;
  gap:7px;
}

button,a.button{
  flex:1;
  box-sizing:border-box;
  border:1px solid rgba(255,255,255,.30);
  border-radius:999px;
  padding:7px 8px;
  background:rgba(0,0,0,.18);
  color:rgba(250,255,252,.92);
  text-align:center;
  text-decoration:none;
  font-family:Georgia,serif;
  font-size:10px;
  letter-spacing:.08em;
  cursor:pointer;
  transition:.25s ease;
}

button:hover,a.button:hover{
  background:rgba(255,255,255,.12);
  box-shadow:0 0 12px rgba(255,255,255,.16);
}
</style>
</head>
<body>

<div class="panel">
  <h1 class="title">NEX MAIL</h1>
  <div class="line"></div>

  <div class="signal">
    <span class="dot sleep"></span>
    <span>Новых сообщений пока нет.</span>
  </div>

  <div class="signal">
    <span class="dot"></span>
    <span>Почтовый архив будет связан с ОБИТЕЛЬЮ.</span>
  </div>

  <div class="note">
    Это только информационное окно. Здесь будут сигналы писем и вход в журнал.
  </div>

  <div class="buttons">
    <a class="button" href="../obitel/obitel.html" target="_top">ЖУРНАЛ</a>
    <button id="closeBtn">НАЗАД</button>
  </div>
</div>

<script>
document.getElementById('closeBtn').addEventListener('click',()=>{
  if(window.parent){
    window.parent.postMessage('close-pochta','*');
  }
});
</script>

</body>
</html>
