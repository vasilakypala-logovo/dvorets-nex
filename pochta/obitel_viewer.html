<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ОБИТЕЛЬ — ПРОСМОТР ПОСЛАНИЙ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
  color:rgba(246,255,232,.94);
  font-family:Georgia, "Times New Roman", serif;
  background:
    radial-gradient(circle at 18% 12%, rgba(210,255,175,.17), transparent 28%),
    radial-gradient(circle at 82% 5%, rgba(255,225,155,.12), transparent 30%),
    radial-gradient(circle at 50% 115%, rgba(70,120,80,.22), transparent 42%),
    linear-gradient(180deg, rgba(9,18,12,.96), rgba(10,28,18,.92) 52%, rgba(4,8,6,.96));
}

body{
  padding:18px 12px 26px;
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg, transparent, rgba(255,255,255,.035), transparent),
    radial-gradient(circle at center, transparent 35%, rgba(0,0,0,.38));
  mix-blend-mode:screen;
  opacity:.55;
}

.shell{
  width:min(92vw, 640px);
  margin:0 auto;
  position:relative;
}

.title{
  margin:0;
  text-align:center;
  font-size:clamp(22px, 4.5vw, 34px);
  letter-spacing:.13em;
  font-weight:normal;
  color:rgba(244,255,224,.96);
  text-shadow:
    0 0 12px rgba(192,255,178,.34),
    0 0 32px rgba(192,255,178,.14);
}

.subtitle{
  margin:7px 0 15px;
  text-align:center;
  font-size:11px;
  line-height:1.5;
  letter-spacing:.18em;
  color:rgba(255,248,216,.62);
}

.readStatus{
  width:100%;
  margin:0 auto 14px;
  padding:10px 12px;
  border-radius:18px;
  text-align:center;
  font-size:12px;
  line-height:1.45;
  letter-spacing:.04em;
  color:rgba(230,255,220,.80);
  background:rgba(0,0,0,.16);
  border:1px solid rgba(200,255,190,.15);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.025),
    0 0 16px rgba(0,0,0,.18);
  overflow-wrap:anywhere;
}

.readStatus.good{
  color:#caffd3;
  border-color:rgba(130,255,165,.35);
  box-shadow:0 0 20px rgba(80,255,130,.12);
}

.readStatus.bad{
  color:#ffd0b8;
  border-color:rgba(255,150,100,.38);
  box-shadow:0 0 18px rgba(255,120,80,.11);
}

#list{
  width:100%;
  margin:0 auto;
}

.card{
  width:100%;
  margin:0 0 14px;
  padding:16px 16px 15px;
  border:1px solid rgba(230,255,215,.18);
  border-radius:24px;
  background:rgba(0,0,0,.20);
  box-shadow:
    0 12px 34px rgba(0,0,0,.32),
    inset 0 0 24px rgba(255,255,255,.035);
  backdrop-filter:blur(7px);
  overflow:hidden;
}

.card.unread{
  border-color:rgba(120,255,150,.46);
  box-shadow:
    0 0 26px rgba(80,255,130,.15),
    0 12px 34px rgba(0,0,0,.32),
    inset 0 0 24px rgba(255,255,255,.04);
}

.head{
  display:grid;
  grid-template-columns:1fr;
  gap:5px;
}

.sender{
  font-size:21px;
  line-height:1.18;
  color:rgba(230,255,215,.98);
  text-shadow:0 0 10px rgba(170,255,170,.14);
  overflow-wrap:anywhere;
  word-break:break-word;
}

.date{
  justify-self:start;
  margin-top:4px;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  line-height:1.35;
  letter-spacing:.04em;
  color:rgba(255,248,218,.56);
  background:rgba(255,255,255,.045);
  overflow-wrap:anywhere;
}

.recipient{
  margin-top:5px;
  font-size:11px;
  line-height:1.45;
  letter-spacing:.08em;
  color:rgba(255,248,218,.62);
  overflow-wrap:anywhere;
  word-break:break-word;
}

.subject{
  margin-top:15px;
  padding-top:12px;
  border-top:1px solid rgba(255,238,180,.16);
  font-size:19px;
  line-height:1.25;
  color:rgba(255,248,204,.96);
  overflow-wrap:anywhere;
  word-break:break-word;
}

.text{
  margin-top:12px;
  padding:12px 13px;
  border-radius:16px;
  line-height:1.58;
  white-space:pre-wrap;
  color:rgba(246,250,232,.93);
  background:rgba(255,255,255,.035);
  overflow-wrap:anywhere;
  word-break:break-word;
}

.image{
  margin:14px auto 0;
  max-width:100%;
  height:auto;
  border-radius:16px;
  display:block;
  box-shadow:0 0 22px rgba(0,0,0,.46);
}

.fileLink{
  display:inline-block;
  max-width:100%;
  margin-top:14px;
  padding:10px 15px;
  border-radius:14px;
  text-decoration:none;
  color:#081008;
  background:linear-gradient(90deg, #e0ffc8, #9cffb2);
  font-size:13px;
  letter-spacing:.06em;
  overflow-wrap:anywhere;
}

.empty{
  width:100%;
  margin:42px auto 0;
  padding:22px 16px;
  border:1px solid rgba(230,255,215,.14);
  border-radius:24px;
  text-align:center;
  font-size:17px;
  line-height:1.45;
  color:rgba(246,255,232,.58);
  background:rgba(0,0,0,.16);
  box-shadow:inset 0 0 22px rgba(255,255,255,.025);
  overflow-wrap:anywhere;
}

@media (max-width:520px){
  body{
    padding:12px 8px 20px;
  }

  .shell{
    width:96vw;
  }

  .card{
    padding:13px 12px;
    border-radius:20px;
  }

  .sender{
    font-size:18px;
  }

  .subject{
    font-size:17px;
  }

  .text{
    padding:10px;
    font-size:14px;
  }
}

</style>
</head>

<body>

<main class="shell">

  <h1 class="title">ОБИТЕЛЬ НЕКСА</h1>

  <div class="subtitle">
    АРХИВ ПОСЛАНИЙ И ПОСЫЛОК
  </div>

  <div id="readStatus" class="readStatus">
    Проверка статуса писем...
  </div>

  <div id="list">
    <div class="empty">Обитель слушает тишину...</div>
  </div>

</main>

<script>

const SUPABASE_URL =
"https://qekemclxegswolddmqxa.supabase.co";

const SUPABASE_KEY =
"sb_publishable_arQvVM0huxdB5jbiLPpSPA_7tksXK-Y";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function markAllAsRead(){

  const status =
    document.getElementById("readStatus");

  try{

    const { data, error } =
      await client
      .from("obitel_storage")
      .update({ is_read:true })
      .or("is_read.eq.false,is_read.is.null")
      .select("id");

    if(error) throw error;

    const count =
      data ? data.length : 0;

    if(status){

      status.className = "readStatus good";

      if(count > 0){
        status.textContent =
          "Новые письма отмечены как прочитанные: " + count;
      }else{
        status.textContent =
          "Новых непрочитанных писем нет.";
      }
    }

    if(window.parent){
      window.parent.postMessage("mail-read-refresh","*");
    }

  }catch(err){

    console.error("READ MARK ERROR:", err);

    if(status){

      status.className = "readStatus bad";

      status.textContent =
        "Supabase не дал погасить лампочку: " + err.message;
    }
  }
}

async function loadMessages(){

  const list =
    document.getElementById("list");

  list.innerHTML =
    '<div class="empty">Обитель открывает архив...</div>';

  try{

    const { data, error } =
      await client
      .from("obitel_storage")
      .select("*")
      .order("created_at",{ ascending:false });

    if(error) throw error;

    if(!data || data.length===0){

      list.innerHTML =
        '<div class="empty">Пока нет посланий.</div>';

      return;
    }

    list.innerHTML = "";

    data.forEach(item=>{

      const card =
        document.createElement("div");

      card.className =
        item.is_read === false
          ? "card unread"
          : "card";

      let media = "";

      if(item.file_url){

        const lower =
          (item.file_name || "")
          .toLowerCase();

        if(
          lower.endsWith(".jpg") ||
          lower.endsWith(".jpeg") ||
          lower.endsWith(".png") ||
          lower.endsWith(".webp") ||
          lower.endsWith(".gif")
        ){

          media =
          `
          <img
            class="image"
            src="${item.file_url}">
          `;

        }else{

          media =
          `
          <a
            class="fileLink"
            href="${item.file_url}"
            target="_blank">

            ОТКРЫТЬ ФАЙЛ

          </a>
          `;
        }
      }

      card.innerHTML = `

        <div class="head">

          <div>

            <div class="sender">
              ${item.sender_name || "Неизвестный"}
            </div>

            <div class="recipient">
              ДЛЯ:
              ${item.recipient || "Обитель"}
            </div>

          </div>

          <div class="date">
            ${new Date(item.created_at)
              .toLocaleString()}
          </div>

        </div>

        <div class="subject">
          ${item.title || "Без названия"}
        </div>

        <div class="text">
          ${item.message_text || ""}
        </div>

        ${media}

      `;

      list.appendChild(card);

    });

    /* После показа архива считаем новые письма прочитанными */
    await markAllAsRead();

  }catch(err){

    console.error(err);

    list.innerHTML =
      `<div class="empty">
        Ошибка загрузки:
        ${err.message}
      </div>`;
  }
}

loadMessages();

</script>

</body>
</html>
