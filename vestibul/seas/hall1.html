<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЗАЛ №1 — ГОСТИННАЯ НЕКСА</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

#stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#room {
    position: absolute;
    inset: 0;
    background-image: url("room.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.zone {
    position: absolute;
    cursor: pointer;
    background: transparent;
    border: 2px solid transparent;
}

.zone:hover {
    background: transparent;
    border: 2px solid transparent;
    box-shadow: none;
}

#z1 {
    left: 4.4%;
    top: 24.0%;
    width: 10.2%;
    height: 49.6%;
}

#z2 {
    left: 27.1%;
    top: 41.2%;
    width: 11.3%;
    height: 23.3%;
}

#z3 {
    left: 43.3%;
    top: 34.2%;
    width: 15.7%;
    height: 38.6%;
}

#z4 {
    left: 64.0%;
    top: 41.8%;
    width: 11.2%;
    height: 24.4%;
}

#z5 {
    left: 86.5%;
    top: 24.4%;
    width: 10.3%;
    height: 49.0%;
}

#nextRoom{
    position:absolute;

    left:50%;
    bottom:2.2%;

    transform:translateX(-50%);

    width:170px;
    height:170px;

    background-image:url("next_orb.png?v=1");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    cursor:pointer;

    z-index:50;

    transition:
        transform 0.35s ease,
        filter 0.35s ease;

    animation:
        orbFloat 4.5s ease-in-out infinite,
        orbPulse 3.2s ease-in-out infinite;
}

#nextRoom:hover{
    transform:
        translateX(-50%)
        scale(1.08);

    filter:
        drop-shadow(0 0 18px rgba(120,180,255,0.95))
        drop-shadow(0 0 42px rgba(80,140,255,0.72))
        drop-shadow(0 0 82px rgba(80,140,255,0.45));
}

@keyframes orbFloat{

    0%,100%{
        bottom:2.2%;
    }

    50%{
        bottom:3.1%;
    }
}

@keyframes orbPulse{

    0%,100%{
        filter:
            drop-shadow(0 0 12px rgba(120,180,255,0.72))
            drop-shadow(0 0 34px rgba(80,140,255,0.42));
    }

    50%{
        filter:
            drop-shadow(0 0 24px rgba(160,220,255,0.98))
            drop-shadow(0 0 58px rgba(90,160,255,0.72));
    }
}

#viewer {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.93);
    z-index: 100;
}

#big {
    max-width: 68vw;
    max-height: 92vh;
    object-fit: contain;
    box-shadow: 0 0 45px rgba(255,255,255,0.18);
}

#close {
    position: fixed;
    right: 24px;
    top: 16px;
    color: white;
    font-size: 44px;
    line-height: 44px;
    cursor: pointer;
    z-index: 110;
}

#infoPanel{
    position:fixed;
    left:20px;
    top:20px;

    width:170px;
    box-sizing:border-box;

    height:calc(100vh - 40px);

    background:rgba(10,10,10,0.72);
    backdrop-filter:blur(10px);

    border-radius:18px;
    padding:12px;

    display:none;
    z-index:120;
}

#titleBox{
    width:100%;
    height:40px;
    margin-bottom:10px;

    background:rgba(255,255,255,0.08);

    border:none;
    border-radius:10px;

    color:white;

    padding:8px;

    box-sizing:border-box;

    font-size:13px;
}

#textBox{
    width:100%;
    height:58%;

    resize:none;

    background:rgba(255,255,255,0.08);

    border:none;
    border-radius:10px;

    color:white;

    padding:8px;

    box-sizing:border-box;

    font-size:13px;
}

#saveBtn{
    margin-top:10px;

    width:100%;
    height:34px;

    border:none;
    border-radius:10px;

    background:rgba(255,255,255,0.12);

    color:white;

    cursor:pointer;

    box-sizing:border-box;

    font-size:12px;
    letter-spacing:0.12em;
}

#miniNex{
    position:fixed;
    right:18px;
    bottom:18px;

    width:58px;
    height:58px;

    border-radius:50%;

    background-color:rgba(255,255,255,0.05);

    background-image:url("mini_nex.png?v=2");
    background-size:cover;
    background-position:center;

    border:2px solid rgba(255,255,255,0.38);

    cursor:pointer;

    z-index:300;

    box-shadow:
        0 0 10px rgba(255,255,255,0.45),
        0 0 24px rgba(255,255,255,0.22),
        0 0 42px rgba(255,255,255,0.10);

    transition:0.25s;
}

#miniNex:hover{
    transform:scale(1.08);

    box-shadow:
        0 0 16px rgba(255,255,255,0.72),
        0 0 36px rgba(255,255,255,0.34),
        0 0 60px rgba(255,255,255,0.14);
}
#nexHelp{
    position:fixed;

    right:20px;
    bottom:76px;

    width:320px;

    background:rgba(12,12,12,0.92);

    border-radius:18px;

    padding:22px;

    color:rgba(255,255,255,0.88);

    line-height:1.6;

    display:none;

    z-index:320;

    box-shadow:0 0 40px rgba(0,0,0,0.45);


}

#nexClose{
    position:absolute;
    top:10px;
    right:14px;

    font-size:24px;
    cursor:pointer;
}

#seaBreathTitle{
    position:absolute;
    left:50%;
    top:6.5%;
    transform:translate(-50%, 18px);

    color:rgba(224,246,255,0);
    font-family:Georgia, 'Times New Roman', serif;
    font-size:clamp(24px, 3.2vw, 54px);
    font-weight:400;
    letter-spacing:0.08em;
    white-space:nowrap;

    text-shadow:
        0 0 10px rgba(145,220,255,0),
        0 0 26px rgba(95,190,255,0),
        0 0 52px rgba(45,135,255,0);

    pointer-events:none;
    z-index:40;

    animation:seaBreathFloat 9s ease-in-out infinite;
}

@keyframes seaBreathFloat{
    0%{
        opacity:0;
        transform:translate(-50%, 24px);
        color:rgba(224,246,255,0);
        text-shadow:
            0 0 10px rgba(145,220,255,0),
            0 0 26px rgba(95,190,255,0),
            0 0 52px rgba(45,135,255,0);
    }
    22%{
        opacity:1;
        transform:translate(-50%, 0);
        color:rgba(232,250,255,0.92);
        text-shadow:
            0 0 10px rgba(180,235,255,0.88),
            0 0 28px rgba(95,205,255,0.64),
            0 0 58px rgba(45,145,255,0.46);
    }
    68%{
        opacity:1;
        transform:translate(-50%, -6px);
        color:rgba(232,250,255,0.96);
        text-shadow:
            0 0 14px rgba(205,245,255,0.95),
            0 0 34px rgba(110,215,255,0.72),
            0 0 70px rgba(45,150,255,0.52);
    }
    100%{
        opacity:0;
        transform:translate(-50%, -18px);
        color:rgba(224,246,255,0);
        text-shadow:
            0 0 10px rgba(145,220,255,0),
            0 0 26px rgba(95,190,255,0),
            0 0 52px rgba(45,135,255,0);
    }
}

</style>
</head>

<body>
<audio id="bgMusic" src="9999.mp3" loop preload="auto"></audio>

<div id="stage">
    <div id="room"></div>

    <div id="seaBreathTitle">Breath of Sensitive Seas</div>

    <div class="zone" id="z1" onclick="openWork(1)"></div>
    <div class="zone" id="z2" onclick="openWork(2)"></div>
    <div class="zone" id="z3" onclick="openWork(3)"></div>
    <div class="zone" id="z4" onclick="openWork(4)"></div>
    <div class="zone" id="z5" onclick="openWork(5)"></div>

    <div id="nextRoom" onclick="goNextRoom()">NEXT</div>
</div>


<div id="viewer" onclick="closeWork()">
    <div id="close">×</div>
    <img id="big" src="">
</div>

<div id="infoPanel">
<textarea id="titleBox" placeholder="Название картины"></textarea>

<textarea id="textBox"
placeholder="Описание, мысль, ощущение..."></textarea>

<button id="saveBtn" onclick="saveText()">СОХРАНИТЬ</button>
</div>




<div id="miniNex" onclick="openNexHelp()"></div>

<div id="nexHelp">
    <div id="nexClose" onclick="closeNexHelp()">×</div>

    <h2>LITTLE NEX</h2>

    <p>
    Welcome to Nex Living Rooms.
    </p>

    <p>
Click on the paintings to open the artworks.
The NEXT button leads to the next room.
    </p>

    <p>
    Here you can save titles and impressions.
    </p>

    <p>
    Some paintings love silence.
    </p>
</div>



<script>
const extensions = ["jpg", "jpeg", "png", "webp", "JPG", "JPEG", "PNG", "WEBP"];

const TITLES = {};
const TEXTS = {};

function openWork(n) {
    stopBgMusic();

    const big = document.getElementById("big");
    const viewer = document.getElementById("viewer");

    let index = 0;

    function tryNext() {
        if (index >= extensions.length) {
            viewer.style.display = "flex";
            return;
        }

        const testSrc = "works/" + n + "." + extensions[index];
        index++;

        big.onerror = tryNext;

        big.onload = function() {
            big.onerror = null;
            viewer.style.display = "flex";
            document.getElementById("infoPanel").style.display = "block";

            document.getElementById("titleBox").value = TITLES[n] || "";
            document.getElementById("textBox").value = TEXTS[n] || "";

            currentWork = n;
        };

        big.src = testSrc;
    }

    tryNext();
}

function closeWork() {
    document.getElementById("viewer").style.display = "none";
    document.getElementById("big").removeAttribute("src");
    document.getElementById("infoPanel").style.display = "none";
}

let currentWork = 1;

function saveText(){
    TITLES[currentWork] = document.getElementById("titleBox").value;
    TEXTS[currentWork] = document.getElementById("textBox").value;

    localStorage.setItem("titles", JSON.stringify(TITLES));
    localStorage.setItem("texts", JSON.stringify(TEXTS));
}

function goNextRoom(){
    window.location.href = "hall2.html";
}

function openNexHelp(){
    document.getElementById("nexHelp").style.display = "block";
}

function closeNexHelp(){
    document.getElementById("nexHelp").style.display = "none";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeWork();
});

Object.assign(TITLES, JSON.parse(localStorage.getItem("titles") || "{}"));
Object.assign(TEXTS, JSON.parse(localStorage.getItem("texts") || "{}"));

/* =========================
   МУЗЫКА ГОСТИНОЙ МОРЯ — 9999.mp3
========================= */

const bgMusic = document.getElementById("bgMusic");
let bgMusicStoppedByWork = false;

function startBgMusic(){
    if(!bgMusic || bgMusicStoppedByWork) return;

    bgMusic.volume = 0.24;

    if(bgMusic.paused){
        bgMusic.play().catch(()=>{});
    }
}

function stopBgMusic(){
    if(!bgMusic) return;

    bgMusicStoppedByWork = true;
    bgMusic.pause();
    bgMusic.currentTime = 0;
}

/* Браузер может запретить автозапуск, поэтому пробуем после загрузки */
window.addEventListener("load", function(){
    setTimeout(startBgMusic, 300);
});

/* Первый живой клик запускает музыку.
   Но если клик сразу по картине — не запускаем: картина любит тишину. */
function unlockSeaRoomMusic(e){
    if(e && e.target && e.target.closest && e.target.closest(".zone")) return;
    startBgMusic();
}

document.addEventListener("pointerdown", unlockSeaRoomMusic, {capture:true});
document.addEventListener("click", unlockSeaRoomMusic, {capture:true});

</script>

</body>
</html>
