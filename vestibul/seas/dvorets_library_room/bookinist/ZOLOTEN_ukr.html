></span></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>далині, на високому кургані, у золоті\nвечірнього сонця виблискувала неначе висічена з каменю постать Гріна Блексона з\nпростягнутим до неба кошиком в руці.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Легкий подих\nвітру вихопив з кошика золотистий листочок і поніс його до села, де світилася\nхата діда Гриця та баби Марії.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">За той\nлисточок зачепилася тонка срібляста, павутина, на<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>якій<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>весело<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>гойдався маленький\nпавучок. Очманілими очима Грін Блексон дивився йому вслід.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Ваша кров з\nнами, наша кров з вами, - шепотіли його уста.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </font></span></font></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2005р.&nbsp;</font></span></font></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false}]};var cur=0;var zoom=1;function sz(f){if(f=='A5')return{w:559,h:794};if(f=='SQUARE')return{w:800,h:800};return{w:794,h:1123};}function calcBase(s){var v=document.getElementById('view');var vw=v.clientWidth||document.body.clientWidth;var vh=v.clientHeight||(document.body.clientHeight-61);var sc=Math.min((vw-40)/s.w,(vh-40)/s.h);if(sc>1)sc=1;if(sc<0.15)sc=0.15;return sc;}function show(){var s=sz(book.format);var p=book.pages[cur];var v=document.getElementById('view');var st=document.getElementById('stage');var sc=calcBase(s)*zoom;var pad=30;var vw=v.clientWidth||document.body.clientWidth;var vh=v.clientHeight||(document.body.clientHeight-61);var sw=Math.max(vw,s.w*sc+pad*2);var sh=Math.max(vh,s.h*sc+pad*2);st.style.width=sw+'px';st.style.height=sh+'px';var left=Math.max(pad,(sw-s.w*sc)/2);var top=pad;st.innerHTML='<div class="page '+(p.cover?'cover':'')+'" style="width:'+s.w+'px;height:'+s.h+'px;left:'+left+'px;top:'+top+'px;transform:scale('+sc+')"><div class="pageContent">'+p.html+'</div><div class="nexStamp">Nx</div></div>';document.getElementById('n').innerHTML=(cur+1)+' / '+book.pages.length;document.getElementById('zoomInfo').innerHTML=Math.round(zoom*100)+'%';var r=document.getElementById('pageRange');if(r){r.max=book.pages.length;r.value=cur+1;}}function prev(){if(cur>0){cur--;show();}}function next(){if(cur<book.pages.length-1){cur++;show();}}function goPage(v){v=parseInt(v,10);if(isNaN(v))return;if(v<1)v=1;if(v>book.pages.length)v=book.pages.length;cur=v-1;show();}function zoomIn(){zoom=zoom*1.15;if(zoom>4)zoom=4;show();}function zoomOut(){zoom=zoom/1.15;if(zoom<0.35)zoom=0.35;show();}function zoomReset(){zoom=1;show();}document.onkeydown=function(e){e=e||window.event;if(e.ctrlKey&&e.keyCode==187){zoomIn();return false;}if(e.ctrlKey&&e.keyCode==189){zoomOut();return false;}if(e.ctrlKey&&e.keyCode==48){zoomReset();return false;}};window.onresize=show;show();</script></body></html>
