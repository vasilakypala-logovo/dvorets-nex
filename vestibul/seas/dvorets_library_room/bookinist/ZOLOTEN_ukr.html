перед сходами на курган. Він застромив короткий спис на\nпершій сходинці і беззбройним піднявся на вершину кургану. Навкруги гомонів\nнарод, де кожен воїн-кім підняв в правиці стрілу.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Гатьман окинув поглядом\nсвоїх Гуртів. Звідси, з найсвятішого місця верховної влади степу, з кургану\nМири, говорити до людей набагато важче. За останні століття жоден володар не\nскористався цим, даним тільки йому гатьману Гуртів, правом.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><span style=\"mso-spacerun: yes;\"><font color=\"#000000\">&nbsp;</font></span><font color=\"#000000\">- Діти степу! - Заговорив Олін. - Шукаючи їжу\nі порятунок від холоду, хмара варварів із заходу суне в наші степи. Вона несе\nспустошення. Ми можемо зупинити цю хмару, дати варварам відсіч.</font><span style=\"mso-spacerun: yes;\"><font color=\"#000000\">&nbsp; </font></span><font color=\"#000000\">А чи надовго? </font></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Голод знову заставить їх\nтиснути, і ми знову будемо змушені боронити наші землі. В цій війні загинуть\nнаші сили. В цій війні загине наша кров. В цій війні загине наш дух.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Волею Кімів я пропоную\nвам обирати кожному своє: або вирушити в путь до Сонця, або залишитися і\nзустріти варварів без зброї.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Той, хто обере для себе\nдорогу на схід, збереже дух і кров, але втратить силу.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Той, хто залишиться тут,\nзбереже силу і дух, але його кров поєднається з кров’ю варварів.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">І в тому, і в другому\nвипадку наш дух залишиться непереможеним! Бо ми люди степу! Бо ми як вітер,\nякого не видно. Вітер може знищити все силою бурі, але може й приспати\nлагідними подихами. Підкорити вітер не можна!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Хто вибере путь до Сонця,\nхай пройде по золотій осені, яка розстелена для щасливої дороги!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">А хто залишається, хай\nвізьме краплю золота із осені до своєї чаші, щоб завжди носити при собі. З нею\nми зустрінемо Путніх, коли прийде час!.. Кім!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">-Кім! Кім! Кім! –\nбагатоголосо визначилися Гурти.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">&nbsp;</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">Попри осінні холоди два\nтижні Олін не сходив з кургану Мири. Два тижні він проводжав тих, хто обрав\nпуть до Сонця. Ті, хто залишався з ним, виносили Путнім чаші з соком вишні\nпонтійської<span style=\"mso-spacerun: yes;\">&nbsp; </span></font><font color=\"#000000\">і промовляли: “Ваша кров з\nнами, наша кров з вами”.</font></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">І лише тоді, коли\nрозібрали золоту осінь до краплини, Олін Кім зійшов з кургану і промовив:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- Ми тепер є, і нас вже\nнемає. Ми живемо, і нас не видно. Ми тепер всюди! Наші знання і звичаї\nзбагатять і облагородять варварський люд. Наша мова і наші пісні впоздовж<span style=\"mso-spacerun: yes;\">&nbsp; </span></font><font color=\"#000000\">усіх майбутніх поколінь будуть жити в інших\nкультурах. Та настане час, коли протягнуться чаші на схід до Сонця, щоб\nзустріти Путніх, і народ Гуртів проснеться, згуртується. Народ Гуртів скине\nярмо варварства... – Олін</font><span style=\"mso-spacerun: yes;\"><font color=\"#000000\">&nbsp; </font></span><font color=\"#000000\">Кім на той час\nне знав, та й не міг знати, що земля кругла.</font></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\" face=\"Times New Roman\">Минули віки. Дві тисячі\nразів до Різдва приходила весна в припонтійські степи і дві тисячі разів – по\nРіздву. Курган Мири загубився серед численних курганів Південної України. Та\nдух Гуртів іронічною посмішкою все ще носиться серед його нащадків. Чекає\nПутніх...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"85\" height=\"76\" class=\" insertedImg\" style=\"left: 11px; top: 357px;\" src=\"d GfetnX/D1jfW1vEfMt0tkKxrAQoA44xg8cCkHU8uADkluU2kngYOMY/AcdfWsPxW4OkqzEZMoAGOnBJ5+p/WvUk8E6YWRTPdkD/bXnj/d/GruneBdFW8huZkluDbt5kaTMCgbscY5x/Pmi4Mr/CbRrzR/Bii+iMUl1O06owwyoQAM+hOM/jRXbUUhH//Z\" v:shapes=\"_x0000_i1027\"></font>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; осередній американець Грін Блексон\nпідтримував своє посереднє життя у відповідності з діючими американськими\nнормативами. Він мав посередню ділянку землі, на якій стояла посередня хатинка-вілла.\nмав посередню роботу, посередній автомобіль і накопичений поколіннями Блексонів\nпосередній капітал.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">В перспективі\nжиття Гріна мало закінчитися в посередній домовині, яку спалили б разом з його\nтілом в посередньому крематорії, а попіл віддали б дітям, щоб ті носилися з ним\nабо поховали десь на посередньому цвинтарі під посереднім хрестом.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Та Гріну\nБлексону цього не судилося. Він зустрівся із досить не посередньою релігійною\nорганізацією «Свідки Гієни Огненної». яка перетворила посереднє життя Гріна\nБлексона в життя епохальне і творче, подарувала йому прозріння в серці щодо\nГоспода Ісуса Христа, за що й отримала в дарунок від Блексона і землю, і\nхатинку, і капітал.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Умійте\nжертвувати благом для Господа Ісуса! - співав головний пастор Свідків Гієни, а\nсвідки, тепер уже разом з Гріном, йому підспівували:</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Сійте добро\nваше, кидайте зерна в землю і проросте воно прощенням в Судний День!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">А щоб знайти\nту благодатну землю, в яку можна було б кидати зерна і отримувати стійкі\nдуховні врожаї, очі Свідків Гієни Огненної пильно вдивлялися через океан, в бік\nмолодої України:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Он де запаси чорнозему для зерен, он де куди треба спрямувати всі подуми\nнаші...</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Ось так, під\nчас релігійних співів, організувалась гуманітарна місія Свідків Гієни з\nдоброчинним наміром - допомогти селянам степової зони України знайти свій шлях\nдо Бога, щоб вони жертвували благом та земельними паями в ім'я Господа Ісуса\nХриста. Амінь, падре!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Серед\nмісіонерів був і Грін Блексон. Його посереднє життя, разом з його землею і\nкапіталом, було втрачене назавжди, то ж тепер він цілком належав Гієні Огненній\nта її гуманітарній місії.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Довгі години\nмікроавтобус \"Міцубісі\" віз дванадцять місіонерів в дикі степи\nУкраїни, у віддалені закутки адміністративних областей. Ось вже щезли\nасфальтовані дороги, і в щільно герметизований салон все ж таки проникала\nпилюка сінокісної пори. А в душі Свідків Гієни степ вривався пекучим небом і\nбезкрайніми ланами сільськогосподарських культур.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Коли мобільні\nтелефони місіонерів враз замовкли, потрапивши у зону глибокої історичної\nнесправедливості, у вікнах мікроавтобуса намалювалась Велика Могіканівка,\nзагублене серед українського степу вимираюче село.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре! - загомоніли Свідки.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Колись село\nмало назву Макогонівка, та в радянські часи в цілях боротьби з маковою\nнаркоманією якийсь партійний ідеолог вирішив, що назва села походить не від\nназви одного з предметів національної зброї - макогона, а від виразу «мак\nгонити» по типу «само-гон». То ж в честь видатного всесвітньо відомого\nроманіста Фенімора Купера село перейменували в Могіканівку, що мало\nпідкреслювати солідарність з важкою долею героїчних американських індійців. А\nдля солідності ще й додали слово Велика.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">За часи\nостанньої перебудови від Великої Могіканівки залишилось декілька живих і\nрозвалля колишніх дворів; та ще залишилися здичавілі, розтягнуті вздовж\nмалесенької річечки, покинуті сади і городи.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Ось в таких\nселах місіонери й сподівалися знайти розчаровану душу пенсіонера чи\nпенсіонерки, під леміш проповідей та гуманітарної допомоги засіяти в цю душу\nзерна віри у спасіння в Судний День, що невблаганно наближається, а натомість\nотримати для Гієни Огненної клаптик родючого припонтійського чорнозему. Для\nбільш успішного досягнення своїх цілей везли з собою \"Ямаху\", щоб\nспівала Божих пісень, півсотні Біблій на російській мові із Бродвея і два мішки\nгуманітарної оптики, - окулярів<span style=\"mso-spacerun: yes;\">&nbsp; </span>різного\nфасону і розміру, - щоб селяни швидше прозрівали і краще бачили шлях до Господа\nІсуса Христа.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре! - подумав про себе Грін Блексон, коли водій мікроавтобуса вимкнув двигун\nпід розложистою грушею в центрі Великої Могіканівки.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"85\" height=\"76\" class=\" insertedImg\" a7bw9oOn+HdIisNOh8uIDczE5aRj1Zj3NalK4XPKtV8H6jpVg11dSW7xg4ba5+UMcYAI/WuX1d9mk3jkMMxgDnOAcjH6g16742QSeHyCSMTxnj615/pfh+z1u4WxvGl8mTywwRgCQRk84+v50AY3w08IX+rWV5f/ZE+yyMiwvI2A5Xdux6gcCivc7SztrC0itLSFIIIVCxxoMBRRSEf//Z\" v:shapes=\"_x0000_i1028\"></font>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ід Гриць весь свій молодий вік працював\nмеханізатором, а коли дожив до пенсії, про нього раптом забули, і він мусив усю\nселянську роботу виконувати прадідівськими методами без механізації -\nпотихеньку косив, потихеньку носив, потихеньку складав у копички. Потихеньку\nковтав самогон. Єдине, що не міг дід Гриць зробити потихеньку – скласти сіно в\nскирту, бо це треба було швидко робити між літніми дощами.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">В той день\nвидався спекотний ранок, і дід Гриць, кістьми відчуваючи наближення грози,\nнагукав помічниць-скиртувальниць: і бабу Тунку, і бабу Груню, і бабу Борманиху\nАндріївну, - всіх, хто у Великій Могіканівці ще був при силі. Баби, усі без\nвинятку колишні доярки, спотикаючись як-то старі кобилиці, підносили й подавали\nнавильники сіна, а Гриць, стоячи зверху, потихеньку зводив скирту. Дідова\nдружина Марія підгрібала.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Монотонна\nробота прикрашалась беззубим гиржанням скиртувальниць, що згадували свої молоді\nліта. В полудень скирту можна було вже й вершити, і Гриць на висоті вже міг\nоглянути село як на долоні. І тут він помітив під центральною грушею\nмікроавтобус і людей біля нього.</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Якась\nкомісія приїхала, чи що? Знов за когось з кандидатів агітують? - крикнув з\nвисоти Гриць.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Піду корову\nздою, та заодно й взнаю! - залепетала<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>Марія,<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>кинула<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>граблі<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>й<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>підтюпцем побігла до груші.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">А за\nпівгодини по тому повернулася і звітувала громаді:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Це мериканці гуманітарну привезли! Співають, кіно знімають. Я їх молоком\nпопоїла! А одного так смішно звати - Хрін! Він мене сфотографував...</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">І як доказ\nправдивості баченого витягла полароїдну фотку, на якій стояла Марія і тримала\nБіблію в руках.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Яка вже тут\nробота! Не встиг Гриць хоч би вилаятись, як баби покидали вила і розчинились\nвздовж дороги, що вела до центральної груші. Гриць плюнув з висоти і потихеньку\nзліз з незавершеної скирти, щоб у клуні потихеньку випити сто грамів.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"72\" height=\"65\" class=\" insertedImg\" style=\"left: 15px; top: 723px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABBAEgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZH ont color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Несподівано\nдля самого себе Грін Блексон відчув ностальгічний сором у своїй душі. Він\nраптом подумав, що у ті давні часи, коли перші європейці дістались берегів\nАмерики, її аборигени ось так само розгрібали привезені з Європи дзеркальця та\nкольорове скло, за які потім довелося розплачуватися своєю землею. А тепер вже\nамериканці прийшли в Європу зі своїми скельцями-окулярами.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Від такого\nісторичного порівняння, чи може від молока, що Блексон випив в знак\nдоброзичливості, у нього забурчало в животі та й примусило озиратися на всі\nбоки.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Та\nбіологічний туалет в степах України має неосяжний для місіонерського ока\nрозмір: отой-от кущик, гайок і оте широке рівне поле. І зрозумівши, що\nальтернативи цьому туалету в Великій Могіканівці немає, Грін Блексон поспішно\nвіддалився від груші у хащі покинутих господарями і Господом Богом садів. Зі\nсвоєю проблемою Блексон, чи не вперше, мудро подивився не у високе небо, а під\nноги, в землю.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">В небо\nдивились Свідки, які співали пісні, а також водій мікроавтобуса та селяни\nМогіканівки. Останні пояснили перекладачеві, що ота чорна хмара, що швидко\nнасувається на село, то не що інше, як Ілля Пророк калачі везе! Хоч для водія,\n- хто б не був той Ілля, і щоб він не віз, - хмара означала одне: якщо не\nвстигнеш дістатись до асфальтованої дороги, мікроавтобус нікого і нікуди не\nповезе: він надовго загрузне в ґрунтах, розквашених літньою зливою.</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Свідки Гієни\nОгненної так хутко вантажились, що навіть мішки з оптикою залишили. За кілька\nхвилин мікроавтобус вже мчав дорогою, тікаючи від степової грози. Ніхто й не\nпомітив, що одного місіонера в салоні автомобіля не вистачає.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"85\" height=\"76\" class=\" insertedImg\" style=\"left: 21px; top: 157px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABMAFUDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5u лачі, що ноги вгрузали в ґрунт по кісточки. Марія промокла до нитки.\nВона хотіла, як завжди, зняти черевики, щоб не тягнути за собою так багато\nбагнюки на босих ногах. Та не могла, бо в руках Марія несла окуляри. І не\nтільки в руках, а й в кишенях, у зібраній за пояс пелені і навіть на шиї були\nокуляри. У зустрічних калюжах можна було бачити відображення російської байки\n\"Мартишка й окуляри\", над якою Марія разом з усіма школярами сміялася\nв дитинстві. Та де те дитинство!..</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">А дід Гриць\nстояв на воротах. В його очах палахкотів сп'янілий розум. Марія перекинула\nгуманітарну допомогу на руку так, наче Мадонна немовля, і упереджено\nзатараторила:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- А Борманиха\nАндріївна цілий мішок собі забрала... Зараза така!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Та на Гриця\nце не подіяло, розум із його очей не зникав:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Вдінь<span style=\"mso-spacerun: yes;\">&nbsp; </span>оті<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>очки,<span style=\"mso-spacerun: yes;\">&nbsp; </span>лярва,<span style=\"mso-spacerun: yes;\">&nbsp; </span>і<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>подивись,<span style=\"mso-spacerun: yes;\">&nbsp; </span>сіно промокло до самого\nнизу!.. Збери своїх окулістів, та розкидайте скирту, хай сіно сохне. Бо я і\nтобі, і їм такі<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>очки<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>понамальовую...<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>потихеньку!<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>Ніяка гуманітарка не допоможе!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"85\" height=\"76\" class=\" insertedImg\" style=\"left: 11px; top: 7px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABMAFUDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDuJdRm1q+vVOqy6XaWFwbfMTIpd1xklmBByWAC/XNWbDxJ5GjzS3+bia2uG nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>ощі в\nстепу виконують також і роль змивного бачка. Грін Блексон ще не встиг вилізти\nіз кущів, як злива впала на землю Великої Могіканівки. Навколо гриміло й\nблискало, очі затулила біла пелена небесної води, від якої він розгубився. Під\nвиблиски та грім Грін втратив орієнтацію у просторі, заблукав, стрибав з-під\nодного дерева до другого, загубив полароїдні фотки, зрештою забув про місію і\nвіддався на милість Іллі Пророка.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Злива\nскінчилась так же раптово, як і розпочалася. Не варто описувати райдугу і\nперлини крапель на листі: хто їх не бачив? Коли після зливи все сяяло в\nпроменях сонця, Грін Блексон вийшов із здичавілих садків далеко за селом біля\nкургану, що як ґуля стирчав на нескінченних просторах українського степу і наче\nзакликав: заберись на мене і знайдеш свою дорогу!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Смак озону\nвідчувало кожне створіння на омитій зливою благодатній землі. Але квашня після\nдощу була така, що усі ці створіння завмерли в чеканні, коли вода всмокчеться у\nґрунт.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Грін Блексон,\nяк і баба Марія, чекати не міг. Він змушений був дряпатись на курган, щоб\nзнайти свою дорогу. А коли врешті видряпався, перед ним розкрилась широка\nпанорама, складена із дощового обрію та приємного зволоженого сонця. Він\nпобачив дорогу одну-єдину, що вихляла між кольоровим різнотрав'ям в один бік і\nздичавілими садками Великої Могіканівки - в другий. Вибору для Гріна не було.\nВін як кидок томагавка скотився з кургану і побрів по тій дорозі в напрямку від\nсела.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">\"Знайди\nсвій шлях до Господа!\" - чавкав черевиками по багнюці Блексон, згадуючи\nпроповідь пастора Свідків Гієни Огненної. Це було в той самий час, коли на\nпротилежному кінці Великої Могіканівки дід Гриць читав перед своєю дружиною\nзовсім іншу проповідь... Які різні погляди й думки вирують в припонтіиських\nстепах після гарної літньої зливи!</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"87\" class=\" insertedImg\" style=\"left: 4px; top: 34px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABXAGADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJy eKJCQoaI/cHcnHAyPb1oAzNSt5tQspoUliDToQCWAC/MOfXGDisfV7qx0izHh3RWlmlndBf3oO1p2/55qP7oz+n1roUUoVjDn5UbdwQSxBwCTyOcmuJiQXni+FRlzLfqBsyTyw6fhzSYmfRureHXvbz7dYajLpt2yhJXSNZElUHIDI3BIJOD15qzo+ix6SkzGeW6ubh/MnuZsb5WxgdOAAOABwKKKQjR2KSTtHPX3rM1jw9Za08UszTwXEIKx3FtKY5Ap6rkdQcDg0UUAZ8ngHw/KjF7aYTv965W4kEzf7z5y30PFcx4p8O2ukS20GnW5LSo7SyySF5JOVGCzH3HsOcUUUwRzd14e1HV7VtOtIV8+5ZY9zygKoz3+gGePYc816f4P8AB+n+DtJW0tFDzuAZ7gjDSt/QegoooY2dBWT4paRfDGoGL7/kkCiikI8p+y3DzGOGPJJk2ZIyMAgn65z/AJNdT8Ofh2NCmk1zVAr3827yYgQy26E9c92Ixz2oopsbP//Z\" v:shapes=\"_x0000_i1032\"></font><span style=\"mso-spacerun: yes;\">&nbsp;</span></font></span></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>орога,\nщо вела Блексона, вперлася в річечку, для якої і назви ніхто не придумав. Бо\nрічечки й не було. В сухі дні від неї лишалась лише суха балка, а от після дощу\nтут вирував бурхливий потік, насичений змитим зі схилів ґрунтом, глиною та\nпіском, з якого інколи то виринав, то знову потопав викинутий кимсь із\nтеперішніх блудних пластиковий пакет.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Блексон\nрозгублено зупинився. Пересипана пісочком і дрібними камінцями дорога вочевидь\nвходила в річечку, а на протилежному схилі дороги не було! Там густо колосились\nмишійка, щириця та інший степовий бур'ян.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">“Феномен\nукраїнського степу, - подумав свідок Гієни Огненної, - дорога, яка веде в\nНікуди!” Хіба ж він міг додуматися, що нинішнє русло річки - то і є дорога, по\nякій ходять і їздять в суху ясну погоду. А коли немає тої погоди, то у цих\nстепах ніхто нікуди не рухається, тож і дорога нікому й не потрібна...\nВоістину, Господи, путі Твої незбагнені!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">На велику\nрадість місіонера неподалік стирчав невеликий гранітно-степовий валун. Грін\nвсівся на нього, щоб спочити після знайомства з тією землею, про яку так\nзахоплено мріяли Свідки Гієни Огненної.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Блексон з\nподивом помітив на собі бруднющі штани й подерту сорочку, залитий дощем\nблискучий Полароїд, дістав з кишені мобілку, що булькала водою. Ілля Пророк\nпотрохи його відпускав. Повертаючись до реалій степового життя, нагадав про\nсебе шлунок, якому останній хотдог дістався в мікроавтобусі, ще коли той шурував\nпо широкій автомагістралі.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">І, піднявши\nочі в надвечірнє небо України, Блексон вперше крамольно засумнівався: а чи є\nГосподь Ісус Христос в цьому українському небі, а чи його тут ніколи й не\nбуло?.. Грін ще не знав, а чи давно забув мудру приказку: \"Бог терпів, і\nнам велів\".</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Не придумавши\nнічого кращого, Грін набрав повні груди вечірнього повітря, різко піднявся з\nкаменю та й поторував назад до села по своїх вже підсихаючих слідах.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"85\" height=\"77\" class=\" insertedImg\" style=\"left: 15px; top: 241px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABNAFUDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDuZdQn1u/vUGqTaXa2NwbfMRRTI64ySWBBBLABfrmrNh4k8jSJpNQzPPa3DWuYE/4+WDBVKjoC2RkZwCD2FZniSy03RPtM2oRQT6PqEpluYpdpaOXjLqp++pwMgcggEZqQy6HquhwQ6BfWbm2ljmhCuNqshyFZRggHkdOM5 an>перехилив<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>чергову<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>склянку самогону. Він і\nгадки не мав, що із заходу на фоні жовтогарячого світила міг з'явиться\nПутній...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Путніх чекали\nзі сходу. Та після п'ятої склянки самогону напрямки сторін горизонту, - де\nсхід, де захід, - дід Гриць ігнорував, як і саму пору дня. «Баба сіно колупає.\nСонце горить. Значить це ранок!» - потихеньку думав старий.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Інструкція,\nяк треба зустрічати Путніх, за кілька тисяч років згубилася в тенетах\nісторичних вигадок та міфів. Гетьман Олін Кім невідомо куди щез, коли прийшли\nгреки. На теренах припонтійських степів множились сармати й скіфи, половці й\nрусини. Всі, кому було не лінь, тягали з собою чаші у степу, як наче то вони\nбули Путніми. А їх все рівно називали блудними, як до тепер називають циган...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Знахабнілі\nваряги створили Русь і принесли сюди Православіє з Візантії, лишивши крихту\nгетьманщини лише для найбільш строптивих козаків. Та незабаром й ту крихту\nз'їли німці, що їх благословила Катерина.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Іще\nвитріпалась душа козацька османським султанатом та польсько-литовською шляхтою.\nА вкінець звичаї Гуртів замурували лихі люди у кріпацтво Московське та\nРадянське. І ніхто вже не пам'ятав, як треба зустрічати Путніх.</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">То ж дід\nГриць, у новітніх традиціях жителів степу широкого, непомітно перехрестився\nпотихеньку і, не помічаючи поруч дружину, почав хрестити Гріна Блексона зі\nсловами:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Згинь нечисть бісова з очей моїх!</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Ага!\nП'яндилига вже світа білого не бачить! - затріскотіла Марія. - Тепер вже я тобі\nочки припишу! Це ж наш Хрін мериканський, той, що гуманітарну роздавав.\nЗаходьте, заходьте, пане Хрін, до двору. Ви, мабуть, трошки відбилися від\nпєвчіх? То це нічого, дороги підсохнуть швидко. Зо два дні, та й за Вами\nповернуться.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Не знаючи\nмови, Грін лише мукав і, наче вождь червоношкірих, намагався жестами віддавати\nякісь команди.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"87\" class=\" insertedImg\" style=\"left: 7px; top: 528px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABXAGADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDvrm+vtd1a50/TtQksIbNxFJJEitJJJ1PLAgKBjtkk1Y0TU7iO6vNK1OdJZrPY63AQRiWJwSpK9FYbWB7cZ71j6tp1tpN3qEWoF10vWJC7XQcqIZCMFHYcqpwMN0BBB61fg8O2tpoN3bR3Lh7uB08+aQyMxZNoZnP3sA8Y4ApsCxB420ieVQTcwQyMFiuZ7d44ZSem1yMc9s4zUWueILqO+ksNNmtLdra3+0XdxdgssSkkAYBHJ2tkk4AHfNcdq+r3iw22kT3CaVAlp5d5FPGrNJIFAXG4ESRnBA2HvWeLnQprYaV4ha8W/W3jEMNm7PPLEw3eU3UHYy/x9sGgDob34harZxugt9OfEUc0d0ju6TrI21NkY5znjlsdOa3fDfie41MTwX8CQ3EMcUoZMhZFfOAVblWG05Fed2EAaw+2tcxabYRwGy8m6jE0 ненної не з'явилися ні через два дні, ні через тиждень, ні через\nмісяць. Гроза гналася за мікроавтобусом так, що водій вивчив на пам'ять ім'я\nІллі Пророка і, стрибаючи з колобатини в колобатину, виспівував на весь салон:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><font face=\"Times New Roman\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\">- </span><span lang=\"EN-US\" style=\"color: black; line-height: 150%; font-size: 14pt; mso-ansi-language: EN-US;\">Oh</span><span style=\"color: black; line-height: 150%; font-size: 14pt;\">, </span><span lang=\"EN-US\" style=\"color: black; line-height: 150%; font-size: 14pt; mso-ansi-language: EN-US;\">Yes</span><span style=\"color: black; line-height: 150%; font-size: 14pt;\">-</span><span lang=\"EN-US\" style=\"color: black; line-height: 150%; font-size: 14pt; mso-ansi-language: EN-US;\">s</span><span style=\"color: black; line-height: 150%; font-size: 14pt;\">,\nка-ла-чі, ка-ла-чі!</span></font></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Амінь,\nпадре! - вторили Свідки. Їм іноді ввижалось, що то не гроза котиться по\nВкраїні, а сама Гієна Огненна. Тож тікали вони, аж поки не заховалися у\nнапівікомфортабельному готелі обласного міста. Про Гріна Блексона ніхто й не\nзгадав, бо всі<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>думки<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>свідків-гієністів<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp; </span>були налаштовані на хвилю такої рідної і\nтакої далекої Америки.</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Тож\nзагубленому в степах місіонеру нічого не залишалось, як тільки здатися на\nмилість степу широкого та широких селянських душ, на які були так багаті\nволодарі змоклого сіна.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Без грошей,\nдокументів і карти степових доріг вибратися у цивілізований світ Грін Блексон\nне міг. Та власне, його на такий вчинок нічого і не надихало. Там у нього\nнічого не було, а тут він отримав не лише ім'я Хрін, але й звання - Німина або\nНімець, бо не вмів говорити по-їхньому. А згодом дід Гриць і його дружина\nдовірили йому селянську збрую - косу, вила, сапу, лопату та ще й батіг для\nприборкування бичка Лютика.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><font face=\"Times New Roman\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\">Спочатку Грін\nвсе ж сподівався, що за ним повернуться, потім деякий час роздумував, в якому\nнапрямку рухатися, щоб вийти прямісінько до якогось міста, а згодом і ці думки\nоблишив. Ганяючись по бур'янах за Маріїними індиками, Грін вчився<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>правильно<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>говорити<span style=\"mso-spacerun: yes;\">&nbsp; </span>українською<span style=\"mso-spacerun: yes;\">&nbsp; </span>мовою</span><span style=\"line-height: 150%; font-size: 14pt;\"><font color=\"#000000\"> </font><span style=\"color: black;\">слова подяки Господу за ще один\nпрожитий день.</span></span></font></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">За місяць під\nпатронатом господаря розкиданої скирти Блексон навчився говорити приказки: <b style=\"mso-bidi-font-weight: normal;\"><i>не</i> <i>робити - можна жити, а не\nжерти </i>- <i>можна вмерти; опинишься там, де Макар телят пасе; це тобі не\nЛютику хвоста крутити, </i></b>та інші народні премудрості.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">На кінець\nвересня німина-американець вже міг за чаркою з дідом Грицем підтримувати\nфілософську бесіду:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Скажи, Гріц, чом тут німа тє-лє-фон, нормаль&shy;ній туа-лєт,?</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- А, Хрін, на\nхрін вони тут треба. Тут кругом степ, краса природи... Щоб цю мою хату зробити\nз удобствами, треба буде перегадити і оцю річечку, і садок, і оті кургани. І\nнавіть щоб перегадити, треба мати гроші.<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>Великі гроші.<span style=\"mso-spacerun: yes;\">&nbsp; </span>Удобства з неба не\nпадають, як отой дощ... Стовпи з електрикою є, то й добре.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Стоупі!\nСтоупі! - зрадів Грін Блексон. - Я можу ходіть як стоупі...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Е, ні,\nХрін, шукати дорогу по стовпах міг тільки покійний електрик Костик. Він стовпи\nзнав, як свої п'ять пальців...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">І дід Гриць\nпоринав у спогади, а Блексон - у мрії про дорогу до Америки. А тим часом він\nнутром відчував, що все більше прикипає до цього села, до людей, до цього\nстепу, як до чогось древнього, родинного, про що давно забув, але про що десь\nна генетичному рівні пам'ятала кожна краплина його душі, крові й тіла,\nпам'ятали усі його клітини, плутані і перемішані планетарними катаклізмами минулих\nтисячоліть.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"86\" class=\" insertedImg\ cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Дід Гриць і\nГрін Блексон снідали дрібною рибкою, яку насмикав американець з річечки під\nвербою. Вони вже перехилили по чарці, а може й більше.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Скажи мені,\nХрін, - вкотре почав дід Гриць, - чи є щось таке там, у вашій Америці, краще од\nнашого степу?</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Там у нас\nСвобода, розумієшь, Гріц? Свобода і Демократія!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Атож! -\nПогодився дід. - У вас там Свобода, а у нас тут - Воля! Ви - раби своєї\nСвободи, ми - раби своєї Волі! Ми тут з усіх сил намагаємось вирватися звідси,\nз цього степу, опльовуємо, ганьбимо свою землю, тікаємо звідси світ за очі...\nКуди тікаємо? На чужину, у хащі машин і бетону. Гнемось перед чужиною... А все\nвід надлишку Волі. А коли на чужині свавілля пришкребе нас, тоді назад до землі\nбіжимо, назад, у рабство до Волі... Та вже тоді не до землі, тоді - у землю...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- О, земля! -\nНе дуже зрозумів Блексон. - Я свою землю дарував Гієні Огнєнной.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Ото і вся\nваша демократія. - Піймав думку дід Гриць. - Ви робите, що хочете, а хочете ви\nте, чого вимагає Гієна Огненна. Та ні, не Гієна, а те, чого хоче її головний\nСвідок, чи як там у вас... Президент!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- У вас тут\nбагато земель без присмотру...</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Раніше ця\nземля наче б то й нікому не потрібна була, а тепер за неї мало не б'ються, до\nкожної баби за паями черги стоять, - продовжив дід Гриць. - Куди вам,\nмериканцям, до тих черг!? Тут із самого<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>Херсону<span style=\"mso-spacerun: yes;\">&nbsp; </span>такі<span style=\"mso-spacerun: yes;\">&nbsp; </span>хлопці<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>їздять!..<span style=\"mso-spacerun: yes;\">&nbsp; </span>Теж<span style=\"mso-spacerun: yes;\">&nbsp; </span>Волі хочуть... Кажуть, родина збирається по\nВолі... Та що вони знають про Волю? Отам... - Дід Гриць тицьнув пальцем в далекий\nгайок, де крізь кущі, розріджені осінню, виглядали хрести на могилах упокоєних\nжителів Великої Могіканівки. - Отам найвища Воля!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Блексон\nглянув у вікно, куди впирався дідів палець. Там, за гайком, підпираючи небо,\nсивів курган.</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Багато землі... Воля... Небо високе, - гнув Блексон.</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Самим\nГосподом Богом отам для кожного з нас земля відведена. - Дід знову тицьнув\nпальцем в напрямку хрестів. - Мені багато не треба, мені й двох метрів\nвистачить! І для тебе, Хрін, у нас теж клаптик землі знайдеться. У тебе ж там,\nв Америці, й того немає. Що тебе там чекає?.. Крематорій?!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Деякий час\nмовчали. Кожен думав про своє.,</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Віддав Гієні свою землю... - Не вгамовувався дід. - Ні, не землю ти\nвіддав, Хріне, ти віддав Гієні свою душу... Треба душу рятувати! - засміявся дід\nГриць і наповнив чарки по самі вінця.</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Наче\nпомаранчева шуліка до курчат, у розмову ввірвалася Марія, вся замотана у\nпомаранчеві стрічки. Вона просто жбурнула на стіл два апельсини і затараторила:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Ось за кого буду голосувати! Борманиха Андріївна аж вісім<span style=\"mso-spacerun: yes;\">&nbsp; </span>апельсинів одхватила,<span style=\"mso-spacerun: yes;\">&nbsp; </span>бо з корзиною прийшла... Зараза така!</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Ти,\nполітічеська простітутка, - гримнув дід Гриць. - На минулому тижні сині\nпрапорці носила!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- То\nпрапорці, а оце осьо - їсти можна! По-ма-ран-чі! Так їхній лектор казав. Там\nцілий автобус агітаторів. Я думала це знов мериканці гуманітарну підвезли... А\nвони співають. «Нас, - співають, -багато!»<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>А скільки ж нас? Борманиха Андріївна, Тунка та ще я залишилася. І все...\nПане Хрін, сходіть до груші, може й вам щось перепаде. - Марія тицьнула<span style=\"mso-spacerun: yes;\">&nbsp; </span>в<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>руки<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>Гріну<span style=\"mso-spacerun: yes;\">&nbsp; </span>старий<span style=\"mso-spacerun: yes;\">&nbsp;\n</span>кошик<span style=\"mso-spacerun: yes;\">&nbsp; </span>і<span style=\"mso-spacerun: yes;\">&nbsp; </span>майже випхнула за двері.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"87\" class=\" insertedImg\" style=\"left: 24px; top: 144px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABXAGADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZH NDEzpNW8OtfXn26w1GXTbtlCSOkayLKoOQGRuCQScHrzVnR9Fj0lJWM8t1c3D+ZPczY3ytjA6cAAcADgUUUhGiVUknaOevvWZrHh6y1p4pZmnguIQVjuLaUxyBT1XI6g4HBoooAz5PAPh+VGL20onf71ytxIJm/3nzlvoeKmi8HaVBptxYxRuEuf9bK0jPK5HQlyc8du1FFAHIal8P8AUrJ/MsjFdQKxfG7YwAxhcHiuVksLqGNllt1BzhhkYPJxnB6bh0HYfhRRTQ0OiUyy5RztSQIexZgCenoM4/8A1Ve03w5qupKPstr5iuATmRFBAA6k89+woopjO78O+BINJlS5vZhczryFVdsat647/j6V1lFFSSf/2Q==\" v:shapes=\"_x0000_i1036\"></font><span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>а час\nпригод в Великій Могіканівці дорога до груші в'їлася Гріну Блексону у печінки,\nяк самогонка баби Груні. Та сьогодні ця дорога була незвичайною. Опале листя\nвкрило її золотом, і він ступав по ній, як по килиму із золотого пуху. Наче хто\nпостелив під ноги золоту осінь, а в душу застромив відчуття Долі.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Блексон\nзгадав пейзажі рідної Америки і відчув смуток - в своєму житті він ніколи не\nбачив стільки голих дерев на фоні голубого холоду з небес і пухкого золота під\nногами. Природа стріляла в очі істинною правдою.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Крізь гілки\nневисоких дерев та кущів Грін побачив біля груші у центрі Великої Могіканівки\nяскраві спалахи жовтогарячих прапорів. Біля автобуса метушились людиноподібні\nплями. Ближче підходив Грін, і плями ставали схожими на людей. Серед них він\nвпізнав того, хто зіграв вирішальну роль в його житті посереднього американця.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Амінь, падре! - вирвалося у Блексона десь зсередини, а його ноги самі\nзупинилися перед кущем шипшини, що ряснів червоними плодами.</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">\"Що\nробить головний Свідок Гієни Огненної під огненними агітаційними\nпрапорами?\" - крамольна думка пронизала релігійний розум Гріна, промитий\nукраїнською \"огненною водою\". На мить стало страшно. Він відчув, що\nможе втратити не якесь там посереднє життя; Він може втратити Волю, щойно\nзнайдену на землі древніх Кімів...</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">То<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>все<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>Брехня!..<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>-<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>вигукнув<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>Блексон українською мовою, - Падре, чужий ти\nтут!</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Але\nнаблизитись до автобуса він не насмілився. Ніхто його не почув, та й не мав\nпочути. Постоявши за кущем з червоними ягодами, Грін садочками та балочками\nпішов, не знаючи куди. Не розумом, а душею він знаходив свою дорогу.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"87\" class=\" insertedImg selected\" style=\"left: 18px; top: 265px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABXAGADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDvrm+vtd1a50/TtQksIbNxFJJEimSSTqeWBAUDHbJJ7VY0TU7iO7vNK1OdJZrPY63AQRiWJwSpK9FYbWB7cZ71j6tp1tpN3qMWoF10vWZC7XQcqIJCMFHYcqpwMN0BBB61fg8O2tpoN3bR3L77uB08+aQyMxZNoZnP3sA8Y4ApsCxB420eeVQTcwQyMFiuZ7d44ZSem1yMc9s4zUWueILqO/ksNNmtLdra3+0XdxdgskSkkAYBHJ2tkk4AHfNcdq+sXiwW2kT3CaVAlp5d5DPGrNJIFAXG4ESRnBA2HvWf9p0Ka2GleIXvFv1t4xDDZuzzyxMN3lN1B2Mv8fbBoA6G++IWq2cboLfTnxFHNHdI7uk6yNtTZGOc545bHTmt7w34nuNT8+ ;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>астор\nСвідків Гієни Огненної домігся бути залишеним в Україні на період чергових\nпозачергових виборів як наглядач-спостерігач за дотриманням демократії. Тепер\nвін колесив по степах в агітаційних автобусах потрібного Гієні кандидата.\nПодейкували, що буцімто за власний кошт пастор щедро поповнював запаси\nгуманітарних апельсинів та заправляв автобус пальним. Така допомога не\nвважається втручанням у внутрішні справи країни і законами не забороняється.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Українською\nмовою пастор вивчив слово \"так\", і коли до нього звертались інші\nагітатори:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Так, падре,\nми робимо?</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Так! -\nвідповідав пастор-гієніст. А що ще він міг відповісти?.. Його віра в силу Гієни\nОгненної майже<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>згасла<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>серед<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>цих<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>степів,<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>але<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp;\n</span>віру<span style=\"mso-spacerun: yes;\">&nbsp;&nbsp; </span>в гуманітарну місію церкви\nвін ще не втратив. Але де ж той шлях, по якому можна проникнути в душу дивного\nукраїнського люду?.. Над цим питанням треба було думати.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p>","cover":false},{"html":"<p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">І щоб надалі\nне відволікати пастора від роздумів про розсіяні по землях України зернах\nгієно-огненної правди та про Судний День, що невблаганно наближався, агітатори\nпочали надписувати слово <b><i>'Так!\" </i></b>спочатку на листівках, а\nпотім і на прапорах апельсинового кольору. Свідок Гієни Огненної задоволено\nкивав головою: тепер так було усе гарно, що йому й рота не треба було\nроззявляти. Та, правду кажучи, й не хотілося.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Під грушею\nагітатори затримались не довго. Більше того, коли автобус мчав геть від Великої\nМогіканівки, вони затіяли сварку між собою:</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Ми дарма згаяли час!</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- На карті\nнаписано Велика Могіканівка, - виправдовувався гід-провайдер. - Велика!..\nЗвідки я міг знати, що там лише три баби живе?!</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">- Чотири! -\nХтось жартома заспокоїв колег. -Он ще одна стоїть на кургані... Кам'яна баба.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">На сивому\nкургані в золотистих променях вечірнього сонця стояла висока постать з піднятою\nдо неба рукою, в якій щось проблискувало і наче світилося. Постать чимось була\nсхожа на жіночу Статую Свободи, символ Сполучених Штатів Америки. Ця схожість\nпримусила пастора здригнутися. Він конвульсивно стиснув апельсин, який тримав у\nруці. Цівка пекучого соку бризнула в око і примусила зажмуритися. Розчавлений\nапельсин полетів у відкрите вікно.</font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\">Пастор\nпам'ятав, що кам'яні жіночі фігури ставилися на припонтійських курганах ще за\nчасів, про які ніхто й не пам'ятає, ще тоді, коли не було ніяких американських\nсимволів, та й самої Америки ще не було. А ця он, бачиш, до цих пір стоїть!..\n«Все!.. Треба вертатися додому!» - раптом вирішив пастор і перехрестився:</font></span></p>","cover":false},{"html":"<p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%; text-indent: 27pt;\"><span style=\"line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font color=\"#000000\">- </font><span style=\"color: black;\">Прости мене, Господи, але чужі ми тут з тобою. Назавжди чужі...</span></font></span></p><p><font color=\"#000000\" face=\"Times New Roman\" size=\"3\">\n\n<br></font></p><p style=\"margin: 0cm 0cm 0pt; text-align: justify; line-height: 150%;\"><span style=\"color: black; line-height: 150%; font-size: 14pt;\"><font face=\"Times New Roman\"><font size=\"3\"><img width=\"96\" height=\"86\" class=\" insertedImg\" style=\"left: 17px; top: 121px;\" src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCABWAGADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDvri+vdd1a60/TtQksIbNxFJJEimSSTq3LAgKBjtkk1Y0TU7iO7vNK1OdJZrPY63IQRiWJwSCw6Kw2sD24B71kaxpttpVzqCagrnSdXcvJchmHkSEYKuV5VCAMN2I561et/D1la+H7q3huGH2uB0+0SSNISWTaGMhzuwDx6CmBPD410maRdwuoIJGCxXVxbskMuemHPAB7E4zUWueIbqO+ksNNntLY2tuLm7ubpSyxKSQFwCOTtbJJ4A75rj9X1W+SK20q4uP7KgW0MV1FJErmaQKApUlSJUOMYUg881nC60KaAaPr63j36W6CGGxdmmeNhu8lj0+Rh0foNtAHRXvxD1W0idFg058QxzR3SO7pOsjbU2R9c54OWx05rd8N+J7nU/tFvfwJDcQRxShkBCur5wCp5VhtORk153Ywg2JvJLqPTLKOE2P2eZBNJ
