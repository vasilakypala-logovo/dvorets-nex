предмет.<br>Но в этом я не виновата.<br>Не плачьте. Гордый слезы прячет,<br>В них утешаются глаза.<br>И все же просится слеза:<br>Кто мало видел, много плачет.<br>У вас, конечно, отговорка,<br>Я знаю, сразу бы нашлась:<br>Ведь солнце смотрит же на грязь,<br>И смотрит даже очень зорко.<br>Теперь хозяйка вам назначит<br>Другой удел, мои глаза.<br>И все же просится слеза:<br>Кто мало видел, много плачет.<br><br>ЯВЛЕНИЕ ДЕВЯТОЕ<br><br>Марсела, Диана.<br><br>Марсела<br><br>Когда усердье многих лет<br>И труд, свершенный нелукаво,<br>Имеют сколько-нибудь право<br>Ждать справедливости в ответ, --<br>Вам дан благоприятный час<br>Свою служанку не обидеть<br>И больше никогда не видеть<br>Лицо, немилое для вас.<br><br>Диана<br><br>Ждать справедливости, Марсела?<br>Не понимаю. Ты о чем?<br><br>Марсела<br><br>Сегодня покидает дом<br>Ваш секретарь, и я хотела<br>Просить, чтоб вы меня пустили<br>В Испанию совместно с ним,<br>Как с мужем, стало быть, моим.<br><br>Диана<br><br>Да вы об этом говорили?<br><br>Марсела<br><br>Ужели бы явиться к вам<br>С подобной просьбой я посмела,<br>Не обсудив, с кем нужно, дела?<br><br>Диана<br><br>Он соглашается?<br><br>Марсела<br><br>Он сам<br>Мне сделал это предложенье.<br><br>Диана<br>(в сторону)<br><br>Еще и это перенесть!<br>Нет, я не в силах.<br><br>Марсела</div>", "cover": false}, {"html": "<div class=\"textPage\">Все как есть<br>Мы приняли в соображенье<br>И даже справились подробно,<br>Как нам устроиться в пути.<br><br>Диана<br>(в сторону)<br><br>Нет, гордость глупая, прости,--<br>Любовь на все пойти способна.<br>И я не побоюсь позора;<br>Но способ я и так найду<br>Уладить новую беду.<br><br>Марсела<br><br>Вы разрешаете, сеньора?<br><br>Диана<br><br>Я без тебя не в силах жить,<br>Моя Марсела, и за что же<br>Мою любовь, и Фабьо тоже,<br>Ты бы хотела оскорбить?<br>Тебя я с Фабьо поженю,<br>И, если хочешь, даже скоро.<br><br>Марсела<br><br>Мне Фабьо мерзок. Теодоро<br>Я обожаю.<br><br>Диана<br>(в сторону)<br><br>Сохраню<br>Власть над собою или нет?<br>О, сердце, сердце, как ты бьешься!<br><br>(Марселе.)<br><br>От Фабьо ты не увернешься.<br><br>Марсела<br><br>Сеньора...<br><br>Диана<br><br>Это мой ответ.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДЕСЯТОЕ<br><br>Марсела.<br><br>Марсела<br><br>Иди навстречу злобе и угрозам<br>И дерзостно могучим прекословь;<br>Ревнивое тиранство хмурит бровь<br>И равнодушно к жалобам и слезам.<br><br>Назад, назад, ты, верившая грезам!<br>То, что минуло, не воскреснет вновь.<br>Во всем цвету погублена любовь,<br>Как деревцо, убитое морозом.<br><br>Так радостно игравшие цвета<br>Чужая власть одела в цвет печали,<br>Чужой мечтой охлаждена мечта.<br><br>Увы, надежды, вы напрасно ждали:<br>Весенняя увяла красота;<br>Не дав плода, ее цветы опали.<br><br>(Уходит.)<br><br>Зала во дворце графа Лудовико.<br><br>ЯВЛЕНИЕ ОДИННАДЦАТОЕ<br><br>Граф Лудовико, Камило.<br><br>Камило<br><br>Другого средства нет у вас<br>Для продолжения породы.<br><br>Лудовико<br><br>Камило, прожитые годы<br>Ко мне суровей, что ни час.<br>Хотя бы цель и оправдала<br>Женитьбу в старости седой,<br>Но разум хочет быть судьей<br>И дело рассмотреть сначала.<br>Ведь может быть,--чего уж хуже, --<br>Потомства не дождаться мне,<br>И я останусь при жене.<br>А ведь жена при старом муже--<br>Что плющ, повисший на ветвях:<br>Когда раскидистому клену<br>Он обовьет и ствол, и крону,<br>Он юн и свеж, а клен зачах.<br>И все такие рассужденья<br>Тревожат в памяти моей<br>Печаль давно минувших дней<br>И бередят мои мученья.<br>Я столько лет в слезах провел,<br>Все поджидая Теодоро!<br>Двадцатый год настанет скоро.<br><br>ЯВЛЕНИЕ ДВЕНАДЦАТОЕ<br><br>Паж; затем Тристан и Фурьо. Те же.<br><br>Паж<br><br>Там к вашей милости пришел<br>Какой-то греческий купец.<br><br>Лудовико<br><br>Проси сюда.<br><br>Паж удаляется, и входят<br>Тристан и Фурьо в греческих одеяниях.<br><br>Тристан<br><br>Без всякой лести<br>Целую руки вашей чести.<br>Да утолит ее творец<br>В ее заветнейшей надежде.<br><br>Лудовико<br><br>Я рад вас видеть, господа.<br>Давно вы прибыли сюда?<br>Впервые? Иль бывали прежде?<br><br>Тристан<br><br>Я из Стамбула с кораблем<br>На Кипр отправился, а дальше<br>В Венецию, куда привез<br>Богатый груз персидских тканей.<br>Я, наряду с моей торговлей,<br>Еще и поисками занят.<br>Хотелось повидать мне также<br>Неаполь, город достославный,<br>И вот, пока там у меня<br>Приказчики товар сбывают,<br>Я и приехал к вам сюда,<br>Где и любуюсь, как прекрасен<br>И пышен этот древний город.<br><br>Лудовико<br><br>Да, город пышный и прекрасный<br>Неаполь.<br><br>Тристан</div>", "cover": false}, {"html": "<div class=\"textPage\">Ваша милость правы.<br>Отец мой, сударь, чтоб вы знали,<br>Был крупным в Греции купцом,<br>И самой прибыльною частью<br>Он почитал работорговлю.<br>И вот в Астеклии однажды<br>Купил он мальчика на рынке,<br>И это был такой красавец,<br>Что никогда еще природа<br>Подобного не создавала.<br>Тот мальчик был турецкий пленник<br>И был, среди других, захвачен<br>На корабле одном мальтийском,<br>Который их паше достался<br>Под Чафолонией в добычу.<br><br>Лудовико<br><br>Камило, сердце замирает.<br><br>Тристан<br><br>Его купил он и отвез<br>К себе в Армению, и с нами,<br>Со мною и с моей сестрой,<br>Его воспитывал.<br><br>Лудовико<br><br>Не надо,<br>Друг, подожди, ты мне пронзаешь<br>Все внутренности!<br><br>Тристан<br>(в сторону)<br><br>Забирает<br><br>Лудовико<br><br>Как звался мальчик?<br><br>Тристан<br><br>Теодоро.<br><br>Лудовико<br><br>О небеса! Как слово правды Могущественно в сердце нашем<br>Я слез своих сдержать не властен.<br><br>Тристан<br><br>Сестра моя Серпалитонья<br>И этот мальчик<br>(о несчастный<br>Дар красоты!)<br> росли совместно<br>И, как бывает очень часто,<br>Еще в младенческие годы<br>Друг друга полюбили страстно.<br>Когда им было лет шестнадцать<br><br>(Отец как раз был в дальних странах)<br>,<br>Осуществилась их любовь.<br>И так она в сестре сказалась,<br>Что это стало всем заметно.<br>А Теодоро, из боязни,<br>Бесследно скрылся и оставил<br>Серпалитонию брюхатой.<br>Катиборратос, мой отец,<br>Был удручен не столько срамом,<br>Как этим бегством Теодоро.<br>От огорченья он скончался,<br>А мы с сестрой крестили внука.<br>Как вам известно, мы, армяне,<br>Такой же веры, как и вы,<br>Хоть церковь наша и другая.<br>Мы нарекли младенцу имя<br>Теримаконьо. Всем на радость<br>Мальчишка вышел и растет<br>У нас в Тепекасе на славу.<br>Так вот, прибыв сюда, в Неаполь,<br>Я стал, как всюду, где бываю,<br>Расспрашивать про Теодоро,--<br>Я даже захватил бумажку<br>С обозначением примет,--<br>И вдруг мне говорит служанка<br>Моей гостиницы, гречанка:<br>&quot;А что, как этот самый мальчик--<br>Сыночек графа Лудовико?&quot;<br>Душа во мне, как свет, взыграла,<br>И я решил, что непременно<br>Вас должен повидать. Я начал<br>Искать ваш дом, и по ошибке<br>Прохожие мне указали<br>На дом графини де Бельфлор.<br>Вхожу и тут же натыкаюсь...<br><br>Лудовико<br><br>Душа дрожит.<br><br>Тристан<br><br>На Теодоро.<br><br>Лудовико<br><br>На Теодоро!<br><br>Тристан<br><br>Он-то, правда,<br>Хотел укрыться, да не мог.<br>Я сам немного сомневался,<br>Да и понятно: борода,<br>Известно как, лицо меняет.<br>В конечном счете, он со мной<br>Заговорил, хоть и смущаясь;<br>Просил, чтоб я оставил в тайне<br>Все то, что про него я знаю.<br>Он опасался, что ему<br>Былое рабство в грех поставят.<br>А я ответил: &quot;Ну, а если<br>Окажется, что здесь ты знатный<br>Наследник титула, ты тоже<br>Смущаться будешь прошлым рабством?<br>Он посмеялся надо мной.<br>А я, желая вас поставить<br>В известность обо всем, что знаю,<br>Явился к вам, и если правда,<br>Что это ваш пропавший сын,<br>Прошу и с внуком посчитаться;<br>Или прошу моей сестре<br>Дозволить с ним прибыть в Неаполь,<br>Не для того, чтоб выйти замуж,<br>Хотя она из лучшей знати,<br>А чтобы наш Теримаконьо<br>С вельможным дедом повидался.<br><br>Лудовико</div>", "cover": false}, {"html": "<div class=\"textPage\">О, дайте вас обнять сто раз!<br>Душа в безмерном ликованье<br>Свидетельствует громогласно,<br>Что ваш рассказ -- святая правда.<br>О сын, возлюбленный мой сын,<br>Вновь обретенный, мне на счастье,<br>В исходе стольких лет разлуки!<br>Камило, что ж теперь мне делать?<br>Бежать к нему, его увидеть?<br><br>Камило<br><br>Само собой! Лететь сейчас же<br>И после всех страданий ваших<br>Воскреснуть вновь в его объятьях!<br><br>Лудовико<br><br>Друг, если вы хотите вместе<br>Со мной идти, я буду счастлив<br>Вдвойне; хотите отдохнуть--<br>Здесь подождите, отдыхайте.<br>Я вас прошу, распоряжайтесь<br>Всем в этом доме, как хозяин.<br>А я не в силах утерпеть.<br><br>Тристан<br><br>Я только захвачу алмазы<br><br>(Я их в гостинице оставил)<br>,<br>Потом приду сюда обратно.<br>Пойдем покуда, Меркапоньос.<br><br>Фурьо<br><br>Идемте, сударь.<br><br>Тристан<br><br>Началдахи<br>Недурносы.<br><br>Фурьо<br><br>Здоровожди.<br><br>Тристан<br><br>Пошлибаши.<br><br>Уходят Тристан и Фурьо.<br><br>Камило<br><br>Какой занятный<br>Язык!<br><br>Лудовико<br><br>Иди за мной, Камило.<br><br>Уходят.<br><br>Улица.<br><br>ЯВЛЕНИЕ ТРИНАДЦАТОЕ<br><br>Тристан внутри дома, дверь которого закрыта.<br> Фурьо снаружи, возле двери.<br><br>Тристан<br>(приотворяя дверь)<br><br>Ну что, плывут?<br><br>Фурьо<br><br>Старик помчался,<br>Не дожидаясь лошадей.<br><br>Тристан<br><br>А если в самом деле правда,<br>Что Теодоро -- графский сын?<br><br>Фурьо<br><br>И вдруг окажется, что басня<br>От истины недалека?<br><br>Тристан<br><br>Возьми пока вот эти тряпки.<br>Мне надобно все это скинуть,<br>А то недолго и попасться<br>Знакомым людям на глаза.<br><br>Фурьо<br><br>Снимай скорее.<br><br>Тристан<br><br>Вот что значит<br>Родительская-то любовь!<br><br>Фурьо<br><br>Так где мне ждать тебя?<br><br>Тристан<br><br>Давай-ка<br>В домишке этом, возле вяза.<br><br>Фурьо<br><br>Прощай, Тристан.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ЧЕТЫРНАДЦАТОЕ<br><br>Тристан.<br><br>Тристан<br><br>Какие разум<br>Таит сокровища, ей-богу!<br>Я сам невольно поражаюсь.<br><br>(Выходит на улицу.)<br><br>Здесь у меня был плащ подвернут,<br>Надетый, словно как подрясник,<br>Чтоб просто, в случае чего,<br>Закинуть в первую канаву<br>Мою армянскую чалму<br>И греческую размахайку.<br><br>ЯВЛЕНИЕ ПЯТНАДЦАТОЕ<br><br>Рикардо, Федерико, Тристан.<br><br>Федерико<br><br>Да это же тот самый наш смельчак,<br>Который брался заколоть любого!<br><br>Рикардо<br><br>Послушайте, идальго! Разве так<br>Порядочные люди держат слово?<br>Или оно, по-вашему, пустяк?<br><br>Тристан<br><br>Сеньор...<br><br>Федерико<br><br>От вас мы ждали не такого<br>Поступка.<br><br>Тристан<br><br>Дайте мне сказать, сеньор,<br>А там произносите приговор.<br>Я поступил на службу к Теодоро,<br>И можете считать, что он пропал.<br>Но надо действовать не слишком скоро,<br>Не тотчас же окровавлять кинжал.<br>Вы знаете: что скоро, то не споро.<br>Благоразумье древний мир считал<br>Верховной добродетелью. Поверьте,<br>Мой поднадзорный не уйдет от смерти.<br>Он томен и меланхоличен днем.<br>А чуть стемнеет--замурован в спальне.<br>Какая-то тоска гнездится в нем,<br>И что ни час, бедняга все печальней.<br>Мы подождем, а там и подстегнем,<br>Чтоб он скорей собрался в путь недальний<br>Но вы не торопите, господа,<br>Я знаю сам, что надо и когда.<br><br>Федерико<br><br>Мне кажется, он дело разумеет.<br>Он втерся в дом и выберет свой час.<br>Убьет его, как мышь.<br><br>Рикардо<br><br>Тот не успеет<br>И пикнуть.<br><br>Федерико<br><br>Не услышали бы нас.<br><br>Тристан</div>", "cover": false}, {"html": "<div class=\"textPage\">Покамест эта смерть тихонько зреет,<br>Сеньоры, не найдется ли у вас<br>Полсотни золотых? Купить клячонку.<br>За мной, наверно, пустятся вдогонку.<br><br>Рикардо<br><br>Вот золото. Признательность щедра<br>Исполните свое--мы не забудем<br>Наш долг.<br><br>Тристан<br><br>Опасная моя игра.<br>Но я всегда помощник честным людям.<br>Засим, сеньоры, кланяюсь. Пора.<br>Боюсь, мы подозрения возбудим<br>Беседой нашей.<br><br>Федерико<br><br>Ваш совет неглуп.<br><br>Тристан<br><br>Вам это засвидетельствует труп.<br><br>(Уходит.)<br><br>Федерико<br><br>Отважный человек.<br><br>Рикардо<br><br>И осторожный.<br><br>Федерико<br><br>Зарежет мастерски.<br><br>Рикардо<br><br>Само собой.<br><br>ЯВЛЕНИЕ ШЕСТНАДЦАТОЕ<br><br>Сельо, Федерико, Рикардо.<br><br>Сельо<br><br>Ведь вот какие чудеса возможны!<br><br>Федерико<br><br>В чем дело, Сельо? Ты куда? Постой!<br><br>Сельо<br><br>Волшебный случай, но весьма тревожный<br>Для вас обоих. Вон какой толпой<br>Идут в ворота графа Лудовико!<br><br>Рикардо<br><br>Он помер?<br><br>Сельо<br><br>Чудо было б невелико.<br>Да нет, спешат поздравить старика.<br>Он разыскал исчезнувшего сына.<br><br>Рикардо<br><br>А нам-то чем же может быть горька<br>Веселая семейная картина?<br><br>Сельо<br><br>Мне кажется, расстроиться слегка<br>Поклонникам Дианы есть причина.<br>Ведь сын-то графа,--знаете, кто он?<br>Ведь это--Теодоро.<br><br>Федерико<br><br>Я сражен.<br><br>Рикардо<br><br>Сын графа? Вот так так! Но как узнали,<br>Что это он?<br><br>Сельо<br><br>Толкуют так и сяк,<br>И столько мне вещей нарассказали,<br>Что и не вспомнить, почему и как.<br><br>Федерико<br><br>Я горестней не ведывал печали!<br><br>Рикардо<br><br>Лучи надежды поглощает мрак.<br><br>Федерико<br><br>Пойду взгляну, в чем дело.<br><br>Рикардо<br><br>Граф, я с вами.<br><br>Сельо<br><br>Святая правда. Убедитесь сами.<br><br>Уходят.<br><br>Зала во дворце графини.<br><br>ЯВЛЕНИЕ СЕМНАДЦАТОЕ<br><br>Теодоро в дорожном платье; Марсела.<br><br>Марсела<br><br>Ты, значит, едешь? Что ж, пора.<br><br>Теодоро<br><br>Виновна ты в моем изгнанье;<br>В таком неравном состязанье<br>Нет и не может быть добра.<br><br>Марсела<br><br>Твоя увертка не хитра,<br>И не довольно ли хитрить?<br>Меня ты не хотел любить,<br>Ты обожал одну Диану.<br>Вот и осталось--сердца рану<br>Разлукой вечной исцелить.<br><br>Теодоро<br><br>Диану? Я?<br><br>Марсела<br><br>Имей хотя бы<br>Отвагу не топтать мечты,<br>Из-за которой гибнешь ты,<br>Воитель дерзостный и слабый.<br>Не будь ты слаб, она могла бы<br>Пойти, быть может, на позор;<br>Не будь ты дерзостен, ты взор<br>Не поднял бы к такому счастью.<br>Но между гордостью и страстью<br>Лежит немало снежных гор.<br>А я отомщена, я рада,<br>Хоть я тебя еще люблю,<br>Я память мщеньем истреблю.<br>В нем есть сладчайшая отрада.<br>Но только одного мне надо:<br>Пусть вечно мысль тебя томит,<br>Что я забыла; гнев и стыд<br>Разбудят в сердце тень былого,<br>Затем что всякий любит снова,<br>Когда он знает, что забыт.<br><br>Теодоро<br><br>К чему такие ухищренья,<br>Чтоб выйти за другого?<br><br>Марсела<br><br>Что ж,<br>Ты сам меня и выдаешь.<br>Ведь мне же нужен способ мщенья.<br><br>ЯВЛЕНИЕ ВОСЕМНАДЦАТОЕ<br><br>Фабьо. Те же.<br><br>Фабьо<br><br>Остались краткие мгновенья,<br>Душа изныла в тяжком горе,<br>И ты ее в прощальном взоре<br>Вручаешь другу своему?<br><br>Теодоро<br><br>Как можно ревновать к тому,<br>Кого навек уносит море?<br><br>Фабьо<br><br>Ты, значит, едешь?<br><br>Теодоро<br><br>Видишь сам.<br><br>Фабьо<br><br>Постой, ты нужен госпоже.<br><br>ЯВЛЕНИЕ ДЕВЯТНАДЦАТОЕ<br><br>Диана, Доротея, Анарда. Те же.<br><br>Диана<br><br>Как, Теодоро, вы уже?<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Я бы хотел к моим ногам<br>Приделать крылья вместо шпор!<br><br>Диана<br><br>Все вещи собраны в дорогу?<br><br>Анарда<br><br>Да, как же.<br><br>Фабьо<br>(Марселе)<br><br>Едет ведь, ей-богу!<br><br>Марсела<br><br>А ты ревнуешь до сих пор!<br><br>Диана<br>(Теодоро)<br><br>Послушайте.<br><br>Теодоро<br><br>Я здесь, сеньора.<br><br>Диана<br><br>О, что за муку я терплю!<br>Вы едете. Я вас люблю.<br><br>Теодоро<br><br>Я только жертва приговора.<br><br>Диана<br><br>Мой деспот--родовая кровь;<br>И разве я боролась мало?<br><br>Теодоро<br><br>Вы плачете?<br><br>Диана<br><br>Нет, мне попало<br>В глаз что-то.<br><br>Теодоро<br><br>Может быть, любовь?<br><br>Диана<br><br>Должно быть, да. Наружу рвется<br>И хочет выйти как-нибудь.<br><br>Теодоро<br><br>Я уезжаю в дальний путь,<br>Но сердце с вами остается.<br>Я уезжаю без него;<br>Я буду сам в стране далекой,<br>Но верен красоте высокой<br>Служеньем сердца моего.<br>Какой приказ у вас найдется<br>В последний миг?<br><br>Диана<br><br>Как ноет грудь!<br><br>Теодоро<br><br>Я уeзжaю в дальний путь,<br>Но сердце с вами остается.<br><br>Диана<br><br>Вы плачете?<br><br>Теодоро<br><br>Нет, что-то в глаз<br>Попало мне и больно гложет.<br><br>Диана<br><br>Мои страдания, быть может?<br><br>Теодоро<br><br>Я рад похитить их у вас.<br><br>Диана<br><br>Я кой-какие безделушки<br>К вам в чемоданчик заперла<br>Простите; все, что я нашла.<br>Скажите, эти побрякушки<br>Перебирая, как трофей<br>Победоносного тирана:<br>&quot;Их щедро полила Диана<br>Слезами горести своей&quot;.<br><br>Анарда<br>(Доротее)<br><br>Пропали оба, что уж тут!<br><br>Доротея<br><br>Не утаить любовной муки!<br><br>Анарда<br><br>Что ехать! Пожимают руки,<br>Друг другу кольца отдают.<br><br>Доротея<br><br>Диана поступает с ним<br>Так точно, как собака с сеном.<br><br>Анарда<br><br>Обязывает вечным пленом.<br><br>Доротея<br><br>Ни ей не сытно, ни другим.<br><br>ЯВЛЕНИЕ ДВАДЦАТОЕ<br><br>Лудовико, Камило. Те же.<br><br>Лудовико<br><br>Восторг души, прелестная Диана,<br>Послужит извиненьем старику,<br>Который к вам вбегает без доклада.<br><br>Диана<br><br>В чем дело, милый граф?<br><br>Лудовико<br><br>От вас одной<br>Укрылось то, что знает весь Неаполь?<br>Весть облетела всех в единый миг,<br>И я с трудом пробился сквозь толпу,<br>Спеша сюда скорей увидеть сына.<br><br>Диана<br><br>Какого сына? И чему вы рады?<br><br>Лудовико<br><br>Ужели вы не слышали рассказа,<br>Как я, тому уж скоро двадцать лет,<br>Отправил сына с дядюшкой на Мальту<br>И как его забрали в плен галеры<br>Али-паши?<br><br>Диана<br><br>Мне кто-то говорил<br>Об этом вашем горе.<br><br>Лудовико<br><br>И сегодня<br>Святое небо мне вернуло сына,<br>Избегшего опасностей и смерти.<br><br>Диана<br><br>Сеньор, вы подарили мне, поверьте,<br>Большую радость.<br><br>Лудовико<br><br>А взамен, сеньора,<br>Я жду, что вы подарите мне сына,<br>Который служит и живет у вас,<br>К родному дому полный безучастья.<br>Ах, если б мать могла дожить до счастья!<br><br>Диана<br><br>Он служит у меня? Кто ж это? Фабьо?<br><br>Лудовико<br><br>Да нет, не Фабьо. Это Теодоро.<br><br>Диана<br><br>Как? Теодоро?<br><br>Лудовико<br><br>Да.<br><br>Теодоро<br><br>Но как же так?<br><br>Диана<br><br>Скажите, Теодоро, граф--отец ваш?<br><br>Лудовико<br><br>Вот этот вот?<br><br>Теодоро<br><br>Сеньор, пусть ваша милость<br>Подумает...<br><br>Лудовико<br><br>О чем тут думать, сын,<br>Сын чресл моих! О том, чтоб умереть<br>В твоих объятьях!<br><br>Диана<br><br>Непонятный случай!<br><br>Анарда<br><br>Ах, боже мой, сеньора! Теодоро<br>Такой высокородный кабальеро?<br><br>Теодоро<br><br>Сеньор, я от смущения потерян.<br>Так я--ваш сын?<br><br>Лудовико<br><br>Не будь я в том уверен,<br>Мне было бы достаточно взглянуть<br>Тебе в лицо. Я был совсем такой же<br>В дни юности!<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Целую ваши ноги<br>И умоляю вас...<br><br>Лудовико<br><br>Не говори!<br>Я сам не свой. Какой прекрасный облик!<br>Храни тебя господь. Какая статность!<br>Как величаво говорит природа,<br>Что ты наследник доблестного рода!<br>Идем, мой сын. Прими в свое владенье<br>И отчий дом, и отчие богатства.<br>Вступи в ворота, на которых блещет<br>Герб, самый гордый в этом королевстве.<br><br>Теодоро<br><br>Сеньор, я должен был сегодня ехать<br>В Испанию...<br><br>Лудовико<br><br>В Испанию? Отлично!<br>Испания -- мои объятья.<br><br>Диана<br><br>Граф,<br>Я вас прошу, позвольте Теодоро<br>Опомниться и не в такой одежде<br>Явиться к вам отдать сыновний долг.<br>Я не хочу, чтоб он отсюда вышел,<br>Когда внизу так людно и так шумно.<br><br>Лудовико<br><br>Вы говорите, как всегда, разумно.<br>Мне больно с ним расстаться и на миг;<br>Но, чтобы пуще не поднялся крик,<br>Я ухожу, прося вас об одном:<br>Чтобы до ночи он вступил в мой дом.<br><br>Диана<br><br>Даю вам слово.<br><br>Лудовико<br><br>Сын мой, до свиданья.<br><br>Теодоро<br><br>Целую ваши ноги.<br><br>Лудовико<br><br>Ax, Камило,<br>Теперь и умереть не жаль.<br><br>Камило<br><br>Красавец<br>Ваш Теодоро!<br><br>Лудовико<br><br>Даже думать жутко.<br>И то боюсь, что я лишусь рассудка.<br><br>Уходят Лудовико и Камило<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ПЕРВОЕ<br><br>Диана, Теодоро, Марсела, Доротея, Анарда, Фабьо<br><br>Доротея<br><br>Сеньор, позвольте ваши руки.<br><br>Анарда<br><br>И не почтите то за лесть.<br><br>Доротея<br><br>Мы заслужили эту честь.<br><br>Марсела<br><br>Вельможи никогда не буки,<br>Сеньор, вы нас должны обнять,<br>Вы этим души покорите.<br><br>Диана<br><br>Посторонитесь, пропустите.<br>Довольно глупости болтать!<br>Весьма почтительно, сеньор,<br>Целую ваши руки тоже.<br><br>Теодоро<br><br>У ног, что мне всего дороже,<br>Ваш раб вдвойне я с этих пор.<br><br>Диана<br><br>А вы не стойте тут напрасно.<br>Оставьте нас на полчаса.<br><br>Марсела<br>(Фабьо)<br><br>Что скажешь, Фабьо?<br><br>Фабьо<br><br>Чудеса.<br><br>Доротея<br>(Анарде)<br><br>Теперь что будет?<br><br>Анарда<br><br>Дело ясно:<br>Хозяйка больше не склонна<br>Лежать собакою на сене.<br><br>Доротея<br><br>Съест наконец?<br><br>Анарда<br><br>И при кузене.<br><br>Доротея<br><br>Ах, хоть бы лопнула она!<br><br>Уходят Марсела, Фабьо. Доротея и Анарда.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ВТОРОЕ<br><br>Диана, Теодоро.<br><br>Диана<br><br>Теперь вам ехать не придется?<br><br>Теодоро<br><br>Мне?<br><br>Диана<br><br>Вам не хочется вздохнуть:<br>&quot;Я уезжаю в дальний путь,<br>Но сердце с вами остается&quot;?<br><br>Теодоро<br><br>Вас забавляет, вам смешно<br>Мое внезапное величье?<br><br>Диана<br><br>Ликуйте, радуйтесь!<br><br>Теодоро<br><br>Различье<br>Меж нас теперь упразднено,<br>И вы глумиться не должны.<br><br>Диана<br><br>Вы изменились.<br><br>Теодоро<br><br>Я уверен,<br>Что в вашем сердце я потерян.<br>Вам тяжело, что мы равны.<br>Во мне любили вы слугу; Тщеславие всегда любило<br>Господствовать над тем, что мило.<br><br>Диана<br><br>Я вам одно сказать могу:<br>Теперь вы мой, навеки пленный!<br>И вы сегодня же со мной<br>Венчаетесь.<br><br>Теодоро<br><br>О счастье, стой!<br><br>Диана<br><br>Нет и не будет во вселенной<br>Счастливей женщины, чем я.<br>Идите. Вам пора одеться.<br>Вас ждут.<br><br>Теодоро<br>Пойду поосмотреться,<br>Взглянуть, где вотчина моя,<br>И на отца, хотя никто<br>Не доказал мне, что он прав.<br><br>Диана<br><br>Так до свиданья, милый граф.<br><br>Теодоро<br><br>Графиня...<br><br>Диана<br><br>Погодите.<br><br>Теодоро<br><br>Что?<br><br>Диана<br><br>Как &quot;что&quot;? А &quot;милость&quot; где моя?<br>Так госпоже не отвечают.<br><br>Теодоро<br><br>Но ваша милость забывают,<br>Что господин отныне я.<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">А ваша милость навсегда,<br>Как бы она ни сожалела,<br>Должна забыть, что есть Марсела.<br><br>Теодоро<br><br>Душа вельможи никогда<br>Не согласится быть нежна<br>К служанке.<br><br>Диана<br><br>Трудно было хуже<br>Меня обидеть.<br><br>Теодоро<br><br>Почему же?<br><br>Диана<br><br>Ведь кто же я?<br><br>Теодоро<br><br>Моя жена.<br><br>(Уходит.)<br><br>Диана<br><br>Мне больше нечего желать! Стой, счастье,<br>Как Теодоро говорит: стой, стой!<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ТРЕТЬЕ<br><br>Федерико, Рикардо, Диана.<br><br>Рикардо<br><br>Среди такого шума и веселья<br>Друзей позабывают?<br><br>Диана<br><br>Почему<br>Вы думаете, что я вас забыла?<br><br>Федерико<br><br>Вы нас не пожелали известить,<br>Что ваш слуга--такой большой вельможа.<br><br>Диана<br><br>Вы можете узнать из первых рук,<br>Что Теодоро -- граф и мой супруг.<br><br>(Уходит.)<br><br>Рикардо<br><br>Как вам понравится?<br><br>Федерико<br><br>Я вне себя.<br><br>Рикардо<br><br>И этот плут его не истребил!<br><br>Федерико<br><br>Вот он идет, смотрите.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ЧЕТВЕРТОЕ<br><br>Тристан, Федерико, Рикардо.<br><br>Тристан<br>(про себя)<br><br>Все в порядке<br>Кто думал, что лакейские мозги<br>Способны взбаламутить весь Неаполь?<br><br>Рикардо<br><br>Постойте, Гектор, или как вас там.<br><br>Тристан<br><br>По-настоящему я -- Живопоро.<br><br>Федерико<br><br>Оно и видно.<br><br>Тристан<br><br>Я бы показал,<br>Когда бы мой мертвец не вышел в графы.<br><br>Рикардо<br><br>Не все ли вам равно?<br><br>Тристан<br><br>Когда я с вами<br>Рядился, судари мои, за триста,<br>Я брался уничтожить Теодоро--<br>Слугу, никак не графа, это ясно.<br>Граф Теодоро--не такой товар;<br>Тут надобно повысить гонорар.<br>Дороже стоит уничтожить графа,<br>Чем десять слуг, и так уж полумертвых<br>От голода, от тщетных ожиданий<br>Или от зависти.<br><br>Федерико<br><br>Вам сколько надо?<br>Но чтоб сегодня.<br><br>Тристан<br><br>Тысячу эскудо.<br><br>Рикардо<br><br>Получите.<br><br>Тристан<br><br>И маленький задаток.<br><br>Рикардо<br><br>Вот эту цепь.<br><br>Тристан<br><br>Так приготовьте деньги.<br><br>Федерико<br><br>Схожу достать.<br><br>Тристан<br><br>А я--ударить в бок.<br>Вот что...<br><br>Рикардо<br><br>Вам мало?<br><br>Тристан<br><br>Обо всем -- молчок.<br><br>Уходят Рикардо и Федерико.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ПЯТОЕ<br><br>Теодоро, Тристан.<br><br>Теодоро<br><br>Ты здесь с убийцами моими<br>О чем-то говорил сейчас?<br><br>Тристан<br><br>Нет дурня в городе у нас,<br>Достойного равняться с ними.<br>Вот цепь и тысяча эскудо<br>За то, чтобы я вас убил.<br><br>Теодоро<br><br>Послушай, что ты натворил?<br>Смотри, не кончилось бы худо.<br>Я изнываю от тоски.<br><br>Тристан<br><br>Когда бы вы меня слыхали,<br>Вы мне бы вдвое больше дали,<br>Чем дали эти дураки.<br>По-гречески не так уж трудно<br>И говорить в конце концов:<br>Чередованье всяких слов.<br>Зато же и звучит как чудно,<br>А имена зато какие:<br>Астеклия, Катиборратос, Серпалитония, Ксипатос,<br>Афиниас, Филимоклия...<br>Здесь главное--красивый звук,<br>И если кто точней не вник,<br>Сойдет за греческий язык.<br><br>Теодоро<br><br>Меня терзают сотни мук,<br>Волненья горести и страха.<br>Ведь если вскроется обман,<br>Я столько бедствий жду, Тристан,<br>Что наименьшим будет плаха.<br><br>Тристан<br><br>С такими мыслями носиться!<br><br>Теодоро<br><br>Ты -- дьявол, вот кто ты такой.<br><br>Тристан<br><br>Пусть все течет само собой,<br>А там увидим, что случится.<br><br>Теодоро<br><br>Идет графиня.<br><br>Тристан<br><br>Я скрываюсь.<br>Не хочется встречаться с нею.<br><br>(Прячется.)<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ШЕСТОЕ<br><br>Диана, Теодоро, Тристан-- спрятанный.<br><br>Диана<br><br>Вы что же не пошли к отцу?<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Сеньора, тяжкие сомненья<br>Меня гнетут; и я решил<br>Вторично вас просить о прежнем,--<br>О разрешенье удалиться<br>В Испанию.<br><br>Диана<br><br>Скажите, это<br>Не потому, что вас опять<br>Зовет к оружию Марсела?<br><br>Теодоро<br><br>Меня? Марсела?<br><br>Диана<br><br>Что ж тогда?<br><br>Теодоро<br><br>Сеньора, мой язык не смеет<br>Тревожить этим ваши уши.<br><br>Диана<br><br>Пусть это честь мою заденет,<br>Но вы скажите, Теодоро.<br><br>Теодоро<br><br>Тристан, которому по смерти<br>Обман воздвигнет изваянья,<br>Лукавство посвятит поэмы,<br>Крит -- лабиринты, увидав<br>Мою любовь, мои мученья,<br>И зная, что у Лудовико<br>Когда-то сын пропал без вести,<br>Измыслил басню про меня;<br>А я -- ничто, найденыш бедный,<br>И мой единственный отец--<br>Мой ум, мое к наукам рвенье,<br>Мое перо. Граф Лудовико<br>Признал, что я его наследник;<br>И я бы мог стать вашим мужем,<br>Жить в полном счастье, в полном блеске,<br>Но внутреннее благородство<br>Не позволяет мне так дерзко<br>Вас обмануть. Я человек,<br>Который по природе честен,<br>Поэтому я вновь прошу<br>О разрешении уехать,<br>Не оскорбив в моей сеньоре<br>Любовь, и кровь, и совершенства.<br><br>Диана<br><br>Все это и умно и глупо.<br>Умно--что ваша откровенность<br>Явила ваше благородство;<br>Но глупо думать, в самом деле,<br>Что буду глупой также я<br>И брошу вас, когда есть средство<br> Возвысить вас из низкой доли.<br>Ведь не в величье -- наслажденье,<br>А в том, чтобы душа могла<br>Осуществить свою надежду.<br>Я буду вашею женой.<br>А чтобы нашего секрета<br>Тристан не выдал никому,<br>То я, как только он задремлет,<br>Велю его схватить и бросить<br>В колодец.<br><br>Тристан<br>(появляясь)<br><br>Но, но, но! Полегче!<br><br>Диана<br><br>Кто это?<br><br>Тристан<br><br>Это я, Тристан,<br>Весьма естественно задетый<br>Несправедливейшим поступком<br>Неблагодарнейшей из женщин.<br>Я вам устроил ваше счастье<br>По собственному побужденью,<br>А вы меня--в колодец бросить!<br><br>Диана<br><br>Ты это слышал?<br><br>Тристан<br><br>Не подцепят!<br>Меня поймать не так легко.<br><br>(Хочет уйти.)<br><br>Диана<br><br>Вернись.<br><br>Тристан<br><br>Вернуться?<br><br>Диана<br><br>Можешь смело.<br>В награду за твою сметливость<br>Я обещаю, что вернее<br>Ты не найдешь друзей, чем я;<br>Зато и ты держи в секрете<br>Свое великое открытье.<br><br>Тристан<br><br>Мне самому неинтересно<br>О нем болтать.<br><br>Теодоро<br><br>Что там такое?<br>Какой-то говор и движенье.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ СЕДЬМОЕ<br><br>Лудовико, Федерико, Рикардо, Камило,<br>Фаоьо, Марсела, Анарда, Доротея. Те же.<br><br>Рикардо<br>(за сценой)<br><br>Вы, я надеюсь, разрешите<br>Примкнуть и нам к его кортежу?<br><br>Входят Лудовико, Федерико, Рикардо, женщины и слуги.<br><br>Федерико<br>(к Лудовико)<br><br>Неаполь собрался внизу<br>И ожидает в нетерпенье.<br><br>Лудовико<br>(к Теодоро)<br><br>С соизволения Дианы<br>Тебя у входа ждет карета,<br>И все дворянство на конях,<br>Чтобы с тобою ехать вместе.<br>Вступи, мой сын, в наш старый дом,<br>Так долго по тебе скорбевший;<br>Вернись под кров, где ты родился.<br><br>Диана<br><br>Пока мы здесь, под этой сенью,<br>Граф, я хочу вам сообщить,<br>Что я его жена.<br><br>Лудовико<br><br>Вбей крепче,<br>Фортуна, в колесо свое<br>Гвоздь золотой! Постой, блаженство!<br>Я думал взять одно дитя,<br>А увожу двоих.<br><br>Федерико<br><br>Уместно<br>Поздравить их, маркиз Рикардо.<br><br>Рикардо<br><br>Могу добавить поздравленье<br>И с тем, что Теодоро жив.<br>Я чувствовал такую ревность,<br>Что сговорился с этим плутом,<br><br>(указывая на Тристана)</div>", "cover": false}, {"html": "<div class=\"textPage\">Украшенным моею цепью,<br>Чтоб он за тысячу эскудо<br>Его зарезал. Он мошенник,<br>И следует его схватить.<br><br>Теодоро<br><br>Нет, стойте. Кто от верной смерти<br>Избавить хочет господина,<br>Тот не мошенник.<br><br>Рикардо<br><br>Кто же этот<br>Воображаемый храбрец?<br><br>Теодоро<br><br>Он мой слуга. В вознагражденье<br>За то, что он сберег мне жизнь<br>И в остальном был честно предаю<br>Я, с разрешения Дианы,<br>Его женю на Доротее,<br>Беря примером, как она<br>Женила Фаоьо и Марселу.<br><br>Рикардо<br><br>Марселу я снабжу приданым.<br><br>Федерико<br><br>Я -- Доротею.<br><br>Лудовико<br><br>Что же делать:<br>Идут, как видно, за графиней<br>Мой сын и все мое наследство.<br><br>Теодоро<br><br>На чем, высокое собранье,<br>Надеюсь, что никто, конечно,<br>Не выдаст тайну Теодоро,<br>Мы, с вашего соизволенья,<br>И кончим повесть о Собаке,<br>Которая лежит на сене.<br><br>Last-modified: Thu, 29-Jan-98 18:24:56 GMT</div>", "cover": false}]};
var cur=0;var zoom=1;
function sz(f){if(f=='A5')return{w:559,h:794};if(f=='SQUARE')return{w:800,h:800};return{w:794,h:1123};}
function calcBase(s){var v=document.getElementById('view');var vw=v.clientWidth||document.body.clientWidth;var vh=v.clientHeight||(document.body.clientHeight-61);var sc=Math.min((vw-40)/s.w,(vh-40)/s.h);if(sc>1)sc=1;if(sc<0.15)sc=0.15;return sc;}
function show(){var s=sz(book.format);var p=book.pages[cur];var v=document.getElementById('view');var st=document.getElementById('stage');var sc=calcBase(s)*zoom;var pad=30;var vw=v.clientWidth||document.body.clientWidth;var vh=v.clientHeight||(document.body.clientHeight-61);var sw=Math.max(vw,s.w*sc+pad*2);var sh=Math.max(vh,s.h*sc+pad*2);st.style.width=sw+'px';st.style.height=sh+'px';var left=Math.max(pad,(sw-s.w*sc)/2);var top=pad;st.innerHTML='<div class="page '+(p.cover?'cover':'')+'" style="width:'+s.w+'px;height:'+s.h+'px;left:'+left+'px;top:'+top+'px;transform:scale('+sc+')"><div class="pageContent">'+p.html+'</div><div class="nexStamp">Nx</div></div>';document.getElementById('n').innerHTML=(cur+1)+' / '+book.pages.length;document.getElementById('zoomInfo').innerHTML=Math.round(zoom*100)+'%';var r=document.getElementById('pageRange');if(r){r.max=book.pages.length;r.value=cur+1;}}
function prev(){if(cur>0){cur--;show();}}
function next(){if(cur<book.pages.length-1){cur++;show();}}
function goPage(v){v=parseInt(v,10);if(isNaN(v))return;if(v<1)v=1;if(v>book.pages.length)v=book.pages.length;cur=v-1;show();}
function zoomIn(){zoom=zoom*1.15;if(zoom>4)zoom=4;show();}
function zoomOut(){zoom=zoom/1.15;if(zoom<0.35)zoom=0.35;show();}
function zoomReset(){zoom=1;show();}
document.onkeydown=function(e){e=e||window.event;if(e.keyCode==37)prev();if(e.keyCode==39)next();if(e.ctrlKey&&(e.key=='+'||e.keyCode==187)){zoomIn();return false;}if(e.ctrlKey&&(e.key=='-'||e.keyCode==189)){zoomOut();return false;}if(e.ctrlKey&&(e.key=='0'||e.keyCode==48)){zoomReset();return false;}};
window.onresize=show;show();
</script>
