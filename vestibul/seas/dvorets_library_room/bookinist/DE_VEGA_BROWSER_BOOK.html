var book={"format": "A4", "title": "ДЕ ВЕГА", "pages": [{"html": "<div class=\"coverPage\"><div class=\"small\">ЛОПЕ ДЕ ВЕГА</div><h1>ДЕ ВЕГА</h1><div class=\"sub\">одна браузерная книга для библиотеки НЕКСА</div><div class=\"orn\">✦</div><div class=\"list\">Учитель танцев<br>Собака на сене</div><div class=\"year\">NEX BOOKINIST</div></div>", "cover": true}, {"html": "<div class=\"chapter\"><h1>УЧИТЕЛЬ ТАНЦЕВ</h1><p>Лопе де Вега</p></div>", "cover": false}, {"html": "<div class=\"textPage\">Лопе Де Вега. Учитель танцев<br><br>Лопе Де Вега. Учитель танцев<br><br>Перевод Т. Щепкиной-Куперник<br><br>ДЕЙСТВУЮЩИЕ ЛИЦА<br><br>Альдемаро.<br>Белардо-- его слуга.<br>Рикаредо-- его двоюродный брат.<br>Альбериго.<br>Фелисьяна  и Флорела -- его дочери.<br>Тевано.<br>Вандалино.<br>Тельо-- его слуга.<br>Корнехо-- дворецкий у Альбериго<br>Лисена-- служанка Флорелы.<br>Андроньо-- слуга.<br><br>Действие происходит в Туделе.<br><br> * ДЕЙСТВИЕ ПЕРВОЕ *<br><br>Гостиница<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Альдемаро, Белардо<br><br>Альдемаро<br><br>Иди скорей меня раздень!<br>Как я устал! Я скоро лягу.<br>Живее отстегни мне шпагу!..<br>Я задыхаюсь целый день.<br>Горю, пылаю, душно мне,<br>Как саламандре на огне.<br>Их тысячи ты уничтожишь,<br>Когда раздеться мне поможешь.<br>Скорей сними камзол с меня!<br>Тому не нужно одеянье,<br>Кто весь -- от мысли до желанья --<br>Есть воплощение огня.<br>Я точно соткан из лучей:<br>По ним безумных мыслей стая,<br>Жар пламени сильней питая,<br>Течет как огненный ручей.<br>Я весь горю, дышать мне тяжко.<br>Освободи--тут давит пряжка!<br><br>Белардо<br><br>Хоть нету дыма без огня,<br>Но и огня ведь нет без дыма.<br>Горите вы--а где же дым?<br><br>Альдемаро<br><br>Смешон с вопросом ты своим!<br>Огонь любви горит незримо.<br>Проникнуть может только тот<br>В его таинственную сферу,<br>Кто знает страсть.<br><br>Белардо<br><br>Приму на веру.<br><br>Альдемаро<br><br>И в каждом тот огонь живет,<br>Но он бывает то кометой,<br>То постоянною звездой.<br><br>Белардо<br><br>Как так? Сеньор любезный мой!<br>Я в мудрости не смыслю этой.<br><br>Альдемаро<br><br>В одних--мелькнул и вмиг погас,<br>В других--горит не угасая,<br>Вот как во мне.<br><br>Белардо<br><br>Ну речь! Такая,<br>Каких я не слыхал от вас.<br>Ведь были вы другим в Лерине.<br><br>Альдемаро<br><br>Я был совсем другим, ты прав.<br>Я прожил жизнь, любви не знав,<br>И я был слеп и глух доныне.<br>Огнем чудесным я палим,<br>Меня он тайно убивает.<br>Он все в себе самом скрывает:<br>В нем -- свет, в нем -- звук, прилив и дым.<br>Свет -- отражение сиянья<br>Далеких солнечных лучей<br>В волшебном зеркале очей;<br>Звук--горькой жалобы стенанья;<br>Живая влага слез -- прилив,<br>А вздохи сердца--струйки дыма,--<br>Я к небесам их шлю незримо,<br>В дым легковейный обратив.<br><br>Белардо<br><br>Ого! Кто так еще речист?<br>Сильны в науке вы любовной<br>И говорите, безусловно,<br>Как истинный специалист.<br><br>Альдемаро<br><br>Учиться долго тут не надо:<br>Схватить легко все на лету.<br>Чтобы постичь науку ту,<br>Нам одного довольно взгляда!<br>На праздник свадьбы поутру<br>Попал в Туделу я проездом<br>И, как угодно было звездам,<br>Невесты увидал сестру.<br>Так в облаках небесной сферы,<br>Где розы и лазурь дарят<br>Своею роскошью закат,<br>Явилась мне звезда Венеры--<br>Нет, солнце было предо мной!<br><br>Белардо<br><br>Сеньор! Простите мне, по чести:<br>Закат, звезда и солнце вместе<br>В картине смешаны одной?<br><br>Альдемаро<br><br>Не только ночью--в час рассвета<br>На небе утреннем видна<br>Звезда любви!<br><br>Белардо<br><br>Но кто ж она,<br>Звезда пленительная эта?<br><br>Альдемаро<br><br>Флорела! За нее умру!<br><br>Белардо<br><br>Ну, утешение хоть в этом,<br>Что сделали своим предметом<br>Вы незамужнюю сестру!<br><br>Альдемаро<br><br>Да, ей легко далась победа:<br>Навек Флореле отдаю<br>Я душу, сердце, жизнь мою!<br>Но где ж милейший Рикаредо?<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же и Рикаредо с маской в руках, в ботфортах со шпорами.<br><br>Белардо<br><br>Вот он -- персоною своей!</div>", "cover": false}, {"html": "<div class=\"textPage\">Рикаредо<br><br>Ну крестничек--хорош, злодей!<br><br>Альдемаро<br><br>Хорош и крестный--не в обиду!<br><br>Рикаредо<br><br>Я потерял тебя из виду<br>Среди людей и лошадей.<br><br>Альдемаро<br><br>Я тоже прямо растерялся<br>И потерялся...<br><br>Рикаредо<br><br>Отчего<br>Ты, покидая торжество,<br>Найти меня не постарался?<br><br>Альдемаро<br><br>Я там такое увидал,<br>Что сам себя я потерял.<br>Но что же было на гулянье!<br><br>Рикаредо<br><br>Чего там не было! Всего<br>Не расскажу: не хватит краски.<br><br>Альдемаро<br><br>Но все ж?<br><br>Рикаредо<br><br>Турнир, призы и маски...<br><br>Альдемаро<br><br>Приезжих много?<br><br>Рикаредо<br><br>Большинство!<br><br>Альдемаро<br><br>Да кто ж там был?<br><br>Рикаредо</div>", "cover": false}, {"html": "<div class=\"textPage\">Ну что же, слушай!<br>Первый--славный Альдемаро!<br>Он, конечно, первый приз<br>Присудил сестре невесты,<br>Обаятельной Флореле,<br>Затмевающей все звезды.<br>О Флорела! Вся в цвету,<br>Мир красой обогащает<br>И плоды своей весны<br>Щедро жизни обещает.<br>Но, однако, по порядку:<br>Стали рыцари съезжаться,<br>Чтоб принять участье в играх,<br>Позаимствовав у птиц<br>Оперенье для уборов,<br>Для нарядов же--богатство<br>Своего воображенья.<br>Первый был--сын коннетабля:<br>Гордо въехал он на кровном<br>Андалусском скакуне,<br>И чепрак его венгерский<br>Вышит был узорной сетью<br>Перламутровых гвоздик<br>И серебряных скелетов.<br>Свой девиз толпе он кинул:<br>&quot;Те плоды мне даст надежда,<br>Что растут на этом поле&quot;.<br>Представляется он судьям,<br>И они, в шатер вернувшись,<br>Присуждают безусловно<br>Нить жемчужную ему.<br>Председатель согласился.<br>Но вступает граф Лерина,<br>Всех затмив своим искусством.<br>Чудный конь! И чудный всадник!<br>Поднимает руку быстро<br>И одним рывком копья<br>Сразу он кольцо срывает,<br>Задевает два других...<br>Приз ему уж предназначен,<br>Вдруг--теряет шпору он!<br>Так пришпоривал усердно,<br>Что ремень блестящий лопнул<br>И к ногам коня упала<br>Шпора посреди дороги.<br>Тут вручает председатель<br>Арагонской даме приз.<br>Смолкнул гром рукоплесканий,<br>И в процессии блестящей<br>Появляются фигуры,<br>Маски разные идут.<br>Две вдовы смиренных в черном,<br>В белых головных уборах,<br>А на голове у каждой<br>Зеленеющие ветки,<br>И в руках у них девиз:<br>&quot;Хоть кора суха снаружи,<br>Но душа внутри цветет&quot;.<br>Стройный пилигрим за ними<br>Выступает в грубой рясе,<br>На полях французской шляпы<br>Знаки орденских отличий<br>И святые амулеты.<br>С ним -- герольды-пилигримы<br>И несут его девиз:<br>&quot;За чудесное спасенье<br>Приношу как благодарность<br>Я разорванные цепи&quot;.<br>Вот два пастушка; герольды<br>На руках несут Амура,<br>Он натягивает лук<br>И стрелою целит прямо<br>В сердце каменной пастушки.<br>На груди у пастушков<br>Две стрелы, вонзенных будто,<br>А девиз гласит: &quot;Вот так<br>К нам его вернутся стрелы!&quot;<br>Знаменосец из Памплоны<br>На большой скале въезжает,<br>Весь в зеленом; и камзол,<br>И чулки его, и шляпа--<br>Все немецкого покроя.<br>На скале зеленый лавр<br>И девиз: &quot;Отсюда свергнусь,<br>Если рушится надежда!&quot;<br>А за ним -- погонщик мулов,<br>А на муле--вместо груза<br>Сам божок Амур крылатый,<br>На глазах его повязка,<br>Лук и стрелы за спиной.<br>А девиз: &quot;Мой груз так тяжек, --<br>Может быть, хотя бы здесь<br>Мне его удастся сбросить!&quot;<br>В заключенье празднества<br>Появляются шесть мавров<br>На арабских скакунах,<br>В фиолетовых одеждах.<br>Тростниковые их копья<br>С ярко-алыми флажками,<br>Точно ивовые прутья,<br>Поднимают, опускают;<br>Разъезжаются попарно,<br>Отдают свои девизы<br>И перед судейской ложей<br>Замирают в ожиданье,<br>Осадив на всем скаку.<br>Все на славу отличились.<br>В состязании всех больше<br>Силой, ловкостью, нарядом<br>Отличился Вандалино,<br>Очарованный Флорелой.<br>Получил он первый приз<br>За изящество и ловкость.<br>Знаменосец из Памплоны<br>За девиз награду взял,<br>И кругом все говорили,<br>Что в скале намек на имя<br>Дамы сердца заключался.<br>Дали сыну коннетабля<br>Справедливо первый приз.<br>Председатель состязанья<br>Заявил, что в ратном деле<br>Всех других он превзошел.<br>Этим был закончен праздник.<br>Скоро площадь опустела,<br>Опустели и балконы,<br>И без двух светил прекрасных --<br>Фелисьяны и Флорелы,--<br>Как без солнца, день померк.</div>", "cover": false}, {"html": "<div class=\"textPage\">Альдемаро<br><br>Хотел бы видеть я все это...<br><br>Рикаредо<br><br>Тебе же не было запрета.<br>Ужель ты бросил торжество<br>Из-за наряда своего?<br><br>Альдемаро<br><br>Хотел я в тень уйти недаром<br>От этих солнечных лучей:<br>Они томят все горячей--<br>Сражен я солнечным ударом.<br><br>Рикаредо<br><br>Что ж ты за солнце увидал?<br><br>Альдемаро<br><br>Ты сам ее сейчас назвал...<br><br>Рикаредо<br><br>Ужель Флорела?<br><br>Альдемаро<br><br>Да, Флорела.<br><br>Рикаредо<br><br>Гм... Солнце ты увидел в ней.<br><br>Альдемаро<br><br>Среди ночей, среди теней<br>Она мне солнцем заблистала.<br><br>Рикаредо<br><br>И ты влюбился -- так вот, вдруг?<br><br>Альдемаро<br><br>Да, сразу.<br><br>Рикаредо<br><br>Сильно?<br><br>Альдемаро<br><br>Без предела:<br>Страсть мной всецело овладела,<br>И гибну я!<br><br>Рикаредо<br><br>Белардо, друг,<br>Седлай! В Лерин! И безусловно<br>Пройдет там этот пыл любовный<br><br>Белардо<br><br>Не удивлюсь: ведь дни бегут,<br>И время все забыть поможет.<br>А мне прикажете, быть может,<br>Вы с лошадьми остаться тут?<br><br>Рикаредо<br><br>Да, и Андроньо, наш лакей,<br>С тобою вместе возвратится:<br>Он тоже может пригодиться<br>Я опасаюсь за коней.<br><br>Альдемаро<br><br>Седлай коня для Рикаредо,<br>И пусть он едет--добрый путь,<br>А я отсюда не уеду.<br><br>Рикаредо<br><br>Ты мелешь глупости.<br><br>Альдемаро<br><br>Ничуть!<br><br>Рикаредо<br><br>Брось шутки и не спорь напрасно:<br>Поедем-ка домой скорей!<br><br>Альдемаро<br><br>Ответа ждешь ты?<br><br>Рикаредо<br><br>Да!<br><br>Альдемаро<br><br>Прекрасно!<br>Я не уеду--хоть убей.<br>Ты мне не веришь?<br><br>Рикаредо<br><br>Нет.<br><br>Альдемаро<br><br>Ну вот:<br>Я остаюсь один, в Туделе.<br><br>Рикаредо<br><br>Да ты помешан, в самом деле!<br><br>Альдемаро<br><br>Пусть смерть меня за это ждет--<br>Имей в виду, отныне я<br>Туделы постоянный житель:<br>Здесь мой приют, моя обитель,<br>Вторая родина моя.<br><br>Рикаредо<br><br>Вот непонятная причуда!<br>Ты позабыл, что твой отец<br>Давно уж разорен вконец,<br>Что замок ваш--развалин груда?<br>Ты знатен, да, но ты бедняк,<br>И ты мечтать о браке можешь?<br>Да что ж невесте ты предложишь,<br>Подумай?<br><br>Альдемаро<br><br>Ах, при чем тут брак?<br><br>Рикаредо<br><br>Чего ж: ты хочешь? Непонятно!<br><br>Альдемаро<br><br>Одной мечтою я живу:<br>Служить ей, точно божеству,<br>И жизнь отдать ей безвозвратно.<br><br>Рикаредо<br><br>В Лерине вам и то вдвоем<br>Сводить концы с концами трудно.<br>Ты поступаешь безрассудно.<br><br>Альдемаро<br><br>Мне будет бог любви вождем!<br><br>Рикаредо<br><br>Скажи, на что твои расчеты?<br>Как ветер, перья улетят,<br>На шпаге нет уж позолоты,<br>А кони взяты напрокат.<br>На это празднество в Туделе<br>Плохой багаж ты, милый мой,<br>Привез из Фландрии домой...<br>И ты мечтаешь о Флореле!<br><br>Альдемаро<br><br>Что б ни было, я остаюсь.<br>Пускай мои желанья смелы.<br>Но не уеду из Туделы,<br>Пока Флорелы не добьюсь.<br><br>Рикаредо<br><br>Как можешь ты ее добиться?<br>Отец ее аристократ...<br><br>Альдемаро<br><br>Да, он и знатен и богат.<br><br>Рикаредо<br><br>Вот угораздило влюбиться!<br>Что ж думаешь ты предпринять?<br><br>Альдемаро<br><br>Придумаю.<br><br>Рикаредо<br><br>Нелепость! Детство!<br><br>Альдемаро<br><br>Любовь найти поможет средство.<br><br>Рикаредо<br><br>Но как?<br><br>Альдемаро<br><br>Не стану я скрывать.<br>Учился я искусству танцев<br>В Неаполе, в одной из школ:<br>Учителей я превзошел<br>И славился у итальянцев.<br><br>Рикаредо<br><br>Так что ж из этого?<br><br>Альдемаро<br><br>Вот что:<br>Я здесь являюсь чужестранцем.<br>Ее учить я буду танцам,<br>Проникнув к ним инкогнито.<br><br>Рикаредо<br><br>Вот дьявол!<br><br>Альдемаро<br><br>Здесь никто не знает,<br>Кто я такой.<br><br>Рикаредо</div>", "cover": false}, {"html": "<div class=\"textPage\">Тем больше зло:<br>Ведь этакое ремесло<br>Твой род старинный унижает.<br>Оставь же это сумасбродство!<br><br>Альдемаро<br><br>Нет, Рикаредо, ты не прав:<br>Его неоспоримых прав<br>Лишить ты хочешь благородство!<br>Да разве швейная игла<br>В моих руках? Иль кисть и краски?<br><br>Рикаредо<br><br>Но обучать искусству пляски--<br>Что ж это, кроме ремесла?<br><br>Альдемаро<br><br>Нет, милый мой, ответь мне прямо:<br>Видал ли ты, чтоб шить и ткать,<br>Кроить иль кистью малевать<br>Умел король, умела дама?<br><br>Рикаредо<br><br>Конечно, нет, но ведь...<br><br>Альдемаро<br><br>Позволь:<br>Быть маляром или шить платье,<br>Вот это--низкое занятье,<br>Но сам державный наш король<br>Обязан знать искусство танцев,<br>И не ремесленник же тот,<br>Кто грацию преподает--<br>Любимый, лучший дар испанцев!<br><br>Рикаредо<br><br>Ну что ж! Всегда ты был упрям,<br>Стал от любви упрямей вдвое...<br>Тебя оставлю я в покое:<br>Ступай служи своим мечтам.<br>Довольно! Я молчу отныне.<br>Что хочешь делай--все равно!<br>С тобою спорить все одно,<br>Что проповедовать в пустыне.<br>Но помни: брат и друг я твой,<br>Тебе готов служить я вечно,<br>Но убедишься сам, конечно,<br>Что этим род позоришь свой<br>И поступаешь ты беспечно.<br><br>Альдемаро<br><br>Дай мне обнять тебя сердечно,<br>Мою признательность прими!<br><br>Белардо<br><br>А что мне делать с лошадьми?<br>Когда не будет вам в охоту,<br>Чтоб тут они плясали хоту,<br>Могу их отвести домой.<br><br>Альдемаро<br><br>Что хочешь делай, милый мой.<br>Тяжки моей надежды крылья:<br>Трудов, лишений и усилья<br>Ей будет стоить каждый взмах.<br><br>Белардо<br><br>Не смею я давать совета,<br>Но дай-то бог, чтоб пляска эта<br>Не стала пляской на мечах!<br><br>Комната в доме Альбериго<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Фелисьяна, Флорела, Тевано.<br><br>Фелистьяна<br><br>Ах, как слова твои нежны!<br>Но искренни ль они? Не знаю.<br><br>Тевано<br><br>Шутить ты хочешь, полагаю,<br>Иль я обижен без вины.<br>Вчера помолвка состоялась,<br>И ныне я уж твой супруг!<br>Возможно ли, прекрасный друг,<br>Чтобы во мне ты сомневалась?<br>Быть может, чувства нет в тебе.<br>Но твой вопрос предполагает,<br>Что мне рассудка не хватает<br>Понять, как счастлив я в судьбе.<br>Душа моя, мне бог свидетель:<br>Сама себя не знаешь ты,<br>Своей не видишь красоты,<br>Свою не ценишь добродетель.<br>Твои достоинства ценя,<br>Тебя я знаю лучше вдвое.<br>Гляди, как в зеркало живое,<br>Моя красавица, в меня!<br>И если б на тебя напали<br>В себе самой сомненья вдруг,<br>Спроси, прекрасна ль ты, мой друг,<br>Умна ль, изящна ли, добра ли,<br>Любое свойство назови,--<br>Вопроса не задашь напрасно:<br>Прямой ответ увидишь ясно<br>Ты в зеркале моей любви.<br><br>Флорела<br><br>О, не для мужа речь такая,<br>Скорей поклоннику под стать...<br>И можно зависть испытать,<br>Сестра, таким речам внимая.<br><br>Фелисьяна<br><br>Должна б завидовать скорей<br>Я красоте твоей, сестрица,<br>Но, верно, скоро веселиться<br>На свадьбе будем мы твоей!<br><br>Флорела<br><br>О нет, сестра! Хоть мне завидно<br>За вашим счастьем наблюдать,<br>Но скоро батюшку опять<br>Вводить в расход мне было б стыдно.<br><br>Фелисьяна<br><br>Что за похвальные слова!<br>Скромней видали ль богомолку?<br>Сама ж мечтаешь втихомолку<br>Скорей дожить до сватовства.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же и Альбериго.<br><br>Альбериго<br><br>Ну что же? Праздник был удачный,<br>На славу вышел ваш прием.<br>Все в восхищении кругом...<br>Как ты находишь, новобрачный?<br><br>Тевано</div>", "cover": false}, {"html": "<div class=\"textPage\">Я от гостей почти без сил.<br><br>Альбериго<br><br>Жаль, что совсем не танцевали<br>И музыканты замолчали.<br><br>Тевано<br><br>Кто этим недоволен был,<br>По-моему, уйти был волен.<br>Довольно, чтоб был я доволен.<br>Что, право, может быть глупей:<br>Никак не обойтись без танцев<br>На свадьбах жалких оборванцев,<br>Как и на свадьбах королей!<br>Давно уж гости надоели,<br>Томят и шум и суета,<br>И новобрачная чета<br>Мечтает сладко о постели.<br>Нет! Ждать извольте до тех пор,<br>Пока на небе солнце встанет<br>И пятки отбивать устанет<br>Последний ревностный танцор.<br>Нелепый, варварский обычай!<br><br>Альбериго<br><br>Но надо соблюдать его:<br>Без танцев что за торжество?<br>Так требует закон приличий.<br><br>Тевано<br><br>На танцы я бы сам глядел,<br>Забава славная, но надо,<br>Чтоб не была она преградой<br>Для более приятных дел.<br><br>Фелисьяна<br><br>Тевано нас простит с сестрой<br>За то, что мы не танцевали:<br>Ведь мы учителя не брали,<br>Оберегая ваш покой.<br><br>Альбериго<br><br>Учителей не находилось,<br>Да вы упрямились притом<br>В смущенье девичьем своем --<br>Вот отчего все так сложилось.<br>А ныне убедился я,<br>Что воспитанье там с изъянцем,<br>Где дамы не учились танцам.<br>Да, дочки, тут вина моя.<br>Сегодня видел я, как танец<br>Невольно украшает дам,<br>Как блеск он придает глазам,<br>А щечкам придает румянец.<br><br>Тевано<br><br>Конечно, отрицать нельзя,<br>Что несравненные сеньоры<br>На бале восхищают взоры,<br>Легко порхая и скользя.<br>Движений музыка живая<br>Без слов о чувствах говорит,<br>Огонь любви, что в сердце скрыт,<br>Подчас невольно выдавая.<br><br>Фелисьяна<br><br>Да, танцы прелестью своей<br>В полете, в радостном порыве<br>Красавиц делают красивей,<br>Дурнушек делают милей.<br>Мне жаль, что пляске грациозной<br>Мы не учились до сих пор.<br><br>Флорела<br>(отцу)<br><br>Когда угодно вам, сеньор,<br>То научиться нам не поздно.<br><br>Альбериго<br><br>Совсем не поздно, слова нет;<br>Хочу я, чтоб моя Флорела<br>На свадьбе у себя сумела<br>Протанцевать хоть менуэт.<br><br>Флорела<br><br>И менуэт и все другое.<br>Без танцев развлеченья нет:<br>Быть неподвижной, как портрет,<br>Храня молчанье гробовое!<br>Коль не танцуя мы сидим<br>Среди танцующих на бале,<br>Нам остается только--в зале<br>Быть украшением стенным.<br><br>Фелисьяна<br><br>Да, это скучно!<br><br>Флорела<br><br>И когда<br>Меня на танец звать подходят,<br>Меня в смущение приводят,<br>И я краснею от стыда.<br><br>Альбериго<br><br>Ну, не красней, поправим дело:<br>Тебе учителя я дам,<br>И скоро ты затмишь всех дам,--<br>Уверен я, моя Флорела.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Те же и Корнехо.<br><br>Корнехо<br><br>Пожалуйте к столу идти:<br>Давно накрыто, все готово.<br><br>Тевано<br><br>А что, нет никого чужого?<br><br>Корнехо<br><br>Да все разъехались почти.<br>И граф уехал.<br><br>Альбериго<br><br>А когда<br>Он уезжает из Туделы?<br><br>Корнехо<br><br>Я слышал--завтра.<br><br>Тевано<br><br>Всадник смелый!<br>Прекрасно ездит он.<br><br>Фелисьяна<br><br>О да!<br>Как ездит он! Очарованье!<br><br>Альбериго<br><br>Но приза он не взял.<br><br>Флорела<br><br>Сеньор!<br>Он потерял одну из шпор.<br>Случайность! Но за фехтованье<br>Ему ведь приз был присужден.<br><br>Корнехо<br>(Флореле)<br><br>А вам как повезло, сеньора!<br><br>Альбериго<br><br>Как это так?<br><br>Корнехс<br><br>Да ведь без спора<br>Свой приз сеньоре отдал он.<br><br>Альбериго<br><br>А гости есть еще?<br><br>Корнехо<br><br>Да.<br><br>Альбериго<br><br>Кто же<br>Остался?<br><br>Корнехо<br><br>Никого почти,<br>И те бы собрались уйти,<br>Не появись на грех в прихожей<br>Дрессировальщик дураков.</div>", "cover": false}, {"html": "<div class=\"textPage\">Альбериго<br><br>Ого! Что это означает?<br><br>Корнехо<br><br>Из тех, кто танцам обучает.<br>А поглядишь, на вид каков,<br>Так скажешь--важная персона!<br><br>Альбериго<br><br>Откуда ж он?<br><br>Корнехо<br><br>Из Арагона.<br><br>Альбериго<br><br>Зачем явился?<br><br>Корнехо<br><br>Говорит,<br>Приехал он сюда недавно.<br><br>Тевано<br><br>Вот поразвлечься случай славный<br>Для дам, не будь уж стол накрыт.<br><br>Корнехо<br><br>Поужинали бы сначала:<br>Простынет все... Вас ждут давно<br>Паштет, индейка и вино.<br><br>Фелисьяна<br><br>Ступай зови! Что я сказала?<br><br>Корнехо<br><br>Когда ж вы сядете за стол?<br>Охота к танцам вдруг припала...<br>Вот, черт возьми, проклятый малый!<br><br>(Уходит.)<br><br>Флорела<br><br>Зови скорей!<br><br>Тевано<br><br>Он уж пошел.<br><br>Фелисьяна<br><br>Как раз нам послан тот, кто нужен.<br><br>Флорела<br><br>Нас точно кто-то услыхал.<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Фелисьяна, Флорела, Тевано, Альбериго, Альдемаро, Белардо, Корнехо.<br><br>Альдемаро<br>(к Корнехо)<br>.<br><br>Ты им сказал, кто я?<br><br>Корнехо<br><br>Сказал.<br>Еще сказал, что стынет ужин.<br><br>Альдемаро<br><br>Сеньоры! Если я достоин,<br>То я служить вам буду рад.<br><br>Тевано<br>(тихо)<br><br>Как элегантен!<br><br>Альбериго<br>(тихо)<br><br>Гордый взгляд!<br><br>Флорела<br>(сестре)<br><br>Как он красив!<br><br>Фелисьяна<br>(сестре)<br><br>Красив и строен.<br><br>Альдемаро<br>(в сторону)<br><br>Я весь дрожу... Не знаю я,<br>Какого с ней держаться тона..<br><br>Альбериго<br><br>Откуда вы?<br><br>Альдемаро<br><br>Из Арагона.<br><br>Альбериго<br><br>А город ваш?<br><br>Альдемаро<br><br>О, город славный!<br>Он в Арагоне всех славней.<br><br>Альбериго<br><br>Так, значит, Сарагоса?<br><br>Альдемаро<br><br>В ней<br>Наш старый род живет издавна.<br><br>Альбериго<br><br>А вы?<br><br>Альдемаро<br><br>А я учился танцам<br>В Неаполе, в одной из школ;<br>Учителей я превзошел<br>И стал известен итальянцам.<br>Избрав профессию мою,<br>Теперь даю уроки дамам,<br>Однако только знатным самым<br>Свое искусство отдаю.<br><br>Тевано<br>(тихо)<br><br>Должно быть, он незаурядный<br>Учитель танцев и манер.<br><br>Флорела<br>(тихо)<br><br>Он настоящий кавалер<br>По виду.<br><br>Альдемаро<br>(в сторону)<br><br>Ангел ненаглядный!<br>Фелисьяна<br><br>Какие танцы вы назвать<br>Могли бы?<br><br>Альдемаро<br><br>Много есть... Ниццарда.<br>Потом задорная гальярда.<br><br>(В сторону.)<br><br>Совсем глазам твоим под стать.<br><br>Фелисьяна<br><br>Ниццарда? Это что такое?<br><br>Альдемаро<br><br>Из Франции завезена.<br><br>Фелисьяна<br><br>А как танцуется она?<br><br>Альдемаро<br><br>Жаль, инструмента нет со мною,<br>Иначе был бы очень рад<br>Сейчас ее вам показать я:<br>Прыжки, изгибы и объятья...<br><br>Фелисьяна<br><br>Объятья?<br><br>Альдемаро<br><br>На французский лад.<br><br>(В сторону)<br>.<br>Хотя я мог бы их примерно<br>И по-испански показать.<br><br>Флорела<br><br>Гальярду я б хотела знать:<br>Французский танец также, верно?<br><br>Альдемаро<br><br>Нет, родина ее была<br>Наварра, и как раз Тудела.<br><br>(В сторону.)<br><br>Там родилась, где и Флорела,<br>И так же, как и ты, мила!<br><br>Флорела<br><br>А, здешний танец?<br><br>Альдемаро<br><br>Да, сеньора,<br>И я ему стал земляком.<br><br>(В сторону.)<br><br>Волнуюсь и дрожу тайком,<br>Боясь презрительного взора!<br><br>(Флореле.)<br><br>А вот--интересует вас<br>Павана, только в новом роде?<br><br>Флорела<br><br>Откуда?<br><br>Альдемаро<br><br>В чрезвычайной моде<br>Она в Неаполе сейчас.<br>Могу сплясать и фуриозо,<br>Коль случай мне к тому дадут.<br><br>(В сторону.)<br><br>Когда мне струны сердца рвут<br>Безумной ревности угрозы.<br><br>Альбериго<br><br>А, этот танец мне знаком:<br>Его в Валенсии танцуют.<br><br>Альдемаро<br><br>Да, да...<br><br>(В сторону.)<br><br>Когда душа тоскует,<br>Найти забвенье можно в нем.<br><br>Корнехо</div>", "cover": false}, {"html": "<div class=\"textPage\">Роланд в поэме Ариосто<br>Его плясал, и оттого<br>Фурьозо и зовут его.<br><br>Тевано<br><br>Читал ты это?<br><br>Корнехо<br><br>Очень просто!<br>Про все читал: как нагишом<br>Он бегал и искал до крику...<br><br>Тевано<br><br>Кого?..<br><br>Корнехо<br><br>Марфизу.<br><br>Тевано<br><br>Анджелику!<br><br>Фелисьяна<br><br>Оставь! Что говорить с шутом?<br><br>Корнехо<br><br>Сеньор! Простите, я поспорю:<br>Ведь Анджелика--та была,<br>Что по ночам всегда ждала,<br>Когда Леандр вверялся морю,<br>Чтоб охладить любовный пыл...<br>Ах, нет: я упустил из вида,<br>Что то была Семирамида...<br>Или Лукреция? Забыл!<br>Та, что в Венеции когда-то<br>Вонзила в грудь себе кинжал?<br><br>Тевано<br><br>Я вижу, много ты читал,<br>И знание твое богато.<br><br>Фелисьяна<br><br>А танец есть круговорот:<br>Его вы знаете?<br><br>Альдемаро<br><br>Прекрасно!<br><br>(В сторону.)<br><br>Его танцую ежечасно:<br>Так голова кругом идет!<br>Но будет мне вознагражденьем<br>Моих желаний торжество.<br><br>Флорела<br><br>Хочу я танцевать его.<br><br>Альдемаро<br><br>Учить вас буду с наслажденьем!<br>Верх удовольствия всегда--<br>Кружиться в вихре упоенья.<br>И алеманду, без сомненья,<br>Вы выучите без труда.<br>Я вам охотно покажу<br>Придворный танец, подходящий...<br><br>Флорела<br><br>К чему?<br><br>Альдемаро<br><br>К компании блестящей,<br>Какую здесь я нахожу.<br><br>Тевано<br><br>Хибао--лучше не найдешь.<br><br>Альбериго<br><br>А это что за танец?<br><br>Тевано<br><br>Бальный --<br>Для вечеринки танцевальной...<br><br>Флорела<br><br>Народный контраданс хорош.<br><br>Фелисьяна<br><br>Как много танцев!<br><br>Альдемаро<br><br>К их числу<br>Еще прибавить нужно хоту...<br><br>Корнехо<br>(в сторону)<br><br>Уж он задаст ногам работу!<br><br>(Громко.)<br><br>Пора бы танцевать к столу!<br>Сеньоры! Развлеченья бросьте!<br>Подумав, что пора пришла<br>И встали все из-за стола,<br>Того гляди, вернутся гости.<br><br>Альбериго<br><br>Так что ж? Давайте делать дело!<br>Ко мне поступите вы в дом,<br>Условья выясним потом.<br><br>Альдемаро<br><br>Предоставляю вам всецело.<br><br>Альбериго<br><br>Теперь и ужинать пора.<br><br>Фелисьяна<br><br>Идем, Флорела!<br><br>Флорела<br><br>Но, сестра,<br>Дай руку мужу ты!<br><br>Фелисьяна<br><br>Отлично.<br>Ему я правую подам.<br><br>Флорела<br><br>Идемте!<br><br>Корнехо<br>(берет факел)<br><br>Так ведите дам,<br>А факел понесу я лично.<br><br>Фелисьяна, Флорела, Тевано, Альбериго и Корнехо<br>уходят.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Альдемаро, Белардо.<br><br>Альдемаро<br><br>Пришел, увидел, принят был,<br>Остался, слушал, любовался,<br>С ней был и с нею говорил.<br>Всего, чего я добивался,<br>Почти мгновенно я достиг.<br>Белардо! Вот счастливый миг!<br>Поздравь меня!<br><br>Белардо<br><br>С чем это? Или<br>Из стран индийских корабли<br>Вам груды золота ввезли?<br>Иль банк в Мадриде вы открыли?<br><br>Альдемаро<br><br>Гораздо больше торжество.<br><br>Белардо<br><br>И как вас поздравлять? Курбетом<br>Иль грациозным пируэтом?<br>Да стоит ли еще того?<br><br>Альдемаро<br><br>Вот признак тупости, в котором<br>Тебя никак не упрекну:<br>Такого счастья глубину<br>Нельзя постигнуть смертным взором!<br>Я здесь, я с ней, я ей служу...<br>Белардо! Как она прекрасна!<br>Могу я видеть ежечасно<br>Моих мечтаний госпожу.<br>О, как любви волшебна власть:<br>Блаженство есть и в ожиданье,<br>В надежде есть уж обладанье...<br>Мечтанья утоляют страсть.<br>Свершение мечты моей<br>Недаром сердце обещало:<br>Великолепное начало --<br>Я здесь, я ей служу, я с ней!<br><br>Белардо<br><br>Мечты летят... надежды тают...<br>Начало хорошо--нет слов:<br>Конец окажется каков?<br>Цыплят по осени считают!</div>", "cover": false}, {"html": "<div class=\"textPage\">Входят Вандалино, закутанный в плащ, и Тельо;<br>они не замечают Альдемаро и Белардо.<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Те же, Вандалино и Тельо.<br><br>Вандалино<br><br>Нам, Тельо, тут посредник нужен:<br>Где я кого-нибудь найду?<br><br>Тельо<br><br>Хозяева еще в саду:<br>Там стол накрыт--кончают ужин.<br><br>Альдемаро<br>(к Белардо)<br><br>Вошли. Впотьмах не разберешь.<br>Кто это?<br><br>Белардо<br><br>Гости, вероятно.<br><br>Альдемаро<br><br>Закутан в плащ идальго знатный...<br>Наверно, молод и хорош!<br><br>Белардо<br><br>Вы ревновать уже хотите?<br><br>Альдемаро<br><br>С войной любви я незнаком:<br>Мне каждый кажется врагом,<br>И сразу я готов к защите.<br><br>Тельо<br>(к Вандалино)<br><br>Сеньор! Сеньор! Здесь кто-то есть.<br>И даже не один--тут двое!<br><br>Вандалино<br><br>Сейчас узнаем, что такое.<br><br>(К Альдемаро.)<br><br>Простите... С кем имею честь?<br><br>Альдемаро<br><br>Мы служим здесь.<br><br>Вандалино<br>(вглядываясь в него)<br><br>Ошибка явно.<br><br>(К Альдемаро.)<br><br>Сеньор! Простите--за услугу<br>Никак принять вас не могу.<br><br>Альдемар<br><br>Я поступил сюда недавно:<br>Учитель танцев в доме здесь.<br><br>Вандалино<br><br>И... в этом доме вы живете!<br><br>Альдемаро<br><br>Да.<br><br>Вандалино<br><br>Вам легко моей заботе<br>Помочь.<br><br>Альдемаро<br><br>К услугам вашим весь.<br><br>Вандалино<br><br>Раз вы живете в этом доме<br>Я вам охотно отдаю<br>Доверье и приязнь мою<br>В неограниченном объеме!<br><br>Альдемаро<br><br>Я благодарен всей душой,<br>Сеньор, но, право, я сконфужен...<br><br>Вандалино<br>(к Тельо)<br><br>Вот, Тельо, вот тот, кто мне нужен:<br>Да будет он посредник мой!<br><br>Альдемаро<br>(к Белардо)<br><br>Белардо! Всей душой моею<br>Предчувствую мою беду:<br>Я в нем соперника найду!<br><br>(К Вандалино.)<br><br>А с кем, сеньор, я честь имею?<br>Быть может, родственник вы им:<br> Тогда мой долг служить вам верно<br>И помогать во всем всемерно<br>Всем разумением моим.<br><br>Вандалино<br><br>Я ей сродни--своей любовью,<br>В крови горящей у меня:<br>Всем пылом своего огня<br>Она с моей смешалась кровью.<br>Так мы теперь в родстве живем:<br>За кровь взамен беру я пламя.<br><br>Альдемаро<br><br>О да, любовь владеет нами,<br>Воспламеняя кровь огнем,<br>Своим дыханьем зажигая...<br>Любовь -- вернейшее родство,<br>И в мире ближе нет его.<br><br>Вандалино<br><br>Как мне по сердцу речь такая!<br>Маэстро! Вижу--вы умны,<br>Вы истый кавалер при этом,<br>На опыте знакомый с светом,<br>Вы мне должны помочь, должны!<br> Я с вами говорю, как с другом,<br>Как стал бы говорить с врачом<br>О положении своем<br>Больной мучительным недугом.<br>Поверьте--нет безумья в том,<br>Когда мы душу открываем,<br>И если боль мы изливаем,<br>То облегченье ей даем.<br>Но про сердечные мученья<br>Моей любви не только вам--<br>Готов кричать о них камням!<br><br>Альдемаро<br><br>Сеньор! Со мною без смущенья<br>Вы говорите обо всем.<br>Поверьте моему участью,--<br>Я вам товарищ по несчастью,<br>Друг друга оба мы поймем.<br>Так, например, солдат с солдатом<br>Всегда найдет один язык,<br>Поймут друг друга--ученик--<br>Юрист с ученым адвокатом.<br>Так моряка поймет пилот,<br>Немало бурь видавший в море,<br>Или раба в тоске и горе<br>Бежавший из тюрьмы поймет.<br>Легко бесправному с бесправным,<br>Больному тяжело с больным.<br>Понять друг друга легче им<br>И говорить, как равный с равным.<br>На том же самом языке<br>И будем говорить мы с вами,<br>И плакать теми же слезами.<br>И в той же изнывать тоске<br><br>Вандалино<br><br>Итак, я вам во всем признаюсь,<br>Мой друг... Как вас зовут?<br><br>Альдемаро</div>", "cover": false}, {"html": "<div class=\"textPage\">Меня?<br>Альберто.<br><br>Вандалино<br><br>В сердце страсть храня,<br>Давно Флореле поклоняюсь<br><br>Альдемаро<br><br>Флореле? Но... скажите мне<br>Свое вы имя.<br><br>Вандалино<br><br>Вандалино.<br>Она мне в жизни свет единый,<br>Я ей молюсь.<br><br>Альдемаро<br><br>Чужой жене?<br>Сегодня утром ведь с Teвaно<br>Их обвенчали.<br><br>(В сторону.)<br><br>Ну, постой,<br>Я все узнаю, милый мой!<br><br>Вандалино<br><br>Нет! То сеньора Фелисьяна!<br><br>Альдемаро<br><br>Ах, вот как?<br><br>Вандалино<br><br>Да, сестра ее.<br><br>Альдемаро<br><br>И что ж, хотите вы жениться?<br><br>Вандалино<br><br>Хочу, чтобы моя царица<br>Служенье приняла мое.<br><br>Альдемаро<br><br>Ее достойны вы всецело...<br><br>Вандалино<br><br>Меня влечет на небо страсть,<br>Но, друг мой, я боюсь упасть<br>С высот, куда душа взлетела.<br>Вы видели ее?<br><br>Альдемаро<br><br>О да!<br><br>Вандалино<br><br>Не правда ли, она прекрасна?<br><br>Альдемаро<br><br>Но красота ее опасна<br>И милосердию чужда.<br>По виду ангел светозарный,<br>Так упоительно нежна,<br>Но людям смерть несет она<br>Под этой красотой коварной.<br>Она опаснее сирен,<br>Горька, точь-в-точь как цвет алоэ.<br>Забудь навеки о покое,<br>Чье сердце попадет к ней в плен!<br><br>Вандалино<br><br>Я буду рад такому плену.<br>Сегодня я вручил ей приз,<br>Как в Древней Греции Парис,--<br>За что он получил Елену.<br>Но у меня не те мечты,<br>Ищу другого идеала:<br>Хочу, чтобы моею стала<br>Сама богиня красоты.<br><br>Альдемаро<br><br>Чего же вы теперь хотите?<br><br>Вандалино<br><br>Служить ей!<br><br>Альдемаро<br><br>Больше ничего?<br><br>Вандалино<br><br>О да! Для счастья моего<br>Что выше может быть, скажите?<br><br>Альдемаро<br><br>Сперва служить хотите ей,<br>А уж потом на ней жениться?<br><br>Вандалино<br><br>Хочу любви ее добиться.<br><br>Альдемаро<br><br>И выдумать нельзя умней.<br>Так выиграть легко вам дело,<br>Взаимность вам помочь должна.<br>И если любит вас она,<br>К отцу ее идите смело:<br>Ждет положительный ответ!<br>Но ведь ошибка роковая<br>Была бы взять жену, не зная,<br>Любимы ей вы или нет.<br>Красавица знакома с вами?<br><br>Вандалино<br><br>Известна ей любовь моя.<br><br>Альдемаро<br><br>Откуда?<br><br>Вандалино<br><br>Ей признался я.<br><br>Альдемаро<br><br>Вы говорили с ней?<br><br>Вандалино<br><br>Глазами.<br>Глаза -- посредники влюбленных, --<br>Играя роль секретарей,<br>Открыли боль любви моей<br>И сердца мук неутоленных.<br><br>Альдемаро<br><br>А вы вели с ней переписку?<br><br>Вандалино<br><br>Почти...<br>Альдемаро<br><br>Но как это &quot;почти&quot;?<br><br>Вандалино<br><br>Сумел я мужество найти<br>Сегодня ей отдать записку.<br><br>Альдемаро<br><br>Но как?<br><br>Вандалино<br><br>Мой приз! Письмо в футляр<br>Тайком вложил, стал под балконом<br>И протянул с коня с поклоном<br>Ей на конце копья свой дар.<br><br>Альдемаро<br>(в сторону)<br><br>Умно, но чересчур уж смело.<br><br>(К Вандалино.)<br><br>Ответ надеетесь прочесть?<br><br>Вандалино<br><br>Сознаюсь, что надежда есть:<br>Она так ласково смотрела...<br><br>Альдемаро<br>(в сторону)<br><br>В бессмертие души людской<br>Теперь мой ум поверить может,<br>Когда ее не уничтожит<br>Безумной ревности такой<br>Пожаром вспыхнувшее пламя!<br><br>Вандалино<br><br>Я раньше слов не находил,<br>Чтоб высказать сердечный пыл,<br>Но нынче на венчанье в храме,<br>Когда с невестою жених<br>Менялись кольцами, Флорела<br>С улыбкой нежной поглядела<br>Вдруг на меня, потом на них,<br>Как будто говоря: &quot;С тобою<br>Я обменялась бы кольцом!&quot;<br><br>Альдемаро<br>(в сторону)</div>", "cover": false}, {"html": "<div class=\"textPage\">И это было бы концом,<br>Мне уготованным судьбою!<br>Мне золота один лишь вид,<br>Как Крезу, гибель предвещает.<br>Нет, не оно меня пленяет,<br>А символ, что оно таит.<br>Мечта Флорелы -- о другом...<br>Он избран ей, к моей печали.<br>Увы, любовь! Мы опоздали,<br>И местность занята врагом.<br>Не стали ждать моей кирки<br>В золотоносной жиле горной<br>Живые золотые зерна,<br>Не стала цапля у реки<br>Ждать соколиного прилета,<br>И клада не нашел пастух,<br>И смертный не сумел, как дух,<br>Взлететь в небесные высоты...<br>Но золото из горных жил,<br>И цель охоты соколиной,<br>И клад, и небо--Вандалино<br>Все безраздельно получил!<br>О, как жестоко я разбужен<br>От упоительного сна!<br>В него Флорела влюблена!<br><br>Белардо<br><br>Сеньор! Мы так пропустим ужин!<br><br>Альдемаро<br><br>Мне не до ужина, отстань!<br><br>Белардо<br><br>Но я хотел бы...<br><br>Альдемаро<br><br>Как угодно --<br>Ступай один, плати свободно<br>Желанью низменному дань!<br><br>Вандалино<br><br>Ты помрачнел. Что значит это?<br><br>Альдемаро<br><br>Я думаю о том, друг мой,<br>Чем поделился ты со мной.<br>Ты хочешь на письмо ответа?<br><br>Вандалино<br><br>Еще бы, в нем судьба моя!<br><br>(Достает письмо.)<br><br>Альдемаро<br><br>Письмо отдам охотно я.<br><br>Вандалино<br><br>Когда б, как Александр Великий,<br>Я был вселенной всей владыкой,<br>С тобой бы поделился ею.<br>Но... отблагодарить сумею.<br>Вот! Все я высказал ей тут.<br><br>Альдемаро<br><br>Давай скорей--сюда идут!<br><br>(В сторону.)<br><br>Проверю все мои сомненья.<br>И если ею он любим,--<br>Простившись с счастием моим,<br>Найду я в смерти избавленье!<br><br>Уходят.<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Фелисьяна, Флорела, Лисена.<br><br>Фелисьяна<br><br>А наш галантный кавалер,<br>Наш молодой--в постели. Мило?<br><br>Флорела<br><br>Веселье, верно, утомило...<br><br>Фелисьяна<br><br>Нет, просто взял с отца пример.<br><br>Флорела<br><br>И не сказал тебе ни слова?<br><br>Фелисьяна<br><br>Мужей законных нрав таков,<br>Они не лучше стариков:<br>От них и ждать нельзя другого.<br><br>Флорела<br><br>В твоих словах для молодого<br>Не очень нежный комплимент.<br><br>Фелисьяна<br><br>Лисена! Дай мне белых лент.<br><br>Флорела<br><br>Зачем тебе?<br><br>Фелисьяна<br><br>Я нездорова,<br>Я утомилась суетой,<br>Устав от смеха, разговора.<br>Хочу тяжелый гнет убора<br>Сменить повязкою простой.<br><br>Лисена<br><br>Вот ленты.<br><br>Фелисьяна<br><br>Слишком длинны. Нет<br>Здесь ножниц? Дай мне их сюда,<br>Концы обрежу я тогда.<br><br>Флорела<br><br>Ты не умеешь делать петли.<br><br>Фелисьяна<br><br>Нет, очень крепко над собой<br>Я петлю мертвую стянула.<br><br>Флорела<br><br>Ах, боже, я совсем уснула<br>Забыла о шкатулке той,<br>Что преподнес мне Baндaлино.<br>Посмотрим...<br><br>Фелисьяна<br><br>Да, смотрела я,<br>Как он поднес тебе с копья<br>Свой приз: красивая картина.<br>Так дай же ножницы мне!<br><br>Флорела<br><br>Ай!<br><br>Фелисьяна<br><br>Ты укололась?<br><br>Флорела<br><br>Да, родная,<br>В шкатулке что-то вдруг нашла я<br>И укололась невзначай.<br><br>Фелисьяна<br><br>А что такое там?<br><br>Флорела<br><br>Пойди,<br>Лисена, подожди за дверью.<br><br>Лисена<br><br>Дала ль я повод к недоверью?<br><br>Флорела<br><br>А впрочем, что ж, не уходи.<br>Ведь я-то в этом не виновна!<br><br>Фелисьяна<br><br>Записка?<br><br>Флорела<br><br>Видишь ты сама!<br><br>Фелисьяна<br><br>Изобретение письма--<br>Большое дело, безусловно!<br><br>Флорела<br><br>Изобретение само<br>Полезно, слова нет, но в дело<br>Нельзя пускать его так смело...<br>Прочесть иль разорвать письмо?<br><br>Фелисьяна<br><br>Лукавишь ты со мной, конечно.<br><br>Флорела<br><br>Ты Вандалино, может быть,<br>Советуешь мне полюбить?</div>", "cover": false}, {"html": "<div class=\"textPage\">Фелисьяна<br><br>Советую чистосердечно.<br><br>Флорела<br><br>Избави бог меня, аминь!<br><br>Фелисьяна<br><br>Его не любишь ты?<br><br>Флорела<br><br>Нимало,<br>И быть свободной я б желала.<br><br>Фелисьяна<br><br>На это ты надежду кинь!<br>Я вышла без любви, Флорела:<br>Тевано здесь два дня всего,<br>А я уж вышла за него.<br>Страшись подобного удела,<br>Люби, сестра! Вот мой совет!<br>Любовь замужство украшает,<br>Тебя он любит, обожает,<br>И гнать его причины нет.<br>Ну, где б красивей, благородней<br>Ты жениха себе нашла?<br><br>Флорела<br><br>Сестрица! Сколько ты взяла,<br>Чтоб ревностною быть мне сводней?<br><br>Фелисьяна<br><br>Нет, берегись судьбы моей!<br>Сама ты рассуди, Флорела:<br>Я выйти замуж захотела...<br><br>Флорела<br>(тихо)<br><br>Постой, не говори при ней --<br>Потом не оберешься сплетен.<br><br>Фелисьяна<br><br>Поверь, и без того ясна<br>Моих несчастий глубина,<br>Мой горький жребий всем заметен,<br>Я вышла замуж не любя,--<br>Что хуже, чем судьба такая?<br><br>Флорела<br><br>Но долг свой честно исполняя,<br>Найдешь ты счастье для себя.<br>Брак по любви всегда опасней:<br>Недолго жар любви горит,<br>И лучше, мудрость говорит,<br>Брак по рассудку.<br><br>Фелисьяна<br><br>Это басни!<br>Кто испытал любовь хоть раз,<br>Всю жизнь сокровищем владеет:<br>Его воспоминанье греет,<br>Хотя бы жар любви погас.<br><br>Флорела<br><br>Что ж, Вандалино я отвечу,<br>Но буду искренна с тобой:<br>Мне по душе совсем другой,<br>Ему пошла бы я навстречу!<br>Он нравится мне безгранично,<br>Но я... не нравлюсь я ему...<br>Или, вернее, безразлична.<br>И я в смущенье не пойму...<br>Сказать тебе?<br><br>Фелисьяна<br><br>Да в чем же дело?<br><br>Флорела<br><br>Сама я не пойму никак:<br>Любовь это или пустяк,<br>Мечтания одни...<br><br>Фелисьяна<br><br>Флорела!<br>Ты мне загадки задаешь?<br><br>Флорела<br><br>Сказала б я, что, как мужчина,<br>Красивее, чем Вандалино,<br>Другой...<br><br>Фелисьяна<br><br>Да кто?<br><br>Флорела<br><br>Он так хорош...<br><br>Фелисьяна<br><br>Э, тут не без любви! Но кто же?<br><br>Флорела<br><br>Смеяться будешь надо мной?<br><br>Фелисьяна<br><br>Но кто же лучше?<br><br>Флорела<br><br>Да любой,<br>Хоть... наш учитель танцев!<br><br>Фелисьяна<br><br>Боже!<br>Флорела! Ты сошла с ума.<br><br>Флорела<br><br>Да, вырвалось из уст невольно.<br>Прости!<br><br>Фелисьяна<br><br>Ну, глупостей довольно.<br>Как ты решишь насчет письма?<br><br>Флорела<br><br>Прочесть записку я решила.<br>Посмотрим, что он пишет в ней.<br><br>Фелисьяна<br><br>Отлично, прочитай скорей.<br><br>Флорела<br>(читает)<br><br>&quot;Ваш взор затмил небес светила...&quot;<br>Мой взор затмил весь блеск светил!<br><br>Фелисьяна<br><br>Читай, читай!<br><br>Флорела<br><br>&quot;Едва я смею<br>Сказать, что всей душой моей<br>Навеки вас я полюбил.<br>Вот я коленопреклоненно<br>У ваших ног, и вздохи шлю,<br>И пощадить меня молю&quot;.<br><br>Фелисьяна<br><br>Как унижается влюбленный!<br>Флорела<br><br>Быть может, только на словах.<br><br>Фелисьяна<br><br>Я выйти без любви решилась,<br>И этого всего лишилась,<br>И жизнь свою разбила в прах!<br><br>Флорела<br><br>Зато не будешь знать несчастий,<br>И огорчений, и забот,<br>Которые всегда несет<br>С собой замужество по страсти.<br><br>Фелисьяна<br><br>А я скажу: нет счастья там,<br>Где вовсе не было желанья,<br>Где не давало ожиданье<br>Простор надеждам и мечтам.<br>Не даст нам удовлетворенья<br>То, что придет внезапно так,--<br>Ни чувство, ни тем больше брак.<br>Когда к тому ж и отвращенье...<br>Читай!<br><br>Флорела</div>", "cover": false}, {"html": "<div class=\"textPage\">&quot;Молю вас подарить<br>Мне счастья миг хотя б короткий:<br>Сегодня ночью у решетки<br>Прийти со мной поговорить&quot;.<br>Ну, словом, каждый взгляд и вздох<br> Он мне дарит в тоске бесплодной...<br>Хоть он любовник превосходный,<br>Но как поэт--он очень плох!<br><br>Фелисьяна<br><br>Ты с ним поговоришь, Флорела?<br><br>Флорела<br><br>Ты разрешаешь мне?<br><br>Фелисьяна<br><br>О да!<br>Несчастная моя звезда!<br>Быть незамужней--то ли дело?<br>Стать дамой сердца для него...<br>Как я бы этого хотела!<br>Такой красавец, статный, смелый...<br><br>Флорела<br><br>Предмет влеченья твоего?<br><br>Фелисьяна<br><br>Вот пустяки!<br><br>(В сторону.)<br><br>Ты угадала...<br>Могла я быть его женой,<br>Когда б не наш старик скупой...<br>Но и сейчас не все пропало!<br><br>(Громко.)<br><br>Как я хотела бы...<br><br>Флорела<br><br>Чего?<br><br>Фелисьяна<br><br>Поговорить с ним мимолетно!<br><br>Флорела<br><br>Я уступила бы охотно<br>Тебе героя твоего.<br>Вот! Хочешь, нежное посланье<br>Тебе на память подарю?<br>Бери его!<br><br>Фелисьяна<br><br>Благодарю!<br>Но... подари мне и свиданье<br><br>Флорела<br><br>Как так?<br><br>Фелисьяна<br><br>Я за тебя пойду!<br><br>Флорела<br><br>Обман?<br><br>Фелисьяна<br><br>Что ж будет тут плохого,<br>Когда я с ним скажу два слова?<br><br>Флорела<br><br>Да ведь с балкона, не в саду...<br>Беды не будет! Что ж, изволь!<br><br>Фелисьяна<br><br>Он наших голосов не знает<br>И ни за что не угадает,<br>Что я твою играю роль.<br><br>Флорела<br><br>Хочу я слышать, как ты станешь<br>С ним говорить.<br><br>Фелисьяна<br><br>Пойдем со мной.<br>Но где же он, постылый мой?<br>Лисена! Ты пойдешь и взглянешь,<br>Все спит ли мой злодей.<br><br>Лисена<br><br>Иду.<br><br>Фелисьяна<br><br>Я на балконе подожду.<br><br>Улица<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Вандалино, Тельо.<br><br>Вандалино<br><br>Закрой лицо как следует плащом.<br>Который час? Как тянутся мгновенья!<br><br>Тельо<br><br>По звездам -- полночь.<br><br>Вандалино<br><br>На небе моем<br>Иной звезды я жажду появленья...<br>Поговорим о чем-нибудь другом.<br>Какого, друг, ты об Альберто мненья?<br><br>Тельо<br><br>Он слишком разговорчив на мой вкус,<br>И одного я не пойму, клянусь!<br><br>Вандалино<br><br>Чего?<br><br>Тельо<br><br>Как можно говорить, как с другом,<br>С тем, кто вам совершенно незнаком?<br><br>Вандалино<br><br>Нам легче, если делимся недугом<br>И часть тоски другому отдаем.<br>К тому же он вполне к моим услугам:<br>При нем могу проникнуть легче в дом.<br><br>Тельо<br><br>Письмо послали вы?<br><br>Вандалино<br><br>И жду ответа.<br>Мучительна мне неизвестность эта!<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же; Альдемаро и Белардо входят,<br>не замечая Вандалино и Тельо.<br><br>Альдемаро<br><br>Под тем же самым кровом, что она,<br>Придется мне сегодня спать впервые...<br>О нет! Не спать! Мне будет не до сна:<br>Прогонят сон мечтанья огневые.<br><br>Белардо<br><br>Сеньора хороша! Сама весна,<br>Сама Венера из морской стихии.<br>Любовь, конечно, рай, но райский сад<br>Нередко ревность превращала в ад.<br><br>Альдемаро<br><br>Нет, за любовь мы вправе ждать награды!<br>Я верю, муки ревности пройдут,<br>Любовь моя разрушит все преграды,<br>И сердце сбросит гнет ревнивых пут.<br><br>Белардо<br><br>Тсс, тсс... Сеньор! Здесь кто-то у ограды.<br><br>Альдемаро<br><br>Наверно, это наш влюбленный тут.<br>Стань ближе...<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Фелисьяна у окна. Альдемаро и Белардо на одной стороне сцены, Вандалино и Тельо--на другой, потом Лисена.<br><br>Фелисьяна<br><br>Тсс...<br><br>Вандалино<br><br>Кто это?<br><br>Фелисьяна<br><br>Я, Флорела!<br><br>Белардо<br>(к Альдемаро, тихо)<br><br>Флорела это--вот какое дело!<br><br>Фелисьяна<br><br>Тсс... Вандалино!</div>", "cover": false}, {"html": "<div class=\"textPage\">Вандалино<br><br>О моя звезда!<br>Как смеет ночь скрывать ваш лик прекрасный,<br>Коль день при вас погаснет от стыда?<br><br>Фелисьяна<br><br>Вы любите меня?<br><br>Вандалино<br><br>Безумно! Страстно!<br>Как не любил никто и никогда!<br>Не стал бы я слова терять напрасно,<br>Чтобы мою любовь изобразить:<br>Вас увидать--уж: значит полюбить!<br>Писать, быть может, слишком смело было,<br>Но эту смелость придал мне ваш взор,<br>Один ваш взгляд небесный, чистый, милый...<br>Взглянули вы--и я ваш раб с тех пор!<br>Теперь надежда жизнь мне озарила...<br><br>Фелисьяна<br><br>Я слушаю с волненьем вас, сеньор...<br>Что ж, буду сердцу своему послушна!<br>Я тоже... тоже... к вам неравнодушна.<br>Я на минуту вышла к вам сюда,<br>Чтобы хоть словом с вами обменяться.<br>Увы, моя несчастная звезда...<br>Нельзя ни говорить нам, ни видаться...<br>Но как любовью вашей я горда!<br>Здесь кто-то есть? Нельзя мне оставаться.<br>Пишите мне, я буду ждать письма<br>И очень скоро напишу сама.<br><br>Альдемаро<br>(к Белардо, тихо)<br><br>Ты слышал? О несчастие, о горе!<br><br>Белардо<br>(тихо)<br><br>Сеньор! Сдержитесь...<br><br>Альдемаро<br><br>Вот она--беда<br><br>Вандалино<br><br>Я видел рай в небесном вашем взоре,<br>Я отдаю вам душу навсегда.<br>Красавица! Пришлю письмо вам вскоре<br>У вас живет учитель танцев?<br><br>Фелисьяна<br><br>Да.<br>Отцом моим совсем недавно нанят.<br><br>Вандалино<br><br>Так вот, он вам носить записки станет.<br><br>Альдемаро<br>(тихо)<br><br>О, для нее наемник жалкий я?<br><br>Вандалино<br><br>Нам помогать он дал мне обещанье.<br><br>Альдемаро<br>(тихо)<br><br>Молчать я должен, гнев мой затая.<br><br>Фелисьяна<br><br>Прощайте же...<br><br>Вандалино<br><br>Скажите &quot;до свиданья&quot;!<br><br>Фелисьяна<br><br>Пишите мне!<br><br>Вандалино<br>Красавица моя!<br>Я завтра же пришлю вам с ним посланье!<br><br>Альдемаро<br>(тихо)<br><br>Да, если я до завтра доживу!<br><br>Вандалино<br><br>Я поклоняюсь вам, как божеству.<br><br>Фелисьяна<br><br>Вам нежный шлет привет моя сестрица,--<br>О, вот кто не жалеет вам похвал!<br><br>Вандалино<br><br>Я добротой ее могу гордиться.<br>Охотно б руки ей расцеловал!<br><br>Фелисьяна<br><br>Так жду письма!<br><br>Вандалино<br><br>Да, да, моя царица!<br><br>Фелисьяна<br>(в сторону)<br><br>Я выпила отравленный бокал<br>И вся во власти сладкого дурмана.<br><br>Лисена<br>(появляясь у окна)<br><br>Скорей, сеньора! Вас зовет Тевано!<br><br>Фелисьяна<br><br>Иду, иду!<br><br>Отходят от окна.<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Вандалино, Тельо, Альдемаро, Белардо<br><br>Вандалино<br>(к Тельо)<br><br>О, я добился цели!<br>Ты слышал, друг?<br><br>Тельо<br>Сеньор! Пропел петух!<br>Давно уже пора вам быть в постели,<br>А не бродить, как беспокойный дух.<br><br>Вандалино<br><br>О радости, о счастье, о Флореле<br>На целый мир готов кричать я вслух.<br><br>Тельо<br><br>Пойдемте: дома радоваться будем,<br>Иначе мы народ весь перебудим.<br><br>Вандалино<br>(заметив Альдемаро)<br><br>Стой! Кто идет?<br><br>Альдемаро<br><br>А кто меня зовет?<br><br>Вандалино<br><br>Я!<br><br>Альдемаро<br><br>&quot;Я&quot;? Кто &quot;я&quot;?<br><br>Вандалино<br><br>Я -- это я! Слыхали?<br><br>Альдемаро<br><br>Куда же это вы? Уж не сюда ли?<br><br>Вандалино<br><br>Здесь улица, свободен всем проход.<br><br>Альдемаро<br><br>А если так, то проходите мимо.<br><br>Вандалино<br><br>Как смеете? Кто вы такой?<br><br>Альдемаро<br><br>Я тот,<br>В ком сердце жгучей ревностью томимо.<br><br>Вандалино<br><br>Вот как? За ревность наказанье ждет!<br>Отсюда ты не сделаешь ни шагу!<br><br>Альдемаро<br><br>Довольно шуток. Уберите шпагу.<br><br>Вандалино<br><br>Кто это?<br><br>Альдемаро<br><br>Я, Альберто!<br><br>Вандалино<br><br>Боже мой!<br>Куда ж идете вы?</div>", "cover": false}, {"html": "<div class=\"textPage\">Альдемаро<br><br>Иду домой.<br><br>Вандалино<br><br>Что ж разыграли сцену вы такую?<br><br>Альдемаро<br><br>Я вашу доблесть испытать хотел<br>И рад, что друг мой так отважно смел.<br><br>Вандалино<br><br>Альберто, друг! Я счастлив, я ликую!<br>Я все тебе подробно расскажу...<br>Благополучно кончилась беседа.<br><br>Альдемаро<br><br>Ну, как? Идем, тебя я провожу.<br><br>Вандалино<br><br>Она -- моя!<br><br>Альдемаро<br><br>Вот торжество!<br><br>Вандалино<br><br>Победа!<br><br> * ДЕЙСТВИЕ ВТОРОЕ *<br><br>Комната в доме Альбериго<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Альдемаро, Флорела. Белардо<br><br>Альдемаро<br><br>Чем я могу вам отплатить<br>За все заботы и вниманье?<br>Одним лишь: все мои старанья<br>Урокам нашим посвятить.<br><br>Флорела<br><br>Благодарю. Я поручусь,<br>Что будут приняты без спора<br>Условья ваши.<br><br>Альдемаро<br><br>Нет, сеньора,<br>Иначе будут, я боюсь,<br>Мои условья таковы,<br>Что вам покажутся, наверно,<br>Они нескромными чрезмерно.<br><br>Флорела<br><br>Чего же требуете вы?<br><br>Альдемаро<br><br>Не денег!<br><br>Флорела<br><br>Но тогда чего же?<br><br>Альдемаро<br><br>Лишь благосклонности.<br><br>Флорела<br><br>Она<br>И так вам, кажется, дана:<br>Отец вас оценил, я... тоже.<br><br>Альдемаро<br><br>Благодарю вас за участье,<br>Но вам скажу одно в ответ:<br>Несчастному надежды нет!<br><br>Флорела<br><br>Несчастны вы? Но в чем несчастье?<br><br>Альдемаро<br><br>Я опоздал... Так рок судил.<br><br>Флорела<br><br>Меня учить вы не хотите?<br><br>Альдемаро<br><br>Я торопился, но, простите:<br>Меня другой опередил.<br><br>Флорела<br><br>Другой? Я слышу в первый раз.<br><br>Альдемаро<br><br>Но я ведь видел сам воочью<br>Вчера, как под балконом ночью<br>Он славно танцевал для вас.<br>Могу ль не сетовать на это?<br>Чтоб он попал под ваш балкон,<br>Чтоб получил согласье он,<br>Довольно было пируэта!<br>Ведь я в тени, к балкону близко,<br>За каждым туром наблюдал.<br>О, он недаром танцевал:<br>Ему обещана записка!<br>Погибну я!.. Такой удар!<br><br>Флорела<br><br>Ему--записка? И об этом<br>Я слышу в первый раз.<br><br>Альдемаро<br><br>С ответом<br>На ту, что он вложил в футляр.<br><br>Флорела<br><br>Какой же интерес, однако,<br>Должно в вас это возбуждать,<br>Когда так много увидать<br>Могли вы средь ночного мрака?<br><br>Альдемаро<br><br>Мрак иногда скорей, чем свет,<br>Все прояснит.<br><br>Флорела<br><br>Скажите, кто вы?<br><br>Альдемаро<br><br>Кто я? Ваш раб, всегда готовый<br>Служить вам.<br><br>Флорела<br><br>И не больше?<br><br>Альдемаро<br><br>Нет.<br><br>Флорела<br><br>Но как известно стало вам...<br><br>Альдемаро<br><br>Я знаю имя властелина<br>Всех ваших мыслей: Вандалино!<br><br>Флорела<br><br>Вот как?<br><br>Альдемаро<br><br>Он все открыл мне сам,<br>Притом сказал, к моей печали,<br>Что после встречи в час ночной<br>Сегодня вы ему со мной<br>Прислать записку обещали.<br><br>Флорела<br><br>Записку? С вами?<br><br>Альдемаро<br><br>Да, вчера.<br><br>Флорела<br><br>Не понимаю...<br><br>(В сторону.)<br><br>Без сомненья,<br>Тут вышло недоразуменье:<br>Вот что наделала сестра!<br><br>Альдемаро<br><br>Его вы любите?<br><br>Флорела<br><br>Не знаю.<br><br>(В сторону.)<br><br>Как честь свою мне уберечь?<br><br>Альдемаро<br><br>Скажите правду, заклинаю!<br><br>Флорела<br><br>Об этом после будет речь.<br>Плетется тут интриги сеть.<br>Пока, я вас прошу, молчите.<br><br>Альдемаро<br><br>Вы вверились моей защите,<br>Мой долг--молчать иль умереть.<br><br>Флорела<br><br>До смерти вам еще далеко!<br>Но нам пора начать урок--<br>Нас этот разговор отвлек.<br><br>Альдемаро<br><br>Да, вы пришли ведь для урока!<br><br>(К Белардо.)<br><br>Дай мне гитару!<br><br>Белардо<br>Вот она.<br>Но вам ее настроить надо:<br>Все струны высились из лада,<br>Вчера тут лопнула одна...<br><br>Альдемаро</div>", "cover": false}, {"html": "<div class=\"textPage\">Рука безумца в том видна.<br><br>Белардо<br><br>А эти ослабели.<br><br>Альдемаро<br><br>Живо.<br>Давай!<br><br>Белардо<br><br>Извольте.<br><br>Альдемаро<br><br>Подтяну<br>Я ослабевшую струну...<br>О, как она звучит фальшиво!<br><br>Флорела<br><br>Фальшиво инструмент звучит,<br>И это словно вас смешит?<br>Вот, право, музыкант на диво!<br><br>Альдемаро<br><br>Но инструмент любви ведь любит<br>Разнообразие во всем;<br>Подчас, пожалуй, прелесть в нем<br>Фальшь больше правды усугубит<br>И лучшим сделает мотив.<br><br>Флорела<br><br>Быть может, музыкант фальшив?<br><br>Альдемаро<br><br>Дай бог, чтоб так была фальшива<br>Та, для кого играет он!<br><br>Флорела<br><br>Так оба равный ритм и тон<br>Найдут для своего мотива.<br><br>Альдемаро<br><br>Любовь всем равенство дает<br>Своею силою могучей,<br>Но часто красота созвучий<br>Зависит от фальшивых нот.<br>Таит божественные звуки<br>Душа моя, как инструмент:<br>И вот теперь в один момент<br>Она к любви попала в руки.<br>Любовь чарует нас игрой...<br>Но хоть играет и прекрасно,<br>Расстроен инструмент ужасно<br>Его нарушили вы строй!<br>Пять струн в душе у человека.<br>Чтоб ни одна не порвалась,<br>Меж ними сердце держит связь,<br>А наша грудь -- для сердца дека.<br>В ней звуки сладостно слились<br>И страстно на свободу рвутся,<br>И вздохи, точно гаммы, льются<br>По шкалам сердца вверх и вниз.<br>Пять струн--пять чувств. Во-первых, зренье.<br>То--прима: надо увидать<br>Предмет любви, чтобы отдать<br>Ему навеки поклоненье.<br>Секунда--это будет слух.<br>Согласно с зреньем чувство это<br>В вопросе выбора предмета,<br>Не разделяем мы их двух.<br>Поставим третьим -- обонянье:<br>Как терция, оно звучит,<br>Любимой аромат таит<br>В себе всю силу обаянья.<br>Над нею кварта верх берет,<br>Земное страстное желанье,<br>А это, чувство осязанья,<br>Невольный страх с собой несет.<br>К нему же квинтой будет бас,<br>То чувство вкуса, и известно,<br>Что с осязанием совместно<br>Оно является у нас.<br>Когда, как нежным дуновеньем,<br>Любви небесная рука<br>Тех струн касается слегка,<br>Дано звучать им вдохновеньем<br>И песни рая вызывать.<br>Но ревности жестокой муки<br>Способны исказить те звуки<br>И струны навсегда порвать...<br><br>Флорела<br><br>О, философией такой<br>Вы набросали арабески<br>Дамасской золотой нарезки<br>На инструмент прекрасный свой!<br>Как эти струны деликатны,<br>И как игра на них неясна!<br><br>Альдемаро<br><br>Она любовью внушена.<br>Начнем. Но вам бы, вероятно,<br>Хотелось, чтоб играл вам он?<br>Тогда б урок вам был отрадой?<br><br>Флорела<br><br>Нет! Одного тебя мне надо,<br>Сойди с небес сам Аполлон!<br><br>Альдемаро<br><br>Так ты не отвергаешь дара<br>Моей любви?<br><br>Флорела<br><br>Так любишь ты?<br><br>Альдемаро<br><br>Тебе от сердца полноты<br>Отвечу песенкою старой:<br>&quot;Пусть скажет за меня гитара&quot;.<br><br>Флорела<br><br>Неужто ремесло твое--<br>Гитара?<br><br>Альдемаро<br><br>Нет, мой враг прекрасный!<br>Из-за тебя мой рок злосчастный<br>Заставил в руки взять ее.<br><br>Флорела<br><br>Ты дворянин? Признайся мне!<br><br>Альдемаро</div>", "cover": false}, {"html": "<div class=\"textPage\">&quot;Пусть скажет за меня гитара!&quot;<br>Я дворянин, и род наш старый<br>Известен нашей всей стране.<br>Я долго странствовал, далеко.<br>От итальянских берегов<br>Вернулся я под отчий кров,<br>В родной Лерин, по воле рока.<br>Желая праздник увидать,<br>Приехал я вчера в Туделу<br>Затем, чтоб увидать Флорелу<br>И сердце ей навек отдать!<br>Тебе на играх, преклоненный<br>Вручил я зеркало, как приз.<br>Взгляни в него ты, как Нарцисс<br>Глядел в ручей, собой плененный!<br>Но знай: прекраснее вдвойне,<br>Флорела, образ тот, который<br>Твои увидеть могут взоры<br>В его хрустальной глубине.<br>Тобой пленился я мгновенно.<br>Всегда я смелым был бойцом,<br>И вот, чтоб к вам проникнуть в дом,<br>Прибег я к хитрости военной.<br>Отныне я в твоих руках.<br>Посмею ль ожидать успеха,<br>Иль Вандалино мне помеха<br>И не напрасен весь мой страх?<br>Теперь твой приговор приму.<br>Я все сказал: казни иль милуй!<br><br>Флорела<br><br>Как я могу казнить, мой милый,<br>Раз я сама виной всему?<br>Ты мне сказал, что благороден,--<br>Могу ль тебя я упрекнуть?<br>К моей душе нашел ты путь:<br>Он одному тебе свободен.<br>Идешь на смелые дела<br>Ты, как и следует герою.<br>Но духом я сравнюсь с тобою:<br>Я женщина, но я смела!<br>Борись! Ждет счастье впереди!<br>Не думай же о Вандалино:<br>Я расскажу, что за причина...<br>Ты все узнаешь! Подожди!<br>Я положу конец обману...<br>Ах! Мой отец! Скорей начнем!<br><br>Альдемаро<br><br>Я так растерян... Как при нем<br>Держаться? Что играть?<br><br>Флорела<br><br>Павану!<br><br>Альдемаро<br><br>Отлично.<br><br>Флорела<br><br>Пусть она идет<br>Под звук красивого мотива.<br><br>Альдемаро<br><br>Та, кто танцует, так красива,<br>Что блеск паване придает<br>И вдохновенье виртуозу.<br><br>Флорела<br><br>Брось шутки: не до шуток тут!<br><br>Альдемаро<br><br>Могу ли я шутить? Идут.<br>Прошу вас, становитесь в позу!<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же, Альбериго, Фелисьяна и Тевано<br><br>Флорела<br><br>Так хорошо?<br><br>Тевано<br>(Фелисьяне)<br><br>И я с тобой<br>Готов приняться за ученье.<br>Чтобы прогнать твое смущены<br>Мы будем вместе, ангел мой!<br><br>Альбериго<br><br>Вы посмотрите, какова?<br>Танцует не шутя Флорела.<br><br>Фелисьяна<br><br>Начать урок и я б хотела.<br><br>Альдемаро<br>(Флореле)<br><br>Простите... реверанс сперва...<br><br>Флорела<br><br>Такой?<br><br>Альдемаро<br><br>Нет, ниже приседайте.<br><br>Флорела<br><br>Вот так?<br><br>Альдемаро<br><br>Так... Корпус попрямей...<br>Головку выше...<br><br>Флорела<br><br>Так?<br><br>Альдемаро<br><br>Смелей!<br><br>Флорела<br><br>Немного медленней играйте.<br><br>Альдемаро<br><br>Вот так... назад... и поворот.<br>Но кончить время уж настало.<br>Ведь затруднительно начало,<br>И легче все потом пойдет.<br>Но за успехи поручиться<br>Могу я, впрочем, только с тем,<br>Что никаких других систем<br>Моя не примет ученица.<br>И я хочу уверен быть,<br>Что радость вам доставит знанье,<br>А вы мне дайте обещанье<br>Все танцы прежние забыть.<br><br>Флорела<br><br>Как в вас к себе доверья мало!<br>Я очень вами дорожу.<br>Позднее я вам расскажу<br>О том, как прежде танцевала.<br><br>Альдемаро<br><br>А я все тайны моего<br>Искусства вам открою скоро.<br><br>(Фелисьяне.)<br><br>А вы что знаете, сеньора?<br><br>Фелисьяна<br><br>Не знаю ровно ничего!<br><br>Тевано<br><br>Не может быть, мой ангел нежный.<br>Начни и ты урок смелей.<br>Где ступишь ножкой ты своей,<br>Взойдут цветы в пустыне снежной.<br><br>Фелисьяна<br><br>Мне стыдно--не умею я!<br><br>Флорела<br><br>Умеет, как еще! Недавно<br>Меня вмешала в танец славно<br>Сестрица милая моя!<br><br>Тевано<br>(к Альдемаро)</div>", "cover": false}, {"html": "<div class=\"textPage\">С чего ж начать хотите вы?<br><br>Альдемаро<br><br>Разучим все, что вы хотите.<br><br>Флорела<br>(к Тевано)<br><br>Хибао с ней вы разучите<br>Ценою вашей головы.<br><br>Тевано<br><br>Но если ножки так красивы,<br>От них не будет никогда<br>Для головы моей вреда.<br><br>Фелисьяна<br>(к Тевано)<br><br>Оставь! Слова ее шутливы,<br>Она от счастья без ума,<br>Что так уже танцует ловко.<br><br>Флорела<br><br>Сестра -- ужасная плутовка!<br>Танцует хорошо сама!<br>Вчера так танцевала мило,<br>Что -- правда, в темноте со мной<br>Смешал ее учитель мой.<br><br>Тевано<br><br>Вчера? Когда же это было!<br>Но кто же ей играл?<br><br>Флорела<br><br>Не он .<br>Ее он принял за другую:<br>Он думал, это я танцую!<br><br>Альдемаро<br><br>Я в заблужденье был введен:<br>Поддавшись странному обману<br>Вас видел в сумраке ночном.<br><br>Флорела<br><br>А я спала спокойным сном.<br>С другим учиться я не стану.<br><br>Альдемаро<br><br>Нужна мне только эта честь.<br>Но ваша, может быть, сестрица<br>Желает у других учиться...<br><br>Тевано<br><br>А разве здесь другие есть?<br><br>Фелисьяна<br><br>Флорела шутит неуместно.<br>Альберто! Вы--учитель мой,<br>Не будет им никто другой!<br><br>Альбериго<br><br>Других и нет, как мне известно,<br>И вас соперники не ждут.<br>Ну что ж? Пора начать занятья.<br><br>Фелисьяна<br><br>Нет, нет, не стану танцевать я,<br>Пока вы остаетесь тут.<br><br>Тевано<br><br>Она стесняется при муже.<br>Уйдемте лучше мы, сеньор!<br><br>Альбериго<br><br>Стесняется при муже? Вздор!<br>Танцуй при всех! Ну, дочка, ну же!<br><br>Фелисьяна<br><br>Не стану! Это свыше сил!<br><br>Альбериго<br><br>Ну, докажи свою охоту...<br><br>Фелисьяна<br><br>Не сдвинусь с места ни на йоту,<br>Хотя б весь мир меня просил.<br>Мне принужденье нестерпимо!<br><br>Альбериго<br><br>Тебя не принуждаю я!<br><br>Флорела<br><br>Ломанье, милая моя!<br><br>Фелисьяна<br><br>Ломаюсь? Я?<br><br>Флорела<br><br>Невыносимо!<br><br>Фелисьяна<br><br>Дай научиться мне сперва.<br>Когда я выучусь отлично,<br>Я буду танцевать публично<br>А раньше -- нет!<br><br>Тевано<br><br>Она права.<br>Сеньор! Ее не принуждайте!<br>А знаете, день так хорош!<br>Поедем за город?<br><br>Альбериго<br><br>Ну что ж!<br>Так кликни слуг.<br><br>Тевано<br>(зовет)<br><br>Эй, вы! Седлайте<br>Скорее нам двух лошадей.<br><br>Альбериго<br><br>Заглянем, может быть, к coceдям?<br><br>Тевано<br><br>Нет, так, недалеко поедем,<br>Чтоб не замучить лошадей<br>Подышим воздухом полей.<br><br>Альбериго и Тевано уходят.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Альдемаро, Флорела, Белардо, Фелисьяна<br><br>Фелисьяна<br>(в сторону)<br><br>Ну, наконец-то! Вот мученье!<br>Все на урок свалила я,<br>И хитрость удалась моя,<br>Но мне совсем не до ученья.<br><br>(Флореле, тихо.)<br><br>О чем ты говорила с ним?<br><br>Флорела<br><br>От Вандалино под секретом<br>Ко мне он прислан за ответом.<br><br>Фелисьяна<br><br>Ах!.. За ответом? За каким?..<br><br>Флорела<br><br>На то любовное посланье.<br><br>Фелисьяна<br><br>Ему открыла, верно, ты<br>Мою любовь, мои мечты?<br><br>Флорела<br><br>Вот каково твое желанье?<br>Хоть для тебя не жду добра,<br>Сказала: &quot;Дам ответ&quot;, сестра!<br><br>Фелисьяна<br><br>Ответ готов...<br><br>(Передает ей письмо.)<br><br>Отдай, но, слышишь,<br>Скажи, что ты все это пишешь!<br><br>Флорела<br><br>Смотри, опасная игра!<br><br>Фелисьяна<br><br>Сестра! Доставь мне эту радость!<br>Ведь ты свободна... Между тем<br>Мне рисковать пришлось бы всем.<br>Дай мне любви изведать сладость!<br><br>Флорела<br><br>Вот хорошо! А как же я?<br>Он будет думать, что Флорела<br>Принадлежит ему всецело...<br>Ведь здесь на карте честь моя!<br><br>Фелисьяна</div>", "cover": false}, {"html": "<div class=\"textPage\">Не беспокойся ты напрасно:<br>Клянусь тебе, ему потом<br>Признаюсь честно я во всем!<br><br>Флорела<br>(передает письмо Альдемаро; тихо)<br><br>Вот вам письмо... Теперь вам ясно--<br>Не мною писано оно.<br><br>(Громко.)<br><br>Его скорее передайте,<br>Да по пути не потеряйте,--<br>Оно сохранным быть должно.<br><br>Альдемаро<br>(Флореле, тихо)<br><br>Все понял -- более ни слова.<br><br>(Громко.)<br><br>Письма, обещанного мной,<br>Он ждет, как доктора больной<br>Как пилигрим -- родного крова.<br>Что на словах ему сказать?<br><br>Фелисьяна<br>(сестре, тихо)<br><br>Чтоб отвечал без промедленья!<br><br>Флорела<br><br>Чтоб отвечал мне.<br><br>Альдемаро<br><br>Без сомненья,<br>Нельзя иного ожидать.<br>Так я иду, простите...<br><br>Флорела<br><br>С богом!<br><br>Альдемаро<br><br>Белардо! Ты готов? Идем!<br><br>Белардо<br><br>Куда поспешно так?<br><br>Альдемаро<br><br>С письмом.<br>Тебе я расскажу о многом.<br><br>Белардо<br><br>Мы потолкуем по пути.<br><br>Белардо и Альдемаро уходят.<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Флорела, Фелисьяна.<br><br>Флорела<br><br>Опять обманы, Фелисьяна?<br><br>Фелисьяна<br><br>Ну что ж? Бояться ль мне обмана?<br>Из-за любви моей пойти<br>На многое, на все готова!<br><br>Флорела<br><br>Но что ж ему ты пишешь там?<br><br>Фелисьяна<br><br>Что? Правду с ложью пополам.<br>Что я могу сказать другого?<br><br>Флорела<br><br>Как хочешь! Пусть! Люби... и лги...<br>Тебя судить не стану строго...<br>Будь счастлива... Но, ради бога,<br>Ты честь мою убереги.<br><br>Фелисьяна<br><br>О, понимаю я прекрасно,<br>Что не по вкусу мой герой<br>Моей сестрице дорогой!<br>Любовь виной тут--это ясно.<br><br>Флорела<br><br>Любовь? Что это за намек?<br><br>Фелисьяна<br><br>Любовь!<br><br>Флорела<br><br>К кому?<br><br>Фелисьяна<br><br>Ну, брось, не скроешь,<br>Кому так нежно глазки строишь:<br>Учитель наш тебя увлек!<br><br>Флорела<br><br>Увлек? Меня? Бедняк безродный,<br>Когда отвергнут мной и тот,<br>К кому тебя любовь влечет, --<br>Твой Вандалино благородный,<br>Твое земное божество!<br><br>Фелисьяна<br><br>Сознайся--верно угадала?<br><br>Флорела<br><br>Какие глупости! Нимало!<br>Нелепость этого всего<br>Тебе поступок мой докажет:<br>Скорей все кончить поспешу<br>Пойду к отцу и попрошу:<br>Пусть он учителю откажет!<br><br>Фелисьяна<br><br>К чему? Учителя прогнав,<br>Любви не выгонишь, сестрица!<br><br>Флорела<br><br>С тобой никак не сговориться!<br><br>Фелисьяна<br><br>Кто сердится--всегда неправ!<br>Но не сердись: и так все сложно...<br>Пойдем-ка лучше в сад со мной<br>Пройдемся.<br><br>Флорела<br><br>На тебя, друг мой,<br>Сердиться, право, невозможно!<br>Уходят.<br><br>У Вандалино<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Вандалино, Тельо<br><br>Тельо<br><br>Да успокойтесь хоть немного!<br><br>Вандалино<br><br>О нет! Пока письма я жду,<br>Себе я места не найду!<br><br>Тельо<br><br>Надежда хуже, чем тревога.<br><br>Вандалино<br><br>Как медлит он... или она?<br><br>Тельо<br><br>Ждет случая...<br><br>Вандалино<br><br>А вдруг Флорела<br>Мне написать не захотела?<br>Утрата чести ей страшна...<br><br>Тельо<br><br>Пусть вас сомненье не смущает.<br><br>Вандалино<br><br>Ах, чем бы время мне убить?<br>Как ожиданье убивает!<br><br>Тельо<br><br>Что ж, пофехтуем, может быть?<br><br>Вандалино<br><br>Развеселил! К чему рапира<br>И блеск зловещий лезвия,<br>Когда мечтами в небе я?<br>Скорей бы подошла мне лира.<br><br>Тельо<br><br>Так вам поэзия нужна?<br><br>Вандалино<br><br>Любя, становишься поэтом.<br>Ведь смысл поэзии весь в этом:<br>Она высоких чувств полна.<br><br>Тельо<br><br>Дать книгу вам? Здесь много разных.<br><br>Вандалино<br><br>А о любви идет в них речь?<br><br>Тельо<br><br>Да.<br><br>Вандалино<br><br>Что ж, давай, но не отвлечь<br>Меня от мыслей неотвязных!<br><br>Тельо</div>", "cover": false}, {"html": "<div class=\"textPage\">Возьмите, предложу вам том --<br>Творения Льва Иудея.<br><br>Вандалино<br><br>Тоску такую? Вот идея!<br>Мне не понять ни слова в нем.<br><br>Тельо<br><br>А Марий? Вот литература!<br><br>Вандалино<br><br>Чуть-чуть получше. Ах, как прав<br>Поэт Овидий был, сказав,<br>Что &quot;темпора лентескунт курэ&quot;...<br>/Время исцеляет любовную тоску<br>(лат.)<br> --<br>стих из &quot;Искусства любви&quot; Овидия./<br><br>Тельо<br><br>Хоть я не очень с ней знаком.<br>Но будто это по-латыни?<br><br>Вандалино<br><br>Но что же от моей богини<br>Альберто не идет с письмом?<br>Что задержать его могло б?<br>Я точно как больной в припадке:<br>Меня от страшной лихорадки<br>То в жар кидает, то в озноб.<br><br>Тельо<br><br>А вот и врач! Вам легче станет!<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же, Альдемаро и Белардо.<br><br>Вандалино<br><br>О, наконец явился тот,<br>Кто жизнь и счастье мне несет!<br><br>Альдемаро<br><br>Я не мешаю? Ты не занят?<br><br>Вандалино<br><br>Мешаешь? Ты? Что за вопрос!<br>Я ждал тебя--вот все занятья.<br>Но, милый, жажду слышать я,<br>С чем ты пришел? Что ты принес?<br>Она с тобою говорила?<br><br>Альдемаро<br><br>Доволен можешь быть вполне:<br>Из-за тебя достались мне<br>Лучи небесного светила.<br>И как она тебя хвалила!<br><br>Вандалино<br><br>Она божественно добра!<br>Но где ж письмо?<br><br>Альдемаро<br><br>Не написала.<br><br>Вандалино<br><br>Как так?<br><br>Альдемаро<br><br>Сестра ей помешала.<br><br>Вандалино<br>Сестра? Ах, да! Там есть сестра!<br>Вот, верно, злобное творенье!<br>Исчадье ада, демон зла!<br>Она мне пережить дала<br>Такое страшное волненье...<br><br>Альдемаро<br><br>Там из-за свадьбы все в смятенье.<br><br>Вандалино<br><br>Сестра! Ей фурии родня--<br>Совсем не этот ангел рая,<br>Пред кем должны мы, замирая,<br>Стоять, колени преклоня.<br><br>(К Тельо.)<br><br>Эй, плащ и шпагу мне достань!<br>Сумею справиться с сестрицей!<br><br>Альдемаро<br><br>Ну полно, полно кипятиться!<br>Ты заплатил безумству дань.<br>Тебя я мигом успокою:<br>Пусть чары этого письма<br>Рассеют все!<br><br>(Передает ему письмо.)<br><br>Она сама<br>Писала собственной рукою.<br><br>Вандалино<br><br>Ах! Из твоих священных рук<br>Беру с восторгом весть благую!<br><br>Альдемаро<br><br>&quot;Священных рук&quot;? Я протестую --<br>Уж ты кощунствуешь, мой друг.<br><br>Вандалино<br><br>Среди частей различных тела<br>Нет ничего дороже глаз:<br>Лишь им могу доверить смело,<br>Как будто короля указ,<br>Что пишет ангел мой Флорела.<br>Дай кресло, Тельо, поскорей!<br><br>(К Альдемаро.)<br><br>Присядь, пока письмо прочту я.<br><br>Альдемаро<br><br>Благодарю.<br><br>Вандалино<br><br>Теперь, ликуя,<br>Моя душа, блаженство пей!<br><br>(Читает.)<br><br>Белардо<br>(к Альдемаро, тихо)<br><br>Сеньор! Осмелюсь, с позволенья,<br>Задать один вопрос пустой<br><br>Альдемаро<br><br>Осмелься: смелости такой<br>Пусть будет глупость извиненье.<br><br>Белардо<br><br>Никак понять я не могу:<br>Отдавши сердце вам всецело.<br>Как может посылать Флорела<br>Записки вашему врагу?<br><br>Альдемаро<br><br>Да ты не знаешь ведь обмана<br>И всей задуманной игры:<br>Записка--от ее сестры!<br><br>Белардо<br><br>Да? Но при чем же Фелисьяна?<br><br>Альдемаро<br><br>Она безумно влюблена<br>В него!<br><br>Белардо<br><br>А! Вот какое дело!<br>А он мечтает, что Флорела<br>Из-за него лишилась сна?<br><br>Альдемаро<br><br>Под этой маскою решила<br>Сестра добиться счастья с ним:<br>Безумно ею он любим.<br><br>Белардо<br><br>Пошла на хитрость! Мило, мило!<br>А он-то думает, простак,<br>Что ночью говорил с Флорелой!<br><br>Альдемаро<br><br>Мне на руку обман их смелый,<br>И многого добьюсь я так.<br><br>Вандалино</div>", "cover": false}, {"html": "<div class=\"textPage\">Такого счастья я не стою!<br>Довольно, что она моя.<br>Она велит, чтоб нынче я<br>Пришел к ней в сад порой ночною!<br><br>Альдемаро<br><br>Сбылось все так, как ты хотел.<br><br>Вандалино<br><br>Но возросло мое смущенье...<br>Я вне себя от восхищенья,<br>Но -- недостаточно я смел!<br><br>Альдемаро<br><br>Была прекрасней Мелибея,<br>Любил Калисто горячей.<br>Однако сад во тьме ночей<br>Помог сойтись им не робея.<br><br>Вандалино<br><br>Красноречив ее ответ.<br>Не лжет записка, без сомненья:<br>На страстные мои моленья<br>Красавица не скажет &quot;нет&quot;!<br><br>Альдемаро<br><br>Что ж пишет?<br><br>Вандалино<br><br>Мне дает согласье,<br>Но просит дать расписку в тoм,<br>Что я женюсь на ней потом.<br>Мечтаю я об этом счастье!<br>Сейчас расписку напишу --<br>Я ждать не в силах! А покуда,<br>Альберте, друг, вот сотня скудо, --<br>Возьми их от меня, прошу!<br>Добьюсь ее -- получишь втрое!<br><br>Альдемаро<br><br>Любезный друг! Сто лет живи!<br><br>Вандалино<br><br>О чудный сад моей любви,<br>Где ждет блаженство неземное!<br>О сад моих заветных грез!<br><br>Альдемаро<br><br>Сад? Виноградник, без сомненья!<br>Спеши туда без промедленья,<br>Сбирай плоды душистых лоз!<br><br>Вандалино<br><br>Я нетерпением томим...<br>Сойди скорее, ночь благая,<br>Веди меня в обитель рая,<br>Где ждет меня мой серафим!<br><br>Уходят.<br><br>Улица<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Рикаредо, Андроньо.<br><br>Рикаредо<br><br>Но как его отец взглянул на это?<br><br>Андроньо<br><br>Узнав, что я коней привел обратно,<br>А сын его остался здесь, в Туделе,<br>Он понял все и очень взволновался.<br>Надеется, сеньор, что вам удастся<br>Уговорить уехать Альдемаро,<br>Иначе завтра сам приедет он.<br><br>Рикаредо<br><br>Не удивляюсь... Молодой безумец<br>Ему забот немало доставляет!<br>Ведь он--отец, и как зеницу ока<br>Боготворит единственного сына,<br>А тот ему приносит только горе.<br>Ученье бросил, странствовал по свету,<br>В Италии служил в войсках, потом<br>Во Фландрию проследовал в сраженье<br>За герцогом, чей сын здесь коннетаблем.<br>И что ж? Едва успел с войны вернуться,<br>Недолго он порадовал отца:<br>Четыре дня -- и ускакал в Туделу!<br>И остается здесь без объяснений!<br>Но чтоб ты знал, где корень всех несчастий,<br>Скажу тебе: влюбился он безумно<br>В дочь Альбериго. Чтоб встречаться с ней,<br>Взялся он за гитару, и теперь<br>В их доме учит танцам он сестер<br>Под именем подложным, как наемник.<br>В Лерин хотел я ехать, но в тревоге<br>Я с полдороги повернул назад:<br>Ведь он мне брат! Могу ль его оставить?<br>Но как поправить эту нам беду?<br><br>Андроньо<br><br>Слов не найду! Вступить на путь позора<br>Из-за такого вздора, как любовь?<br><br>Рикаредо<br><br>Ему не прекословь! Он очарован,<br>Он заколдован дивной красотой<br>Сеньоры той!<br><br>Андроньо<br><br>И стал он самозванцем!<br>И учит танцам! Свой старинный род<br>Он предает на стыд и посмеянье!<br><br>Рикаредо<br><br>Оставь старанья: здесь помочь нельзя.<br><br>Андроньо<br><br>Но, пригрози ему отцовским гневом,<br>Легко вполне вам укротить его.<br><br>Рикаредо<br><br>Не выйдет ничего, пропало дело.<br>Им овладела пламенная страсть,<br>И ей во власть он отдался бездумно.<br><br>Андроньо<br><br>Но так безумно поступать с собой!<br>Играть с судьбой! Сеньор! Ваш ум поможет.<br>Быть может, убедить удастся вам...<br><br>Рикаредо<br><br>Нет, слишком он упрям: здесь труд напрасный.<br><br>Андроньо</div>", "cover": false}, {"html": "<div class=\"textPage\">Отец несчастный! Горем потрясен,<br>Удара он снести не будет в силах.<br>У старцев в жилах кровь хоть холодна,<br>Но если вдруг она вскипит чрезмерно,<br>Тогда наверно можем ждать конца!<br>За смерть его отца тогда ответим.<br>Покончить с этим как-то надо нам.<br><br>Рикаредо<br><br>Но как его найти?.. Да вот он сам!<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же, Альдемаро и Белардо.<br><br>Альдемаро<br><br>В порядке ли струна, Белардо? Тронь-ка!<br><br>Белардо<br><br>Сеньор! Тихонько: здесь чужие есть.<br><br>Рикаредо<br><br>Имею честь! Вы, верно, из оркестра,<br>Сеньор маэстро?<br><br>Альдемаро<br>(притворяясь помешанным)<br><br>С этим стариком<br>Как будто я знаком.<br><br>(К Андроньо.)<br><br>Вы из Лерина?<br><br>Андроньо<br><br>Забыли вы долг сына, мой сеньор!<br>Какой позор! Для рыцаря Наварры!<br>Под звон гитары танцам обучать!<br>Как тут смолчать? Где ж гордость кабальеро?<br>Ведь ваша сфера -- подвиги войны!<br>И вы должны ценить свое призванье<br>И дарованья...<br><br>Альдемаро<br><br>Очень буду рад:<br>Пойдет на лад, коль есть у вас охота.<br>Я вас в два счета обучу всему.<br><br>Андроньо<br><br>Я не пойму.<br><br>Альдемаро<br><br>Больших не надо сроков:<br>В пять-шесть уроков с вами все пройдем,<br>Ручаюсь в том: прыжки, и реверансы,<br>И контрадансы...<br><br>Андроньо<br><br>Ждет вас господин!<br>Его седин святыню пощадите,<br>В себя придите, вспомните ваш род--<br>Он вас зовет! Со стен родного крова<br>Глядит сурово славных предков ряд.<br>Они вам говорят о славной цели,<br>О ратном деле. Иль милей для вас<br>Пускаться в пляс?<br><br>Альдемаро<br><br>Никто уже не спорит,<br>Что не позорят пляска и любовь.<br>Не прекословь! Романы и поэмы<br>На эти темы говорят всегда,<br>Что нет стыда--там, где любви победа.<br><br>Андроньо<br><br>Дон Рикаредо! Да вступитесь вы!<br><br>Рикаредо<br><br>Боюсь, увы, он не в своем рассудке.<br><br>(К Альдемаро.)<br><br>Мой друг, брось шутки!<br><br>Белардо<br>(к Андроньо)<br><br>Мы, сеньор, вдвоем<br>Уроки с ним даем.<br><br>Рикаредо<br><br>Оставь упорство.<br>Твое притворство слишком ясно мне!<br><br>Альдемаро<br><br>Легко вполне понять основу дела<br>Начнете смело правою ногой,<br>Потом--другой: скользить быстрее...<br>Носок повыше... там прыжок идет<br>И поворот--с поклоном грациозным.<br><br>Рикаредо<br><br>Но будь серьезным! Я, как старший брат...<br><br>Белардо<br><br>Вас не хотят они понять. Да бросьте<br>Не то мы кости будем доедать!<br><br>Альдемаро<br><br>Могу вам дать мой адрес для урока:<br>Здесь недалеко Альбериго дом.<br><br>Рикаредо<br><br>Клянусь мечом, я вне себя от гнева!<br><br>Альдемаро<br><br>Вот тут -- налево.<br><br>Белардо<br><br>Ох, пора б поесть!<br><br>Альдемаро<br><br>Прощайте!<br><br>Рикаредо<br><br>Но...<br><br>Альдемаро<br><br>Сеньор! Имею честь!<br><br>Альдемаро и Белардо уходят.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Рикаредо, Андроньо.<br><br>Рикаредо<br><br>Я вне себя!<br><br>Андроньо<br><br>Смеется он над нами.<br><br>Рикаредо<br><br>Не может быть! Тут дело много хуже:<br>Всего страшней--он потерял рассудок.<br>Как быть?<br><br>Андроньо<br><br>Не заблуждайтесь, мой сеньор!<br><br>Рикаредо<br><br>О нет! Ведь это надо помешаться,<br>Чтоб старшему так дерзко отвечать!<br><br>Андроньо<br><br>Притворство, чтоб отделаться от нас.<br><br>Рикаредо<br><br>Все выясню, и богом я клянусь,<br>Что увезу его--живым иль мертвым!<br>Сегодня ж ночью мы в Лерин уедем!<br><br>Андроньо<br><br>Проклятая любовь всему виной.<br>Кто ей поддастся, тот утратит разом<br>Свою свободу, мужество и разум.<br><br>Комната в доме Альбериго<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Флорела, Лисена.<br><br>Флорела</div>", "cover": false}, {"html": "<div class=\"textPage\">Так удалось им сговориться?<br><br>Лисена<br><br>Она ему велела ждать<br>И ночью в сад тайком явиться.<br><br>Флорела<br><br>Но неужли сестра решится<br>Его любовницею стать?<br><br>Лисена<br><br>Да, кажется, ей так угодно!<br><br>Флорела<br><br>О боже мой! Так низко пасть<br>Такой сеньоре благородной!<br><br>Лисена<br><br>Обман в ней разжигает страсть:<br>Ей сладко счастие украсть.<br><br>Флорела<br><br>Но он ведь будет в заблужденье,<br>Что знал со мной он наслажденье!<br>Погибнет честь моя навек!<br><br>Лисена<br><br>Да, в вашем полном снисхожденье<br>Уверен этот человек.<br><br>Флорела<br><br>О, это будет верх позора!<br>Молва пойдет повсюду скоро,<br>Что с Вандалино я близка!<br>Ответ имеет уж сеньора?<br><br>Лисена<br><br>Альберто нет еще пока.<br><br>Флорела<br><br>Меня бесчестье запятнает...<br>Как выйду замуж я тогда?<br><br>Лисена<br><br>Ну да, а ей что за беда?<br>Вас губит, а себя спасает.<br><br>Флорела<br><br>Меня сестрица плохо знает!<br>Но я не допущу стыда...<br>Когда у них свиданье?<br><br>Лисена<br><br>Ближе<br>К полуночи.<br><br>Флорела<br>А, так!.. Иди же,<br>На страже будь, ступай туда.<br>Вознаградить тебя сумею.<br><br>Лисена<br><br>Нет, мне награда не нужна:<br>Я вас люблю и вам верна.<br><br>Флорела<br><br>Мне честь моя всего важнее:<br>Меня заботит лишь она.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Флорела одна.<br><br>Флорела<br><br>Нет! Никогда не умирает тот,<br>Чья жизнь прошла светло и беспорочно,<br>Чья память незабвенная живет,<br>В сердцах людей укоренившись прочно.<br><br>Ведь раб не тот, кто стонет под кнутом,<br>Не тот отшельник, кто по воле неба<br>Живет в уединении глухом,<br>И нищ не тот, кто просит корку хлеба.<br><br>Но тот и раб, и нищ, и одинок,<br>Кто в жизни выбрал спутником порок<br>И продал честь за сладкий яд отравы.<br><br>Свободу ж, царство, счастие нашел<br>Тот, кто избрал при жизни ореол<br>Высокой чести и бессмертной славы.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Флорела, Альдемаро.<br><br>Альдемаро<br><br>Я вас тревожу, дорогая.<br>Не смел бы беспокоить вас.<br>Когда б не личный ваш приказ:<br>Пришел, его я исполняя.<br>Вот вам ответ. С ним вместе и<br>Свою любовь и поклоненье.<br><br>Флорела<br><br>Мой бог! Какое оскорбленье!<br>Как отомстить? Вот, вот, вот, вот!
