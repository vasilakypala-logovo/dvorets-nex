<br><br>(Рвет письмо в клочки.)<br><br>Альдемаро<br><br>Что значит...<br><br>Флорела<br><br>Я в негодованье.<br>Подумайте! Узнала я,<br>Что в эту ночь сестра моя<br>Ему назначила свиданье.<br><br>Альдемаро<br><br>Да, это так.<br><br>Флорела<br><br>Он думать смеет,<br>Что это я к нему пойду<br>И на свидании в саду<br>Сегодня мной он овладеет!<br><br>Альдемаро<br><br>Он неминуемо узнает,<br>Кто был в объятиях его.<br><br>Флорела<br><br>Но честь моя не допускает<br>И подозренья одного.<br>И если ты не понимаешь,<br>Как горько я оскорблена,<br>Твоя любовь ничтожней сна<br>И чести ты совсем не знаешь.<br><br>Альдемаро<br><br>Я--Альдемаро из Лерина:<br>Алькальд почтенный -- мой отец,<br>Высокой чести образец,<br>Хоть замок наш -- одна руина.<br>Наш род был знатен и богат,<br>Теперь, увы, он только знатен!<br>Но чести долг всегда мне свят--<br>На нашем имени нет пятен.<br>Я -- Альдемаро из Лерина:<br>За вашу честь я постою<br>Не менее, чем за свою,<br>Даю вам слово дворянина!<br><br>Флорела<br><br>Тебе я верю, и вдвоем<br>Мы средство мщения найдем.<br><br>Альдемаро<br><br>Вот мысль!<br><br>Флорела<br><br>Что, что?<br><br>Альдемаро<br><br>Постой немного.<br>Я знаю, как!<br><br>Флорела<br><br>Но ради бога,<br>Скажи скорей!<br><br>Альдемаро</div>", "cover": false}, {"html": "<div class=\"textPage\">Я вижу путь:<br>Он пишет ей в своем письме,<br>Что ночью он возьмет преграду<br>И, перебравшись за ограду,<br>Он будет ждать ее во тьме.<br>Но помешаем мы их плану:<br>Мы ей письмо передадим,<br>Но--заменив его другим,<br>И пусть он ждет там Фелисьяну!<br>А мы напишем ей, что он<br>В сад выйти ночью не решится,<br>Что погубить ее страшится,<br>Придет же только под балкон.<br>Ты поняла? И Фелисьяна<br>Пусть ждет его хоть до утра.<br><br>Флорела<br><br>Так и дождешься ты, сестра,<br>Героя своего романа!<br>Спасти ее мой долг прямой,<br>Чтоб нашу честь не запятнала:<br>Ее во что бы то ни стало<br>Спасу я от нее самой!<br>Ступай, пиши! Да, без сомненья<br>Для нас иного нет пути:<br>Ведь если надо честь спасти,<br>И ложь бывает во спасенье.<br><br>Альдемаро уходит.<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Флорела, Тевано, Альбериго.<br><br>Тевано<br><br>Так завтра, если вам угодно,<br>Поедем вместе дичь стрелять.<br><br>Альбериго<br><br>Сейчас в природе благодать.<br>В лесу и в поле превосходно.<br><br>Флорела<br><br>Ну что ж там нового?<br><br>Тевано<br><br>Весна!<br>Полна цветов и упоенья...<br>Хоть с той весной, что здесь, сравненья<br>Не может выдержать она!<br><br>Флорела<br><br>Вот это комплимент на славу!<br>Как вы галантны, милый зять!<br>Пойду скорей сестру позвать--<br>Любезности ее по праву.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Тевано, Альбериго.<br><br>Тевано<br>(в сторону)<br><br>Письма какого-то клочки?<br>Гм... Да. Кто любит, тот ревнует:<br>Мысль о жене меня волнует...<br>Но, может быть, все пустяки?<br>Письмо совсем не к ней, быть может?<br>Воображение тревожит<br>Мне душу призраком пустым?<br>Но и любовь--воображенье,<br>И сердца каждого движенье--<br>Все только--тучка, ветер, дым...<br>А все-таки хочу собрать я<br>Клочки письма, чтоб их прочесть.<br>Как только сделать, чтоб мой тесть<br>Не видел моего занятья?<br>Ему не стоит сообщать<br>Моих ревнивых опасений,<br>Чтоб в нем не вызвать подозрений,<br>Пока всего не буду знать.<br><br>(Громко.)<br><br>Сеньор! Вот странность я заметил,<br>Когда въезжали в город мы:<br>Среди вечерней полутьмы<br>Был небосвод так дивно светел.<br><br>Альбериго<br><br>Свет, говоришь, заметил?<br><br>Тевано<br><br>Да.<br>На небе в зареве багряном,<br>Как бы окружена туманом,<br>Вставала странная звезда.<br>Мне показалось, что комета.<br><br>Альбериго<br><br>А почему решил ты так?<br><br>Тевано<br><br>Так странно прорезали мрак<br>Лучи особенного света.<br><br>Альбериго<br><br>Существование комет<br>Всегда смущало человека,<br>И Плиний-младший и Сенека<br>Им занимались много лет.<br><br>Пока Альбериго, подойдя к окну, рассуждает,<br>Тевано подбирает с полу клочки письма.<br><br>Комету отличим легко мы<br>Среди других небесных звезд:<br>В ней голову, ядро и хвост<br>Установили астрономы.<br>Они бывают трех сортов...<br><br>Тевано<br><br>Каких?<br><br>Альбериго<br><br>Зовут их: волосатой,<br>Иль бородатой, иль хвостатой,<br>Смотря по виду их хвостов.<br><br>Тевано<br>(в сторону)<br><br>Старик отлично занялся!<br><br>Альбериго<br><br>Их различить весьма несложно:<br>У первой--сразу видеть можно--<br>Лучи как будто волоса,<br>Вторая сходна с бородою...<br><br>Тевано<br><br>А третья с чем?<br><br>Альбериго<br><br>С хвостом. Когда<br>Взойдет на западе звезда,<br>Плодам грозит она бедою.<br>Да, и родиться в этот год<br>Девчонки будут непременно.<br><br>Тевано<br><br>Когда ж на юге?<br><br>Альбериго</div>", "cover": false}, {"html": "<div class=\"textPage\">Всей вселенной<br>Жестоких бедствий ряд несет.<br>Из надвоздушных сфер звезда<br>Грозит бедой великим мира.<br>Когда ж блестит среди эфира,<br>Как меч, войну несет всегда.<br><br>Тевано<br><br>А эта?<br><br>Альбериго<br><br>А она где встала?<br><br>Тевано<br><br>Там, на востоке, полевей.<br><br>Альбериго<br><br>Постой--я прослежу за ней,<br>Но принесу очки сначала.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Тевано один.<br><br>Тевано<br><br>Ну вот, ушел. Теперь проверю,<br>Что мне удастся здесь прочесть:<br>Дрожать ли за свою мне честь,<br>Оплакивать ее потерю?<br><br>(Читает клочки.)<br><br>&quot;Любовь моя...&quot; Ох!.. &quot;Я приду...&quot;<br>Ужель к моей жене записка?<br>Нет, это подозренье низко.<br>Другой клочок: &quot;...в полночь, в саду...&quot;<br>Еще клочок: &quot;...я твой всецело...&quot;<br>Клочок побольше: &quot;...так любить,<br>Как я,-- нельзя...&quot; Но, может быть,<br>Всему виновница--Флорела?<br>Я убедиться должен сам,<br>К кому любовное посланье:<br>Подстерегу в саду свиданье --<br>Поверю лишь своим глазам!<br>Бумага порвана в клочки<br>Иль честь разорвана на клочья<br>Но все узнаю в эту ночь я.<br>О роковые лоскутки!<br>Что вы храните так коварно--<br>Спасенье или гибель мне?<br>И уничтожу ль вас в огне<br>Иль сохраню вас благодарно?<br>Любая буква, точка, штрих<br>Мне шепчут о моем позоре...<br>Терпенье! Я узнаю вскоре,<br>Что для меня таилось в них!<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Флорела, Альдемаро<br><br>Флорела<br><br>Не изменила бы ни слова.<br>Но уж не слишком ли сурово<br>Мы издеваемся над ним?<br><br>Альдемаро<br><br>Что значит? Ты его жалеешь?<br><br>Флорела<br><br>О нет! Мне честь всего важней,<br>И надо думать лишь о ней!<br><br>Альдемаро<br><br>Любовь моя!<br><br>Флорела<br><br>Ты мной владеешь,<br>О мой учитель дорогой!<br><br>Альдемаро<br><br>О дорогая ученица!<br>Действительно, могу гордиться<br>Я ученицею такой.<br>Все позы, жесты, повороты --<br>Ты все усвоила вполне.<br><br>Флорела<br><br>Все объяснил так хорошо ты,<br>Все сразу стало ясно мне.<br><br>Альдемаро<br><br>Моя Флорела! Я под властью<br>Желаний, и желанья те<br>К твоей стремятся красоте,<br>Но не считай их низкой страстью!<br>Пылаю чистой я мечтою<br>До самой смерти быть твоим.<br>Мечты! Надежда имя им,<br>И я твоей награды стою,<br>Флорела.<br><br>Флорела<br><br>Говори еще!<br><br>Альдемаро<br><br>Я так волнуюсь... Ради бога,<br>Прости высокопарность слога,<br>Но я люблю так горячо!<br>Скажи: тебя не оскорблю я,<br>С таких высот спустясь во прах<br>И высказав в простых словах,<br>Что страстно жажду поцелуя?<br><br>Флорела<br><br>Ты это должен знать и сам.<br><br>Альдемаро<br><br>О, если это оскорбленье,<br>Мои все просьбы, все моленья<br>Я принесу к твоим ногам!<br><br>Флорела<br><br>Так скоро просишь поцелуя!<br><br>Альдемаро<br><br>Мой бог! Я заслужил укор,<br>Я омрачил твой милый взор...<br>О, накажи меня, молю я!<br>Но я, как Фаэтон, хотел<br>На яркой колеснице Феба<br>Подняться прямо к солнцу в небо --<br>И пал от лучезарных стрел.<br>Так, вижу я в невольном страхе,<br>Что слишком высоко взлетел:<br>Упасть на землю мой удел<br>И пред тобой лежать во прахе.<br>Но ты ведь снова можешь ввысь<br>Меня поднять: я умоляю --<br>Простишь ли ты меня?<br><br>Флорела<br><br>Прощаю..<br>Встать--чтобы выше вознестись.<br><br>Альдемаро<br><br>Открой же мне свои объятья,<br>Своей судьбе не прекословь!<br><br>Флорела<br><br>Тебе не в силах отказать я.<br><br>Обнимаются.<br><br>Альдемаро<br><br>Моя любовь!<br><br>Флорела<br><br>Моя любовь!<br><br>ЯВЛЕНИЕ BOCЬMOЕ<br><br>Те же и Фелисьяна.<br><br>Фелисьяна<br>(в сторону)</div>", "cover": false}, {"html": "<div class=\"textPage\">Глазам не верю -- вот так славно<br>Она в объятьях у него?<br><br>Флорела<br>(к Альдемаро, тихо)<br><br>Нас увидали!<br><br>Альдемаро<br>(Флореле, тихо)<br><br>Ничего!<br><br>(Громко.)<br><br>Со мною в такт скользите плавно.<br>Теперь извольте ручку снять...<br>Одни вы поверните вправо...<br><br>Флорела<br><br>Я поняла вас?<br><br>Альдемаро<br><br>Браво, браво!<br>Теперь прошу ко мне опять.<br><br>Фелисьян<br><br>Что это?<br><br>Флорела<br><br>А, вот Фелисьяна!<br><br>Альдемаро<br><br>Сеньора выше всех похвал.<br><br>Фелисьяна<br><br>Меня совсем очаровал<br>Ваш танец. Что это?<br><br>Альдемаро<br><br>Сердана.<br><br>Фелисьяна<br><br>Прелестный танец!<br><br>Альдемаро<br><br>В нем весьма<br>Разнообразные фигуры.<br>Еще не все прошли мы туры.<br><br>Фелисьяна<br>(сестре, тихо)<br><br>Флорела! Как насчет письма?<br><br>Флорела<br><br>Оно в моих руках.<br><br>Фелисьяна<br><br>О боже!<br>Ты уж прочла?<br><br>Флорела<br><br>К несчастью, да.<br><br>Фелисьяна<br><br>Что это значит?<br><br>Флорела<br><br>От стыда<br>Чуть не сгорела я.<br><br>Фелисьяна<br><br>Но что же...<br>Флорела! Прочитать мне дай!<br><br>Флорела<br><br>Его письмо мне непонятно:<br>С ума сошел он, вероятно.<br><br>Фелисьяна<br><br>Давай скорей!<br><br>Флорела<br><br>Ну что ж, читай!<br><br>Фелисьяна<br>(читает)<br><br>&quot;Сеньора! Я Вам бесконечно признателен за ту милость, которую Вы соблаговолили мне оказать, но принять ее я не могу: Вы в один день даруете мне то, что и через тысячу лет показалось бы мне несбыточным чудом. Я хочу видеть в Вас мою будущую жену, но не любовницу, а потому не ждите меня в саду: чтобы насладиться беседой с Вами, я подойду к Вашему окну, как прошлой ночью. Храни Вас господь&quot;.<br><br>Флорела<br><br>Писать тебе так равнодушно!<br><br>Фелисьяна<br><br>За то, что я любовь мою<br>Ему всецело отдаю,<br>Безумью своему послушна!<br><br>(Направляется к выходу.)<br><br>Флорела<br><br>Сестра!<br><br>Фелисьяна<br><br>Спешу взглянуть в окно,--<br>В то, что на улицу выходит.<br>Изменник и злодей давно,<br>Быть может, где-нибудь там бродит.<br><br>ЯВЛЕНИЕ ДЕВЯТОЕ<br><br>Флорела, Альдемаро.<br><br>Флорела<br><br>О! Разъярилась, как тигрица!<br><br>Альдемаро<br><br>Да, да!<br><br>Флорела<br><br>Хочу я одного:<br>Чтобы как следует его<br>Отделала моя сестрица.<br><br>Альдемаро<br><br>Хоть на свиданье он придет--<br>Не сбудется ее желанье.<br>Он будет ждать в саду свиданья--<br>Она же у окошка ждет.<br><br>Флорела<br><br>Ах, упустила я из виду!<br>Ведь он же так прождет всю ночь,<br>Его отправить надо прочь.<br>Как я из положенья выйду?<br><br>Альдемаро<br><br>Вот что: ты в сад к нему пойди,<br>Сама скажи ему два слова,<br>Будь с ним спокойна, но сурова<br>И хорошенько пристыди.<br>Тем временем мы подоспеем<br>С Белардо и другим лакеем,<br>И я ему тогда задам --<br>Пускай не бродит по садам!<br><br>Флорела<br><br>Но если нападать он станет?<br>Мой милый! Вдруг тебя он ранит?<br><br>Альдемаро<br><br>Да нет, нас будет трое там,<br>Но шпагу я возьму и сам.<br><br>Флорела<br><br>Итак, пойду я в возмущенье<br>Читать ему нравоученье.<br><br>Альдемаро<br><br>За шпагою отправлюсь я.<br><br>Флорела<br><br>Ты мой?<br><br>Альдемаро<br><br>Я твой. Моя?<br><br>Флорела<br><br>Твоя!<br><br>Уходят.<br><br>Сад<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Тевано один.<br><br>Тевано<br><br>Старик с балкона наблюдает небо<br>Через стекло своих очков прозрачных,<br>Я ж в стекла темной ревности моей<br>Пришел смотреть на рог луны: растет ли<br>Иль убывает сила подозренья.<br>Любовь, любовь! Один мудрец недаром<br>Изобразил любовь с таким девизом:<br> &quot;В любви всегда согласие и лад,<br>Но букву зачеркнуть--и выйдет ад!&quot;<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Тевано, Вандалино в темном плаще.</div>", "cover": false}, {"html": "<div class=\"textPage\">Вандалино<br><br>Вот я и здесь. Счастливое мгновенье!<br>Вступаю я в обитель красоты...<br>Примите же мое благословенье,<br>Ночь, сад, фонтаны, звезды и цветы!<br>Весенний воздух вздохами волнуем,<br>Фонтаны сыплют чистый жемчуг струй<br>Наступит миг -- и страстным поцелуем<br>Ответит мне она на поцелуй.<br><br>Тевано<br>(в сторону)<br><br>Так, я был прав! Теперь он в западне.<br><br>Вандалино<br><br>Зеленые, цветущие деревья!<br>Нашли приют в вас сотни певчих птиц!<br>Что соловей поет мне о Флореле?<br><br>Тевано<br>(в сторону)<br><br>&quot;Флорела&quot;--он сказал! Какое счастье!<br>Но обманулся, может быть, мой слух?<br>Я выжду. А! Кусты зашевелились:<br>Как будто это женские шаги?<br><br>(Прячется и выглядывает из засады.)<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Те же и Флорела.<br><br>Флорела<br><br>Тсс!.. Вандалино!.. Вы?<br><br>Вандалино<br><br>Ваш верный раб!<br><br>Флорела<br><br>Как вы решились на такую дерзость?<br><br>Вандалино<br><br>Как дерзость? Вы же сами написали,<br>Чтоб на свиданье я пришел к вам в сад?<br><br>Флорела<br><br>Вас обманули. Я вам не писала.<br>Я не из тех, что подают мужчинам<br>Подобный повод -- их не уважать.<br><br>Вандалино<br><br>Совсем не так со мной вы говорили<br>Вчерашней ночью!<br><br>Флорела<br><br>Ночью? Берегитесь:<br>И тут обман.<br><br>Вандалино<br><br>Обман? Что это значит?<br><br>Флорела<br><br>Какая-нибудь дерзкая дуэнья<br>Задумала над вами подшутить.<br>Я с вами никогда не говорила.<br><br>Тевано<br>(в сторону)<br><br>О, снова ревность в сердце пробудилась!<br><br>Вандалино<br><br>Сеньора! Вы хотите испытать<br>Мою любовь?<br><br>Флорела<br><br>Какое испытанье?<br>Вы плохо знаете меня, сеньор!<br>Как мрамор, холодно мое к вам сердце,<br>И если б я не видела, что вы<br>Обмануты, ослеплены любовью,<br>Я вас бы... растерзала на куски!<br><br>(Скрывается.)<br><br>Тевано<br>(в сторону)<br><br>Флорела -- ангел чистоты!<br><br>Вандалино<br><br>Проклятье вам, записки и романы,<br>Служанки, слуги, окна и балконы,<br>Любовный шепот, неясность, вздохи,<br>Цветы, деревья, звезды и фонтаны!<br><br>О! За любовь я ждал иной награды!<br>За все мои страданья и мученья<br>Что мне судьба послала в возмещенье?<br>Кинжал, веревки, стены и ограды!<br><br>Проклятье часу нашей первой встречи,<br>Проклятье вам, обманчивые речи,<br>Проклятие безумью моему!<br><br>Но горькой правде шлю благословенье.<br>Я знаю все -- теперь без сожаленья<br>Умру! Уйду в небытие, во тьму!<br><br>(Уходит.)<br><br>Флорела<br><br>Ушел и постарается, наверно,<br>Скорей забыть о том, что здесь случилось.<br>Пора идти и мне. Альберто медлит!<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Тевано один.<br><br>Тевано<br><br>Видал ли кто подобные дела?<br>Девицы добродетелью блистают<br>И подают пример замужним дамам...<br>Опять идут? В тени деревьев спрячусь.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Тевано, никем не замеченный, Альдемаро, Белардо,<br>Корнехо в шутовском вооружении.<br><br>Корнехо<br><br>Где воры? Где разбойники? Откуда?<br><br>Альдемаро<br><br>Во время суматохи после свадьбы<br>Решила злоумышленников шайка<br>Проникнуть в дом.<br><br>Белардо<br><br>Смелей на них, Корнехо!<br><br>Корнехо<br><br>Ой, ой, меня так и трясет от страха!<br><br>Белардо<br><br>Да разве нет оружия с тобой?<br><br>Корнехо<br><br>Какое тут оружие, когда<br>У каждого разбойника, наверно,<br>С собой палаш и несколько мушкетов!<br><br>Альдемаро<br>(заметив Тевано)<br><br>А вот один из них!<br><br>Белардо<br><br>Ага!<br><br>Альдемаро<br><br>Белардо!<br>Задай ему как следует!<br><br>Белардо<br><br>Задам!<br>Я славную дубинку захватил.<br>Вот, вот тебе!<br><br>Бьет Тевано.</div>", "cover": false}, {"html": "<div class=\"textPage\">Тевано<br><br>Эй, стойте, дурачье!<br>Остановитесь, черт бы вас побрал!<br><br>Корнехо<br>(в сторону)<br><br>О господи! Помру я без причастья!<br><br>Альдемаро<br>(к Тевано)<br><br>Кто вы такой?<br><br>Тевано<br><br>Тевано, ваш хозяин!<br>Бездельники!<br><br>Альдемаро<br><br>Простите, бога ради!<br>Считали мы, что вор сюда забрался.<br><br>Тевано<br><br>Здесь неплохое место для прогулки,<br>Но заплатил по вашему я счету!<br><br>Белардо<br><br>Корнехо, да не бойся!<br><br>Корнехо<br><br>Кто же это?<br><br>Белардо<br><br>Тевано, новобрачный!<br><br>Корнехо<br>(к Тевано)<br><br>А, сеньор!<br>Как нравится вам сила рук моих?<br>Неплохо расправляюсь я с ворами?<br><br>Тевано<br><br>Молчите, вы встревожите весь дом.<br>Ступайте все скорее по местам.<br><br>(В сторону.)<br><br>Удары палок мне глаза открыли.<br>Я очень рад: других ударов нет!<br><br>(Уходит.)<br><br>Белардо<br><br>Пойдем, Корнехо! Ужинать пора.<br><br>Корнехо<br><br>В другой раз я мушкет возьму с собою.<br><br>Альдемаро<br>(в сторону)<br><br>Пойду мечтать и грезить о Флореле!<br><br>(Уходит.)<br><br>Корнехо<br><br>Как думаешь, осталась ветчина?<br><br>Белардо<br><br>Да, и вино. За чаркою вина,<br>Пожалуй, досидимся мы до солнца?<br><br>Корнехо<br><br>Да, да! И кувшина увидим донце!<br><br> * ДЕЙСТВИЕ ТРЕТЬЕ *<br><br>Комната в доме Альбериго<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Фелисьяна, Вандалино.<br><br>Фелисьяна<br><br>И вас я позвала, желая<br>Все выяснить насчет письма.<br><br>Вандалино<br><br>Я вам признателен весьма,<br>Но тут ошибка роковая.<br>Чтоб я Флореле так писал?<br>Клянусь душой, письмо подложно.<br><br>Фелисьяна<br><br>Не надо клятв: вам верить можно.<br>Но нам письмо Альберто дал!<br><br>Вандалино<br><br>Альберто обманул вас низко,<br>Меня он предал. Между тем<br>С ним у меня была совсем<br>Другая послана записка.<br>В той был ответ совсем другой,<br>Не нарушавший чести правил,<br>А в этой, верьте, не поставил<br>Я ни единой запятой.<br>Я в том письме писал Флореле,<br>Что сердце ей навек отдам,<br>Что жизнь кладу к ее ногам<br>И докажу любовь на деле.<br>За милость я благодарил<br>Ее коленопреклоненно,<br>А ночью, счастьем окрыленный,<br>В сад на свиданье поспешил.<br>Туда стремился я, как к раю,<br>И что ж? Какой нашел прием?<br>Как я в отчаянье своем<br>Остался жив--не понимаю!<br>Подумайте! Позвать самой<br>И вдруг--прогнать так беспощадно?<br>Жизнь сразу стала безотрадна:<br>Как Ифис в древности седой,<br>Я все сомнения и муки<br>Готов был смертью прекратит:<br>Так это все Альберто штуки!<br>Меня он хочет погубить.<br>За что? Зачем?<br><br>Фелисьяна<br><br>Мне это ясно:<br>Он ревновал Флорелу к вам.<br><br>Вандалино<br><br>Как ревновал?<br><br>Фелисьяна<br><br>Ну да, он сам<br>Влюблен в мою сестру.<br><br>Вандалино<br><br>Несчастный!<br>Ему я вверил жизнь мою<br>С минуты первого знакомства,<br>И вдруг--такое вероломство...<br>Но я предателя убью!<br><br>Фелисьяна<br><br>Нет! Репутации сестры<br>Вы этим только повредите.<br>Сеньор! Вы лучше подождите<br>И помолчите до поры.<br>Коль вы его не пощадите,<br>Свет все узнает, и наш дом<br>Навек покроется стыдом.<br><br>Вандалино<br><br>О, раз вы этого хотите...<br><br>Фелисьяна<br><br>За вас сама я отомщу:<br>Отцу как надо все представлю<br>И дом наш от врага избавлю.<br><br>Вандалино<br><br>Я большей мести не ищу.<br><br>Фелисьяна</div>", "cover": false}, {"html": "<div class=\"textPage\">Уж мы управимся с танцором,<br>Он потанцует у меня:<br>Не позже нынешнего дня<br>Он будет выгнан прочь с позором.<br>Да, живо уберется прочь<br>Несчастный этот оборванец--<br>Ему придется кончить танец,<br>А вам берусь во всем помочь.<br>Примусь за дело я сегодня,<br>Поговорю сегодня ж с ней.<br>Для счастия сестры моей<br>Я прямо стать готова сводней!<br><br>Вандалино<br><br>О Фелисьяна! Ваше имя--<br>&quot;Счастливая&quot;, и вам оно<br>Недаром, вижу я, дано:<br>Устами нежными своими<br>Вернули счастие опять<br>Одним лишь словом вы мгновенно<br>Тому, кто мог во всей вселенной<br>Себя несчастнейшим считать.<br>Кто б мог подумать, что злодей<br>Мое письмо другим подменит<br>И больно честь мою заденет<br>Преступной клеветой своей!<br>Теперь у вас в руках, сеньора,<br>Флорелы милость мне вернуть<br>И объяснить, что я отнюдь<br>Не заслужил ее укора.<br><br>Фелисьяна<br><br>А вы за подписью своей<br>Письмо ей напишите снова,<br>Насчет свидания ночного<br>Опять уговоритесь с ней.<br>Мы все поправим. Чтоб у вас<br>Уж не было сомненья в этом,<br>Пойду к сестре я за ответом<br>И к вам сюда вернусь сейчас.<br>Пусть подтвердит своей рукой<br>Что ждет вас ночью на свиданье<br>И вам подпишет обещанье,<br>Что будет вашею женой.<br>А уж написанного слова<br>Не смеем не исполнить мы!<br><br>Вандалино<br><br>О, после непроглядной тьмы<br>Я проблеск солнца вижу снова!<br>Могу ль за доброту такую<br>Я руки вам расцеловать?<br><br>Фелисьяна<br><br>Могу уже вас братом звать<br>Сама вас просто расцелую<br>И без стесненья обниму.<br><br>(В сторону.)<br><br>Как целовать его приятно!<br><br>(Громко.)<br><br>Так я сейчас вернусь обратно.<br><br>Вандалино<br><br>Как? Здесь остаться одному?<br>Но если вдруг сюда нагрянут<br>И, верно, спросят уж о том,<br>Зачем сюда попал я в дом?<br><br>Фелисьяна<br><br>Ну, если спрашивать вас станут,<br>Кто вы, скажите им, что вы...<br><br>Вандалино<br><br>Нет, мне никем нельзя назваться,<br>И думать мне нельзя скрываться --<br>Меня все знают здесь, увы!<br><br>Фелисьяна<br><br>Да просто говорите смело,<br>Что есть у вас к Альберто дело<br>И что пришли вы брать урок<br>У знаменитого танцора.<br><br>Вандалино<br><br>Я повинуюсь вам, сеньора.<br><br>Фелисьяна<br><br>Я возвращусь в короткий срок.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Вандалино один.<br><br>Вандалино<br><br>Как мячиком, судьба играет мной,<br>От радости к отчаянью кидая.<br>Позавчера я был у двери рая,<br>Вчера я встретил холод ледяной,<br>Сегодня вновь надежды луч сияет...<br>Что будет завтра--знает только бог.<br>И близок ли конец моих тревог<br>Иль снова перемена угрожает?<br>То горем, то любовью я томим...<br>Как этот груз с своей души я скинут<br>Но, право, золотую середину<br>Я предпочел бы крайностям таким!<br>Тевано здесь? Он, без сомненья<br>Со мною ищет объясненья.<br><br>Тевано<br>(за сценой)<br><br>Гнедой чуть не понес меня!<br>Его взнуздали слишком туго,<br>И трет бока ему подпруга.<br>Живей, переседлать коня!<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Вандалино, Тевано<br><br>Вандалино<br>(в сторону)<br><br>Любовь заводит нас в тупик.<br>Как глупо... Я стою в смущенье.<br><br>Тевано<br>(в сторону)<br><br>Что значит это посещенье?<br>Как это он сюда проник?<br><br>Вандалино<br><br>За мой визит прошу прощенья.<br><br>Тевано<br><br>Помилуйте! Мой дом--ваш дом.<br><br>Вандалино<br><br>Вы так любезны -- я сконфужен...<br>Альберто мне по делу нужен.<br><br>Тевано<br><br>О, мы сейчас его найдем!<br>За ним пойду я...<br><br>Вандалино<br><br>Ради бога!<br>Сеньор! Любезности так много...</div>", "cover": false}, {"html": "<div class=\"textPage\">Тевано<br><br>Нет, слишком мало, чтобы вам<br>Я выразил мое почтенье.<br><br>Вандалино<br><br>Я, право, чувствую смущенье...<br>Но вот сюда идет он сам!<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Те же и Альдемаро.<br><br>Вандалино<br><br>Альберто, друг!<br><br>Альдемаро<br><br>Сеньор! Привет!<br><br>Вандалино<br><br>Я за тобой пришел: будь другом!<br><br>Альдемаро<br><br>В чем дело? Я к твоим услугам.<br><br>Вандалино<br><br>Необходим мне твой совет:<br>Признаться, друг, я озадачен...<br>Вчера ты мне урок давал;<br>Когда ж в саду я танцевал,<br>Дебют мой вышел неудачен.<br>Не танец -- просто кавардак!<br>Представь, мне заявила прямо<br>Разочарованная дама,<br>Что я танцую все не так!<br>Хочу, чтоб ты беду исправил...<br><br>Альдемаро<br><br>Ты был рассеян, может быть,<br>И мог фигуры позабыть,<br>Но я не отступал от правил.<br>Обижен я--не утаю,--<br>Я заслужить не мог упреков,<br>И не по правилам уроков<br>Я даже в шутку не даю.<br><br>Вандалино<br><br>Тебе не верить я не смею...<br>Так приходи ко мне потом,<br>Урок мы заново пройдем.<br><br>Альдемаро<br><br>Знай: для тебя не пожалею<br>Я ни старания, ни сил.<br><br>Тевано<br><br>Да, он учитель превосходный,<br>И человек он благородный:<br>Он вашу милость заслужил.<br><br>Вандалино<br><br>Я то же думаю.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Те же и Фелисьяна.<br><br>Фелисьяна<br>(в сторону)<br><br>Тевано!<br>Моя несчастная звезда<br>Меня преследует всегда:<br>Мой муж вернулся слишком рано!<br>Как я записку передам?<br><br>Тевано<br><br>Вполне доверья он достоин,<br>Как дворянин и храбрый воин.<br><br>Альдемаро<br><br>Сюда идет сеньора к нам!<br><br>Фелисьяна<br>(мужу)<br><br>Я проводить тебя спускалась,<br>А кстати, вижу--здесь сеньор.<br>Привет! А я уж: с давних пор<br>К сестрицам вашим собиралась:<br>Я им давно должна визит.<br><br>Вандалино<br><br>Прошу, себя не утруждайте,<br>Но, умоляю вас, считайте,<br>Что дом мой вам принадлежит.<br><br>Фелисьяна<br><br>Всем сердцем благодарна я...<br><br>(Незаметно роняет записку на пол<br>и тут же поднимает ее)<br><br>Что это здесь лежит? Не вы ли,<br>Сеньор, записку обронили?<br><br>Вандалино<br><br>Позвольте...<br><br>Фелисьяна<br>(отдавая записку)<br><br>Ваша?<br><br>Вандалино<br>(взглянув)<br><br>Да, моя!<br>Вот как теряем иногда мы<br>В пустой небрежности своей<br>То, что для нас всего важней!<br><br>Фелисьяна<br><br>Конечно, от прекрасной дамы?<br><br>Вандалино<br><br>От будущей жены моей.<br><br>Альдемаро<br>(в сторону)<br><br>Не видеть, как своих ушей,<br>Тебе ее!<br><br>Вандалино<br>(откланиваясь)<br><br>Но мне проститься<br>Пора...<br><br>Тевано<br><br>Так вместе мы пойдем!<br>Я провожу вас.<br><br>Вандалино<br><br>Я верхом...<br>Что, если в парк нам прокатиться?<br>Посмотрим на прелестных дам.<br>Коль вам супруга разрешает.<br><br>Фелисьяна<br><br>Как, без меня? Пусть не мечтает:<br>Я разрешения не дам!<br><br>Тевано<br><br>Поедем!<br><br>Вандалино<br><br>Я его, сеньора,<br>Верну вам в целости домой.<br><br>Фелисьяна<br><br>Надеюсь! У него, друг мой,<br>Не выйдешь ты из-под надзора.<br><br>Вандалино<br>(в сторону)<br><br>В записке жду я приговора.<br><br>Вандалино и Тевано уходят.<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Альдемаро, Фелисьяна.<br><br>Альдемаро<br>(в сторону)<br><br>Любовь! Ты вся -- один каприз:<br>Надежды, ревность, ряд сомнений,<br>Тысячекратных изменений<br>Влекут меня то вверх, то вниз.<br><br>Фелисьяна<br><br>Альберто!<br><br>Альдемаро<br><br>Я! Что приказать<br>Угодно вам?<br><br>Фелисьяна<br><br>Прошу, подите<br>И мне Корнехо позовите.<br><br>Альдемаро<br><br>Сюда?<br><br>Фелисьяна<br><br>Да. Здесь я буду ждать.<br><br>Альдемаро уходит.</div>", "cover": false}, {"html": "<div class=\"textPage\">Да, я все время деду чего-то,<br>Хожу я как во сне, в чаду...<br>Я ночи страстно жду, я жду<br>Ее бесшумного полета.<br>Часы докучные гоня,<br>Пусть день становится короче,<br>Пусть станет сказка этой ночи<br>Желанным счастьем для меня!<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Фелисьяна, Корнехо.<br><br>Корнехо<br><br>Мои услуги вам нужны?<br>Сказал Альберте, что вы звали?<br><br>Фелисьяна<br><br>А где он сам?<br><br>Корнехо<br><br>Остался в зале.<br><br>Фелисьяна<br><br>Чем занят?<br><br>Корнехо<br><br>Сел чинить штаны.<br><br>Фелисьяна<br><br>Корнехо! Ты слуга надежный...<br><br>Корнехо<br><br>Надеюсь, в том сомненья нет?<br><br>Фелисьяна<br><br>Тебе доверю я секрет...<br>Но ты не выдашь?<br><br>Корнехо<br><br>Как возможно!<br>Такой вопрос недопустим.<br>Да, чтобы вам известно было:<br>Мой род старей Мафусаила,<br>И вправе я гордиться им.<br><br>Фелисьяна<br><br>Так чтоб никто и никогда...<br>Ты слышишь?.. не узнал об этом!<br><br>Корнехо<br><br>Клянусь хоть перед целым светом.<br><br>Фелисьяна<br><br>Итак, ты мне поможешь, да?<br><br>Корнехо<br><br>Что, вы не знаете Корнехо?<br><br>Фелисьяна<br><br>Мне надо сбить с Альберте спесь.<br>Уж слишком взял он волю здесь<br>И загордился от успеха.<br><br>Корнехо<br><br>Да! Арагонский шалопай,<br>Ничтожнейший из оборванцев...<br>Подумаешь, учитель танцев,<br>А гордость--хоть не подступай!<br>Учитель тоже! Эстрамботу<br>Вчера хотел мне показать--<br>Так вот, я должен вам сказать,<br>Что он не знает даже счету!<br><br>Фелисьяна<br><br>Тебе ларец хочу я дать,<br>Снесешь его к нему секретно<br><br>Корнехо<br><br>Ларец? Зачем?<br><br>Фелисьяна<br><br>И незаметно<br>К нему поставишь под кровать.<br><br>Корнехо<br><br>А! Понимаю всю интригу...<br><br>Фелисьяна<br><br>Ступай же с богом.<br><br>Корнехо<br><br>И не прочь<br>Я в этом деле вам помочь:<br>Уж мы проучим прощелыгу!<br><br>(Уходит.)<br><br>Фелисьяна<br><br>Обманом за обман плачу!<br>Месть будет только справедливой,<br>Я жду ее нетерпеливо,--<br>О как я отомстить хочу!<br>Для женской мести нет предела:<br>Не успокоюсь до тех пор,<br>Пока изгнанье и позор<br>Не испытает он всецело.<br><br>ЯВЛЕНИЕ ВОСЬМОЕ<br><br>Фелисьяна, Альдемаро, Флорела.<br><br>Альдемаро<br>(не замечая Фелисьяны)<br><br>Флорела! Я с ума схожу,<br>Душа сомнением томима...<br>О, невозможность нестерпима:<br>Я с ужасом вперед гляжу!<br><br>Флорела<br>(не замечая Фелисьяны)<br><br>А для моей любви, поверь,<br>Нет невозможного на свете.<br>Мы победим. Брось мысли эти!<br><br>Альдемаро<br>(заметив Фелисьяну, меняет тон)<br><br>Позвольте руку мне теперь...<br><br>Флорела<br><br>Что?<br><br>(Поняв.)<br><br>Да!<br><br>Альдемаро<br>Но если кавалеру<br>Вы руку не хотите дать,<br>То я для танцев показать<br>Могу еще одну манеру:<br>Держать платок за уголки...<br><br>Фелисьяна<br><br>Флорела!<br><br>Альдемаро<br><br>Раз, два, три, четыре...<br><br>Фелисьяна<br>(в сторону)<br><br>Хитрей обманщиков нет в мире.<br><br>Альдемаро<br><br>Не отнимайте же руки!<br><br>Флорела<br><br>А как же быть при повороте?<br><br>Альдемаро<br><br>На время можно разойтись.<br><br>Фелисьяна<br><br>На миг от танцев оторвись,<br>А то вы день и ночь в работе!<br>Все танцевать да танцевать,<br>Как будто больше нет и дела!<br>И как тебе не надоело?<br><br>Флорела<br><br>Не стану от тебя скрывать:<br>Я к танцам прямо страсть питаю,<br>А где такое чувство есть,<br>Ничто не может надоесть.<br>Мне кажется, что я летаю...<br>Да, я нашла свой идеал.<br>Альберте ведь такой учитель<br>Что, кажется, пустынножитель,<br>И тот бы с ним затанцевал!<br><br>Альдемаро<br><br>Готовим мы для маскарада<br>Прекрасный танец в вашу честь.<br><br>Флорела<br><br>Хотим сюрприз тебе поднесть!<br><br>Фелисьяна</div>", "cover": false}, {"html": "<div class=\"textPage\">Сюрприз? Я буду очень рада!<br><br>(К Альдемаро.)<br><br>Я приготовить вам хочу<br>Сама сюрприз.<br><br>Альдемаро<br><br>Мне? Что ж такое?<br><br>Флорела<br><br>Кто ж будет танцевать?<br><br>Фелисьяна<br><br>А двое:<br>Мужчина с дамой...<br><br>(Смеясь.)<br><br>Я шучу!<br>Что ж вы готовите такое?<br>Скажите!<br><br>Альдемаро<br><br>Если вы не прочь<br>Своим участьем нам помочь.<br>Должны мы танцевать все трое.<br><br>Фелисьяна<br><br>Так танцевать должна и я?<br><br>Альдемаро<br><br>Коль вам угодно.<br><br>Фелисьяна<br><br>Я согласна.<br>Могу попробовать.<br><br>Альдемаро<br><br>Прекрасно!<br><br>Фелисьяна<br><br>А в чем же будет роль моя?<br><br>Альдемаро<br><br>Сейчас я инструмент возьму<br>И попрошу, чтоб рядом в зале<br>С сестрицею вы подождали,<br>Чтобы по зову моему<br>Входить сюда поочередно.<br><br>Флорела<br><br>Так, значит, надо нам уйти?<br><br>Альдемаро<br><br>Да, чтоб как следует пройти<br>Все в этой зале.<br><br>Флорела<br><br>Превосходно.<br>Идем, сестра!<br><br>Фелисьяна<br><br>Ну что ж, уйдем.<br><br>Альдемаро<br><br>Как следует для маскарада<br>Я подготовлю все, что надо,<br>Вас позову--тогда начнем.<br><br>Флорела и Фелисьяна уходят<br><br>ЯВЛЕНИЕ ДЕВЯТОЕ<br><br>Альдемаро один.<br><br>Альдемаро<br><br>О небо! В крайностях теряюсь:<br>Одну безумно я люблю,<br>Другую просто не терплю...<br>Что дальше делать? Затрудняюсь.<br>Боюсь, что счастью не бывать.<br>В моем обмане столько риску!<br>Что ж мне играть? Начну мориску.<br>Кого мне первую позвать?<br><br>(Громко.)<br><br>Флорела! С вас хочу начать я!<br><br>ЯВЛЕНИЕ ДЕСЯТО<br><br>Альдемаро, Флорела<br><br>Флорела<br><br>Я здесь! Что делать я должна?<br><br>Альдемаро<br><br>Твоя обязанность одна:<br>Скорей приди в мои объятья!<br>Приятней позы, ангел мой,<br>Для наших танцев не бывает.<br><br>Флорела<br><br>А ведь она подозревает,<br>Как мы здесь учимся с тобой!<br><br>Альдемаро<br><br>Очей моих влюбленных радость,<br>Не насмотрюсь я на тебя!<br>Покой души моей сгубя,<br>Ты горькую даришь мне сладость.<br>Как страсть свою я утолю?<br>Или ей быть неутолимой?<br><br>Флорела<br><br>Поверь мне, что тебя, любимый,<br>Я больше, чем себя, люблю,<br>И сказано не много это...<br><br>Альдемаро<br>(возвысив голос)<br><br>Меняйте ритм... С мотивом в лад...<br>Помедленнее, шаг назад...<br>Теперь вперед два пируэта...<br>Вы стали чудно танцевать!<br>Как быстро вы во всем успели!<br><br>Флорела<br><br>Раз я стремлюсь к желанной цели,<br>Так как же мне не успевать?<br><br>Альдемаро<br><br>Держите корпус вы свободно...<br>Тут пауза... прыжок... и взлет...<br>Как хорошо у вас идет!<br>Полупоклон... О, превосходно!<br><br>Флорела<br><br>Надеюсь я, что твой урок<br>Я понимаю с полуслова.<br>Тебя я слушаться готова:<br>Советы все идут мне впрок.<br>Она-то думает наивно,<br>Что мы танцуем здесь с тобой!<br><br>Альдемаро<br><br>О дар, мне посланный судьбой,<br>Восторг души, мой ангел дивный!<br><br>Фелисьяна<br>(за сценой)<br><br>Что ж, долго быть мне под замком?<br><br>Альдемаро<br><br>Сейчас!<br><br>ЯВЛЕНИЕ ОДИННАДЦАТОЕ<br><br>Те же и Фелисьяна.<br><br>Фелисьяна<br><br>Хорошенькое дело!<br>Я на свободу захотела,--<br>Неужли вас просить о том?<br>Мне долго ждать еще пришлось бы!<br>И почему--мне невдомек--<br>У вас без музыки урок?<br><br>Альдемаро<br><br>Я вас хотел позвать без просьбы.<br>А музыка тут ни при чем:<br>Она бы только помешала<br>Пройти теорию сначала.<br>Теперь мы ваш урок начнем!<br><br>ЯВЛЕНИЕ ДВЕНАДЦАТОЕ<br><br>Те же и Корнехо.<br><br>Корнехо<br><br>Сеньор вернулся.<br><br>Фелисьяна<br><br>А! Который?<br><br>Корнехо<br><br>Супруг ваш.<br><br>Фелисьяна<br><br>Я покину вас...<br><br>(К Корнехо.)<br><br>А что он делает сейчас?<br><br>Корнехо</div>", "cover": false}, {"html": "<div class=\"textPage\">Садятся ужинать сеньоры<br>И просят вас скорей за стол<br>Еще пришел слуга сеньоры<br>Невестки вашей, Леоноры.<br><br>Фелисьяна<br><br>Ко мне? Зачем же он пришел?<br><br>Корнехо<br><br>Она дворецкого прислала:<br>Ей просит жемчуг одолжить<br>И бриллиантовую нить--<br>Надеть для завтрашнего бала.<br><br>Фелисьяна<br><br>Ступай Лисену поищи,<br>Скажи, что я ей приказала,<br>Чтоб все футляры ей послала.<br><br>Корнехо<br><br>Иду, сеньора!<br><br>Фелисьяна<br>(давая ему ключи)<br><br>Вот ключи.<br>Ларец в шкафу, что у камина.<br><br>Корнехо уходит.<br><br>ЯВЛЕНИЕ ТРИНАДЦАТОЕ<br><br>Альдемаро, Флорела, Фелисьяна.<br><br>Флорела<br><br>А муж твой поспешил назад:<br>Воображаю, как он рад<br>Отделаться от Вандалино!<br><br>Фелисьяна<br><br>Любезно!<br><br>Флорела<br><br>По себе сужу.<br><br>Фелисьяна<br><br>Ты в нем не видишь превосходства,<br>И красоты, и благородства<br>Его ума?<br><br>Флорела<br><br>Не нахожу<br>Его красивым.<br><br>Фелисьяна<br><br>Ты пристрастна!<br><br>Флорела<br><br>Ну что ж, у всякого свой вкус.<br><br>Фелисьяна<br><br>Твой вкус ужасно плох, клянусь!<br><br>Лисена<br>(за сценой)<br><br>Чего же мне искать напрасно!<br>Шкаф взломан. Сам ищи!<br><br>Корнехо<br>(за сценой)<br><br>Дела!<br>Разиня ты!<br><br>ЯВЛЕНИЕ ЧЕТЫРНАДЦАТОЕ<br><br>Те же и Лисена.<br><br>Фелисьяна<br><br>Что там за ссора?<br><br>Лисена<br><br>Вы не ломали шкаф, сеньора?<br><br>Фелисьяна<br><br>Я? Шкаф? Да ты с ума сошла!<br><br>Лисена<br><br>Взломали шкаф. Открыта дверца.<br>Наверно, взяли вы ларец--<br>Его там нет!<br><br>Фелисьяна<br><br>Ах, мой творец!<br>Ограблена! Ох, сердце, сердце!<br>В себя никак я не приду!<br><br>Альдемаро<br><br>Но успокойтесь же, сеньора!<br>Клянусь вам, что найдем мы вора.<br>Наверно, он сейчас в саду.<br><br>Фелисьяна<br><br>Найдем?<br><br>Альдемаро<br><br>Во что бы то ни стало.<br>Весь мир переверну вверх дном!<br><br>Фелисьяна<br><br>Альберто, друг! Найдем?<br><br>Альдемаро<br><br>Найдем!<br><br>(Убегает.)<br><br>Фелисьяна<br>(в сторону)<br><br>Вот как я хорошо сыграла!<br><br>Сад<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Вандалино и Тельо в темных плащах.<br><br>Вандалино<br><br>Дай мне на всякий случай щит--<br>Могу с засадой я столкнуться.<br><br>Тельо<br><br>Когда прикажете вернуться?<br><br>Вандалино<br><br>Когда Флорела повелит.<br>Когда она уйдет отсюда,<br>Уйду и я, и чем поздней<br>Я в эту ночь расстанусь с ней,<br>Тем лучше!<br><br>Тельо<br><br>Не было бы худа!<br>А вдруг придут?<br><br>Вандалино<br><br>Ну, подожди<br>Там, за садовою оградой,<br>На улице, а будет надо,<br>Тогда на помощь приходи.<br><br>Тельо<br><br>Да я уж лучше подежурю<br>Да пошагаю журавлем:<br>Ведь в случае чего, вдвоем<br>Осилить легче будет бурю.<br><br>Вандалино<br><br>Ты верный друг!<br><br>Тельо<br><br>Я ваш слуга!<br><br>Вандалино<br><br>Пока прощай! Что хочешь делай!<br><br>Тельо<br>(в сторону)<br><br>Пусть наслаждается с Флорелой,<br>А мне другая дорога!<br>Он до зари пробудет тут.<br>Пойду скорей в свою кровать я --<br>Меня зовут ее объятья<br>И сладкий отдых мне дадут.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Вандалино один.<br><br>Вандалино<br><br>Когда спустилась тишина кругом<br>И солнце в море лик свой погрузило,<br>Когда иное выплыло светило<br>И золото сменило серебром,<br><br>И стала ночь сиянием одета,<br>Я не могу сдержать горячих слез --<br>И вот, цветы мне задают вопрос:<br>Откуда же роса здесь до рассвета?<br><br>Но сладко в одиночестве моем<br>Все высказать, о чем молчу я днем.<br>Чем занята душа моя всецело.<br><br>Я плачу, над самим собой скорбя:<br>Несчастен я, что нет со мной тебя,<br>Мучительница милая, Флорела!<br><br>ЯВЛЕНИЕ ТРЕТЬЕ</div>", "cover": false}, {"html": "<div class=\"textPage\">Вандалино, Альдемаро, Альбериго, Тевано,<br>Белардо. Корнехо, вооруженные;<br>Флорела, Фелисьяна.<br><br>Альдемаро<br><br>Ведь если драгоценности пропали,<br>Проникла шайка, значит, через сад.<br><br>Тевано<br><br>Неужто забрались через ограду?<br><br>Альбериго<br><br>Вор, очевидно, знал, куда пойти,<br>Где вещи спрятаны. Отсюда ясно,<br>Что кто-нибудь украл их из домашних.<br><br>Корнехо<br><br>Быть может, за полицией пойти?<br><br>Вандалино<br>(в сторону)<br><br>Пропало все: бежать мне невозможно.<br>Через ограду прыгнуть? Нет, поймают.<br>Попробую укрыться я в деревьях.<br><br>Белардо<br><br>Сеньор! Здесь кто-то есть.<br><br>Альдемаро<br><br>Нашли мы вора!<br><br>Альбериго<br><br>Держи его! Смерть вору!<br><br>Вандалино<br><br>Стойте, стойте!<br>Иль первый, кто приблизится ко мне.<br>Проколот будет шпагой! Я не вор!<br><br>Альбериго<br><br>Так кто же ты?<br><br>Вандалино<br><br>Прохожий.<br><br>Альбериго<br><br>Здесь в саду? Скажи, кто ты, или...<br>Мушкет мне дайте!<br><br>Вандалино<br><br>Мне нечего скрывать: я Вандалино.<br><br>Тевано<br><br>Вы -- здесь? Что это значит?<br><br>Альбериго<br><br>Как не стыдно<br>Тайком врываться в благородный дом?<br><br>Вандалино<br><br>Сеньор! Моя любовь всему виною.<br><br>Тевано<br><br>Любовь? К кому?<br><br>Вандалино<br><br>Тевано! Успокойтесь!<br>Пришел к моей невесте я, к Флореле.<br><br>Альбериго<br><br>Флорела, дочь! Так вот как бережешь<br>Ты честь мою! Ты не щадишь меня,<br>Забыв о добром имени своем!<br><br>Флорела<br>(Фелисьяне, тихо)<br><br>Так что же отвечать мне, Фелисьяна?<br><br>Фелисьяна<br>(Флореле, тихо)<br><br>Что можешь ты ответить в ту минуту,<br>Когда на карте жизнь моя и честь?<br>Скажи, что так! Спаси меня, спаси!<br><br>Флорела<br>(в сторону)<br><br>Обман безбожный!<br><br>Вандалино<br><br>Вот ее записка,<br>Подписана собственноручно ею.<br><br>Альбериго<br><br>Давайте мне! Скорей!<br><br>(Читает.)<br><br>Глазам не верю!<br><br>Альдемаро<br>(в сторону)<br><br>О небо! Что же делать? Я погиб.<br>Ужели на обман пойдет Флорела,<br>Чтобы спасти безумную сестру?<br>Да, нет сомненья! И тогда, несчастный,<br>Я по своей вине лишусь Флорелы.<br>Да, я всему виной! Но если так,<br>Клинок остер, решительна рука.<br>Убью себя из-за любви несчастной:<br>Достоин воина такой конец.<br><br>Альбериго<br><br>Все так, она зовет его супругом.<br>Сеньор! Хотя и требовали б мести<br>Мой знатный род и благородный дом,<br>Но позабыть готов я оскорбленье<br>Ввиду того, что вы ее достойны<br>Происхождением и состояньем.<br>Так дайте руку ей: Флорела--ваша!<br><br>Флорела<br><br>Отец мой! Подождите!<br><br>Альбериго<br><br>Подождать?<br>Чего же ждать, змея, позор семьи?<br>Дай руку ты ему.<br><br>Флорела<br><br>Довольно слова...<br>Сперва должна поговорить я с вами.<br><br>Альбериго<br><br>Что б ни было, из дома моего<br>Не сделает ни шагу Вандалино,<br>Пока не обвенчается с Флорелой.<br><br>Вандалино<br><br>Готов быть вашим пленником до свадьбы --<br>Ведь все равно я у нее в плену!<br><br>Тевано<br><br>Он благородный человек, ручаюсь!<br><br>Альдемаро<br>(в сторону)<br><br>Как неудачна выдумка моя!<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Те же и Лисена с драгоценностями.<br><br>Лисена<br><br>Сеньора! Радость! Торжество!<br><br>Фелисьяна<br><br>Что, что?<br><br>Лисена<br><br>Нашлась, нашлась покража.<br>Все отыскалось -- и пропажа<br>И вор!<br><br>Альбериго<br><br>Где ж вы нашли его?<br><br>Лисена<br><br>У вас же в доме, ваша милость.<br>Все вещи целы.<br><br>Альбериго<br><br>Дай взгляну.<br><br>Лисена<br><br>Теперь с нас всех сниму вину<br>И расскажу, как все случилось.<br><br>Альбериго</div>", "cover": false}, {"html": "<div class=\"textPage\">Да, расскажи нам обо всем.<br>Одно пришло мне подозренье,<br>И, думаю, я без сомненья<br>Прав в подозрении своем.<br><br>Лисена<br><br>Альберто -- вор!<br><br>Альдемаро<br><br>Что? Негодяйка!<br>Меня? Меня -- подозревать?<br><br>Лисена<br><br>А как же под твою кровать<br>Попали вещи? Отвечай-ка!<br><br>Альбериго<br><br>Так вот каков у нас танцор?<br>Вот ты какую пляшешь хоту?<br>Постой, я отобью охоту<br>К чужому золоту!<br><br>Альдемаро<br><br>Сеньор!<br>Я дворянин, я вне сомненья!<br>Прошу меня не оскорблять:<br>Сумею быстро доказать<br>Я всю нелепость обвиненья.<br><br>Лисена<br><br>Но вещи у тебя нашлись!<br>Тебе глядеть на нас не стыдно?<br><br>Тевано<br><br>Как отрицать, что очевидно?<br><br>Белардо<br>(в сторону)<br><br>Ого, Белардо, торопись:<br>Скорей бежать за Рикаредо,<br>На выручку его позвать!<br><br>(Убегает.)<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Вандалино, Альдемаро, Альбериго,<br>Тевано, Корнехо, Флорела, Фелисьяна,<br>Лисена.<br><br>Корнехо<br><br>А малый-то успел удрать! Хозяин не удрал бы следом!<br><br>Альбериго<br><br>Что ж ты не задержал, дурак?<br><br>Тевано<br><br>Сбежал? Вот признак безусловный,<br>Что в воровстве они виновны!<br><br>Флорела<br><br>Отец! Тут что-нибудь не так:<br>Альберто быть не может вором!<br><br>Альбериго<br><br>Так, заступаться ты должна!<br>Ясна предателя вина:<br>Повешен будет он с позором.<br><br>Альдемаро<br>(в сторону)<br><br>И вот к чему я все привел!<br><br>Альбериго<br>(к Корнехо)<br><br>А что ж того вы не связали?<br><br>Корнехо<br><br>Да вы ведь нам не приказали.<br><br>Альбериго<br><br>Сам не додумался, осел?<br><br>Корнехо<br><br>Да тут окончилось бы таской:<br>Он до зубов вооружен.<br><br>Альбериго<br><br>Так вот чему учил здесь он,<br>Какою занимался пляской!<br><br>Корнехо<br><br>Показывал он ловкость ног,<br>Но у него искусней руки.<br><br>Альбериго<br><br>Поплатится за эти штуки!<br><br>Флорела<br>(в сторону)<br><br>Но что же он молчит, мой бог?<br><br>Альбериго<br><br>Теперь запляшет по-иному!<br><br>(Выхватывает у Альдемаро шпагу.)<br><br>Отдать мне шпагу! Не нужна<br>В тюрьме преступнику она.<br><br>Альдемаро<br>(в сторону)<br><br>Флорелу отдадут другому!<br><br>Флорела<br>(в сторону)<br><br>Он отдал шпагу? Почему?<br>Он подозренью роковому<br>Не отвечал?<br><br>Корнехо<br>(к Альдемаро)<br><br>Танцуй в тюрьму!<br><br>Альдемаро<br>(в сторону)<br><br>Флорелу отдадут другому!<br><br>Корнехо уводит Альдемаро;<br>следом за ними уходят Фелисьяна и Лисена.<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Вандалино, Альбериго, Тевано, Флорела.<br><br>Альбериго<br><br>А сам еще искал воров --<br>Как разыграл!<br><br>Тевано<br><br>Невероятно!<br>Красивый, благородный, статный,<br>В войсках служил он... Нет, каков?<br>Ну, тут еще попался в руки<br>Нам злоумышленник другой.<br><br>(Указывает на Вандалино.)<br><br>Он ждет. Сеньор! Его с собой<br>Позвольте взять мне на поруки?<br><br>Альбериго<br><br>Пойдем и кончим разговор,--<br>Другие пляски подоспели!<br><br>Вандалино<br><br>Весь в вашей воле я, сеньор!<br><br>Тевано<br><br>Идем.<br><br>Флорела<br>(в сторону)<br><br>Альберто!.. Неужели?..<br><br>Уходят.<br><br>Улица<br><br>Появляются Рикаредо, Андроньо и Белардо<br><br>Рикаредо<br><br>Так вещи в комнате его нашли?<br><br>Белардо<br><br>Да, и теперь, как вор, он арестован.<br>Но от любви он обезумел так,<br>Что ничего не сознает как будто.<br><br>Рикаредо<br><br>Но кто же при подобном подозренье<br>Да, кто же не схватился бы за шпагу!<br><br>Белардо<br><br>Прекрасно! Шпаги заодно всегда<br>И с нашим мужеством и с нашей честью.<br>Кому же честь не дорога--напрасно<br>Пристегивать себе он стал бы шпагу.<br><br>Рикаредо<br><br>Но кто ж ему подбросил эти вещи?<br><br>Белардо</div>", "cover": false}, {"html": "<div class=\"textPage\">Да кто-нибудь из слуг украл, а после<br>Перепугался, верно, и решил<br>На чужестранца бедного свалить.<br><br>Рикаредо<br><br>Вот час настал: и мой несчастный брат<br>Поруган, опозорен и захвачен,<br>И в городской тюрьме его сгноят.<br>И час настал--прийти ему на помощь!<br>И жизнь и честь его стоят на карте.<br>За жизнь его не стал бы я сражаться,<br>Раз он ее не ценит сам, но честь--<br>Честь рода нашего -- и мне священна!<br>Андронио! Идем спасать его,<br>Освободим хотя б ценою жизни!<br><br>Андроньо<br><br>Нам надо бы дать знать его отцу,<br>Спросить совета...<br><br>Рикаредо<br><br>Тут не до советов,<br>Нам каждая минута дорога.<br><br>Белардо<br><br>Идем! Я первый жизнь отдам охотно,<br>Чтоб выручить сеньора моего.<br><br>Рикаредо<br><br>К каким же низостям любовь приводит!<br><br>Андроньо<br><br>Вот этот дом.<br><br>Рикаредо<br><br>Войдем туда мы тайно.<br><br>Входят в дом Альбериго.<br><br>Комната в доме Альбериго<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Альбериго, Флорела.<br><br>Альбериго<br><br>Я изумлен!<br><br>Флорела<br><br>Нет, я тебе не лгу!<br><br>Альбериго<br><br>Так все обман? Понять я не могу!<br><br>Флорела<br><br>Один обман, и очень сложный:<br>Интриги спутанная нить...<br>Я Вандалино и не думала любить!<br><br>Альбериго<br><br>И подпись не твоя?<br><br>Флорела<br><br>Письмо подложно.<br><br>Альбериго<br><br>Я сам был этою любовью удивлен.<br>Но Вандалино... Как же он?<br><br>Флорела<br><br>Он был введен сестрою в заблужденье<br>И остается в убежденье,<br>Что мною он любим.<br><br>Альбериго<br><br>Позор! Но ты добра.<br>Подумай: все-таки она твоя сестра,<br>Она мне дочь, с тобой мы вместе<br>Должны помочь ей не утратить чести.<br>Ее спасет один твой брак.<br>Да, в нем спасение! Иначе полный мрак!<br><br>Флорела<br><br>Отец! Простите, умоляю,<br>Что вам давать совет себе я позволяю...<br><br>Альбериго<br><br>Я выслушать тебя готов:<br>В любви ведь женщины умнее стариков.<br><br>Флорела<br><br>Скажите вы ему под строгой тайной,<br>Что счастливы его желаньем чрезвычайно<br>Назвать меня своей женой,<br>Но--что тут есть один вопрос...<br><br>Альбериго<br><br>Какой?<br><br>Флорела<br><br>Вот слушайте, как нам поправить дело!<br><br>Альбериго<br><br>Я слушаю тебя, Флорела.<br><br>Тихо говорят друг с другом.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Те же и Вандалино.<br><br>Вандалино<br>(не видя их)<br><br>Мы близки к гавани, корабль моей любви!<br>Еще немного проплыви --<br>И отдохнуть с тобой мы сможем:<br>И бросим якорь мы и паруса мы сложим...<br>Боролись с ветром мы и с бурною волной,<br>С могучею стихией споря,<br>Но без границ ведь нету моря!<br>В страданьях мужество всегда владело мной:<br>Я солнца выдержал палящий зной,<br>Бестрепетно борясь с стихией водной,<br>И наконец желанный миг пришел--<br>И солнцу счастия свободно<br>Смотрю в глаза я, как орел!<br><br>Альбериго<br>(Флореле, тихо)<br><br>Я понял все. Ступай! Я все устрою.<br><br>Флорела<br><br>Как вы нашли мой план?<br><br>Альбериго<br><br>Я восхищен тобою!<br><br>Флорела уходит.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Альбериго, Вандалино.<br><br>Вандалино<br><br>Флорела!.. Но она уходит прочь?..<br><br>Альбериго<br>(в сторону)<br><br>О хитрость, дочь<br>Опасности!<br><br>(Громко.)<br><br>Привет мой, Вандалино!<br><br>Вандалино<br><br>Сеньор мой! Я у ваших ног.<br><br>Альбериго</div>", "cover": false}, {"html": "<div class=\"textPage\">Мой друг! Я б мог найти иной предлог,<br>Но так велит мне честь и совесть дворянина.<br>Я буду искренен и прям:<br>Без околичностей я все открою вам.<br>Мы все не любим горьких истин,<br>И правды лик нам часто ненавистен,<br>Но все скажу вам, не тая,<br>Чтобы впоследствии не заслужить упрека.<br>Сознаться горько мне: Флорела, дочь моя,<br>Сестре завидуя жестоко,<br>По легкомыслию решила убежать<br>И тайно обвенчаться --<br>Увы, не с вами, должен я сознаться,--<br>Я б это ей простил: вы мне желанный зять.<br><br>Вандалино<br><br>Но с кем?<br><br>Альбериго<br><br>С учителем! С танцором!<br><br>Вандалино<br><br>Что слышу я?<br><br>Альбериго<br><br>Она -- скажу вам со стыдом --<br>Под ложным именем ввела его в наш дом<br>Чуть не покрыв меня позором,<br>Хотя и говорит она,<br>Что кавалер он благородный,<br>Но передумала, раскаянья полна.<br>И вот теперь рука ее свободна.<br><br>Вандалино<br><br>Сеньор! Простите! Непонятно мне,<br>Как ставите меня вы с вором наравне?<br><br>Альбериго<br><br>Нет, он не вор: мы ошибались с вами.<br><br>Вандалино<br><br>Так драгоценности к нему попали сами?<br><br>Альбериго<br><br>Их дочь взяла и отдала ему,<br>Как будущему мужу своему:<br>В своем ребячестве Флорела<br>Бежать с ним из дому хотела!<br>Так вот, когда угодно вам,<br>Сегодня ж вечером Флорелу вaм отдам.<br><br>Вандалино<br><br>Нет! Эта честь мне больше не нужна!<br>О нет, сеньор! Супруга дворянина<br>Быть непорочною должна<br>И чистою, как горная вершина.<br>Тa женщина, чья красота<br>Другого восхищала без вуали<br>И чьи влюбленные уста<br>Другому поцелуй, как вексель, выдавали,--<br>О нет! Такой не мог бы верить я, сеньор:<br>И каждое письмо и каждый разговор<br>Во мне рождали б подозренье.<br>Моя жена должна быть вне сомненья.<br>Равна душой и красотой своей<br>Должна быть мать моих детей!<br>Иначе что б мои сказали предки?<br>Нет, не нужны чужие мне объедки.<br>Я ей служил, как божеству,<br>Я ей принес весь пыл любви и страсти...<br>Все кончено: я рву ее письмо на части,<br>И память я о ней вот так же разорву!<br>Хотя бы продолжал любовью пламенеть я,<br>Хотя б встречаться с ней пришлось мне, может быть,<br>Но оскорбления подобного избыть<br>Не мог бы я и за тысячелетья!<br><br>(Рвет письмо и уходит.)<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Альбериго один.<br><br>Альбериго<br><br>Однако удалась отлично хитрость эта!<br>Я рад, что я ее послушался совета.<br>Но, дочь моя! Куда отца ты завела?<br>Нельзя не побранить за эти все дела.<br>Я пожурю ее... раскается Флорела...<br>А там -- придет любовь: конец венчает дело!<br><br>Вбегают Рикаредо, Андроньо и Белардо в масках;<br>Тевано, с обнаженной шпагой, преследует их;<br>Фелисьяна его удерживает.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Альбериго, Рикаредо, Андроньо,<br>Белардо, Тевано, Фелисьяна.<br><br>Тевано<br><br>Смерть вам! Не выдам никогда!<br><br>Фелисьяна<br><br>Сеньор! Сдержитесь, ради бога!<br><br>Рикаредо<br><br>Давайте нам его сюда!<br><br>Тевано<br><br>С троими справлюсь без труда!<br><br>Альбериго<br><br>Что там такое за тревога?<br><br>Тевано<br><br>Тут выкрасть вора собрались<br>И в дом наш дерзко ворвались<br>Его друзья, такие ж воры.<br><br>Рикаредо<br><br>Нет, мы не воры--мы танцоры!<br>Дым этот, право, без огня,--<br>Ведь обвиненье голословно!<br><br>Альбериго<br><br>Не вор он, это безусловно.<br><br>Тевано<br><br>Не вор? А кто ж?<br><br>Альбериго<br><br>Твоя родня!<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Те же и Корнехо<br><br>Корнехо</div>", "cover": false}, {"html": "<div class=\"textPage\">Сеньор! На помощь! Сеньорита<br>Оковы с жулика сняла!<br><br>Тевано<br><br>Бежать? Помочь? Нужна защита?<br><br>Рикаредо<br><br>Сеньоре надлежит хвала!<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Те же, Флорела и Альдемаро.<br><br>Альдемаро<br><br>О, все погибло! Здесь засада...<br>Где шпагу взять?..<br><br>Альбериго<br><br>Ее не надо.<br>Да, да! Довольно маскарада.<br>Я знаю ваше благородство<br>И вашей крови чистоту,--<br>Дороже всяких денег чту<br>Я ваших качеств превосходство.<br>Все знаю: и зачем вы тут<br>И как вы прогреметь успели<br>Своей затеей здесь, в Туделе:<br>Кругом рассказы уж идут!<br>Соперник ваш бесповоротно<br>Забыть решил любовь свою,<br>Узнав, что дочь вам отдаю<br>Я добровольно и охотно.<br><br>Альдемаро<br><br>Отныне я ваш раб, сеньор:<br>Я доброты такой не стою!<br>Флорела дивной красотою<br>Пленила сердце мне и взор.<br>Я беден: все, чем я владею,--<br>Моя любовь и честь моя.<br>С их помощью решился я<br>Завоевать блаженство с нею.<br>Простите ль вы меня, сеньор?<br><br>Альбериго<br><br>Все прощено--вы не в опале!<br><br>Тевано<br><br>О, вы жемчужину украли!<br><br>Альдемаро<br><br>Я истинно счастливый вор!<br>Но не мешало нам узнать бы,<br>Что надо этим здесь троим?<br><br>Рикаредо<br>(снимает маску)<br><br>Мы--три танцора и хотим<br>Потанцевать в день вашей свадьбы.<br><br>Альдемаро<br><br>Как! Рикаредо?<br><br>Рикаредо<br><br>Милый брат!<br>Пришел на выручку тебе я,<br>Меча и жизни не жалея.<br><br>Альдемаро<br><br>Тебя, наверное, простят.<br><br>Белардо<br>(снимая маску)<br><br>Белардо -- я.<br><br>Андроньо<br>(снимая маску)<br><br>Андроньо -- я!<br><br>Альдемаро<br><br>О верные мои друзья!<br><br>Белардо<br><br>Сеньор! Плясали вы исправно<br>И счастье выплясали славно,<br>Но где ж награда-то моя?<br><br>Альбериго<br><br>Тебе Лисену я отдам<br>С приданым в тысячу червонцев:<br>Подобных верных арагонцев,<br>По правде, не хватает нам!<br><br>Белардо<br><br>Колени преклонить мне надо!<br>Такая щедрая награда --<br>За то, что я служил не вам?<br><br>Фелисьяна<br>(в сторону)<br><br>Ты порвалась, как паутина.<br>Моя любовь: навек прости!<br>Должна я честь свою спасти...<br>Так прочь из сердца, Вандалино!<br><br>Альбериго<br><br>Ну, все устроилось отлично!<br>Пишите же скорей отцу,<br>Чтоб горести пришли к концу<br><br>Андроньо<br><br>Письмо свезу я самолично.<br><br>Альбериго<br><br>Итак, желаемый финал:<br>Здесь вам искусство, пляски, маски,<br>Любовь и светлый миг развязки<br>Учитель танцев показал!<br><br>Last-modified: Thu, 29-Jan-98 18:24:46 GMT</div>", "cover": false}, {"html": "<div class=\"chapter\"><h1>СОБАКА НА СЕНЕ</h1><p>Лопе де Вега</p></div>", "cover": false}, {"html": "<div class=\"textPage\">Лопе Де Вега. Собака на сене<br><br>Лопе Де Вега. Собака на сене<br><br>Перевод М. Лозинского<br><br>ДЕЙСТВУЮЩИЕ ЛИЦА<br><br>Диана, графиня де Бельфлор.<br>Теодоро, ее секретарь.<br>Марсела<br>Доротея   } ее служанки.<br>Анарда<br>Отавьо, ее мажордом.<br>Фабьо, ее слуга.<br>Граф Федерико.<br>Граф Лудовико.<br>Маркиз Рикардо.<br>Тристан, лакей.<br>Леонидо, слуга.<br>Антонело, лакей.<br>Фурьо.<br>Лирано.<br>Сельо, слуга.<br>Камило.<br>Паж.<br><br>Действие происходит в Неаполе.<br><br> * ДЕЙСТВИЕ ПЕРВОЕ *<br><br>Зала во дворце графини.<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Теодоро и Тристан, убегая.<br><br>Теодоро<br><br>Беги, Тристан! Скорей! Сюда!<br><br>Тристан<br><br>Плачевней не было скандала!<br><br>Теодоро<br><br>Она, пожалуй, нас узнала?<br><br>Тристан<br><br>Не знаю; думаю, что да.<br><br>Уходят.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Диана<br><br>Диана<br><br>Эй, сударь! Слушайте! Назад!<br>Остановитесь на мгновенье!<br>Со мной--такое обращенье?<br>Вернитесь, эй, вам говорят!<br>Хола! Куда весь дом укрылся?<br>Хола! Где слуги? Ни души?<br>Не призрак же в ночной тиши,<br>Не образ сонный мне явился.<br>Хола! Все спят? Но как же быть?<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Фабьо, Диана.<br><br>Фабьо<br><br>Как будто ваша милость звали?<br><br>Диана<br><br>Вся желчь моя могла б едва ли<br>Такую флегму растопить!<br>Беги скорее, дурень вялый,--<br>Ты это званье заслужил,--<br>Узнай сейчас же, кто тут был,<br>Кто выбежал из этой залы<br><br>Фабьо<br><br>Из этой залы?<br><br>Диана<br><br>Отвечай<br>Ногами! Живо!<br><br>Фабьо<br><br>Я иду.<br><br>Диана<br><br>Узнай, кто он такой. Я жду.<br><br>Фабьо<br><br>Вот скверный случай, ай, ай, ай!<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Отавьо, Диана.<br><br>Отавьо<br><br>Я, ваша милость, слышал вас,<br>Но мне не верилось, простите,<br>Что ваша милость так кричите<br>В такой неподходящий час.<br><br>Диана<br><br>Какой невиннейший ответ!<br>Уж больно рано вы ложитесь<br>И так прохладно шевелитесь,<br>Что просто силы с вами нет!<br>Чужие люди бродят ночью<br>По дому, входят без утайки<br>Почти что в комнату хозяйки<br><br>(Я эту наглость здесь воочью,<br>Отавьо, видела сама)<br>,<br>А вы, хранитель мой достойный,<br>Невозмутимы и спокойны,<br>Когда я тут схожу с ума!<br><br>Отавьо<br><br>Я, ваша милость, слышал вас,<br>Но мне не верилось, простите,<br>Что ваша милость так кричите<br>В такой неподходящий час.<br><br>Диана<br><br>Идите спать, а то вам вредно.<br>Да и не я совсем звала.<br><br>Отавьо<br><br>Сеньора...<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Фабьо. Те же.<br><br>Фабьо<br><br>Дивные дела!<br>Как ястреб, улетел бесследно.<br><br>Диана<br><br>Приметы ты видал?<br><br>Фабьо<br><br>Приметы?<br><br>Диана<br><br>Плащ с золотым шитьем?<br><br>Фабьо<br><br>Когда<br>Он вниз бежал...<br><br>Диана<br><br>Вам, господа,<br>Надеть бы юбки и корсеты!<br><br>Фабьо<br><br>Он сверзся с лестницы в два скока,<br>В светильню шляпой запустил,<br>Попал, светильню погасил,<br>Двор пересек в мгновенье ока,<br>Затем нырнул во мрак портала,<br>Там вынул шпагу и пошел.<br><br>Диана<br><br>Ты совершеннейший осел.<br><br>Фабьо<br><br>Что ж было делать?<br><br>Диана<br><br>Бить вас мало!<br>Догнать и заколоть на месте.<br><br>Отавьо<br><br>А вдруг почтенный человек?<br>Ведь это был бы срам навек<br>И умаленье вашей чести.<br><br>Диана<br><br>Почтенный человек? Вот тоже!<br><br>Отавьо<br><br>Да разве мало здесь у нас<br>Таких, кому увидеть вас<br>Одним глазком -- всего дороже?<br>Ведь тысячи сеньоров жадно<br>Мечтают лишь о браке с вами<br>И слепы от любви! Вы сами<br>Сказали: он одет нарядно,<br>И Фабьо видел, как поспешно<br>Он пламя шляпой притушил.<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">Быть может, правда, это был<br>Сеньор, влюбленный безутешно,<br>Который щедрою рукой<br>Купил мою прислугу? Чудно!<br>Честней найти прислугу трудно!<br>Я буду знать, кто он такой.<br>Он в шляпе с перьями промчался.<br>Она на лестнице.<br><br>(К Фабьо.)<br><br>Не мямли.<br>Сходи за ней.<br><br>Фабьо<br><br>Да шляпа там ли?<br><br>Диана<br><br>А где же? Вот дурак сыскался!<br>Ведь он, когда ее швырял,<br>Не поднимал ее при этом.<br><br>Фабьо<br><br>Сеньора, я схожу за светом.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Диана, Отавьо.<br><br>Диана<br><br>Нет, если кто-то помогал,<br>Виновных я без сожаленья<br>Всех прогоню.<br><br>Отавьо<br><br>И поделом:<br>Вы людям поручили дом,<br>А вам такие огорченья.<br>И все ж, хоть это неучтивость,<br>Когда вы так раздражены,<br>Касаться этой стороны,<br>А только ваша же строптивость<br>И нежеланье выйти замуж:<br>Всем этим выходкам виной,<br>Когда с отчаянья иной,<br>Что предпринять, не знает сам уж.<br><br>Диана<br><br>Вам что же, случаи известны?<br><br>Отавьо<br><br>Известно только то, что вы,<br>Как утверждает суд молвы,<br>Недостижимы и прелестны.<br>Притом и вотчина Бельфлор<br>Лишает очень многих сна.<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Фабьо. Те же.<br><br>Фабьо<br><br>Сеньора, шляпа найдена.<br>Не шляпа, а один позор.<br><br>Диана<br><br>Покажи, что это?<br><br>Фабьо<br><br>Вот.<br>Та, что он швырнул. Она же.<br><br>Диана<br><br>Эта?<br><br>Отавьо<br><br>Трудно встретить гаже.<br><br>Фабьо<br><br>Может быть, ему идет.<br><br>Диана<br><br>Ты нашел вот эту шляпу?<br><br>Фабьо<br><br>Стал бы говорить я вздор!<br><br>Отавьо<br><br>Ну и перья!<br><br>Фабьо<br><br>Это вор.<br><br>Отавьо<br><br>В сундуки нацелил лапу.<br><br>Фабьо<br><br>Шляпа вора, это верно.<br><br>Диана<br><br>Ты меня сведешь с ума.<br>Я же видела сама:<br>Столько перьев, непомерно.<br>Перья-то куда же делись?<br><br>Фабьо<br><br>Как он в пламя запустил,<br>Он их, видно, подпалил;<br>Сразу паклей загорелись.<br>Ведь Икар спалил крыла,<br>Взвившись к солнцу в бездне<br>И погиб в морской пучине.<br>Та же штука здесь была.<br>Солнцем был огонь светильни,<br>А Икаром -- шляпа; вмиг<br>Перья пламень и обстриг.<br>Вот вам: прямо из красильни.<br><br>Диана<br><br>Право, не до шуток, Фабьо.<br>Много и без них забот.<br><br>Отавьо<br><br>Ну, разгадка подождет.<br><br>Диана<br><br>Как так подождет, Отавьо?<br><br>Отавьо<br><br>Спать идите. Утром рано<br>Все успеете узнать.<br><br>Диана<br><br>Нет, и я не лягу спать,<br>Если только я--Диана,<br>Не разведав, чья вина.<br><br>(К Фабьо.)<br><br>Женщин всех сюда пришлите.<br><br>Уходит Фабьо.<br><br>ЯВЛЕНИЕ ВОСЬМОЕ<br><br>Диана, Отавьо.<br><br>Отавьо<br><br>Ночь во что вы превратите!<br><br>Диана<br><br>Мне, Отавьо, не до сна.<br>Разве тут уснуть возможно:<br>Кто был в доме у меня?<br><br>Отавьо<br><br>Лучше бы, дождавшись дня,<br>Все разведать осторожно.<br>А пока--нужнее сон.<br><br>Диана<br><br>Пусть для вас он будет сладок:<br>Засыпать среди загадок--<br>Высшей мудрости закон.<br><br>ЯВЛЕНИЕ ДЕВЯТОЕ<br><br>Фабьо, Марсела, Доротея, Анарда. Те же.<br><br>Фабьо<br><br>Вот эти, может быть, помогут.<br>А остальные спят давно<br>Блаженным сном и все равно<br>Знать толком ничего не могут.<br>Но камеристки не легли<br>И перед вами в полном сборе.<br><br>Анарда<br>(в сторону)<br><br>В ночную пору грозно море;<br>Я бурю чувствую вдали.<br><br>Фабьо<br><br>Прикажете нам выйти?<br><br>Диана<br><br>Да.<br><br>Уйдите оба.<br><br>Фабьо<br>(тихо к Отавьо)<br><br>Разгулялась!<br>Допрос честь честью!<br><br>Отавьо<br><br>Помешалась.<br><br>Фабьо<br><br>И мне не верит. Вот беда!<br><br>Уходят Отавьо и Фабьо.<br><br>ЯВЛЕНИЕ ДЕСЯТОЕ<br><br>Диана, Марсела, Доротея, Анарда.<br><br>Диана<br><br>Пусть Доротея подойдет.<br><br>Доротея<br><br>Что госпожа моя желает?</div>", "cover": false}, {"html": "<div class=\"textPage\">Диана<br><br>Скажи: кто чаще всех гуляет<br>Поблизости моих ворот?<br><br>Доротея<br><br>Маркиз Рикардо ходит мимо<br>Граф Парис тоже невзначай.<br><br>Диана<br><br>Святую правду отвечай.<br>Ты знаешь, я неумолима<br>В негодовании моем.<br><br>Доротея<br><br>От вас мне нечего таить.<br><br>Диана<br><br>С кем им случалось говорить?<br><br>Доротея<br><br>Когда бы вы меня живьем<br>На тысяче огней палили,<br>Скажу: не помню, чтоб хоть раз<br>Они с кем-либо, кроме вас,<br>Из здесь живущих говорили.<br><br>Диана<br><br>А письма были ненароком?<br>Пажи являлися сюда?<br><br>Доротея<br><br>Ни разу.<br><br>Диана<br><br>Отойди туда.<br><br>Марсела<br>(тихо Анарде)<br><br>Как на суде!<br><br>Анарда<br><br>И на жестоком<br><br>Диана<br><br>Анарда, ты!<br><br>Анарда<br><br>Что вам угодно?<br><br>Диана<br><br>Какой мужчина был сейчас...<br><br>Анарда<br><br>Мужчина?<br><br>Диана<br><br>В этой зале. Вас<br>Я знаю всех, и превосходно.<br>Кто ввел его, чтоб он тайком<br>Меня увидел? Кто продался?<br><br>Анарда<br><br>Сеньора, верьте, не рождался<br>Столь дерзкий замысел ни в ком.<br>Мужчину привести сюда,<br>Чтоб вас он мог тайком увидеть,--<br>Такой изменой вас обидеть<br>Мы не могли бы никогда!<br>Нет, нет, вы к нам несправедливы.<br><br>Диана<br><br>Постой. Подальше отойдем.<br>Я вправе думать вот о чем,--<br>Конечно, если вы правдивы:<br>Не приходил ли он, быть может,<br>Из горничных к кому-нибудь?<br><br>Анарда<br><br>Чтоб мирно вы могли уснуть,--<br>Раз этот случай вас тревожит,--<br>Я буду искренней и смелой<br>И все скажу, по долгу службы,<br>Хоть это будет против дружбы,<br>Которая у нас с Марселой.<br>Она в кого-то влюблена,<br>И он успел в нее влюбиться.<br>Но кто он -- не могу добиться.<br><br>Диана<br><br>Теперь ты все сказать должна:<br>Раз ты призналась в главной части,<br>Скрывать остаток смысла нет.<br><br>Анарда<br><br>Ax, госпожа, чужой секрет<br>Мучительнее всех несчастий.<br>Я -- женщина. Вам мало знать,<br>Чтобы забыть об этом деле,<br>Что кто-то приходил к Марселе?<br>Вы можете спокойно спать:<br>У них пока одни слова<br>И только самое начало.<br><br>Диана<br><br>Я слуг подлее не встречала!<br>Хорошая пойдет молва<br>О молодой вдове! Ну, бойтесь!<br>Клянусь спасеньем ваших душ,<br>Когда бы мой покойный муж,<br>Граф...<br><br>Анарда<br><br>Ваша милость, успокойтесь:<br>Ведь тот, с кем видится она,<br>Совсем не посторонний дому,<br>И ваша милость по-пустому<br>Себя тревожить не должна.<br><br>Диана<br><br>Так это кто-нибудь из слуг?<br><br>Анарда<br><br>Да, госпожа.<br><br>Диана<br><br>Кто?<br><br>Анарда<br><br>Теодоро.<br><br>Диана<br><br>Мой секретарь?<br><br>Анарда<br><br>Да. Вот как скоро<br>Я ваш рассеяла испуг.<br><br>Диана<br><br>Побудь, Анарда, в стороне.<br><br>Анарда<br><br>Не обходитесь с нею строго<br><br>Диана<br>(в сторону)<br><br>Я успокоилась немного,<br>Узнав, что это не ко мне.<br><br>(Марселе.)<br><br>Марсела!<br><br>Марсела<br><br>Госпожа...<br><br>Диана<br><br>Послушай.<br><br>Марсела<br><br>Что вам угодно?<br><br>(В сторону.)<br><br>Грудь трепещет!<br><br>Диана<br><br>И это я тебе вверяла<br>И честь мою, и помышленья?<br><br>Марсела<br><br>Что про меня вам насказали?<br>Ведь вы же знаете, что верность<br>Я соблюдаю вам во всем.<br><br>Диана<br><br>Ты -- верность?<br><br>Марсела<br><br>В чем моя измена?<br><br>Диана<br><br>Иль не измена--в этом доме,<br>В моих стенах, встречаться с кем-то<br>И тайно с ним вести беседы?<br><br>Марсела<br><br>Я с Теодоро где ни встречусь,<br>Он тут же мне наговорит<br>Две дюжины словечек нежных.<br><br>Диана<br><br>Две дюжины? Клянусь, недурно!<br>Как видно, год благословенный,<br>Раз дюжинами продают их.<br><br>Марсела</div>", "cover": false}, {"html": "<div class=\"textPage\">Ну, словом, входит ли он в двери<br>Или выходит, все, что в мыслях,<br>Он тотчас же устам доверит.<br><br>Диана<br><br>Доверит? Странный оборот.<br>И что ж он говорит?<br><br>Марсела<br><br>Наверно,<br>Я и не вспомню.<br><br>Диана<br><br>Постарайся.<br><br>Марсела<br><br>То скажет так: &quot;Мне нет спасенья,<br>Я гибну из-за этих глаз&quot;.<br>То скажет: &quot;В них--мое блаженство;<br>Сегодня я не мог уснуть<br>И, изнывая страстью, бредил<br>Твоею красотой&quot;. Однажды<br>Просил мой волос, чтобы в сердце<br>Связать любовные желанья<br>И обуздать воображенье.<br>Но почему вас занимает<br>Весь этот вздор?<br><br>Диана<br><br>По крайней мере,<br>Тебя он радует?<br><br>Марсела<br><br>Не мучит.<br>Ведь Теодоро, несомненно,<br>Свою любовь решил направить<br>К такой прямой и честной цели,<br>Как та, чтобы на мне жениться.<br><br>Диана<br><br>Ну что же, цели нет честнее,<br>Чем цель такая, у любви.<br>Я бы могла помочь вам в этом.<br><br>Марсела<br><br>Какое это будет счастье!<br>Я вам сознаюсь откровенно,<br>Раз вы и в гневе так добры<br>И так великодушны сердцем,<br>Что я люблю его ужасно;<br>Я молодого человека<br>Благоразумней, даровитей,<br>Чувствительнее и скромнее<br>Не знаю в городе у нас.<br><br>Диана<br><br>В его талантах и уменье<br>Я убеждаюсь ежедневно.<br><br>Марсела<br><br>Большая разница, поверьте,<br>Когда для вас он пишет письма<br>По всем законам этикета<br>Или когда свободным слогом<br>Он с вами сладостно и нежно<br>Ведет влюбленный разговор.<br><br>Диана<br><br>Я не намерена, Марсела,<br>Чинить препятствий вашей свадьбе,<br>Когда тому настанет время,<br>Но и себя мне должно помнить,<br>Не поступаясь личной честью<br>И древним именем моим.<br>Поэтому совсем не дело,<br>Чтоб вы встречались в этом доме.<br><br>(В сторону.)<br><br>Хочу дать выход раздраженью.<br>Но так как все об этом знают,<br>Ты можешь, только посекретней,<br>С ним продолжать свою любовь;<br>А я, при случае, всецело<br>Берусь обоим вам помочь.<br>Мне Теодоро очень ценен,<br>Он вырос в доме у меня.<br>К тебе же, милая Марсела,<br>Мою привязанность ты знаешь<br>И родственное отношенье.<br><br>Марсела<br><br>У ваших ног созданье ваше<br><br>Диана<br><br>Иди.<br><br>Марсела<br><br>Целую их смиренно.<br><br>Диана<br><br>Пусть все уйдут.<br><br>Анарда<br>(тихо Марселе)<br>.<br><br>Ну, что же было?<br><br>Марсела<br><br>Был гнев, но для меня полезный.<br><br>Доротея<br><br>Так ей известен твой секрет?<br><br>Марсела<br><br>Причем известно, что он честный.<br><br>Марсела, Доротея и Анарда<br>делают графине три реверанса и уходят.<br><br>ЯВЛЕНИЕ ОДИННАДЦАТОЕ<br><br>Диана<br><br>Диана<br><br>Я столько раз невольно замечала.<br>Как Теодоро мил, красив, умен,<br>Что, если бы он знатным оыл рожден,<br>Я бы его иначе отличала.<br><br>Сильней любви в природе нет начала.<br>Но честь моя--верховный мой закон;<br>Я чту мой сан, и не допустит он,<br>Чтоб я подобным мыслям отвечала.<br><br>Но зависть остается в глубине.<br>Чужим добром нетрудно соблазниться,<br>А тут оно заманчиво вдвойне.<br><br>О, если б нам судьбой перемениться,<br>Так, чтобы он подняться мог ко мне<br>Или чтоб я могла к нему спуститься!<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДВЕНАДЦАТОЕ<br><br>Теодоро, Тристан.<br><br>Теодоро<br><br>Я эту ночь провел без сна.<br><br>Тристан<br><br>Не мудрено, что вы не спали:<br>Ведь вы же начисто пропали,<br>Коли дознается она.<br>Я говорил вам: &quot;Обождите,<br>Пусть ляжет спать&quot;. Вы не хотели.<br><br>Теодоро<br><br>Любовь стремится прямо к цели.<br><br>Тристан<br><br>Стреляете--и не глядите.<br><br>Теодоро<br><br>Кто ловок, попадет всегда.<br><br>Тристан</div>", "cover": false}, {"html": "<div class=\"textPage\">Кто ловок, различает ясно,<br>Что пустяки, а что опасно.<br><br>Теодоро<br><br>Так я открыт?<br><br>Тристан<br><br>И нет, и да;<br>Прямых, конечно, нет улик,<br>Но в подозренье вы великом.<br><br>Теодоро<br><br>Когда за нами с громким криком<br>Погнался Фабьо,--лишний миг,<br>И я в него вонзил бы шпагу.<br><br>Тристан<br><br>Ведь как я ловко запустил<br>В светильню шляпой?<br><br>Теодоро<br><br>Он застыл<br>И дальше не ступил ни шагу.<br>Когда бы он пошел вперед,<br>Он пал бы мертвым и не пикнул.<br><br>Тристан<br><br>Я на ходу светильне крикнул:<br>&quot;Скажи, что был чужой народ&quot;.<br>Она ответила: &quot;Ты лжец&quot;.<br>Тогда я шляпу снял--и хлоп,<br>В отместку ей.<br><br>Теодоро<br><br>Я лягу в гроб<br>Сегодня.<br><br>Тристан<br><br>Вам всегда конец,<br>Влюбленным! В вечном сокрушенье,<br>А сам упитан и румян.<br>Теодоро<br><br>Но что же делать мне, Тристан,<br>В таком опасном положенье?<br><br>Тристан<br><br>Да перестать любить Марселу.<br>Графиня наша так горда,<br>Что стоит ей узнать,--беда!<br>И хитрость не поможет делу:<br>Сюда вам не вернуться вновь.<br><br>Теодоро<br><br>Забыть! Какой совет жестокий!<br><br>Тристан<br><br>Берите у меня уроки, И вы забудете любовь.<br><br>Теодоро<br><br>Брось! Надоела ерунда.<br><br>Тристан<br><br>Все можно одолеть искусством.<br>Хотите знать, как с вашим чувством<br>Покончить раз и навсегда?<br>Во-первых, нужно безотложно<br>Принять решенье позабыть<br>И твердо знать, что воскресить<br>Волненья сердца невозможно;<br>Затем, что если дать надежде<br>Хотя б лазейку, с новой силой<br>Проснется слабость к вашей милой,<br>И все останется, как прежде.<br>Скажите, почему не может<br>Мужчина женщину забыть?<br>Да потому, что тянет нить<br>И что его надежда гложет.<br>Он должен возыметь решенье<br>О ней не думать никогда<br>И этим раз и навсегда<br>Остановить воображенье.<br>Ведь вы видали на часах:<br>Когда раскрутится цепочка,<br>Колесики замрут -- и точка.<br>Вот точно так же и в сердцах<br>Мы наблюдаем остановку,<br>Когда надежду раскрутить.<br><br>Теодоро<br><br>Но память будет нас язвить,<br>Что час--придумывать уловку,<br>И наше чувство, раз за разом,<br>Вернется к прежнему, поверь.<br><br>Тристан<br><br>Да, чувство -- это хищный зверь,<br>Вцепившийся когтями в разум,<br>Как говорит стихотворенье<br>Того испанского поэта;<br>Но есть приемчик и на это,<br>Чтоб истребить воображенье.<br><br>Теодоро<br><br>Как?<br><br>Тристан<br><br>Вспоминая недостатки,<br>Не прелести. Чтоб позабыть,<br>Старайтесь в памяти носить<br>Ее изъян, и самый гадкий.<br>В вас не должна рождать тоски<br>Нарядно-стройная персона,<br>Когда она на вас с балкона<br>Глядит, взмостясь на каблучки<br>Все это так, архитектура.<br>Один мудрец учил народ,<br>Что половиной всех красот<br>Портным обязана натура.<br>Представьте вашу чаровницу,<br>Чтоб обольщенье побороть,<br>Как истязающего плоть,<br>Которого везут в больницу.<br>Ее себе рисуйте так,<br>А не в фалборочках и складках;<br>Поверьте, мысль о недостатках<br>Целительней, чем всякий злак;<br>Ведь ежели припомнишь вид<br>Иного мерзкого предмета,<br>На целый месяц пакость эта<br>Вам отбивает аппетит;<br>Вот и старайтесь вновь и вновь<br>Припоминать ее изъяны;<br>Утихнет боль сердечной раны,<br>И улетучится любовь.<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Какой невежественный лекарь!<br>Какое грубое знахарство!<br>Чего и ждать, когда лекарство<br>Изготовлял такой аптекарь!<br>Твоя стряпня -- для деревенщин.<br>Ты -- коновал и шарлатан,<br>Мужик и неуч. Я, Тристан,<br>Себе не так рисую женщин.<br>Нет, для меня они кристальны,<br>Они прозрачны, как стекло.<br><br>Тристан<br><br>Стекло, и ломкое зело,<br>Как учит опыт нас печальный.<br>Когда вам трудно одному,<br>Я вам помочь берусь свободно;<br>Мое лекарство превосходно<br>Мне послужило самому.<br>Однажды -- чтоб меня повесить! --<br>Я был влюблен, вот с этой рожей,<br>В охапку лжи с атласной кожей,<br>Лет от рожденья пятью десять.<br>Сверх прочих тысяч недостатков<br>Она владела животом,<br>Где б уместился, и притом<br>Оставив место для придатков,<br>Любой архив, какой угодно<br>В нее, друг друга не тесня,<br>Как в деревянного коня,<br>Сто греков влезли бы свободно.<br>Слыхали вы--в одном селе<br>Стоял орешник вековой,<br>Где обитал мастеровой<br>С женой и детками в дупле,<br>И то просторно было слишком!<br>Вот так же приютить могло<br>И это пузо, как дупло,<br>Ткача со всем его домишком.<br>Ее забыть хотел я страстно.<br><br>(Давно уж время подошло)<br>,<br>И что же? Память, как назло,<br>Мне подносила ежечасно<br>То снег, то мел, то мрамор хрупкий,<br>Левкои, лилии, жасмин<br>И преогромный балдахин,<br>Носивший имя нижней юбки.<br>Я чах на одиноком ложе.<br>Но я решил не пасть в борьбе<br>И начал рисовать себе<br>Все то, что на нее похоже:<br>Корзины рыночных торговок,<br>Баулы с почтой, сундуки,<br>Вьюки, дорожные мешки,<br>Где и тюфяк, и подголовок,<br>И словно бы я молвил: сгинь! --<br>Любовь преобразилась в злобу,<br>И я забыл сию утробу<br>На веки вечные--аминь!<br>А ведь у этой душегубки<br>Любая складка<br>(я не вру!)<br><br>Могла укрыть в своем жиру<br>Четыре пестика для ступки<br><br>Теодоро<br><br>Но где же я изъян найду?<br>В Марселе места нет изъян<br>Я забывать ее не стану.<br><br>Тристан<br><br>Что ж, кличьте на себя беду<br>И шествуйте стезей гордыни.<br><br>Теодоро<br><br>Но ведь она же так мила!<br><br>Тристан<br><br>Вам от любви сгореть дотла--<br>Милее милостей графини.<br><br>ЯВЛЕНИЕ ТРИНАДЦАТОЕ<br><br>Диана. Те же.<br><br>Диана<br><br>А, Теодоро здесь?<br><br>Теодоро<br>(в сторону)<br><br>Она!<br><br>Диана<br><br>Я к вам.<br><br>Теодоро<br><br>Я ваш слуга, сеньора.<br><br>Тристан<br>(в сторону)<br><br>По оглашенье приговора<br>Мы вылетаем в три окна.<br><br>Диана<br><br>Меня одна моя подруга,<br>Боясь не справиться сама,<br>Просила черновик письма<br>Составить ей. Плоха услуга,<br>Когда я ровно ничего<br>В делах любви не понимаю,<br>А вы напишете, я знаю,<br>Гораздо лучше моего.<br>Прочтите, вот.<br><br>Теодоро<br><br>Когда вы сами<br>Писали вашею рукой,<br>Была бы дерзкой и пустой<br>Попытка состязаться с вами.<br>Не глядя, я прошу, сеньора,<br>Послать письмо таким, как есть.<br><br>Диана<br><br>Прочтите.<br><br>Теодоро<br><br>Я готов прочесть,<br>Но не для строгого разбора,<br>А чтоб узнать любовный слог;<br>Я в нем вовек не упражнялся.<br><br>Диана<br><br>Вовек?<br><br>Теодоро<br><br>Любить я не решался,<br>Осилить робости не мог.<br>Я из застенчивых людей.<br><br>Диана<br><br>Вы потому и на прогулках<br>Крадетесь в темных закоулках,<br>Плащом закрывшись до бровей?<br><br>Теодоро<br><br>Закрывшись? Я? Где и когда?<br><br>Диана<br><br>Вас встретил в облике таком<br>Сегодня ночью мажордом,<br>Но он узнал вас без труда.<br><br>Теодоро<br><br>Ах, это мы на склоне дня<br>Шутили с Фабьо; мы подчас<br>Заводим тысячи проказ.<br><br>Диана<br><br>Читайте.</div>", "cover": false}, {"html": "<div class=\"textPage\">Теодори<br><br>Или то меня<br><br>Чернит завистник неизвестный.<br><br>Диана<br><br>Или ревнует кто-нибудь.<br>Читайте.<br><br>Теодоро<br>Я хочу взглянуть,<br>Как блещет гений ваш чудесный.<br><br>(Читает.)<br><br> &quot;Зажечься страстью, видя страсть чужую,<br>И ревновать, еще не полюбив,--<br>Хоть бог любви хитер и прихотлив,<br>Он редко хитрость измышлял такую.<br><br>Я потому люблю, что я ревную,<br>Терзаясь тем, что рок несправедлив:<br>Ведь я красивей, а, меня забыв,<br>Он нежным счастьем наградил другую.<br><br>Я в страхе и в сомненье дни влачу,<br>Ревную без любви, но ясно знаю:<br>Хочу любить, любви в ответ хочу.<br><br>Не защищаюсь и не уступаю;<br>Быть понятой мечтаю и молчу.<br>Поймет ли кто? Себя я понимаю&quot;.<br><br>Диана<br><br>Что скажете?<br><br>Теодоро<br><br>Что если здесь<br>Все это передано верно,<br>То лучше написать нельзя.<br>Но только я в недоуменье:<br>Я не слыхал, чтобы любовь<br>Могла от ревности зажечься.<br>Родится ревность от любви.<br><br>Диана<br><br>Я думаю, что даме этой<br>Приятно было с ним встречаться,<br>Но страсть не загоралась в сердце;<br>И лишь когда она узнала,<br>Что он другую любит, ревность<br>Зажгла в ней и любовь и страсть.<br>Возможно это?<br><br>Теодоро<br><br>Да, конечно.<br>Но и для ревности, сеньора,<br>Уже имелось побужденье,<br>И то была любовь; причина<br>Не может проистечь от следствий,<br>Она рождает их сама.<br><br>Диана<br><br>Не знаю; только дама эта<br>Не больше чем весьма охотно<br>Встречалась с этим человеком;<br>Но чуть увидела она,<br>Что он другую любит нежно,<br>Толпа неистовых желаний<br>Пресекла ей дорогу чести,<br>Похитив у ее души<br>Все те благие помышленья.<br>С которыми она жила.<br><br>Теодоро<br><br>Письмо написано прелестно.<br>Я состязаться не дерзну.<br><br>Диана<br><br>Попробуйте.<br><br>Теодоро<br><br>Нет, я не смею.<br><br>Диана<br><br>И все-таки я вас прошу.<br><br>Теодоро<br><br>Сеньора, вы хотите этим<br>Изобличить мою ничтожность.<br><br>Диана<br><br>Я жду. Вернитесь поскорее.<br><br>Теодоро<br><br>Иду.<br><br>(Уходит.)<br><br>Диана<br><br>Поди сюда, Тристан.<br><br>ЯВЛЕНИЕ ЧЕТЫРНАДЦАТОЕ<br><br>Диана, Тристан.<br><br>Тристан<br><br>Спешу услышать повеленья,<br>Хоть и стыжусь своих штанов;<br>Ваш секретарь, мой благодетель,<br>Уже давненько на мели.<br>А плохо, если кабальеро<br>Лакея держит замухрышкой:<br>Лакей -- и зеркало, и свечка,<br>И балдахин для господина,<br>И это забывать невместно.<br>Мудрец сказал: когда сеньор<br>Сидит верхом, то мы ступени,<br>Затем что до его лица<br>По нашему восходят телу.<br>Он, видно, большего не может.<br><br>Диана<br><br>Что ж, он играет?<br><br>Тристан<br><br>Вот уж если б!<br>Ведь кто играет, тот всегда<br>Возьмет свое то с тех, то с этих.<br>Бывало, всякий царь учился<br>Какому-нибудь рукоделью,<br>Чтоб, если на войне иль в море<br>Он потеряет королевство,<br>Иметь, чем прокормить себя.<br>Счастливец тот, кто с малолетства<br>Обучен хорошо играть!<br>Игра, когда сидишь без денег,<br>Есть благородное искусство<br>Легко добыть на прокормленье.<br>Иной великий живописец,<br>Упорно изощряя гений,<br>Портрет напишет, как живой,<br>Чтобы услышать от невежды,<br>Что он не стоит трех эскудо;<br>А игроку--сказать лишь этак:<br>&quot;Иду!&quot;--и если повезло,<br>Глядишь--и взял все сто процентов.<br><br>Диана<br><br>Он, словом, не игрок?<br><br>Тристан<br><br>Он робок.<br><br>Диана<br><br>Он вместо этого, наверно,<br>Любовью занят.<br><br>Тристан<br><br>Он? Любовью?<br>Вот шутка! Это лед чистейший<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">Однако человек, как он,<br>Изящный, холостой, любезный<br>Не может не таить в душе<br>Какого-нибудь увлеченья.<br><br>Тристан<br><br>Мне вверены ячмень и сено,<br>Я не ношу записок нежных.<br>Весь день он тут, у вас на службе,<br>Ему и времени-то нету.<br><br>Диана<br><br>А вечер
