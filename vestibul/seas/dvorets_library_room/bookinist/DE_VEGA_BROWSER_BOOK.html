ом он не выходит?<br><br>Тристан<br><br>Я не хожу с ним; изувечен --<br>Нога разбита у меня.<br><br>Диана<br><br>Как так, Тристан?<br><br>Тристан<br><br>Могу ответить,<br>Как плохо вышедшие замуж,<br>Когда у них лицо пестреет<br>От синяков, что расписала<br>На нем супружеская ревность:<br>Скатился с лестницы, сеньора.<br><br>Диана<br><br>Скатился?<br><br>Тристан<br><br>И весьма почтенно:<br>Все ребрами пересчитал<br>Ступеньки.<br><br>Диана<br><br>Что же, и за дело,<br>Тристан. С чего это ты вдруг<br>В светильню шляпой вздумал метить?<br><br>Тристан<br>(в сторону)<br><br>А ну тебя! Вот черт возьми!<br>Ей вся история известна.<br><br>Диана<br><br>Что ж ты молчишь?<br><br>Тристан<br><br>Стараюсь вспомнить,<br>Когда бишь я упал... Да, верно:<br>Сегодня ночью здесь кружили<br>Нетопыри, в окно влетели;<br>Я шляпой начал в них кидать;<br>Один пронесся мимо света,<br>И я, швырнув в него, попал<br>В светильню и при этом вниз<br>По всем проехался ступеням.<br><br>Диана<br><br>Придумано великолепно.<br>А знаешь, старые рецепты<br>Считают кровь нетопырей<br>Испытанным и верным средством<br>Для выведения волос.<br>Пущу им кровь; тогда, поверь мне,<br>Хватая случай за вихры,<br>Ты промахнешься, мой любезный.<br><br>Тристан<br>(в сторону)<br><br>Ей-богу, дело вышло скверно.<br>Бывает, мы в светильню метим,<br>А попадаем мы в тюрьму.<br><br>Диана<br>(в сторону)<br><br>Я все-таки в большом волненье!<br><br>ЯВЛЕНИЕ ПЯТНАДЦАТОЕ<br><br>Фабьо, затем маркиз Рикардо и Сельо. Диана.<br><br>Фабьо<br><br>Пожаловал маркиз Рикардо.<br><br>Диана<br><br>Скорее пододвиньте кресла.<br><br>Входят Рикардо и Сельо, уходят Фабьо и Тристан.<br><br>Рикардо<br><br>С тревогой в сердце, с мукой безответной,<br>Которая всегда в груди живет<br>У тех, кто к цели близится заветной,<br>Меня любовь, Диана, к вам влечет.<br>Я снова здесь, хотя, быть может, тщетной<br>Мою мечту соперник назовет,<br>Который, грезой сладостной обвеян,<br>Не столь вам предан, сколь самонадеян.<br>Вы так красивы, что, взглянув на вас,<br>Я убежден, что вы благополучны.<br>У женщины--как опыт учит нас--<br>Здоровье с красотою неразлучны.<br>Вы свежестью так радуете глаз,<br>Что лишь невежда, лишь глупец докучный,<br>Который до рассудка не дорос,<br>Вам о здоровье задал бы вопрос:<br>Итак, что вы благополучны, зная<br>По вашим восхитительным чертам,<br>Хочу узнать, сеньора дорогая,<br>Насколько я благополучен сам.<br><br>Диана<br><br>Сеньор маркиз, вы лишний раз, блистая,<br>Образчик вкуса подаете нам.<br>Но стоит ли такого славословья<br>Обычный вид покоя и здоровья<br>А что до вас,--мне кажется, не я<br>Благополучью вашему хозяин.<br><br>Рикардо</div>", "cover": false}, {"html": "<div class=\"textPage\">Вы знаете, верна любовь моя<br>И образ ваш в душе моей изваян.<br>Давно согласна ваша вся семья,<br>Чтоб наш союз был нерушимо спаян,<br>И неизвестен только ваш ответ.<br>Лишь он решит, я счастлив или нет.<br>Когда бы я, взамен моих владений,<br>Которыми я славен и богат,<br>Владел землей от взморий, чуждых тени,<br>До алых царств, где клонится закат,<br>И золотом, кумиром поколений,<br>И перлами, которые струят<br>Ресницы звезд, и кладами Востока,<br>Пути морей взбраздившими широко,<br>Я положил бы их у ваших ног.<br>Не сомневайтесь: вдохновленный вами,<br>Мой дерзкий путь бесстрашно бы пролег<br>Туда, где день не озарен лучами;<br>Я бы попрал, средь бури и тревог,<br>Пустыни волн дубовыми стопами,<br>Чтобы достигнуть до полярных скал,<br>Куда вовек смельчак не проникал.<br><br>Диана<br><br>Я уважаю ваше благородство,<br>Я верю вам, признанью сердца вняв.<br>У наших мыслей есть, быть может, сходство;<br>Но я не знаю, как посмотрит граф.<br><br>Рикардо<br><br>Ему в одном дарю я превосходство:<br>Граф Федерико ловок и лукав.<br>Но я надеюсь: суд ваш будет правый,<br>Вы ослепите этот взгляд лукавый.<br><br>ЯВЛЕНИЕ ШЕСТНАДЦАТОЕ<br><br>Теодоро, Диана, Рикардо, Сельо.<br><br>Теодоро<br><br>Пусть ваша милость взглянет и решит.<br><br>Рикардо<br><br>Вы заняты, и я ничьих доселе<br>Не крал минут.<br><br>Диана<br><br>Нас время не теснит.<br>Я в Рим пишу письмо.<br><br>Рикардо<br><br>Всего тяжеле<br>В почтовый день растянутый визит.<br><br>Диана<br><br>Вы очень милы.<br><br>Рикардо<br><br>Если б в самом деле!<br><br>(Тихо к Селю.)<br><br>Ну, Сельо, что ты скажешь?<br><br>Сельо<br><br>Что она<br>Ваш страстный пыл вознаградит сполна.<br><br>Уходят Рикардо и Сельо.<br><br>ЯВЛЕНИЕ СЕМНАДЦАТОЕ<br><br>Диана, Теодоро.<br><br>Диана<br><br>Написали?<br><br>Теодоро<br><br>Да, причем<br>Вышло плохо,--видно сразу:<br>Я работал по приказу.<br><br>Диана<br><br>Покажите.<br><br>Теодоро<br><br>Вот.<br><br>Диана<br><br>Прочтем.<br><br>(Читает.)<br><br>&quot;Кто любит вслед чужой любви, тот жаден,<br>В нем завистью зажжен сердечный пыл;<br>Кто сам себе блаженство не сулил,<br>К чужому счастью остается хладен.<br><br>Но если наш возлюбленный украден<br>Соперницей,--скрывать любовь нет сил;<br>Как кровь к лицу из потаенных жил,<br>Призыв к устам стремится, беспощаден.<br><br>Но я молчу, чтоб низость высоту<br>Не оскорбила. Я остановился,<br>Не преступив заветную черту.<br><br>И без того довольно я открылся;<br>Забыть о счастье я мудрей сочту,<br>Иначе могут счесть, что я забылся&quot;.<br><br>Диана<br><br>Вы, право, всех затмите скоро!<br><br>Теодоро<br><br>Вы надо мной смеетесь?<br><br>Диана<br><br>Нет.<br><br>Теодоро<br><br>Скажите правду.<br><br>Диана<br><br>Мой ответ:<br>Вы победили, Теодоро.<br><br>Теодоро<br><br>Увы, я вижу -- есть причина,<br>Чтоб я забыл покой и сон:<br>Слугу не терпят, если он<br>Кой в чем искусней господина.<br>Один король сказал вельможе:<br>&quot;Я озабочен, и весьма.<br>Я сочинил проект письма;<br>Прошу вас, сочините тоже.<br>Что будет лучше, я пошлю&quot;.<br>Вельможа бедный постарался,<br>И текст письма ему удался,<br>Как не удался королю.<br>Увидев, что его письму<br>Властитель отдал предпочтенье,<br>Он погрузился в размышленье,<br>Шагая к дому своему.<br>&quot;Бежим скорей,--сказал он сыну, --<br>Меня ужасный ждет конец&quot;.<br>Сын попросил, чтобы отец<br>Хотя бы объяснил причину.<br>&quot;Король узнал,---сказал вельможа,<br>Что я искуснее, чем он&quot;.<br>Вот я, сеньора, и смущен:<br>Моя история похожа.<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">О нет, и если приз назначен<br>Бесспорно вашему письму,<br>То это только потому,<br>Что этот облик так удачен.<br>Похвал назад я не беру,<br>Но я при этом не сказала,<br>Что я отныне потеряла<br>Доверье к моему перу.<br>Хотя, как женщина, конечно,<br>Я рассуждаю наобум,<br>И мой несовершенный ум<br>Судить не может безупречно.<br>Но вот плохое выраженье:<br>&quot;Молчу, чтоб низость высоты<br>Не оскорбила&quot;. Я прочту<br>Вам небольшое наставленье:<br>Любовью оскорбить нельзя,<br>Кто б ни был тот, кто грезит счастьем;<br>Нас оскорбляют безучастьем<br><br>Теодоро<br><br>Любовь -- опасная стезя.<br>Мы помним участь Фаэтона<br>И крыл Икара тщетный взмах:<br>Один на золотых конях<br>С крутого сброшен небосклона.<br>Другого солнце опалило<br>И свергло на морское дно.<br><br>Диана<br><br>Будь солнце женщиной, оно<br>Едва ли так бы поступило.<br>Любовь--упорство до конца;<br>Ища вниманья знатной дамы,<br>Усердны будьте и упрямы:<br>Не камни--женские сердца.<br>Письмо я уношу с собой;<br>Мне перечесть его охота.<br><br>Теодоро<br><br>Но в нем нелепостям нет счет.<br><br>Диана<br><br>А я не вижу ни одной.<br><br>Теодоро<br><br>Вы так добры! О, если б вечно<br>Взамен я ваше мог хранить!<br><br>Диана<br><br>Ну, что ж... Хоть лучше, может быть,<br>Порвать его.<br><br>Теодоро<br><br>Порвать?<br><br>Диана<br><br>Конечно.<br>То невеликая потеря,<br>Теряют больше иногда.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ВОСЕМНАДЦАТОЕ<br><br>Теодоро.<br><br>Теодоро<br>Ушла. Казалось--так горда!<br>Смотрю, глазам своим не веря.<br>Так неожиданно и смело<br>В любви признаться, как она!<br>Но нет, такая мысль смешна,<br>И здесь совсем не в этом дело.<br>Хотя бывало ли когда,<br>Чтоб с этих строгих уст слетало:<br>&quot;В такой потере горя мало,<br>Теряют больше иногда&quot;?<br>&quot;Теряют больше...&quot; Боже мой,<br>Понятно, кто: ее подруга.<br>Нет, глупость, жалкая потуга,<br>И речь идет о ней самой.<br>И все же, нет! Она умна,<br>Честолюбива, осторожна;<br>Такая странность невозможна;<br>Она к другому рождена.<br>Ей служат первые сеньоры<br>Неаполя, я не гожусь<br>В ее рабы. Нет, я боюсь,<br>Что здесь опасней разговоры.<br>Узнав мою любовь к Марселе,<br>Она, играя и дразня,<br>Хотела высмеять меня...<br>Но что за страхи, в самом деле?<br>У тех, кто шутит, никогда<br>Так густо не краснеют щеки.<br>А этот взгляд и вздох глубокий:<br>&quot;Теряют больше иногда&quot;?<br>Как роза, рдея изнутри<br>И вся блестя росою зыбкой,<br>Глядит с пурпуровой улыбкой<br>На слезы утренней зари,<br>Она в меня вперяла взгляд<br>Залившись огненным румянцем.<br>Так пламенеющим багрянцем<br>Ланиты яблока горят.<br>Так как же все же рассудить?<br>Признаться, рассуждая строго,<br>Для шутки--это слишком много,<br>Для правды--мало, может быть.<br>Остановись, мое мечтанье!<br>Каким величьем бредишь ты!..<br>Нет, нет, единой красоты<br>Меня влечет очарованье.<br>На свете нет такой прекрасной<br>Такой разумной, как она.<br><br>ЯВЛЕНИЕ ДЕВЯТНАДЦАТОЕ<br><br>Марсела, Теодоро.<br><br>Марсела<br><br>Ты здесь один?<br><br>Теодоро<br><br>И нам дана<br>Минута встречи безопасной.<br>Но для тебя, моя Марсела,<br>Со смертью я вступил бы в бой.<br><br>Марсела</div>", "cover": false}, {"html": "<div class=\"textPage\">Я, чтоб увидеться с тобой,<br>Сто жизней отдала бы смело.<br>Всю ночь одна я просидела,<br>Как птица, ожидая дня;<br>И я шептала, взор склоня,<br>Когда за гранью небосклона<br>Заря будила Аполлона:<br>&quot;Мой Аполлон, ты ждешь меня!&quot;<br>Вчера здесь все ходило кругом:<br>Графиня позабыла сон,<br>И был строжайший учинен<br>Допрос прислужницам и слугам.<br>Моим завистливым подругам,<br>Чтобы мою затронуть честь,<br>Был случай все сказать, как есть.<br>Когда ты вместе с кем на службе,<br>Не верь его сердечной дружбе:<br>Все в этой дружбе--ложь и лесть.<br>Так с нашим кончено секретом.<br>Диана, раз она--луна,<br>Мешать любовникам должна<br>И озарять их тайны светом.<br>Но обернулось все при этом<br>Для нас удачно, и весьма.<br>Я подтвердила ей сама,<br>Что наша свадьба будет скоро,<br>И не таила, Теодоро,<br>Что от тебя я без ума.<br>Попутно я превознесла<br>Твой нрав, и слог, и дарованья;<br>Она, в порыве состраданья,<br>Была душевна и мила,<br>Удачным выбор мой нашла,<br>Удачней всякого другого,<br>И тотчас же дала мне слово,<br>Что поскорей поженит нас:<br>Так умилил ее рассказ<br>О муках сердца молодого.<br>Я думала--она взбесится,<br>Поставит вверх ногами дом,<br>И мы с тобою пропадем,<br>И остальным не схорониться.<br>Но кровь великих в ней струится,<br>И ум высокий в ней живет;<br>Он дал себе во всем отчет<br>И оценил твои заслуги.<br>Поистине блаженны слуги<br>У рассудительных господ!<br><br>Теодоро<br><br>Тебе графиня обещала<br>Нас поженить?<br><br>Марсела<br><br>Я ей родня,<br>Она и жалует меня.<br><br>Теодоро<br>(в сторону)<br><br>И как я с самого начала<br>Не понял своего провала!<br>Так глупо разыграть тупицу!<br>Взять и поверить в небылицу!<br>Графине, ей--меня любить!<br>Чтоб этот ястреб вздумал бить<br>Такую низменную птицу!<br><br>Марсела<br><br>Ты что бормочешь шепотком?<br><br>Теодоро<br><br>Она меня сейчас видала,<br>Но даже слова не сказала<br>Про то, что я вчера тайком<br>Бежал, укутанный плащом,<br>Как вор, проникший на чердак.<br><br>Марсела<br><br>Она себя держала так,<br>Чтоб совершенных преступлений<br>Не облагать законной пеней<br>Тяжеле, чем законный брак.<br>Графиня подтвердить хотела,<br>Что нет для любящих сердец<br>Уместней кары, чем венец.<br><br>Теодоро<br><br>И лучше нет развязки дела.<br><br>Марсела<br><br>Так ты согласен?<br><br>Теодоро<br><br>Да, Марсела<br><br>Марсела<br><br>Чем ты скрепишь?<br><br>Теодоро<br><br>Кольцом объятий:<br>Они -- автографы симпатий<br>И росчерки пера любви,<br>И поцелуй, с огнем в крови,<br>Скрепляет лучше всех печатей.<br><br>ЯВЛЕНИЕ ДВАДЦАТОЕ<br><br>Диана. Те же.<br><br>Диана<br><br>Вы исправляетесь, я вижу,<br>И это мне весьма приятно.<br>Наставник должен быть доволен,<br>Что он потратил труд недаром.<br>Не беспокойтесь, я прошу вас.<br><br>Теодоро<br><br>Я здесь Марселе признавался,<br>Как я вчера отсюда вышел<br>С таким терзанием и страхом --<br>Не приняла бы ваша милость<br>За оскорбительную шалость<br>Мое правдивое желанье<br>Жениться на ее служанке--<br>Что я готов был умереть;<br>Когда, в ответ, она сказала,<br>Что вы явили в этом деле<br>Такую доброту и благость,<br>Я заключил ее в объятья.<br>Я мог бы сочинить сто сказок,<br>Когда хотел бы вам солгать;<br>Но лучше всякого обмана--<br>В беседе с умным человеком<br>Сказать ему простую правду.<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">Вы проявили, Теодоро,<br>Преступную неблагодарность,<br>Забыв приличья в этом доме.<br>И я никак не обкидала,<br>Чтобы в моем великодушье<br>Вы почерпнуть решили право<br>Так дерзко распустить себя.<br>Когда любовь переступает<br>В бесстыдство, то уже ничто<br>Не оградит ее от кары.<br>Поэтому пускай Марсела,<br>Пока еще вы не женаты,<br>Побудет взаперти одна.<br>Я не хочу, чтобы служанки<br>Могли увидеть вас вдвоем,<br>А то им всем придет желанье<br>Повыйти замуж, как она.<br>Эй, Доротея!<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ПЕРВОЕ<br><br>Доротея. Те же.<br><br>Доротея<br><br>Что прикажет<br>Сеньора?<br><br>Диана<br><br>Этим вот ключом<br>Ты у меня в опочивальне<br>Запрешь Марселу. Эти дни<br>Ей нужно кое-чем заняться.<br><br>(Марселе.)<br><br>Ты не считай, что я сержусь.<br><br>Доротея<br>(тихо Марселе)<br><br>Что это, милая?<br><br>Марсела<br><br>Тиранство<br>И злополучная звезда.<br>Она берет меня под стражу,<br>Чтоб отомстить за Теодоро.<br><br>Доротея<br><br>Тебе тюремный ключ не стршен:<br>Любовь ревнивые замки<br>Волшебной силой отворяет.<br><br>Уходят Марсела и Доротея.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ВТОРО<br><br>Диана, Теодоро<br><br>Диана<br><br>Так вы желаете жениться?<br><br>Теодоро<br><br>Мое первейшее желанье --<br>Быть вам приятным, ваша милость.<br>Поверьте мне, не так ужасна<br>Моя вина, как вам сказали.<br>Вы сами знаете, что зависть<br>Рисуют с жалом скорпиона.<br>Когда б Овидий знал, что значит<br>Служить, то он не в диких чащах<br>И не в горах живописал бы<br>Ее тлетворную обитель:<br>Здесь дом ее и здесь держава.<br><br>Диана<br><br>Но вы же любите Марселу?<br>Ведь это правда?<br><br>Теодоро<br><br>Я прекрасно<br>Прожить бы мог и без Марселы.<br><br>Диана<br><br>А по ее словам, вы разум<br>Теряете из-за нее.<br><br>Теодоро<br>Его и потерять не жалко.<br>Но только верьте, ваша милость:<br>Хотя Марсела стоит самых<br>Изысканных и неясных чувств,<br>Я не люблю ее ни капли.<br><br>Диана<br><br>А вы ей разве не держали<br>Речей, способных отуманить<br>И не такую, как она?<br><br>Теодоро<br><br>Слова, сеньора, стоят мало.<br><br>Диана<br><br>Скажите, что вы говорили?<br>Как признаются в нежной страсти<br>Мужчины женщинам?<br><br>Теодоро<br><br>Как всякий,<br>Кто обожает и вздыхает,<br>Приукрашая сотней врак<br>Одну сомнительную правду.<br><br>Диана<br><br>Так; но в каких же выраженьях?<br><br>Теодоро<br><br>Сеньора, ваш жестокий натиск<br>Меня смущает. &quot;Эти очи,--<br>Я говорил,--струят сиянье,<br>В котором мой единый свет;<br>А драгоценные кораллы<br>И перлы этих уст небесных...&quot;<br><br>Диана<br><br>Небесных?<br><br>Теодоро<br><br>Да, и не иначе,<br>Все это азбука, сеньора,<br>Для тех, кто любит и желает.<br><br>Диана<br><br>Я вижу, вкус у вас плохой.<br>Должна сказать, что он немало<br>Роняет вас в моих глазах.<br>В Марселе больше недостатков,<br>Чем прелестей; они видней<br>Тому, кто ближе наблюдает<br>Притом еще она грязнуля,<br>За что ей попадает часто...<br>Но я нисколько не хочу<br>Ее порочить перед вами;<br>А то бы я могла такое<br>Порассказать... Итак, оставим<br>И прелести и недостатки.<br>Я вам желаю с нею счастья<br>И буду рада вашей свадьбе.<br>Но раз уже вы доказали,<br>Что вы такой знаток в любви,<br>То помогите, бога ради,<br>Советом той моей подруге.<br>Ее томит и сна лишает<br>Любовь к простому человек<br>Решив отдаться этой страсти,<br>Она свою унизит честь;<br>А поборов свои мечтанья,<br>Сойдет от ревности с ума.<br>Ее возлюбленный не знает,<br>Что он любим, и робок с нею,<br>Хоть он умен, и очень даже.<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Какой же я в любви знаток?<br>Я, видит бог, неподходящий<br>Советчик.<br><br>Диана<br><br>Или вы к Марселе<br>Не чувствуете нежной страсти?<br>Не признавались ей в любви?<br>Будь у дверей язык, немало<br>Они могли бы рассказать...<br><br>Теодоро<br><br>Рассказ их был бы незанятен.<br><br>Диана<br><br>Ага, вот вы и покраснели<br>И подтверждаете румянцем<br>Все то, что отрицал язык.<br><br>Теодоро<br><br>Она, наверно, вам болтает<br>Какие-нибудь небылицы.<br>Я за руку ее однажды<br>Взял и сейчас же отпустил.<br>В чем я виновен, я не знаю.<br><br>Диана<br><br>Возможно; но бывают руки,<br>Как образки в господнем храме:<br>Их отпускают, приложась.<br><br>Теодоро<br><br>Марсела -- глупая ужасно.<br>Я, правда, раз себе позволил,<br>Хоть и с великим содроганьем,<br>К прохладным лилиям и снегу<br>Припасть горящими губами.<br><br>Диана<br><br>К прохладным лилиям и снегу?<br>Полезно знать, что этот пластырь<br>Так освежает пылкость сердца.<br>Каков же ваш совет, однако?<br><br>Теодоро<br><br>Я мог бы вам ответить только,<br>Что если сказанная дама,<br>Любя простого человека,<br>Боится честь свою умалить,<br>То пусть она им насладится,<br>Оставшись, с помощью обмана,<br>Неузнанной.<br><br>Диана<br><br>Совет опасный:<br>Что, если он ее узнает?<br>Не лучше ли его убить?<br><br>Теодоро<br><br>Что ж, Марк Аврелий, по преданью,<br>Своей супруге Фаустине<br>Кровь гладиатора в стакане<br>Дал выпить для смягченья мук;<br>Но эти римские забавы<br>Годны в языческой стране.<br><br>Диана<br><br>Вы правы; больше нет Торкватов,<br>Виргиниев или Лукреций<br>В наш век; а в те века бывали<br>И Фаустины, и Поппеи,<br>И Мессалины, как мы знаем.<br>Вы мне напишете письмо,<br>Где бы об этом рассуждалось.<br>Прощайте.<br><br>(Падает.)<br><br>Ай, я оступилась!<br>Чего вы смотрите? Подайте<br>Скорее руку мне.<br><br>Теодоро<br><br>Почтенье<br>Меня невольно удержало.<br><br>Диана<br><br>Ну что за вежливая грубость!<br>Сквозь плащ руки не предлагают.<br><br>Теодоро<br><br>Так, провожая вас к обедне,<br>Вам подает ее Отавьо.<br><br>Диана<br><br>Его руки я не прошу;<br>Она уже седьмой десяток<br>Справляет в должности руки<br>И ходит, наряжаясь в саван.<br>Спеша к упавшему на помощь,<br>Обматывать ее шелками--<br>Не лучше, чем рядиться в панцирь,<br>Когда ваш друг попал в засаду:<br>Пока придете--он убит.<br>Притом же я считаю гадким<br>Из вежливости кутать руку,<br>Как это ведено жеманством;<br>Рука, когда она честна,<br>Ни перед кем лица не прячет.<br><br>Теодоро<br><br>Я эту честь ценю высоко.<br><br>Диана<br><br>Когда б вы были провожатым<br>Вельможной дамы, вы, конечно,<br>В плаще бы руку подавали.<br>Но вы пока мой секретарь.<br>И секретарь держать обязан<br>Мое падение в секрете,<br>Когда желает сам подняться.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ТРЕТЬЕ<br><br>Теодоро.<br><br>Теодоро<br><br>Я грежу? Нет, все это лучше грез.<br>Я постигаю милую науку:<br>Она меня просила дать ей руку,<br>И бледный страх сменился цветом роз.<br><br>Что делать мне? Какой смешной вопрос!<br>Мне счастье дарит верную поруку.<br>Неся в душе пленительную муку,<br>Пойду к победе, не страшась угроз.<br><br>Однако как же изменить Марселе?<br>Ведь женщины--наш светоч в царстве тьмы,<br>И так бросать их -- нет греха тяжеле.<br><br>Но ведь они за полмотка тесьмы<br>И сами нас бросают, в самом деле;<br>Так пусть страдают, как страдаем мы.<br><br> * ДЕЙСТВИЕ ВТОРОЕ *<br><br>Улица.<br><br>ЯВЛЕНИЕ ПЕРВОЕ<br><br>Граф Федерико, Леонидо<br><br>Федерико<br><br>Ее ты видел?<br><br>Леонидо</div>", "cover": false}, {"html": "<div class=\"textPage\">В этот храм<br>Она вошла, пленяя взоры,<br>Неслышной поступью Авроры,<br>Струящей первый свет лугам.<br>Вам не придется долго ждать<br>У входа в божию обитель:<br>Священник здешний не любитель<br>Обедней паству утруждать.<br><br>Федерико<br><br>Я жажду с нею объясниться!<br><br>Леонидо<br><br>Вы как кузен, само собой,<br>Ее проводите домой.<br><br>Федерико<br><br>С тех пор как я хочу жениться,<br>Я знаю, ей мое родство<br>Уже внушает подозренья;<br>А прежде я не знал стесненья<br>И не боялся ничего.<br>Будь он кузен, будь он знакомый,<br>Пока мужчина не влюблен,<br>Свободно к даме ходит он<br>И запросто, и на приемы.<br>Но стоит лишь ему влюбиться,<br>Он реже посещает дом,<br>Он даже говорит с трудом,<br>Он робок, он всего боится.<br>Вот и со мной случилось так,<br>С тех пор как я в сетях Дианы;<br>Из-за моей сердечной раны<br>Я отлучен от многих благ,<br>Я с нею видеться не смею<br>Так, как в былые времена.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Рикардо и Сельо, остающиеся поодаль<br>от Федерико и Леонидо.<br><br>Сельо<br><br>Я говорю вам, что она<br>Пошла пешком, и слуги с нею.<br><br>Рикардо<br><br>До церкви близко, и Диана,<br>Блеснуть желая красотой,<br>Почтила камни мостовой.<br><br>Сельо<br><br>Видали вы, как утром рано<br>Восходит солнце в ореоле<br>Огнелучистого венца<br>И затмевает блеск Тельца,<br>Пасущегося в алом поле,--<br>Как называл один поэт<br>Зарей пылающие тучи?<br>Так, проливая пламень жгучий,<br>Двух солнц победоносный свет,<br>Еще роскошней и прекрасней,<br>Прошла Диана де Бельфлер.<br><br>Рикардо<br><br>Ты хитроумен и остер,<br>И я твоей доволен басней.<br>Ты прав еще и потому,<br>Что солнце, идя Зодиаком,<br>Дарует свет различным знакам,<br>Томимым ревностью к нему.<br>Уже лучей его венца<br>Граф Федерико ждет, как видно.<br><br>Сельо<br><br>Один из вас, сколь ни обидно,<br>Изображает знак Тельца.<br><br>Рикардо<br><br>Ему на это все права,<br>Как первому и как кузену.<br>Я прихожу ему на смену<br>И буду в небе знаком Льва.<br><br>Федерико<br><br>Маркиз Рикардо?<br><br>Леонидо<br><br>Это он.<br><br>Федерико<br><br>Признаться, в этом нет сюрприза,<br>Что мы встречаем здесь маркиза.<br><br>Леонидо<br><br>Маркиз, ей-богу, недурен.<br><br>Федерико<br>Уж не ревнуешь ли ты сам?<br>И это говоришь со злобы?<br><br>Леонидо<br><br>А вы ревнуете?<br><br>Федерико<br><br>Еще бы.<br>Таким внимая похвалам!<br><br>Леонидо<br><br>Забудьте ревность навсегда:<br>Диана всех бесстрастьем сгубит.<br><br>Федерико<br><br>А вдруг она его полюбит?<br>Она ведь женщина.<br><br>Леонидо<br><br>О да. Но так горда и так кичлива,<br>Что лишь собою занята.<br><br>Федерико<br><br>Всегда надменна красота.<br><br>Леонидо<br><br>Неблагодарность некрасива.<br><br>Сельо<br><br>Она идет.<br><br>Рикардо<br><br>День снова ясен,<br>И в сердце исчезает ночь.<br><br>Сельо<br><br>Вы подойдете?<br><br>Рикардо<br><br>Я не прочь,<br>Когда соперник мой согласен.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Диана, Отавьо, Фабьо;<br>следом --Марсела, Доротея и Анарда, в домино. Те же.<br><br>Федерико<br>(Диане)<br><br>Я медлил здесь, в надежде вас увидеть.<br><br>Диана<br><br>Я очень рада встрече с вами, граф.<br><br>Рикардо<br><br>И я, сеньора, с тою же надеждой<br>Пришел приветствовать и проводить вас.<br><br>Диана<br><br>Сеньор маркиз, я счастлива, поверьте.<br>Благодарю вас.<br><br>Рикардо<br><br>Всюду быть, где вы,<br>Повелевает мне любовь.<br><br>Федерико<br>(своему слуге)<br><br>Увы,<br>Мне кажется, я лишний воздыхатель.<br><br>Леонидо<br><br>Смелее! Не смущайтесь!<br><br>Федерико<br><br>Ах, приятель.<br>Кто знает, что его речам не рады,<br>Тот поневоле молча клонит взгляды.<br><br>Уходят.</div>", "cover": false}, {"html": "<div class=\"textPage\">Зала во дворце графини.<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Теодоро.<br><br>Теодоро<br><br>О новая мечта моя,<br>Я за тобой слежу с улыбкой,<br>Как ты, на крыльях тучи зыбкой,<br>Летишь в надземные края;<br>Остановись, взываю я,<br>Мечта моя, остановись!<br>Ты безрассудно мчишься ввысь,<br>С тобой мы оба безрассудны;<br>Хотя, кто ищет жребий чудный,<br>Тот говорит тебе: стремись!<br>Ты высоко вознесена,<br>И нет конца твоей надежде.<br>Мечта, мечта, проверим прежде,<br>На чем основана она.<br>Я знаю, да, ты влюблена,<br>И ты ответишь, знаю сам,<br>Что веришь собственным глазам.<br>Скажи глазам: &quot;Вам это снится,<br>И на соломе не годится<br>Сооружать алмазный храм&quot;.<br>Винить тебя я был бы рад,<br>Когда наступит час расплаты.<br>Но, ах, мы оба виноваты,--<br>Я точно так же виноват.<br>Ты скажешь--и права стократ,--<br>Что если ты от солнца близко<br>И в искрах пламенного диска<br>Твои воскрылья обожглись,<br>То ты взнеслась в такую высь<br>Лишь потому, что я так низко;<br>Тот, кто подвергся нападенью.<br>К насилью повода не дав,<br>В своей защите будет прав;<br>Мечта, не уступай сомненью,<br>Служи любви и дерзновенью<br>И пусть грозит нам гибель злая,<br>Мы смело скажем, погибая:<br>Из-за меня погибла ты,<br>А я--вослед моей мечты,<br>Куда стремились мы,-- не зная.<br>Итак, вперед, хотя б всечасно<br>Грозила гибелью стезя;<br>Того погибшим звать нельзя,<br>Кто погибает так прекрасно.<br>Других величат громогласно<br>За их победы; я таков,<br>Что прославлять тебя готов,<br>Мечта, за гибель и паденье.<br>Такое славное крушенье<br>Рождает зависть у врагов.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Тристан, Теодоро.<br><br>Тристан<br><br>Когда средь стольких велеречий<br>Есть место письмецу Марселы<br><br>(Она покинула пределы<br>Своей тюрьмы и жаждет встречи)<br>,<br>Безмездно вам вручу пакет.<br>Ведь тот, кто больше не полезен,<br>Забыт и сердцу не любезен,--<br>Таков придворный этикет.<br>Вельможа в случае<br>(а с ним<br>Вы, доложу вам, очень схожи)<br><br>Толпой, набившейся в прихожей,<br>И осаждаем, и тесним.<br>Но стоит также и ему<br>Познать непостоянство рока,--<br>Отхлынут все в мгновенье ока,<br> Как будто он схватил чуму.<br>Велите уксусом, быть может,<br>Попрыскать это письмецо?<br><br>Теодоро<br><br>Оно, как и твое лицо,<br>Мне самым видом желчь тревожит.<br>Дай; побывав в твоих руках,<br>Зараза выдохлась с испугу.<br><br>(Читает.)<br><br>&quot;Марсела своему супругу&quot;.<br>Супругу? Этакий размах!<br>Как глупо!<br><br>Тристан<br><br>Глупо, да, нет слов.<br><br>Теодоро<br><br>Ужель, ты думаешь, охота<br>Моей судьбе, с ее полета,<br>Глядеть на этих мотыльков?<br><br>Тристан<br><br>Такому дивному герою<br>Прочесть письмо--не все ль равно?<br>Ведь не гнушается вино<br>Над ним кружащей мошкарою.<br>Притом же мотылек-Марсела<br>Для вас, в не так давно былом,<br>Была увесистым орлом.<br><br>Теодоро<br><br>Мой дух, вознесшись до предела<br>Где блещет солнце в нимбах славы,<br>Дивится сверху, что она<br>И вообще еще видна.<br><br>Тристан<br><br>Ответ простой и величавый.<br>Но с письмецом что делать этим?<br><br>Теодоро<br><br>А вот что!<br><br>Тристан<br><br>Вы порвали?<br><br>Теодоре<br><br>Да.<br><br>Тристан<br><br>Зачем?<br><br>Теодоро<br><br>Так меньше с ним труда.<br>Так мы скорей всего ответим.<br><br>Тристан<br><br>Все же вы порвали зря.<br><br>Теодоро<br><br>Отучись от прежней меры.<br><br>Тристан</div>", "cover": false}, {"html": "<div class=\"textPage\">Ладно; все вы, кавалеры,<br>У любви аптекаря.<br>Те -- рецепты, вы -- записки<br>Натыкаете на гвоздь.<br>Recipe / Прими<br>(лат.)<br>/ восторг и злость,<br>Сок фиалок и редиски. Recipe ожесточенье<br>И sirupi / Сиропа<br>(лат.)<br>/ огурцорум,<br>Вместе с кровью Ноздриорум,<br>Чтоб настало облегченье.<br>Recipe разлуку с милой,<br>Пластырь налепи на грудь;<br>Он идущим в дальний путь<br>Помогает с дивной силой.<br>Recipe законный брак,<br>Разведенный медом хмель;<br>После сладких двух недель<br>Сразу клизму натощак.<br>Signum / Знак<br>(лат.)<br>/ recipe небесный,<br>Что зовется Козерог;<br>Тот умрет, кто занемог,<br> Если силы нет телесной.<br>Recipe из модной лавки<br>Жемчуг, бархат и атлас;<br>Кошелечку в тот же час<br>Дать таблеток для поправки.<br>Друг за дружкой круглый год<br>На гвозде растут бумажки.<br>В день расплаты -- нет поблажки:<br>Жив больной или помрет,<br>Все рецепты рвут гуртом.<br>Вы, однако ж, слишком смелы:<br>Разорвать рецепт Марселы,<br>Не узнав, что было в нем.<br><br>Теодоро<br><br>Любезный друг, твои слова<br>Как будто отдают бутылкой.<br><br>Тристан<br><br>Верней, от молодости пылкой<br>У вас кружится голова.<br><br>Теодоро<br><br>Тристан, для всех, кто в мире дышит,<br>Черед счастливый настает.<br>Не знает счастья только тот,<br>Кто зова счастья не расслышит.<br>Иль я приму конец ужасный,<br>Иль буду графом де Бельфлор.<br><br>Тристан<br><br>В былые времена, сеньор,<br>Жил Цезарь, герцог своевластный.<br>Он начертал в своем гербе:<br>&quot;Иль Цезарь, иль ничто&quot;. И вот<br>Такой случился оборот<br>В его заносчивой судьбе,<br>Что написали вслед за тем:<br>&quot;Иль Цезарь, иль ничто,--сказал ты,<br>И то, и это испытал ты:<br>Был Цезарем -- и стал ничем&quot;.<br><br>Теодоро<br><br>И все ж я принимаю бой,<br>А там судьба решить вольна<br>Как ей угодно.<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Марсела и Доротея,<br>не замечая Теодоро и Тристана.<br><br>Доротея<br><br>Ни одна<br>Из тех, кто служит здесь с тобой,<br>Так не сочувствует, Марсела<br>Твоим несчастиям, как я.<br><br>Марсела<br><br>В моей тюрьме любовь твоя<br>Таким теплом меня согрела,<br>И я за все твои услуги<br>Перед тобой в таком долгу,<br>Что лишь одно сказать могу:<br>Верней ты не найдешь подруги.<br>Анарда думает, наверно,<br>Что я не знаю, как она<br>В красоты Фабьо влюблена.<br>Поэтому она так скверно<br>Себя со мной и повела.<br><br>Доротея<br><br>Смотри, кто здесь.<br><br>Марсела<br><br>Мой дорогой!<br><br>Теодоро<br><br>Не подходи, Марсела, стой.<br><br>Марсела<br><br>Мой милый, как? Я так ждала,<br>Я так хотела этой встречи!<br><br>Теодоро<br><br>Не преступай строжайшей меры.<br>В дворцах и самые шпалеры<br>Подчас владеют даром речи.<br>Ты знаешь, почему на них<br>Изображаются фигуры?<br>Чтобы напомнить: кто-то хмурый,<br>Быть может, за ковром притих.<br>Немой царевич речь обрел,<br>Отца увидев умерщвленным;<br>Так и вещам неоживленным<br>Внушен таинственный глагол.<br><br>Марсела<br><br>Ты прочитал мое письмо?<br><br>Теодоро<br><br>Его порвал я, не читая;<br>А с ним -- причина тут простая --<br>И чувство порвано само.<br><br>Марсела<br><br>А это вот обрывки?<br><br>Теодоро<br><br>Да.<br><br>Марсела<br><br>И ты порвал мою любовь?<br><br>Теодоро<br><br>Не лучше ль так, чем вновь и вновь<br>Ждать, что обрушится беда<br>И уничтожит нас с тобой?<br>И если ты того же мненья,<br>Оставим эти объясненья<br>И примем данное судьбой.<br><br>Марсела<br><br>Ты говоришь...<br><br>Теодоро<br><br>Что я намерен<br>Ни в чем не причинять отныне<br>Неудовольствия графине.<br><br>Марсела</div>", "cover": false}, {"html": "<div class=\"textPage\">Что ты любви моей неверен,<br>Уже давно читала я<br>В твоих глазах.<br><br>Теодоро<br><br>Прощай, Марсела.<br>Любовь сегодня отлетела,<br>Но мы по-прежнему друзья.<br><br>Марсела<br><br>Прийти к решению такому,<br>Прийти к жестокости такой!..<br><br>Теодоро<br><br>Я соблюдаю свой покой,<br>А также уваженье к дому<br>Которому я с юных лет<br>Обязан всем.<br><br>Марсела<br><br>Постой, минутку!<br><br>Теодоро<br><br>Отстань.<br><br>Марсела<br><br>Скажи, ты это в шутку?<br>Послушай...<br><br>Теодоро<br><br>Просто силы нет!<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Марсела, Доротея, Тристан.<br><br>Марсела<br><br>Тристан, Тристан!<br><br>Тристан<br><br>Тебе чего?<br><br>Марсела<br><br>Что это значит?<br><br>Тристан<br><br>Прихоть чувства.<br>Он тайнам этого искусства<br>У вас учился.<br><br>Марсела<br><br>У кого?<br><br>Тристан<br><br>У женщин, жалящих без жала.<br><br>Марсела<br><br>Скажи ему...<br><br>Тристан<br><br>Скажи сама.<br>Я подпись этого письма,<br>Я ножны этого кинжала,<br>Я рукоятка этой шпаги,<br>Я камень этого забора,<br>Я пляска этого танцора,<br>Я обувь этого бродяги,<br>Я только дышло этой фуры,<br>Я только цифра этой сметы,<br>Я только хвост его кометы,<br>Я только тень его фигуры,<br>Короче -- я давным-давно<br>На этом пальце только ноготь,<br>И я прошу меня не трогать,<br>Пока мы вместе с ним одно.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ВОСЬМОЕ<br><br>Марсела, Доротея.<br><br>Марсела<br><br>Ну, что ты скажешь?<br><br>Доротея<br><br>Что тут можно<br>Сказать?<br><br>Марсела<br><br>И это твой ответ?<br>А я скажу.<br><br>Доротея<br><br>А я так нет.<br><br>Марсела<br><br>А я так да.<br><br>Доротея<br><br>Неосторожно<br>Так забываться. О коврах<br>Мы слышали с тобою обе.<br><br>Марсела<br><br>О нет, любовь, в ревнивой злобе,<br>Не знает, что такое страх.<br>Не будь графиня столь надменной,<br>Я бы могла предположить,<br>Что Теодоро, может быть,<br>Живет надеждой сокровенной;<br>Он что-то у нее в чести.<br><br>Доротея<br><br>Молчи; ты говоришь с досады.<br><br>Марсела<br><br>Пусть он теперь не ждет пощады!<br>Я знаю, как себя вести,<br>Не так глупа. Я отомщу.<br><br>ЯВЛЕНИЕ ДЕВЯТОЕ<br><br>Фабьо. Те же.<br><br>Фабьо<br><br>Здесь секретарь? Большая спешка.<br><br>Марсела<br><br>Что это? Новая насмешка?<br><br>Фабьо<br><br>Ей-богу, я его ищу.<br>Графиня, я боюсь, заждалась.<br><br>Марсела<br><br>Ну, может подождать хоть раз.<br><br>(Указывая на Доротею.)<br><br>Спроси у ней, как я сейчас<br>О Теодоро отзывалась.<br>Как он, такого тунеядца<br>Второго нет,--ищи, где хочешь.<br><br>Фабьо<br><br>Ты это что ж меня морочишь?<br>Вы сговорились притворяться,<br>Я знаю, для отводу глаз.<br>Да только это все напрасно.<br><br>Марсела<br><br>Мы? Сговорились? Что ты!<br><br>Фабьо<br><br>Ясно;<br>Подстроен заговор у вас.<br><br>Марсела<br><br>Я Теодоро от себя<br>Не отгоняла, да, конечно;<br>Но в сердце жил другой, жил вечно,<br>Во всем похожий на тебя.<br><br>Фабьо<br><br>Похожий на меня?<br><br>Марсела<br><br>Ведь ты<br><br>Сам на себя похож?<br><br>Фабьо<br><br>Похож.<br><br>Марсела<br><br>Когда мои признанья--ложь<br>И не с тобой мои мечты,<br>Когда не ты -- мой клад заветный,<br>Когда я не твоя, мой друг,<br>Пусть я умру средь страшных мук,<br>В терзаньях страсти безответной.<br><br>Фабьо<br><br>Здесь все--обман, ты все наврала.<br>А впрочем, если ты умрешь,<br>Ты только душу мне вернешь,<br>Которую давно украла.<br>К чему весь этот вздор трескучий,<br>Не понимаю, хоть убей.<br><br>Доротея<br><br>Любезный Фабьо, не робей,<br>Используй этот редкий случай.<br>Тебя Марсела поневоле<br>Сегодня любит.<br><br>Фабьо<br><br>Нам ценна<br>Любовь, когда она вольна.<br><br>Доротея<br><br>Наш Теодоро--ветер в поле;<br>Его давно пропал и след.<br><br>Фабьо</div>", "cover": false}, {"html": "<div class=\"textPage\">Иду его искать. Ну, что ж!<br>Он сплоховал--я стал хорош.<br>Любовь-то, стало быть,-- пакет:<br>Надписано секретарю,<br>А нет его--вручить другому.<br>Но я не горд, я по-простому<br>И на обиду не смотрю.<br>В добре и в зле--я твой до гроба;<br>Пусть так и будет решено.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДЕСЯТОЕ<br><br>Марсела, Доротея<br><br>Доротея<br><br>Ты это что ж?<br><br>Марсела<br><br>Мне все равно:<br>Во мне кипит такая злоба.<br>Скажи: Анарда Фабьо любит?<br><br>Доротея<br><br>Да, любит.<br><br>Марсела<br><br>Вот и в добрый час:<br>Я отплачу двоим зараз.<br>Любовь, как бог, и мстит и губит.<br><br>ЯВЛЕНИЕ ОДИННАДЦАТОЕ<br><br>Диана, Анарда. Те же.<br><br>Диана<br>(Анарде)<br><br>Так было надо, повторяю.<br>Оставим этот разговор.<br><br>Анарда<br><br>Сеньора, с некоторых пор<br>Я вас совсем не понимаю.<br>Ах, посмотрите: здесь Марсела,<br>И Доротея вместе с ней.<br><br>Диана<br><br>Она за эти пять-шесть дней<br>Мне хуже смерти надоела.<br>Марсела, выйди вон.<br><br>Марсела<br><br>Пойдем.<br><br>(Тихо Доротее.)<br><br>Ты видишь, что за ветер дует:<br>Она не то меня ревнует,<br>Не то подозревает в чем.<br><br>Уходят Марсела и Доротея.<br><br>ЯВЛЕНИЕ ДВЕНАДЦАТОЕ<br><br>Диана, Анарда.<br><br>Анарда<br><br>Дозвольте мне два слова.<br><br>Диана<br><br>Да.<br><br>Анарда<br><br>Те два сеньора, что сейчас<br>Ушли отсюда, любят вас,<br>А вы жестоки, как всегда.<br>Вы холодней Анаксареты,<br>Самой Лукреции стыдливей.<br>Быть надо к людям справедливей...<br><br>Диана<br><br>Нельзя ли прекратить советы?<br><br>Анарда<br><br>Какой вам надобен жених?<br>Маркиз Рикардо, например,<br>Чем не отличный кавалер,<br>И чем он хуже остальных,<br>Чье имя пышно и велико?<br>И благороднейшей из дам<br>Далеко было бы не срам<br>Пойти за графа Федерико.<br>А вы их гоните опять,<br>И каждый горько безутешен.<br><br>Диана<br><br>Один -- дурак, другой -- помешан,<br>А ты обоим им под стать.<br>Я потому их не люблю,<br>Что я люблю, и потому<br>Люблю, что сердцу моему<br>Надежды нет.<br><br>Анарда<br><br>Как? Я не сплю?<br>Вы любите?<br><br>Диана<br><br>Ах, разве я<br>Не женщина?<br><br>Анарда<br><br>Скорее лед,<br>Такой, что солнца луч замрет,<br>Едва задев его края.<br><br>Диана<br><br>И вот, все эти глыбы льда,<br>В сверканье холода и света,<br>У ног безродного.<br><br>Анарда<br><br>Кто это?<br><br>Диана<br><br>Анарда, я еще горда,<br>И долг перед собой я знаю;<br>Кто он, я скрою от тебя;<br>Скажу лишь, что, его любя,<br>Свое величье я пятнаю.<br><br>Анарда<br><br>Царицы древности любили<br>Одна--коня, одна--быка;<br>О прочих умолчу пока,<br>Чтоб их не обижать в могиле;<br>А здесь не зверь. Любовь к мужчине<br>Вас никогда не опорочит.<br><br>Диана<br><br>Кто любит, может, если хочет,<br>Возненавидеть. И отныне<br>Мою любовь я истреблю.<br><br>Анарда<br><br>А сила будет?<br><br>Диана<br><br>Будет сила.<br>Пока хотела, я любила,<br>А захочу, и разлюблю.<br><br>За сценой музыка.<br><br>Кто там поет?<br><br>Анарда<br><br>Ах, это Клара<br>И Фабьо.<br><br>Диана<br><br>Мне и песни скучны.<br><br>Анарда<br><br>Любовь и музыка созвучны.<br>Что нагадает вам гитара?<br><br>Песня за сценой.<br>О, если б можно, если б можно было,<br>Чтоб самовольно сердце разлюбило!<br>Зачем, зачем того не может быть,<br>Чтоб самовольно взять и разлюбить!<br><br>Анарда<br><br>Ну вот, вы слышали? Похоже,<br>Что песня с вами не согласна.<br><br>Диана<br><br>Я это слышала прекрасно,<br>Но и себя я знаю тоже,<br>И знаю, что могу навек<br>Возненавидеть, как любила.<br><br>Анарда<br><br>Кому дана такая сила,<br>Тот небывалый человек.<br><br>ЯВЛЕНИЕ ТРИНАДЦАТОЕ<br><br>Теодоро. Те же.<br><br>Теодоро<br><br>Сеньора, Фабьо мне сказал,<br>Что вы меня как будто звали.</div>", "cover": false}, {"html": "<div class=\"textPage\">Диана<br><br>Я жду вас несколько часов.<br><br>Теодоро<br><br>Я поспешил явиться сразу;<br>Простите, если виноват.<br><br>Диана<br><br>Моей руки--для вас не тайна --<br>Весьма усердно ищут двое.<br><br>Теодоро<br><br>Я это знаю.<br><br>Диана<br><br>Оба статны,<br>Красивы оба.<br><br>Теодоро<br><br>Даже очень.<br><br>Диана<br><br>Не посоветовавшись с вами,<br>Не знаю, как решить. Скажите:<br>Так за кого мне выйти замуж?<br><br>Теодоро<br><br>Какой же я могу, сеньора,<br>Подать совет там, где решает<br>Единственно ваш личный вкус?<br>А мне приятен тот хозяин,<br>Которого дадите вы.<br><br>Диана<br><br>Я вас почтила лестным званьем<br>Советника в столь важном деле,<br>Но вы его не оправдали.<br><br>Теодоро<br><br>Сеньора, разве с этим делом<br>Не лучше обратиться к старшим?<br>Вам мог бы опытом и званьем<br>Помочь ваш майордом Отавьо,<br>Который много видел в жизни.<br><br>Диана<br><br>Я бы хотела, чтоб вы сами<br>Себе избрали господина.<br>По-вашему, маркиз приятней,<br>Чем мой кузен?<br><br>Теодоро<br><br>Приятней, да.<br><br>Диана<br><br>Его и выберу. Ступайте<br>Его поздравить от меня.<br><br>Уходят Диана и Анарда.<br><br>ЯВЛЕНИЕ ЧЕТЫРНАДЦАТОЕ<br><br>Теодоро.<br><br>Теодоро<br><br>Кто знал подобное несчастье!<br>Кто видел взбалмошней решенье!<br>Кто глубже испытал превратность!<br>Так вот они, мои порывы<br>Взлететь! О солнце, пусть твой пламень<br>Испепелит мои крыла,--<br>Уже расщеплены лучами<br>Не в меру дерзостные перья,<br>Те, что взманил прекрасный ангел!<br>Диана обманулась тоже...<br>О, как я мог так безоглядно<br>Поверить ласковому слову!<br>Давно известно,--меж неравных<br>Не уживается любовь.<br>Но разве можно удивляться,<br>Что этот взгляд меня опутал?<br>Ведь он бы мог завлечь обманом<br>И хитроумного Улисса.<br>Я никого винить не вправе:<br>Лишь я виновен. И потом--<br>Что я в конце концов теряю?<br>Скажу себе, что у меня<br>Был сильный приступ лихорадки<br>И что, пока она тянулась,<br>Я бредил чем-то очень странным.<br>И только. Гордая мечта,<br>Простись с надеждой невозвратной<br>Стать графом де Бельфлор; направь<br>К знакомым берегам свой парус;<br>Люби, как встарь, свою Марселу;<br>С тебя вполне Марселы хватит.<br>Графини пусть маркизов ищут;<br>Любовь предпочитает равных.<br>В бесплотном ветре ты родилась,<br>Моя мечта, и ветром стала;<br>Кто недостоин высоты,<br>Тому судьба очнуться павшим.<br><br>ЯВЛЕНИЕ ПЯТНАДЦАТО<br><br>Фабьо. Теодоро.<br><br>Фабьо<br><br>Вы видели графиню?<br><br>Теодоро<br><br>Видел, милый,<br>И счастлив тем, что от нее узнал.<br>Ей опостыл удел вдовы унылый,<br>И свадебный нас обкидает бал.<br>Те оба любят свыше всякой силы;<br>Но трезвый ум графини рассчитал<br>И предпочел маркиза.<br><br>Фабьо<br><br>И отлично.<br><br>Теодоро<br><br>Мне велено его поздравить лично.<br>Но я хочу, чтоб ты, мой старый друг,<br>Мог заработать. Отправляйся живо;<br>Поверь, маркиз не скуп.<br><br>Фабьо<br><br>Таких услуг<br>Не забывают, говорю правдиво.<br>Лечу стрелой и обернусь вокруг.<br>Помилуй бог, как вышло все на диво!<br>Маркизу есть чем хвастать: не пустяк --<br>Склонить графиню на вторичный брак.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ШЕСТНАДЦАТОЕ<br><br>Тристан, Теодоро.<br><br>Тристан<br><br>Я вас ищу в большом волненье.<br>Неужто правда, что я слышал?<br><br>Теодоро<br><br>Увы, Тристан, святая правда,<br>Коли о том, как я ошибся!<br><br>Тристан<br><br>Я видел, там сидели в креслах<br>Два сукновальщика обычных<br>И шерсть валяли из Дианы;<br>Но чтобы состоялся выбор,<br>Об этом я еще не знал.<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Так вот, Тристан, сюда явилась<br>Она, подсолнечник вертлявый,<br>Она, стекло, она, пылинка,<br>Она, поток, поворотивший<br>Назад от моря, вверх долиной,<br>Она, небесная Диана,<br>Луна, и женщина, и призрак<br>Она, чудовище коварства<br>Меня обрекшая на гибель,<br>Чтоб запятнать свою победу;<br>Она явилась и спросила,<br>Который мне из двух приятней,<br>Затем что хочет сделать выбор,<br>Руководясь моим советом.<br>Я это слушал, как убитый,<br>И то, что я не обезумел,<br>Уже само безумьем было.<br>Потом сказала, что маркиз<br>Ей по душе и чтоб я лично<br>Его об этом известил.<br><br>Тристан<br><br>Нашелся, стало быть, счастливец?<br><br>Теодоро<br><br>Маркиз Рикардо.<br><br>Тристан<br><br>Право слово,<br>Не будь вы в столь плачевном виде,<br>Не будь грехом ввергать в унынье<br>И без того уже унылых,<br>Я бы напомнил вам сейчас,<br>Как вы взлетели горделиво<br>И возомнили, что вы граф.<br><br>Теодоро<br><br>Взлетел, и вот лежу разбитый.<br><br>Тристан<br><br>Во всем вы сами виноваты.<br><br>Теодоро<br><br>Я это признаю. Я слишком<br>Легко поверил обольщенью<br>Прекрасных глаз.<br><br>Тристан<br><br>Я говорил вам:<br>Нет ядовитее сосудов<br>Для чувства смертного мужчины,<br>Чем эти женские глаза.<br><br>Теодоро<br><br>Ты не поверишь, как мне стыдно.<br>Клянусь тебе, свои глаза<br>Я от земли поднять не в силах.<br>Все кончено. Одно осталось--<br>Похоронить в забвенье тихом<br>И честолюбье, и любовь.<br><br>Тристан<br><br>Каким пристыженным и смирным<br>Вы возвращаетесь к Марселе!<br><br>Теодоро<br><br>Мы с нею быстро подружимся.<br><br>ЯВЛЕНИЕ СЕМНАДЦАТОЕ<br><br>Марсела, не замечая Теодоро и Тристана.<br><br>Марсела<br>(про себя)<br><br>Как трудно делать вид, что влюблена!<br>Как трудно позабыть любовь былую!<br>Чем я усердней мысль о ней бичую,<br>Тем все живее в памяти она.<br><br>Но честь велит, я позабыть должна,<br>И нужно душу вылечить больную:<br>Чужой любовью сердце уврачую,<br>И будет страстью страсть исцелена.<br><br>Но, ах, нельзя внушить себе, что любишь,<br>Когда другой любовью дышит кровь!<br>Так не отмстишь, так лишь себя погубишь.<br><br>Нет, лучше ждать, что все вернется вновь.<br>Иной раз вовсе прошлое отрубишь,<br>А смотришь -- снова расцвела любовь.<br><br>Теодоро<br><br>Марсела...<br><br>Марсела<br><br>Кто тут?<br><br>Теодоро<br><br>Это я.<br>Так ты меня совсем забыла?<br><br>Марсела<br><br>Совсем. И чтобы тень твоя<br>Передо мной опять не всплыла,<br>Сама блуждаю не своя.<br>Ведь если б я пришла в себя,<br>Я б тотчас вспомнила тебя;<br>Так вот, чтоб ты забылся прочно<br>Я душу отдала нарочно,<br>Другого, прочно полюбя.<br>Как твой язык еще посмел<br>Коснуться имени Марселы?<br><br>Теодоро<br><br>Я только испытать хотел<br>Твою любовь. Но опыт смелый<br>Был, как я вижу, слишком смел.<br>Уже кругом молва прошла,<br>Что уголок мой в сердце занят<br>И страсть былая отцвела.<br><br>Марсела<br><br>Кто мудр, испытывать не станет<br>Ни женщин, друг мой, ни стекла.<br>Но только полно лицемерить.<br>Ты не меня хотел проверить.<br>Причины здесь совсем не те:<br>Ты новой, золотой мечте,<br>Безумный, предпочел поверить.<br>Ну, как дела? Далек ли ты<br>От этой высоты надзвездной?<br>Осуществляются мечты?<br>Божественность твоей любезной<br>Превыше всякой красоты?<br>Но что случилось? Что с тобой?<br>Ты огорчен своей судьбой?<br>Сменился ветер своенравный,<br>И ты опять приходишь к равной?<br>Или ты шутишь надо мной?<br>Не скрою, я была бы рада<br>Узнать, что наконец-то есть<br>Моим терзаниям награда.</div>", "cover": false}, {"html": "<div class=\"textPage\">Теодоро<br><br>О, если ты лелеешь месть,--<br>Чего ж еще для мести надо?<br>Я лишь одно сказать могу:<br>Любовь должна быть величавой<br>Я от страданий не бегу;<br>Но победитель, гордый славой,<br>Не мстит сраженному врагу.<br>Ты победила. Я вернулся<br>К моей Марселе. С ней я вновь.<br>От снов безумных я очнулся.<br>И если есть в тебе любовь,<br>Прости того, кто обманулся.<br>Не то чтобы я пал в борьбе,<br>Сказав прости другой надежде,--<br>Но в переменчивой судьбе<br>Я вспомнил все, что было прежде,<br>И я пришел опять к тебе.<br>Верни и ты воспоминанье<br>О прежних, о счастливых днях.<br>Раз я принес тебе признанье.<br><br>Марсела<br><br>Не дай мне бог повергнуть в прах<br>Твое блистательное зданье.<br>Дерзай, борись, начни сначала,<br>Не падай духом, чтоб она<br>Тебя трусишкой не назвала.<br>Лови удачу. Я скромна,<br>А я свою уже поймала.<br>Тебе от этого не больно,<br>Раз ты меня покинуть рад,<br>А я хоть исцелюсь невольно.<br>Мой Фабьо не такой уж клад,<br>Но я отмстила, и довольно.<br>Прощай. Пора и отдохнуть.<br>Ты собеседник скучноватый.<br>И Фабьо может заглянуть,<br>А мы ведь с ним почти женаты.<br><br>Теодоро<br><br>Тристан, держи, отрежь ей путь.<br><br>Тристан<br><br>Сеньора, стойте! Всякий знает:<br>Возврат любви не означает,<br>Что в ней имелся перерыв.<br>Души отчаянный призыв<br>Все преступленья искупает.<br>Марсела, знаешь, дело в чем?<br><br>Марсела<br><br>Оставь меня!<br><br>Тристан<br><br>Да подожди ты!<br><br>ЯВЛЕНИЕ ВОСЕМНАДЦ^<br><br>Диана, Анарда.<br>Теодоро, Марсела и Тристан не видя их.<br><br>Диана<br>(в сторону)<br><br>Опять я вижу их вдвоем!<br><br>Анарда<br>(тихо Диане)<br><br>Вы, как мне кажется, сердиты,<br>Что мы их вместе застаем.<br><br>Диана<br><br>Анарда, нам бы надо стать<br>Вот здесь и посмотреть немного<br><br>(В сторону.)<br><br>Ревную и люблю опять!<br><br>Диана и Анарда прячутся за занавеской<br><br>Марсела<br><br>Да отвяжись ты, ради бога!<br><br>Анарда<br>(тихо Диане)<br><br>Тристан мирит их, как видать.<br>У них, должно быть, вышла ссора.<br><br>Диана<br><br>У, этот сводник! Ведь живет<br>Такая дрянь!<br><br>Тристан<br><br>Мой друг, сеньора,<br>Как в небе молния мелькнет,<br>Так для его мелькнула взора<br>Бессмысленная красота<br>В него влюбившейся особы.<br>Богатство -- прах и суета.<br>Ему дороже -- о, еще бы! --<br>Твои прелестные уста.<br>Причисли эту страсть к кометам,<br>Летящим мимо. Теодоро,<br>Прошу сюда.<br><br>Диана<br>(в сторону)<br><br>Да он при этом<br>Еще и дипломат!<br><br>Теодоро<br><br>Коль скоро<br>Марсела перед целым светом<br>Клянется в том, что любит страстно<br>Другого, так при чем тут я?<br><br>Тристан<br><br>И этот дуется!<br><br>Теодоро<br><br>Прекрасно,<br>Пусть и берет его в мужья.<br><br>Тристан<br><br>Вот люди! Это же ужасно!<br>Ну, перестаньте корчить злюку.<br>Сюда давайте вашу руку<br>И помиритесь с вашей милой.<br><br>Теодоро<br><br>Нет, не заставишь даже силой.<br><br>Тристан<br><br>О, прекратите эту муку<br>И дайте руку, я молю.<br><br>Теодоро<br><br>Слыхала от меня Марсела,<br>Что я кого-нибудь люблю?<br>А мне она...<br><br>Тристан<br><br>Соврать хотела,<br>Чтоб крепче затянуть петлю.<br><br>Марсела<br><br>Нет, это правда: так и есть.<br><br>Тристан<br><br>Молчи, дуреха. Ваша честь,<br>Что за безумье! Видеть больно!<br><br>Теодоро<br><br>Я умолял. Теперь довольно<br>Я покажу, что значит месть.<br><br>Марсела<br><br>Пусть гром меня рассыплет в прах...<br><br>Теодоро<br><br>Тш, не божись!<br><br>Марсела<br>(тихо Тристану)<br><br>Хоть я сердита,<br>Но я шатаюсь на ногах.<br><br>Тристан<br><br>Держись!<br><br>Диана<br>(в сторону)</div>", "cover": false}, {"html": "<div class=\"textPage\">У этого бандита,<br>Однако, подлинный размах.<br><br>Марсела<br><br>Тристан, мне некогда, пусти.<br><br>Теодоро<br><br>Пусти ее.<br><br>Тристан<br><br>Что ж, пусть идет.<br><br>Теодоро<br><br>Нет, задержи.<br><br>Марсела<br><br>Нет сил уйти,<br>Мой дорогой!<br><br>Тристан<br><br>Стоит. И тот.<br>Вот люди, господи прости!<br><br>Марсела<br><br>Я не могу уйти, любимый.<br><br>Теодоро<br><br>И я. Скалой неколебимой<br>Я словно врос в морскую глaдь.<br><br>Марсела<br><br>О, я хочу тебя обнять!<br><br>Теодоро<br><br>Сгореть в любви неодолимой!<br><br>Тристан<br><br>Чего же я-то лез из кожи?<br>Чего их было примирять?<br><br>Анарда<br>(тихо Диане)<br><br>Вам это нравится?<br><br>Диана<br><br>О боже,<br>Как безрассудно доверять<br>Словам мужчин -- и женщин тоже!<br><br>Теодоро<br><br>Как ты со мною обошлась!<br><br>Тристан<br><br>Мне повезло, что так солидно<br>Скрепилась порванная связь.<br>Для маклака всегда обидно,<br>Когда продажа сорвалась.<br><br>Марсела<br><br>О, если кто-нибудь сменит<br>Тебя в моей душе, мой милый,<br>То пусть я от твоих обид<br>Умру.<br><br>Теодоро<br><br>Отныне с новой силой<br>Моя любовь к тебе горит.<br>И если я тебя обижу,<br>В объятьях Фабьо пусть увижу<br>Мою любимую жену!<br><br>Марсела<br><br>Ты хочешь смыть свою вину?<br><br>Теодоро<br><br>Я для тебя горами движу.<br><br>Марсела<br><br>Скажи: все женщины на свете --<br>Уроды.<br><br>Теодоро<br><br>Пред тобой, о да!<br>Кто затруднился бы в ответе?<br><br>Марсела<br><br>Хоть мы друзья, и навсегда,<br>Я все-таки чуть-чуть в секрете<br>Еще ревную. Мне неловко,<br>Что здесь Тристан.<br><br>Тристан<br><br>Валяй, плутовка!<br>Хоть про меня. Зачем заглазно?<br><br>Марсела<br><br>Скажи: графиня безобразна.<br><br>Теодоро<br><br>Графиня -- сущая чертовка.<br><br>Марсела<br><br>И глупая?<br><br>Теодоре<br><br>Глупа, как гусь.<br><br>Марсела<br><br>И пустомеля?<br><br>Теодоре<br><br>Как сорока.<br><br>Диана<br>(тихо Анарде)<br><br>Я их прерву; а то, боюсь,<br>Их разговор зайдет далеко.<br>Я не могу, я покажусь!<br><br>Анарда<br><br>Ах, нет, сеньора, неудобно!<br><br>Тристан<br><br>Кто хочет все узнать подробно<br>Насчет графини, по статьям,<br>Тот должен обратиться к нам.<br><br>Диана<br>(в сторону)<br><br>Я это слушать не способна.<br><br>Тристан<br><br>Во-первых...<br><br>Диана<br>(в сторону)<br><br>Я не стану ждать,<br>Что во-вторых. Всему на свете<br>Граница есть.<br><br>Марсела<br><br>Я удаляюсь.<br><br>Появляются Диана и Анарда:<br>Марсела делает графине реверанс и уходит.<br><br>Тристан<br>(в сторону)<br><br>Графиня, ух!<br><br>Теодоро<br>(в сторону)<br><br>Графиня!<br><br>Диана<br><br>Вечно<br>Я вас ищу...<br><br>Теодоро<br><br>Сеньора, верьте...<br><br>Тристан<br>(в сторону)<br><br>Сейчас начнется гром небесный.<br>От молнии мудрей уйти.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДЕВЯТНАДЦАТОЕ<br><br>Диана, Теодоро, Анарда.<br><br>Диана<br><br>Анарда, принеси скорее<br>Или конторку, или столик.<br>Мне Теодоро нужно спешно<br>Продиктовать одно письмо.<br><br>Теодоро<br>(в сторону)<br><br>Она не в духе, что-то шепчет.<br>Я говорил, что во дворцах<br>Благополучен бессловесный:<br>У каждого ковра есть уши,<br>И есть язык у каждой двери!<br><br>Анарда<br><br>Я принесла вот этот столик<br>И чем писать.<br><br>Диана<br><br>Займемтесь делом.<br>Перо возьмите, Теодоро.<br><br>Теодоро<br>(в сторону)<br><br>Убьет или прогонит с места.<br><br>Диана<br><br>Пишите.<br><br>Теодоро<br><br>Я готов.<br><br>Диана<br><br>Постойте,<br>Вам неудобно на коленях.<br>Анарда, дай ему подушку<br><br>Теодоро<br><br>Мне хорошо.<br><br>Диана<br><br>Клади, не мешкай.<br><br>Теодоро<br>(в сторону)<br><br>Не нравится мне эта милость<br>Там, где и гнев и подозренье.<br>Кто мягко стелет для колен,<br>Тот голову не прочь отрезать.<br>Я жду, сеньора.<br><br>Диана<br><br>Я диктую.<br><br>Теодоро<br>(в сторону)<br><br>Вручаю дух мой силе крестной!</div>", "cover": false}, {"html": "<div class=\"textPage\">Диана садится в высокое кресло.<br>Она диктует, а Теодоро пишет.<br><br>Диана<br><br>&quot;Когда знатная женщина открыла свое чувство человеку безродному, то верх неприличия продолжать ухаживать за другой. И кто не ценит своего счастья, пусть остается дураком&quot;.<br><br>Теодоро<br><br>А дальше что?<br><br>Диана<br><br>Чего ж еще?<br>Сложить и запечатать это.<br><br>Анарда<br>(тихо Диане)<br><br>Сеньора, что все это значит?<br><br>Диана<br><br>Безумства любящего сердца.<br><br>Анарда<br><br>Да кто же вам внушил любовь?<br><br>Диана<br><br>Вопрос, достойный удивленья.<br>Мне кажется, и камни дома,<br>И те уже об этом шепчут.<br><br>Теодоро<br><br>Я запечатал, ваша милость.<br>Мне только адрес неизвестен.<br><br>Диана<br><br>Письмо назначено для вас;<br>И по секрету от Марселы.<br>Быть может, вы его поймете,<br>Вновь перечтя в уединенье.<br><br>Уходят Диана и Анарда.<br><br>ЯВЛЕНИЕ ДВАДЦАТОЕ<br><br>Теодоро; затем Марсела.<br><br>Теодора<br><br>Я ничего не понимаю!<br>Ну, кто ж так любит, раз в неделю,<br>Как будто лекарь кровь пускает?<br>Какие странные задержки<br>Дает ее любовный пульс!<br><br>Входит Марсела.<br><br>Марсела<br><br>О дорогой мой, наконец-то!<br>Ну, что она тебе сказала?<br>Как у меня стучало сердце!<br><br>Теодоро<br><br>Сказала, что желает выдать<br>Тебя за Фабьо. Да, Марсела.<br>Вот и письмо, чтоб из именья<br>Прислали поскорее денег,<br>Твое приданое, мой друг.<br><br>Марсела<br><br>Что это?<br><br>Теодоро<br><br>Я тебе сердечно<br>Желаю счастья; но теперь,<br>Когда ты сделалась невестой<br>Со мной и в шутку не беседуй.<br><br>Марсела<br><br>Послушай.<br><br>Теодоро<br><br>Сетовать не время<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ПЕРВОЕ<br><br>Марсела.<br><br>Марсела<br><br>Нет, нет, я не могу поверить,<br>Что это так на самом деле.<br>Ему опять мозги вскружило<br>Вниманье этой сумасшедшей.<br>Ведь он же -- как ведро в колодце:<br>Чуть он внизу, она немедля<br>Его наполнит влагой ласки;<br>Чуть вверх пошел, все выльет с плеском.<br>Неблагодарный Теодоро!<br>Едва лишь на тебя повеет<br>Ее величьем--я забыта.<br>Она уйдет--со мной ты нежен;<br>Она нежна--и ты уходишь.<br>Ну чье тут выдержит терпенье?<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ВТОРОЕ<br><br>Рикардо, Фабьо, Марсела.<br><br>Рикардо<br><br>Миг промедленья был бы мне тяжел,<br>И я спешу поцеловать ей руки.<br><br>Фабьо<br>(Марселе)<br><br>Пойди сказать сеньоре, что пришел<br>Сеньор маркиз.<br><br>Марсела<br>(в сторону)<br><br>О ревность, что за муки<br>Ты мне готовишь! Нет страшнее зол,<br>Чем гибель счастья и тоска разлуки.<br><br>Фабьо<br><br>Ты что ж?<br><br>Марсела<br><br>Иду.<br><br>Фабьо<br><br>Пришел--и передашь--<br>Ее супруг, хозяин новый наш.<br><br>Уходит Марсела.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ТРЕТЬЕ<br><br>Рикардо, Фабьо.<br><br>Рикардо<br><br>Зайди ко мне, брат, завтра, утром рано;<br>Получишь превосходного коня<br>И тысячу эскудо чистогана.<br><br>Фабьо<br><br>Я ваш навек, с сегодняшнего дня.<br><br>Рикардо<br><br>И это только первый шаг. Диана<br>Тобой командует, а для меня<br>Ты лучший друг.<br><br>Фабьо<br><br>Целую ваши ноги.<br><br>Рикардо<br><br>Я твой должник и подвожу итоги.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ЧЕТВЕРТОЕ<br><br>Диана. Те же.<br><br>Диана<br><br>Вы здесь, маркиз?<br><br>Рикардо<br><br>Где быть мне, как не тут,<br>Когда ваш Фабьо, верный ваш посланник,<br>Принес мне весть, что изгнанного ждут,<br>Что он отныне ваш супруг и данник?<br>Я здесь, у ваших ног. Таких минут<br>Снести нельзя, и если ваш избранник<br>Сойдет с ума, я удивлюсь весьма,<br>Что он от счастья лишь сошел с ума<br>Каким огнем душа моя согрета!<br>Свершилось все, о чем я так мечтал!<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">Я даже слов не знаю для ответа.<br>Не понимаю. Вас никто не звал.<br><br>Рикардо<br><br>Что это значит, Фабьо?<br><br>Фабьо<br><br>Как же это?<br>Меня с известьем секретарь послал.<br>Я б не затеял этакое дело.<br><br>Диана<br><br>Здесь Теодоро виноват всецело.<br>Он слышал речь недавнюю мою,<br>Что вас я ставлю выше Федерико<br>И первенство за вами признаю,<br>И он решил, хоть это очень дико,<br>Что я уже и руку отдаю.<br>Простите глупых.<br><br>Рикардо<br><br>Будь не столь велико<br>И свято место, где царите вы,<br>То не снести бы Фабьо головы.<br>Целую ваши ноги, веря все же,<br>Что страсть моя растопит этот хлад.<br><br>(Уходит.)<br><br>Диана<br><br>На что же это, я спрошу, похоже?<br><br>Фабьо<br><br>Я, ваша милость, тут не виноват.<br><br>Диана<br><br>Где Теодоро? Пусть придет.<br><br>(В сторону.)<br><br>О боже,<br>Как этот франт явился невпопад,<br>Когда я все отдам за Теодоро!<br><br>Фабьо<br>(в сторону)<br><br>Коня и деньги получу не скоро.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ПЯТОЕ<br><br>Диана.<br><br>Диана<br><br>Любовь, чего ты хочешь от меня?<br>Ведь я забыть была совсем готова!<br>Зачем же тень твоя приходит снова,<br>Жестокой болью душу мне казня?<br><br>О ревность, это ты, мой слух дразня,<br>Советы шепчешь, злей один другого!<br>Послушаться советчика такого--<br>Так наша честь не устоит и дня.<br><br>Да, я люблю; но, средь грозы и гула,<br>Не я ль -- волна, не он ли-- легкий струг?<br>И кто слыхал, чтобы волна тонула?<br>Ах, гордость сердца стоит многих мук!<br>Я тетиву так туго натянула,<br>Что я боюсь -- не выдержит мой лук!<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ШЕСТОЕ<br><br>Теодоро, Фабьо, Диана.<br><br>Фабьо<br>(тихо к Теодоро)<br><br>Маркиз хотел меня убить.<br>Да что уж там! Не это горько,<br>А жалко тысячи эскудо.<br><br>Теодоро<br><br>Я дам тебе совет хороший.<br><br>Фабьо<br><br>Какой совет?<br><br>Теодоро<br><br>Граф Федерико<br>Себя не помнит от тревоги,<br>Что могут выйти за маркиза.<br>Явись с известьем, что помолвка<br>Расстроена; тебе он мигом<br>Отсыплет тысячу червонцев.<br><br>Фабьо<br><br>Помчусь, как молния.<br><br>Теодоро<br><br>Беги.<br><br>Уходит Фабьо.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ СЕДЬМОЕ<br><br>Диана, Теодоро.<br><br>Теодоро<br><br>Меня вы звали?<br><br>Диана<br><br>Я довольна<br>Что этот дурачок ушел.<br><br>Теодоро<br><br>Я целый час читал, сеньора,<br>Письмо, составленное вами,<br>И, заглянув в себя глубоко,<br>Нашел, что лишь благоговенье<br>Виной тому, что я так робок.<br>Но я виновен в том, конечно,<br>Что, как дурак, взирал безмолвно<br>На знаки вашего вниманья.<br>Да, я давно сознаться должен,<br>Что я люблю вас,--о, поверьте,--<br>Благоговейною любовью.<br>И этот трепет мой понятен.<br><br>Диана<br><br>Что ж, я вам верю, Теодоро.<br>Вам странно было б не любить<br>Свою хозяйку, от которой<br>Вы столько видели добра,<br>Которая вас ценит больше,<br>Чем всех других домашних слуг.<br><br>Теодоро<br><br>Я вас не понимаю вовсе.<br><br>Диана<br><br>Понять меня необходимо,<br>Чтоб вы не смели ни на йоту<br>Переступать своих границ.<br>Смирите чувства, Теодоро.<br>Со стороны столь знатной дамы,--<br>Особенно, когда так скромны<br>Заслуги собственные ваши,--<br>Малейшей милости довольно,<br>Чтобы наполнить вашу жизнь<br>До гроба счастьем и почетом.<br><br>Теодоро<br><br>Увы, приходится сказать,<br>Что в рассужденьях ваших больше<br>Бывает светлых промежутков,<br>Чем в вашем разуме, сеньора</div>", "cover": false}, {"html": "<div class=\"textPage\">(Простите, если я невежлив)<br>.<br>Вам было некогда угодно<br>Внушить мне страстные надежды,<br>Взманившие меня настолько,<br>Что я не вынес груза счастья<br>И был, как вам известно, болен,<br>Лежал в постели целый месяц.<br>К чему все эти разговоры?<br>Чуть я немножечко остыну,<br>Вы загораетесь соломой,<br>А чуть я снова загораюсь,<br>Вы льдом становитесь холодным.<br>Ну, отдали бы мне Марселу!<br>Так нет: вы, точно в поговорке,<br>Собака, что лежит на сене.<br>То вы ревнуете, вам больно,<br>Чтоб я женился на Марселе;<br>А чуть ее для вас я брошу,<br>Вы снова мучите меня<br>И пробуждаете от грезы.<br>Иль дайте есть, иль ешьте caми.<br>Я прокормиться не способен<br>Такой томительной надеждой.<br>А не хотите,--мне недолго<br>Влюбиться в ту, кому я мил.<br><br>Диана<br><br>Нет, Теодоро. Знайте твердо:<br>Марселы больше быть не может.<br>Бросайте взор, куда угодно,<br>Но только не сюда. Марсела<br>К вам не вернется.<br><br>Теодоро<br><br>Не вернется?<br>Иль ваша милость пожелает<br>Остановить своею волей<br>Любовь Марселы и мою?<br>Или я должен, вам в угоду,<br>Пленяться тем, что мне противно,<br>И подчинять мой вкус чужому?<br>Нет, я Марселу обожаю,<br>Она--меня, и нет позора<br>В такой любви.<br><br>Диана<br><br>Мошенник, дрянь!<br>Я бы должна убить такого!<br><br>Теодоро<br><br>Но что вы делаете? Что вы?<br><br>Диана<br><br>Я негодяю и пройдохе<br>Даю пощечины.<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ВОСЬМОЕ<br><br>Федерико,Фабьо. Те же.<br><br>Фабьо<br>(тихо к Федерико)<br><br>Постойте.<br><br>Федерико<br><br>Да, Фабьо, подождем немного.<br>Хоть лучше, может быть, войти.<br>Сеньора, что это такое?<br><br>Диана<br><br>Так, ничего; дурные слуги<br>Встречаются во всяком доме.<br><br>Федерико<br><br>Скажите мне, быть может, вам<br>Угодно что-нибудь?<br><br>Диана<br><br>Угодно<br>Вам кое-что порассказать.<br><br>Федерико<br><br>Вы бы охотнее, быть может,<br>Другое время предпочли?<br><br>Диана<br><br>Зачем? Не будем ждать другого.<br>Вы не смущайтесь пустяками.<br>Пройдем ко мне; я вам открою<br>Кой-что касательно маркиза.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ДВАДЦАТЬ ДЕВЯТОЕ<br><br>Федерико, Фабьо, Теодоро.<br><br>Федерико<br>(тихо к Фабьо)<br><br>Послушай...<br><br>Фабьо<br><br>Я, сеньор.<br><br>Федерико<br><br>Похоже,<br>Я бы сказал, что эта ярость<br>Таит совсем другое что-то.<br><br>Фабьо<br><br>Сказать по совести, не знаю.<br>А только я дивлюсь, ей-богу,<br>Что Теодоро так досталось.<br>Ведь никогда еще сеньора<br>Себя так круто не вела.<br><br>Федерико<br><br>Платок весь перепачкан кровью.<br><br>Уходят Федерико и Фабьо.<br><br>ЯВЛЕНИЕ ТРИДЦАТОЕ<br><br>Теодоро.<br><br>Теодоро<br><br>Нет, если это не любовь, то как<br>Назвать такой поступок своенравный?<br>Пошел от фурий род Бельфлоров славный,<br>Когда их дамы любят нас вот так.<br><br>И если знатность наслажденьям враг,<br>Которые и для неравных равны,<br>Зачем же суд творить самоуправный<br>И на любимых заносить кулак?<br><br>Ну, что ж, убей! Покорствуя уроку,<br>Я бы хотел хоть кончик ноготка<br>Поцеловать карающему року.<br><br>Но если ты, прелестная рука,<br>Бьешь только для того, чтоб тронуть щеку, --<br>Тебе одной твоя любовь сладка.<br><br>ЯВЛЕНИЕ ТРИДЦАТЬ ПЕРВОЕ<br><br>Тристан, Теодоро.<br><br>Тристан<br><br>Я норовлю всегда прийти,<br>Когда разгар событий кончен.<br>Я--как трусливая шпажонка<br><br>Теодоро<br><br>Увы, Тристан!<br><br>Тристан<br><br>Сеньор! Ой, боже!<br>У вас платок в крови!<br><br>Теодоро<br>Любовь<br>Всегда вколачивает с кровью<br>Науку ревности.<br><br>Тристан<br><br>Наука,<br>Я вам скажу, не из веселых.<br><br>Теодоро</div>", "cover": false}, {"html": "<div class=\"textPage\">Дивиться нечему. Графиня<br>Безумна от тоски любовной,<br>И так как утолить ее<br>Она считает недостойным,--<br>Она разбила мне лицо,<br>Разбила зеркало, в котором<br>Ее влюбленная гордыня<br>Отражена во всем уродстве.<br><br>Тристан<br><br>Когда Лусия иль Хуана<br>Со мной из ревности повздорят<br>И, скажем, издерут когтями<br>Подаренный когда-то ворот,<br>Иль, скажем, вырвут клок волос,<br>Иль исцарапают мне рожу,<br>Виня в каком-нибудь обмане,--<br>Я понимаю; что с них спросишь:<br>Монашеские башмаки,<br>И на ноге чулок пеньковый.<br>Но знатной даме уваженье<br>К себе самой забыть настолько,<br>Чтоб драться,-- извините, нет.<br><br>Теодоро<br><br>Я сам не знаю. Сил нет больше!<br>Она меня то обожает,<br>То вдруг возненавидит злобно.<br>Не отдает меня Марселе<br>И не берет сама. Как только<br>Я отвернусь, она сейчас же<br>Бежит ко мне и в сети ловит.<br>Вот уж, поистине, собака<br>На сене. Просто невозможно!<br>Сама не ест и есть мешает.<br>Ни в стороне, ни посередке.<br><br>Тристан<br><br>Рассказывают,--некий доктор,<br>Почтенный муж, весьма ученый,<br>Держал слугу и экономку,<br>А эти жили в вечной ссоре.<br>Они бранились за обедом,<br>За ужином и даже ночью<br>Его своим будили криком.<br>Ну, просто он не мог работать.<br>Однажды, посредине лекций,<br>Пришлось ему поспешным ходом<br>Домой вернуться. Входит он<br>В свои ученье хоромы,<br>Глядит: слуга и экономка<br>Почиют в тишине любовной.<br>Он и воскликнул: &quot;Слава богу,<br>Хоть на минуту тихо в доме!&quot;<br>Я жду, что так и с вами будет,<br>Хоть вы сейчас и в вечной ссоре.<br><br>ЯВЛЕНИЕ ТРИДЦАТЬ ВТОРОЕ<br><br>Диана. Те же.<br><br>Диана<br><br>Вы здесь?<br><br>Теодоро<br><br>Сеньора...<br><br>Тристан<br>(в сторону)<br><br>Вот уж, бродит,<br>Как привидение!<br><br>Диана<br><br>Я только<br>Узнать, в каком вы состоянье.<br><br>Теодоро<br><br>Вы сами видите.<br><br>Диана<br><br>Вам плохо?<br><br>Теодоро<br><br>Мне хорошо.<br><br>Диана<br><br>Вы не сказали:<br>&quot;К услугам вашим&quot;.<br><br>Теодоро<br><br>Вряд ли долго<br>Могу я быть к услугам вашим,<br>Когда со мною так жестоки.<br><br>Диана<br><br>Вы мало знаете.<br><br>Теодоро<br><br>Так мало,<br>Что смысл речей--и тот мне темен;<br>Я ваших слов не понимаю,<br>Но понимаю звук пощечин.<br>Когда я вас люблю, вы злитесь,<br>А не люблю--вы злитесь тоже;<br>Забуду--пишете мне письма,<br>И в лютом гневе -- если помню;<br>Хотите, чтоб я понял вас,<br>И я же глуп, когда вас понял.<br>Убейте или дайте жить!<br>Я так страдать не в силах больше.<br><br>Диана<br><br>Я вас разбила в кровь?<br><br>Теодоро<br><br>Еще бы!<br><br>Диана<br><br>А где платок ваш?<br><br>Теодоро<br><br>Здесь, сеньора.<br><br>Диана<br><br>Отдайте.<br><br>Теодор<br><br>Для чего?<br><br>Диана<br><br>Мне нужно.<br>Он будет мой, вот с этой кровью.<br>Сходите от меня к Отавьо.<br>Ему приказано вам тотчас<br>Вручить две тысячи эскудо.<br><br>Теодоро<br><br>Зачем?<br><br>Диана<br><br>Нашить платков побольше.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ТРИДЦАТЬ ТРЕТЬ<br><br>Теодоро, Тристан.<br><br>Теодоро<br><br>Вот небывалые дела!<br><br>Тристан<br><br>Таких чудес я не запомню.<br><br>Теодоро<br><br>Дает две тысячи эскудо!<br><br>Тристан<br><br>За эти деньги смело можно<br>Стерпеть еще хоть шесть затрещин.<br><br>Теодоро<br><br>Велит нашить платков побольше --<br>И мой уносит, весь в крови.<br><br>Тристан<br><br>Она вам платит цену крови,<br>Хоть новобрачной тут--ноздря.<br><br>Теодоро<br><br>Собака укусила больно,<br>Зато и ластится теперь.<br><br>Тристан<br><br>И кончится все так же точно,<br>Как с докторскою экономкой.<br><br>Теодоро<br><br>Что ж, это было бы неплохо.<br><br> * ДЕЙСТВИЕ ТРЕТЬЕ *<br><br>Улица.<br><br>ЯВЛЕНИЕ ПЕРВОЕ</div>", "cover": false}, {"html": "<div class=\"textPage\">Федерико, Рикардо;<br>поодаль от них Сельо.<br><br>Рикардо<br><br>И вы при этом были?<br><br>Федерико<br><br>Да.<br><br>Рикардо<br><br>Хлестала собственною ручкой?<br>Федерико<br><br>Чтоб это было нахлобучкой,<br>Хозяйским гневом -- никогда.<br>Когда такая, как она,--<br>Ведь надо знать мою кузину,--<br>Себя не помня, бьет мужчину,<br>Картина, думаю, ясна.<br>А он, с тех пор--в каком фаворе,<br>Как весь преобразился вдруг!<br><br>Рикардо<br><br>Фортуна многих дамских слуг.<br><br>Федерико<br><br>Она себе готовит горе.<br>В давно исчезнувшие лета<br>Философ басню написал<br>О двух горшках. Когда б он знал,<br>Как здесь подходит басня эта!<br>Один был глиняный горшок,<br>Другой -- чугунный или медный;<br>Их у одной деревни бедной<br>На берег выбросил поток.<br>И глиняный посторонился<br>Чугунного, боясь, что тот<br>Его толкнет и разобьет.<br>Урок бы многим пригодился:<br>В сравненье с женщиной, мужчина--<br>Горшок чугунный; если с ней<br>Он стукнется чуть-чуть сильней,<br>То цел чугун, а бьется глина.<br><br>Рикардо<br><br>Она вела себя со мной<br>Так гордо и высокомерно,<br>Что я на многое, наверно,<br>Смотрел, не видя, как слепой.<br>Но эти кони, и пажи,<br>И блеск, и роскошь Теодоро,--<br>Как это все случилось скоро!<br>Такую щедрость госпожи<br>Не вправе ли мы с вами счесть<br>Красноречивейшим ответом?<br><br>Федерико<br><br>Пока не начали об этом<br>Кричать в Неаполе и честь<br>Ее семьи пощажена,<br>Пусть даже обвиненье вздорно,<br>Он должен умереть.<br><br>Рикардо<br><br>Бесспорно.<br>Хотя б узнала и она.<br><br>Федерико<br><br>Как это сделать?<br><br>Рикардо<br><br>Как? Известно!<br>Здесь этим многие живут,<br>Без фальши: золотом берут<br>И кровью возвращают честно.<br>Велеть такому молодцу--<br>Он вам его прикончит живо.<br><br>Федерико<br><br>О, как я жду нетерпеливо!<br><br>Рикардо<br><br>Сегодня ж будет наглецу<br>За все достойная награда.<br><br>Федерико<br>(замечая Тристана и трех других)<br><br>Смотрите! Кажется, как раз!<br><br>Рикардо<br><br>Уверен.<br><br>Федерико<br><br>Небо слышит вас<br>И посылает то, что надо.<br><br>ЯВЛЕНИЕ ВТОРОЕ<br><br>Тристан, в новом платье;<br>Фурьо, Антонело. Лирано. Те же.<br><br>Фурьо<br><br>Сегодня платишь ты. Нам нужно спрыснуть<br>Твою великолепную обнову.<br><br>Антонело<br><br>Какие тут возможны разговоры?<br><br>Тристан<br><br>Я ж говорю -- от всей души, сеньоры.<br><br>Лирано<br><br>А платье вышло здорово.<br><br>Тристан<br><br>Все это,<br>Я вам скажу, пустяк и безделушка<br>В сравненье с тем, что будет впереди.<br>Когда фортуна не подставит ножку,<br>Я завтра -- секретарь секретаря.<br><br>Лирано<br><br>Хозяин твой, как видно, у графини<br>В великой милости, Тристан.<br><br>Тристан<br><br>У ней<br>Он нынче правая рука, он--дверь<br>К ее благоволению. Но бросим<br>Пути фортуны и давайте пить.<br><br>Фурьо<br><br>Я чувствую, что в этом заведенье<br>Отличная найдется мальвасия.<br><br>Тристан<br><br>Попробуемте греческого. Выпьешь --<br>Так и пойдешь по-гречески чесать!<br><br>Рикардо<br>(Федерико)<br><br>Вот этот, черный с чахлым цветом кожи<br>Мне кажется, у них главарь и есть.<br>Как с ним почтительны все остальные!<br>Послушай, Сельо...<br><br>Сельо<br><br>Ваша милость...<br><br>Рикардо<br><br>Кликни<br>Того вон, бледного.<br><br>Сельо<br>(Тристану)<br><br>Эй, кабальеро! Пока вы не вошли в святую сень,<br>Сеньор маркиз сказать вам хочет что-то.<br><br>Тристан<br>(своим приятелям)</div>", "cover": false}, {"html": "<div class=\"textPage\">Товарищи, меня зовет вельможа.<br>Мне надобно узнать, чего он хочет.<br>Входите, спрашивайте полбочонка,<br>Да закажите также ломтик сыру,<br>Пока я тут осведомлюсь, в чем дело.<br><br>Антонело<br><br>Ты только не замешкайся.<br><br>Тристан<br><br>Я мигом.<br><br>Уходят Фурьо, Антонело и Лирано.<br><br>ЯВЛЕНИЕ ТРЕТЬЕ<br><br>Рикардо, Федерико, Тристан, Сельо.<br><br>Тристан<br><br>Что ваша милость соблаговолит?<br><br>Рикардо<br><br>У вас такой неустрашимый вид<br>И мужественный взор, что граф и я<br>Хотели бы узнать, способны ль вы<br>Зарезать человека.<br><br>Тристан<br>(в сторону)<br><br>Гром небесный!<br>Ведь это воздыхатели графини!<br>Тут чем-то пахнет. Так и быть, прикинусь.<br><br>Федерико<br><br>Чего же вы молчите?<br><br>Тристан<br><br>Я подумал,<br>Не шутит ли, быть может, ваша милость<br>Над нашим ремеслом. Но видит небо,<br>Дарующее смертным силу мышц:<br>Нет шпаги в королевстве, что не дрогнет<br>При имени моем. Слыхали вы<br>Про Гектора? Никто другой не Гектор<br>Там, где моя свирепствует рука.<br>Тот был троянский, я же -- итальянский.<br><br>Федерико<br><br>Маркиз, нам нужно именно такого.<br>Нет, мы не шутим, я даю вам слово.<br>И если грозно в вас не только имя<br>И вы согласны кой-кого убрать,<br>То заработать можно бы не худо.<br><br>Тристан<br><br>С меня достаточно двухсот эскудо,<br>Будь это хоть сам черт.<br><br>Рикардо<br><br>Я дам вам триста.<br>Но чтоб сегодня же. Срок очень краток.<br><br>Тристан<br><br>Мне нужно имя жертвы и задаток.<br><br>Рикардо<br><br>Вы знаете графиню де Бельфлор?<br><br>Тристан<br><br>Да, в этом доме кое с кем я дружен.<br><br>Рикардо<br><br>Вы можете убить ее слугу?<br><br>Тристан<br><br>Готов убить всех слуг и всех служанок<br>И даже лошадей ее кареты.<br><br>Рикардо<br><br>Так вот: вы истребите Теодоро.<br><br>Тристан<br><br>Тут надо взяться чуточку иначе.<br>Мне говорили, что в ночное время<br>Он больше не выходит, опасаясь,<br>Как видно, мщенья с вашей стороны.<br>Меня зовут служить ему охраной<br>Дозвольте согласиться, и тогда<br>Я как-нибудь беднягу подколю,<br>Так, чтобы он in расе requiscat / Почил в мире<br>(лат.)<br>/,<br>А сам останусь выше подозрений<br>Я рассуждаю правильно?<br><br>Федерико<br><br>Навряд ли<br>В Неаполе найдется человек,<br>Который бы вернее с ним покончил.<br>Наймитесь к Теодоро, а затем,<br>Его пришпилив, скроетесь у нас.<br><br>Тристан<br><br>Я попрошу сегодня сто эскудо.<br><br>Рикардо<br><br>Здесь пятьдесят червонцев; а как только<br>Я с вами встречусь в доме у Дианы,<br>Я дам вам сто и даже много сот.<br><br>Тристан<br><br>Мне этих многих сот не надо вовсе.<br>Теперь же, ваши милости, прощайте.<br>Меня там ждут Репейник, Стенолом,<br>Железная Рука и Чертоглот.<br>Я не хочу давать им повод к сплетням.<br><br>Рикардо<br><br>Вы правы. До свиданья.<br><br>Федерико<br><br>Вот удача!<br><br>Рикардо<br><br>Теперь считайте Теодоро мертвым.<br><br>Федерико<br><br>А он красавец, этот негодяй!<br><br>Уходят Рикардо, Федерико и Сельо.<br><br>Тристан<br><br>Предупрежу хозяина. Прощай,<br>Приятели и греческие вина!<br>Пойду домой; конец туда немалый.<br>Никак, он самый? Вот не думал встретить!<br><br>ЯВЛЕНИЕ ЧЕТВЕРТОЕ<br><br>Теодоро, Тристан.<br><br>Тристан<br><br>Сеньор, куда вы?<br><br>Теодоро<br><br>Затруднюсь ответить.<br>Сердечная не заживает рана,<br>И я иду, не ведая куда.<br>Мой дух уныл, как будто из тумана<br>Мне не взглянуть на солнце никогда.<br>Какой вчера со мной была Диана!<br>Сегодня страсть исчезла без следа,<br>И словно мы знакомы еле-еле,<br>На радость торжествующей Марселе.<br><br>Тристан</div>", "cover": false}, {"html": "<div class=\"textPage\">Идем домой. Нельзя, чтобы они<br>Нас видели вдвоем. Смекнут ведь, черти.<br><br>Теодоро<br><br>Кто? Что? Не понимаю.<br><br>Тристан<br><br>Ваши дни<br>Хотят пресечь и жаждут вашей смерти.<br><br>Теодоро<br><br>Кто это жаждет? Как так? Объясни.<br><br>Тристан<br><br>Потише. Дело скверное, поверьте.<br>Маркиз и граф пришли ко мне сейчас<br>И предложили укокошить вас.<br><br>Теодоро<br><br>Они? Меня?<br><br>Тристан<br><br>Из некоих пощечин<br>Был сделан вывод, что тут есть любовь;<br>И так как я понравился им очень,<br>То у меня купили вашу кровь.<br>Уже задаток наперед уплочен,<br>А после вашей смерти платят вновь.<br>Я им сказал, что приглашен негласно<br>Вас охранять; что это и прекрасно,<br>Затем что так я легче вас убью.<br>На самом деле--вот вам и охрана.<br><br>Теодоро<br><br>Тристан, я жизнь с восторгом отдаю<br>Как мне сладка была бы эта рана!<br><br>Тристан<br><br>Вы что? С ума сошли?<br><br>Теодоро<br><br>Я смерть мою<br>Приветствую. Поверь мне, что Диана<br>Давно бы вышла замуж за меня,<br>Когда б не честь, не титул, не родня.<br>Ей честь страшна. Отсюда все печали,<br>Вся злость ее.<br><br>Тристан<br><br>А если б я сердца<br>Соединил, то что бы вы сказали?<br><br>Теодоро<br><br>Что ты хитрей Улисса-хитреца.<br><br>Тристан<br><br>Когда бы я из неизвестной дали<br>Привел к вам на дом знатного отца,<br>Чтоб вы с графиней стали равны честью,<br>Вы б улыбнулись этому известью?<br><br>Теодоро<br><br>Сомненья в этом нет.<br><br>Тристан<br><br>Граф Лудовико,<br>Уже седой старик, тому лет двадцать,<br>Послал на Мальту сына, Теодоро,<br>Племянника великого магистра.<br>Но юноша попал в неволю к маврам,<br>И с той поры никто о нем не слышал.<br>Так вот -- кто ваш отец, вот -- чей вы сын,<br>И это все я вам берусь устроить.<br><br>Теодоро<br><br>Тристан, подумай; это может стоить<br>Обоим нам и головы и чести.<br><br>Уходят.<br><br>Зала во дворце графини.<br><br>ЯВЛЕНИЕ ПЯТОЕ<br><br>Теодоро, Тристан.<br><br>Тристан<br><br>Вот мы и дома. Будьте же здоровы;<br>Увидите, как мы вам верно служим,<br>Когда вы завтра станете ей мужем.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ШЕСТОЕ<br><br>Теодоро.<br><br>Теодоро<br><br>Нет, он не прав. Я сам с собой в раздоре,<br>Но я избрал спасительный исход:<br>Я знаю твердо, что любовь пройдет,<br>Когда два сердца разделяет море.<br><br>Уеду за море, и это горе<br>Забудется за далью синих вод.<br>Ты молния, любовь, твой пламень жжет,<br>Не гаснет даже он в морском просторе.<br><br>О да, любовь, все, кто страдал любя,<br>Кто мучился, жестокой страсти полный<br>За дальним морем забывал тебя.<br><br>В края забвенья нас уносят челны,<br>И тот воскрес, кто, прошлое губя,<br>Бросает сердце в пенистые волны.<br><br>ЯВЛЕНИЕ СЕДЬМОЕ<br><br>Диана, Теодоро.<br><br>Диана<br><br>Ну как? Вам легче, Теодоро?<br>Вас меньше тяготят печали?<br><br>Теодоро<br><br>Они мне столько счастья дали,<br>Что я отброшу их не скоро.<br>Столь нежной мукой я томим,<br>Столь сладким жалом я ужален,<br>Что был бы горько опечален<br>Выздоровлением моим.<br>Стократ благословен недуг,<br>Который болью так ласкает,<br>Что, кто от боли умирает,<br>Тот жаждет только больше мук.<br>И у меня печаль одна:<br>Что мне придется эту муку<br>Обречь на вечную разлуку<br>С той, кем взлелеяна она.<br><br>Диана<br><br>Нужна разлука? Почему?<br><br>Теодоро<br><br>Меня хотят убить.<br><br>Диана<br><br>Вы правы<br><br>Теодоро<br><br>Терзанья горестной отравы<br>Внушают зависть кой-кому.<br>Вы мне дадите дозволенье<br>Отплыть в Испанию, сеньора?<br><br>Диана</div>", "cover": false}, {"html": "<div class=\"textPage\">Благоразумное, нет спора,<br>И благородное решенье.<br>Что было горестной отравой,<br>Забудется в чужом краю,<br>А я хоть много слез пролью,<br>Зато утешусь доброй славой.<br>С тех пор, как я прибила вас,<br>Граф Федерико непритворно<br>Меня ревнует, и, бесспорно,<br>Расстаться--лучшее для нас.<br>Да, нужно ехать. Вам в дорогу<br>Дадут шесть тысяч золотых.<br><br>Теодоро<br><br>Я уезжаю, чтоб затих<br>Враждебный шум. Целую ногу.<br><br>Диана<br><br>Пора. Прощайте, Теодоро.<br>Я постараюсь позабыть.<br><br>Теодоро<br>(в сторону)<br><br>Диана плачет. Как мне быть?<br><br>Диана<br><br>Когда же вы уйдете? Скоро?<br><br>Теодоро<br><br>Сейчас.<br><br>Диана<br><br>Постойте... Нет, уйдите...<br>Послушайте.<br><br>Теодоро<br><br>Я здесь, я жду.<br><br>Диана<br><br>Нет, нет, идите.<br><br>Теодоро<br><br>Я иду.<br><br>Диана<br>(в сторону)<br><br>Терзанья страсти, вы казните<br>Жесточе, чем любая месть!<br><br>(К Теодоро.)<br><br>Вы не ушли.<br><br>Теодоро<br><br>Теперь ушел.<br><br>(Уходит.)<br><br>Диана<br><br>О, как мне этот миг тяжел!<br>Будь проклята, людская честь!<br>Нелепый вымысел, губящий<br>То, что сердцам всего дороже!<br>Кто выдумал тебя? И все же<br>Ты нас у пропасти грозящей<br>Спасаешь, отводя от краю.<br><br>Возвращается Теодоро.<br><br>Теодоро<br><br>Простите, я пришел спросить:<br>Что, мне сегодня же отплыть?<br><br>Диана<br><br>Ах, Теодоро, я не знаю.<br>Но только, верьте, мне сейчас<br>Вас видеть -- худшее из зол.<br><br>Теодоро<br><br>Я за самим собой пришел;<br>Ведь я остался возле вас,<br>А мне уже и ехать скоро<br>Я умоляю вас, отдайте<br>Мне самого себя.<br><br>Диана<br><br>Так знайте:<br>Я не отдам вас, Теодоро.<br>Я оставляю вас себе.<br>Уйдите. Истекая кровью,<br>Честь борется с моей любовью,<br>А вы мешаете борьбе.<br>Уйдите. Вас я не отдам,<br>И не просите, не дождетесь.<br>Вы здесь со мною остаетесь.<br>А я, я буду с вами там.<br><br>Теодоро<br><br>Желаю счастья вашей чести.<br><br>(Уходит.)<br><br>ЯВЛЕНИЕ ВОСЬМОЕ<br><br>Диана.<br><br>Диана<br><br>Да будет проклята она!<br>Из-за нее я лишена<br>Того, с кем жить бы рада вместе.<br>Итак, осиротели, значит,<br>Покрылись тьмой мои глаза!<br>И все же просится слеза:<br>Кто мало видел, много плачет.<br>Глаза, вот это вам расплата<br>За то, что изливали свет<br>На недостойный вас
