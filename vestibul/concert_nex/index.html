<script>
const panel = document.getElementById('musicPanel');

const player = document.getElementById('player');
const nowPlaying = document.getElementById('nowPlaying');
const archiveList = document.getElementById('archiveList');
let currentButton = null;

const fallbackTracks = [
  { title:'Mozart Piece', file:'audio/mozart_piece.mp3' }
];

function openPlayer(){ panel.classList.add('open'); }
function closePlayer(){ panel.classList.remove('open'); }

function renderArchive(tracks){
  archiveList.innerHTML = '';
  tracks.forEach((track)=>{
    const btn = document.createElement('button');
    btn.className = 'trackBtn';
    btn.textContent = track.title;
    btn.onclick = () => loadTrack(track.file, track.title, btn);
    archiveList.appendChild(btn);
  });
}

function loadTrack(src, title, btn){
  if(currentButton) currentButton.classList.remove('active');
  currentButton = btn || null;
  if(currentButton) currentButton.classList.add('active');
  player.src = src;
  player.loop = true;
  player.volume = 0.85;
  nowPlaying.textContent = 'Now playing: ' + title;
  try{ localStorage.setItem('nexHallTrack', src); localStorage.setItem('nexHallTrackTitle', title); }catch(e){}
  const p = player.play();
  if(p !== undefined){ p.catch(()=>{}); }
}

fetch('playlist.json', {cache:'no-store'})
  .then(r => r.ok ? r.json() : fallbackTracks)
  .then(tracks => renderArchive(Array.isArray(tracks) && tracks.length ? tracks : fallbackTracks))
  .catch(() => renderArchive(fallbackTracks));

function goBalcony(){
  try{
    if(player && player.src){
      localStorage.setItem('nexHallTrack', player.getAttribute('src') || player.src);
      localStorage.setItem('nexHallTrackTitle', nowPlaying.textContent.replace('Now playing: ','') || 'Hall music');
      localStorage.setItem('nexHallTrackTime', String(player.currentTime || 0));
    }
  }catch(e){}
  window.location.href='balcony.html';
}

document.addEventListener('keydown',(e)=>{
  if(e.key.toLowerCase()==='h') document.body.classList.toggle('show-hotspots');
  if(e.key==='Escape') closePlayer();
});
</script>
</body>
