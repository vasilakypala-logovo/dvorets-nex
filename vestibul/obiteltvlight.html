<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ОБИТЕЛЬ НЕКСА — последние поступления</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:#050506;color:white;font-family:Georgia,serif;
}
#vestibule{
  position:fixed;inset:0;
  background-image:url('VESTIBUL.png');
  background-size:cover;background-position:center center;background-repeat:no-repeat;
}
#nexZone{
  position:absolute;
  left:12.5%;
  top:36%;
  width:14%;
  height:42%;
  cursor:pointer;
  border-radius:45%;
}

#nexZone:hover{
  background:transparent;
  box-shadow:none;
}
#nexHint{
  position:absolute;left:11%;top:29%;padding:8px 14px;border:1px solid rgba(190,120,255,.42);
  border-radius:999px;color:rgba(235,210,255,.92);background:rgba(5,0,12,.44);
  letter-spacing:.08em;font-size:13px;text-shadow:0 0 10px rgba(180,80,255,.9);
  opacity:0;pointer-events:none;transition:.35s;
}
#nexZone:hover + #nexHint{opacity:1}
#tvOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.08);backdrop-filter:none;
  display:none;align-items:center;justify-content:center;z-index:10;
}
#tvOverlay.open{display:flex}
#tv{
  position:relative;width:min(980px,78vw);height:min(620px,72vh);border-radius:28px;
  background:rgba(20,40,55,.10);
  backdrop-filter:blur(1.5px) saturate(1.15);
  -webkit-backdrop-filter:blur(1.5px) saturate(1.15);
  border:2px solid rgba(120,245,255,.82);
  box-shadow:
    0 0 16px rgba(90,240,255,.95),
    0 0 42px rgba(165,60,255,.58),
    0 0 80px rgba(70,220,255,.24),
    inset 0 0 28px rgba(80,230,255,.10);
  overflow:hidden;
}
#tv:before{
  content:"";position:absolute;inset:10px;border-radius:21px;
  border:1px solid rgba(210,100,255,.55);
  background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.015) 38%,rgba(80,220,255,.045));
  box-shadow:
    inset 0 0 18px rgba(200,80,255,.18),
    inset 0 0 35px rgba(80,240,255,.08);
  pointer-events:none;z-index:3;
}
#tvTitle{
  position:absolute;top:18px;left:0;width:100%;text-align:center;z-index:4;
  color:#dffaff;font-size:20px;letter-spacing:.16em;
  text-shadow:0 0 8px rgba(80,240,255,1),0 0 20px rgba(190,70,255,.95),0 0 38px rgba(80,240,255,.7);
}
#slideArea{
  position:absolute;left:42px;right:42px;top:74px;bottom:54px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(0,0,0,.04);
  border-radius:18px;
}
#slideImg{
  max-width:100%;max-height:100%;border-radius:16px;border:1px solid rgba(210,255,255,.28);
  box-shadow:0 0 40px rgba(80,220,255,.20);
  transition:filter 1s ease, opacity 1s ease, transform 1s ease;
  opacity:0;filter:blur(18px);transform:scale(.985);
}
#slideImg.visible{opacity:1;filter:blur(0);transform:scale(1)}
#workTitle{
  position:absolute;left:50%;bottom:30px;transform:translateX(-50%);
  max-width:84%;padding:9px 20px;border-radius:999px;color:#fff;background:rgba(0,0,0,.42);
  border:1px solid rgba(210,80,255,.38);text-align:center;font-size:22px;letter-spacing:.08em;
  text-shadow:0 0 8px rgba(255,255,255,.8),0 0 18px rgba(200,70,255,1),0 0 32px rgba(60,220,255,.82);
  z-index:4;opacity:0;transition:.8s;
}
#workTitle.show{opacity:1}
#tvClose{
  position:absolute;right:18px;top:14px;z-index:6;width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(220,255,255,.52);background:rgba(0,0,0,.45);
  color:white;font-size:22px;cursor:pointer;text-shadow:0 0 10px cyan;
}
#tvStatus{
  position:absolute;left:0;right:0;bottom:15px;text-align:center;
  color:rgba(220,250,255,.66);font-size:13px;letter-spacing:.08em;z-index:4;
}
#fullView{
  position:fixed;inset:0;z-index:30;
  background:radial-gradient(circle at 60% 35%,rgba(45,55,75,.26),transparent 42%),rgba(0,0,0,.96);
  display:none;
}
#fullView.open{display:block}
#infoPanel{
  position:absolute;left:28px;top:28px;bottom:28px;width:min(360px,30vw);
  border:1px solid rgba(130,240,255,.36);border-radius:22px;padding:24px;
  background:rgba(3,8,14,.72);
  box-shadow:0 0 35px rgba(80,220,255,.18), inset 0 0 24px rgba(180,60,255,.08);
  overflow:auto;
}
#infoPanel h2{
  margin:0 0 18px;color:#e8fbff;font-weight:normal;font-size:24px;line-height:1.2;
  text-shadow:0 0 14px rgba(80,240,255,.75),0 0 26px rgba(180,60,255,.55);
}
.field{margin:15px 0;color:#bcd6de;font-size:14px;line-height:1.45}
.field b{
  display:block;color:#f1e4ff;letter-spacing:.09em;font-size:12px;margin-bottom:5px;
  text-shadow:0 0 10px rgba(180,60,255,.65);
}
#storyText{white-space:pre-wrap}
#fullImgWrap{
  position:absolute;left:min(420px,34vw);right:28px;top:28px;bottom:28px;
  display:flex;align-items:center;justify-content:center;
}
#fullImg{
  max-width:100%;max-height:100%;border-radius:18px;border:1px solid rgba(220,255,255,.25);
  box-shadow:0 0 55px rgba(100,220,255,.24);
}
#fullClose{
  position:absolute;right:24px;top:20px;z-index:35;width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(220,255,255,.55);background:rgba(0,0,0,.55);
  color:white;font-size:26px;cursor:pointer;text-shadow:0 0 10px cyan;
}
@media(max-width:850px){
  #tv{width:92vw;height:70vh}
  #infoPanel{left:14px;right:14px;top:14px;height:34vh;width:auto;bottom:auto}
  #fullImgWrap{left:14px;right:14px;top:40vh;bottom:14px}
  #tvTitle{font-size:15px}
  #workTitle{font-size:16px}
}
</style>
</head>
<body>
<div id="vestibule">
  <div id="nexZone" title="М.Некс — последние поступления"></div>
  <div id="nexHint">М.НЕКС · ПОСЛЕДНИЕ ПОСТУПЛЕНИЯ</div>
</div>

<div id="tvOverlay">
  <div id="tv">
    <button id="tvClose" onclick="closeTV(event)">×</button>
    <div id="tvTitle">ПОСЛЕДНИЕ ПОСТУПЛЕНИЯ В ОБИТЕЛЬ</div>
    <div id="slideArea" onclick="openFullWork()">
      <img id="slideImg" alt="Работа из ОБИТЕЛИ">
    </div>
    <div id="workTitle"></div>
    <div id="tvStatus">клик по картине — раскрыть</div>
  </div>
</div>

<div id="fullView">
  <button id="fullClose" onclick="closeFullWork()">×</button>
  <div id="infoPanel">
    <h2 id="infoTitle">Название</h2>
    <div class="field"><b>АВТОР</b><span id="infoAuthor"></span></div>
    <div class="field"><b>ГОД</b><span id="infoYear"></span></div>
    <div class="field"><b>МАТЕРИАЛЫ</b><span id="infoMaterials"></span></div>
    <div class="field"><b>РАЗМЕР</b><span id="infoSize"></span></div>
    <div class="field"><b>СОПРОВОЖДЕНИЕ</b><span id="storyText"></span></div>
  </div>
  <div id="fullImgWrap">
    <img id="fullImg" alt="Работа крупно">
  </div>
</div>

<script>
const SUPABASE_URL = "https://qekemclxegswolddmqxa.supabase.co";
const SUPABASE_KEY = "sb_publishable_arQvVM0huxdB5jbiLPpSPA_7tksXK-Y";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let works = [];
let currentIndex = 0;
let slideTimer = null;
let tvWasOpened = false;

const nexZone = document.getElementById("nexZone");
const tvOverlay = document.getElementById("tvOverlay");
const slideImg = document.getElementById("slideImg");
const workTitle = document.getElementById("workTitle");
const tvStatus = document.getElementById("tvStatus");
const fullView = document.getElementById("fullView");

nexZone.addEventListener("click", openTV);

async function loadWorks(){
  tvStatus.textContent = "загружаю ОБИТЕЛЬ...";
  const result = await client
    .from("artworks")
    .select("*")
    .order("created_at", { ascending:false });

  if(result.error){
    tvStatus.textContent = "ошибка чтения ОБИТЕЛИ: " + result.error.message;
    return;
  }

  works = result.data || [];
  if(!works.length){
    tvStatus.textContent = "в ОБИТЕЛИ пока нет работ";
    return;
  }

  if(currentIndex >= works.length) currentIndex = 0;
  tvStatus.textContent = "клик по картине — раскрыть";
  showCurrent(true);
}

function openTV(){
  tvOverlay.classList.add("open");

  if(!tvWasOpened){
    tvWasOpened = true;
    loadWorks().then(startSlideshow);
  }else{
    showCurrent(true);
    startSlideshow();
  }
}

function closeTV(event){
  if(event) event.stopPropagation();
  window.location.href = 'vestibul.html';
}

function startSlideshow(){
  stopSlideshow();
  if(!works.length) return;
  slideTimer = setInterval(nextSlide, 5200);
}

function stopSlideshow(){
  if(slideTimer){
    clearInterval(slideTimer);
    slideTimer = null;
  }
}

function nextSlide(){
  if(!works.length) return;
  currentIndex = (currentIndex + 1) % works.length;
  showCurrent(false);
}

function showCurrent(first){
  if(!works.length) return;
  const work = works[currentIndex];

  slideImg.classList.remove("visible");
  workTitle.classList.remove("show");

  setTimeout(() => {
    slideImg.src = work.image_url || "";
    workTitle.textContent = work.title || "Без названия";
    slideImg.onload = () => {
      slideImg.classList.add("visible");
      workTitle.classList.add("show");
    };
  }, first ? 80 : 850);
}

function openFullWork(){
  if(!works.length) return;
  stopSlideshow();

  const work = works[currentIndex];
  document.getElementById("infoTitle").textContent = work.title || "Без названия";
  document.getElementById("infoAuthor").textContent = work.author || "Неизвестный автор";
  document.getElementById("infoYear").textContent = work.year || "";
  document.getElementById("infoMaterials").textContent = work.materials || "";
  document.getElementById("infoSize").textContent = work.size || "";
  document.getElementById("storyText").textContent = work.story || "";
  document.getElementById("fullImg").src = work.image_url || "";

  fullView.classList.add("open");
}

function closeFullWork(){
  fullView.classList.remove("open");
  if(tvOverlay.classList.contains("open")){
    startSlideshow();
  }
}

document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    if(fullView.classList.contains("open")) closeFullWork();
    else if(tvOverlay.classList.contains("open")) closeTV();
  }
});
</script>
</body>
</html>
